<style>
  :root {

    --paper: #f5f0e8;

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Cormorant Garamond', Georgia, serif;

    color: var(--paper);

    text-align: center;

  .controls {

  .search-wrap input:focus { border-color: var(--rust); }
  .search-icon {

    transform: translateY(-50%);
    color: var(--muted);

  }
  select {

    border: 1px solid var(--line);

  select:focus { border-color: var(--rust); }
  .results-info {

  /* LAYOUT */
  .main {

  }

  /* SIDEBAR */
  .sidebar {
    width: 300px;

    overflow-y: auto;

  .poem-list-item {

  .poem-list-item.active .poem-list-date { color: var(--gold); }
  .poem-list-title {

    font-size: 1rem;

  .no-results {

  /* POEM VIEWER */
  .poem-viewer {

  .poem-viewer.empty {

  .empty-state {

  .empty-state .big-quote {

  .empty-state p {
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 1rem;
  }

  .poem-header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--line);
  }
  .poem-number {
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .poem-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.8rem, 3vw, 2.8rem);
    font-weight: 300;
    line-height: 1.2;
    color: var(--ink);
    margin-bottom: 0.5rem;
  }
  .poem-date {
    font-family: 'Josefin Sans', sans-serif;

    letter-spacing: 0.2em;

    text-transform: uppercase;
  }
  .poem-body {

  .poem-author {

    background: none;
    border: 1px solid var(--line);

    transition: all 0.2s;

  .nav-btn:hover {

    background: var(--ink);
    border-color: var(--ink);

  .nav-btn:disabled {

  .nav-btn:disabled:hover {

  /* RANDOM BTN */

    color: var(--paper);

  @media (max-width: 700px) {

    .poem-viewer { padding: 2rem 1.5rem; height: auto; }

<script>
const POEMS = [{"title": "Writer's Block", "date": "2015-07-01", "content": "I thought to write some lines of verse,
But blank page glared and I did curse.
My mind went blank, my ears did steam,
I couldn't even choose a theme! 

And so I took a walk outside,
Through woods for inspiration stride...
But mind would just not cerebrate,
A situation that I hate -

But have grown quite accustomed to,
As my brains often turn to goo.
And so it seems I'll leave the page
As white as snow and sit in rage."}, {"title": "Motion", "date": "2015-07-02", "content": "In constant motion, here to there,
By boat and train and now by air.
I can't imagine any need
And so to stop I humbly plead.

I think it happened long ago.
Exactly when I do not know.
That with location discontent
They means of travel did invent.

And ever since, the problem grew,
So now I'll state my case to you.
Or, plead it, may be better said
As I do this situation dread.

At first 'twas simple I agree
When people wished the world to see,
Or seeking opportunity,
Or wanting somewhere else to be, 

They simply packed their bags and left.
And leaving friends a bit bereft
They forward trudged along their way
Until they found a place to stay.

But now they're moving everything.
They food and clothes and houses bring
From far off corners of the globe.
And this is what I wish to probe.

So malcontent the world does seem
And fringing on the quite extreme.
They've started moving streets around,
And even large pieces of ground.

The whole idea is simply mad.
I'm hoping it's a passing fad.
The world involved in such a tizzy,
I'm feeling just a little dizzy.

In constant motion, here to there,
By boat and train and now by air.
I can't imagine any need,
And so to stop I humbly plead!"}, {"title": "Over-extrapolation", "date": "2015-07-03", "content": "The poets, novelists, and scribes
Of yester-years gone by
Began to fill the world with words,
The land, the sea, and sky.

The process has continued on,
The writers, multiplied.
And with every sentence, phrase, and book
I grow more terrified.

You see, they're taking over.
They're filling up my mind.
And if we don't control them now
We'll be in quite a bind.

They're flying ‘round my study,
And lurking in the halls,
And filling up the crevices
In ancient village walls.

They're marching on my bookshelf,
A military troop.
And next they'll fill the kitchen, STOP!
What is this in my soup!?!

Now I've devised a clever plan
To keep them on their guard.
We'll tie up all the writers
And cinch the rope up hard.

And hence eliminate the source,
To aid in its demise.
And not allow one blasted word
Be written ‘till one dies.

The libraries will close their doors.
The erudite will weep.
And though a little harsh appears,
The silence it will keep.

And so with pen and paper, I,
Around the world will state;
The dangers of the written word,
And journalists berate. 

Then lengthy manuscripts I'll pen
Admonishing the crowds,
That they should ever cautious be
Of rhetorical shrouds.

But oh alas, I'm guilty too,
And with the rest condemned.
Then just to justify myself,
The rules I've set, I'll bend. 

(attached note)

But not to fear, the just is just
And tales all must end.
I found this note one day, you see
While visiting a friend.

He didn't answer at the door.
The blinds had all been shut.
I couldn't find a trace of life
Within his cozy hut.

But on his desk this note was left
Aside his uncapped pen.
And large cases of erasers
Filled up his tiny den.

Now some said he was crazy,
Or better yet a fool.
But I don't think he chose to die
By drowning in his pool."}, {"title": "Exhortation to the Enlisted", "date": "2015-07-04", "content": "'Tis heroic to charge into battle.
'Tis noble to die for the right.
But it requires a far greater person
To linger and valiantly fight.

It is courage, I ask, my dear fellow.
To wield your sword brave and true.
To remember the cause that we fight for
And never give up ‘til it's through.

Then after you've dealt with this conflict, and
Per chance the opponent's retreat;
You may wish to relax for a moment
And relish the victory sweet.

Or perhaps you might lose this small skirmish
And forced by the foe to retrench,
Your once noble courage now waning, and
The victory sweet's now a stench.

But whatever the day's final outcome
And whether we live or we die
I ask you my friend to remember, that 
The conflict is constantly nigh. 

We therefore must never surrender, and
There's really no time for a rest. 
We need always remain at our vigil 
And ceaselessly strive for our best."}, {"title": "Progress?", "date": "2015-07-05", "content": "Although modern innovation Is a marvelous sensation,
A phenomenon of sorts has come about:

With space age new appliances,
We've shed our old reliances
On perspiration; and this fact we tout.

As we'd rather wear our ruffles
And consume our share of truffles,
Hence our middles are now growing rather stout.

So then we join a super gym
To keep our bodies fit and trim
Yet still our blooming waistlines make us pout.

And our savings are depleted
From all these things we've needed
To maintain in our society some clout.

My final question is; would we,
Save time, our cash and energy
If chores we did do manually,

And thus I'll cease this silly verse to spout."}, {"title": "The Wonderer", "date": "2015-07-06", "content": "I sit here in my little room
With thoughts of economic theory,
Until my feeble little mind
Begins to grow a trifle weary. 

And so I ponder life some more
And ask myself, what it's all for.
Then hope that past this complex bore 
We'll realize there's something more. 

That ‘ics and ‘isms, theories, schemes,
Are not the stuff that make up dreams.
And ‘though with institutions teems,
Life may be saner than it seems. 

For isn't it concern and love
From fam’ly, God and cherished friends,
That bring real meaning to our life;
And on which more our life depends."}, {"title": "At Anchor, One Evening", "date": "2015-07-07", "content": "The greyish mist now darker grows,
While I at bay may now repose.
Then closer ‘round my jacket wrap
And readjust my well-worn cap.

Alone I sit aboard my ship,
Far from my tiny home port slip;
Reflecting on my journey here
And why I left my home so dear.

To seek adventure, truth and fame?
Was this in fact my foremost aim?
Or was it for my soul to tame?
In search of love, perhaps, I came?

But I suppose I'll never know
Exactly why I onward go,
Or which of all the ports I'll see
Or who I'll choose for company.

I only know that when I wake
This little craft I'll with me take.
And as these shores I leave behind,
Some unknown world I'll surely find."}, {"title": "The Clock", "date": "2015-07-08", "content": "(An adaptation of a theme which I chose myself and upon which I have now elaborated.)

The clock ticks on, day after day,
It has since Adam's time they say,
But what is time? And who are they?
And let it stop, oh please, I pray.

For time is nothing but a clock — a dumb machine.
Please let it stop.
It says get up! to go to bed! to go to work!
Oh how I dread that ticking, ticking of the clock
As seconds pass and hours fall behind me.
I'd rather live my life in peace,
Without that chiming, ringing beast.
It clings! It grabs! It chokes my wrist!
It lurks in corners of my room,
On table tops, in village shops,
At school, at work ... I want to shirk.
But still it leads me on.
And I must follow.

What man or beast created this –
A lifeless hunk of metal scrap
That leads my life ... my ...
But wait, it lives! Or am I daft!?!
Its hands are moving round and round,
Its face is staring at me now.
And yes, it even talks,
Or ticks as I should rather say.
But either way, it lives, and leads us all.
It tells us to be born and die.
It tells us when it's time to cry.
But now I'll close this short refrain,
I'm beckoned by my watch again.

And on it ticks, day after day,
Since Adams time, or so they say.
But what is time? And who are they?
And let it stop, oh please, I pray!"}, {"title": "The Kite", "date": "2015-07-09", "content": "Above she floats, she soars and flies.
Her colors vibrant grace the skies.
And through the strata does she rise;
Beyond the length of twine she tries. 

Yet bounded by that cursed string
She cannot t'ward the heavens fling.
But rather tethered to the ground,
As if by chain, a hostage bound. 

So for her freedom she did fight
That by the grace of God she might
Drift ever upward, out of sight.
But even more the cord drew tight. 

Then she with her full strength did strain
To rend that blasted string in twain.
And with a twist and windy flap
The sinews of that line did snap. 

Then for a moment she did soar,
But kites sans strings may fly no more.
And so from lofty heights did drop
To earth below without a stop. 

Where she did light atop a tree,
Reduced to colorful debris. 
And thus it stands; ‘though strings may tie,
Without them we might never fly."}, {"title": "Freedom of Thought", "date": "2015-07-10", "content": "Although you may my ankles bind, 
Around my wrists your chains do wind; 
I'll never truly be confined. 
For you can never stay my mind. 

My thoughts may go where e'er they will- 
My deepest fantasies fulfill. 
Although my body lies here still. 
Ideas, you may not ever kill. 

I, to the dungeon you may send. 
In vain you try my will to rend, 
But always, I'll my dreams defend. 
And thus this poem I will end."}, {"title": "My Friends, The Dreamers", "date": "2015-07-11", "content": "A world without dreamers - 
I cringe at the thought. 
Who scoff at the standards, 
Put counsels at naught; 
Who stare into space 
All day and all night;
And whose friends think they're crazy, 
And maybe they're right. 
But I'll always love dreamers, 
They're idols for me 
And I dream to someday 
A great dreamer be.
 
The arts and the science, 
The planes and the trains, 
Are all due to dreamers 
Whom history proclaims 
Had courage above and beyond 
That of the call, 
And made that which is great 
Out of what once was small. 
They thought and they sat, 
Then they sat and they thought. 
And they worked 'til one day 
A discovery they brought 
To a world full of skeptics 
And dreamer beraters 
Who laughed at our friends 
The new concept creators. 
But the dreams, they came true 
And though say what you may, 
The world's a much happier 
Place now, today.

From Tchaikovsky and Bach 
By whom great works were wrought;
Don Quixote of old 
Who the great windmills fought, 
Then Aesop the writer of Many a fable,
King Arthur who founded 
The famous Roundtable. 
There've been many a dreamer 
By whom great works were done 
And of course quite a few 
Who were laughed at and shunned. 
But the fact still remains 
And is proven each day, 
Which the annals of history 
Most clearly display: 
That while many may ridicule, scoff, and dismay 
It's the dreamers who 
Create the future today. 

A world without dreamers — 
Please silence the thought. 
Who scoff at the standards, 
Put counsels at naught; 
Who stare into space 
All day and all night; 
And whose friends think they're crazy 
And maybe they're right. 
But I'll always love dreamers, 
They're idols for me. 
And I dream to someday 
A great dreamer be."}, {"title": "A Little Opposition", "date": "2015-07-12", "content": "There is something in a sunset 
That makes me want to stay, 
And watch the colors in the sky 
Forever and a day. 

There are walks along the seashore 
I wish would never end; 
And I treasure quiet moments 
Alone, or with a friend. 

And it's times like these that help us 
To make it through this life; 
To overcome our struggles, and 
To cope with stress and strife. 

But were it not for crisis, and 
That same old daily grind; 
The constant dread of deadlines, and 
The fear that we're behind, 

I suppose they wouldn't mean much, 
And though nuisances annoy, 
If we never felt the sorrow 
We could never know the joy."}, {"title": "The Girl on the Beach", "date": "2015-07-13", "content": "I see her sitting on the beach,
The sunlight in her hair.
The world appears within her reach,
She doesn't have a care. 

Her thoughts, I'm sure, are far away,
As gulls land by her side.
The crabs dance swiftly, as they play,
To flee the rising tide.

Undoubtedly she dreams that some 
Idyllic prince appear. 
Then on his white horse boldly come
And take her far from here. 

So as I view her from afar,
I dream she thinks of me.
Then to her on my white horse ride.
Her dream prince I would be. 

But I have found that sitting out
Below the mid—day sun
Affects my rationality
Or brain damage is done. 

For as the fabled dream prince, I
Along her side did stride 
(I never had a white horse, so
That's why I didn't ride). 

And then I rather dashingly
Did sit alongside her.
She gathered her belongings and
Did quickly disappear."}, {"title": "The Poet's Plant", "date": "2015-07-14", "content": "I have a plant that ceaseless crawls
Across my desk and up the walls. 
Especially it takes delight 
In growing t'ward a source of light. 

It will not yield this constant aim,
Although with shears its growth I tame.
But rather with a vengeance rare 
It seems to reach more quickly there. 

I pondered on this plant awhile 
And thought to emulate its style. 
I should reach also for the light;
With courage strive to do the right.  

Example I might set for all 
If in the truth I posture tall. 
That clear be heard a new descant, 
\"In truth, the poet and his plant.\""}, {"title": "The Wind - part one", "date": "2015-07-15", "content": "Oh lovely wind I sing your praise,
For always you my spirits raise.
When rain-filled clouds you take away,
Allowing sunlight in my day.

Oh wond'rous wind I marvel how
You do the world pow'r endow.
The sailing ships you take to sea,
Then create electricity.

Oh pleasant wind my chimes you ring
And carry fragrances of spring.
You cool the tired worker's face;
Inspire the poet with your grace.

Oh artful wind the leaves you churn -
Kaleidoscopic pictures turn.
And fields of grain below you dance.
The hardest soul you thus entrance."}, {"title": "The Wind - part two", "date": "2015-07-16", "content": "Oh hind'ring wind, my way you slow;
The papers off my desk do blow.
The leaves from off my trees you tear,
And then you leave without a care.

Oh awful wind, the storm you bring;
With raindrops soak, with hail sting.
The birds you drive out of the sky.
The fragile land you set awry.

Oh horrid wind of days of old;
Thou courier of sleet and cold.
Through flesh and bones you drive the chill.
I plead that thou would now be still.

Oh vicious wind, at breakneck speed
To lands and homes you give no heed.
And when you're done, a ruin leave,
That we alone and homeless grieve."}, {"title": "H 2 Eau", "date": "2015-07-17", "content": "Steamy jungle heat
Wet with storms and stagnant pools,
Like a mirage rising
From a desert lake,
Mist from cascading waterfalls,
And pounding ocean breakers;

The essence of water
Free from the impurities of
Dust and plant and beast
Gently rising through life-giving air.

Bonding with common elements
To form a hint of hydration,
A wisp of wetness.

Rising through the strata
Carried on trade-wind and jet stream.
Traces of global civilizations
United in a fluid dance,
Joining together and drifting apart.

Tumbling, diving and reaching
Toward the heavens,
In silence and serenity.
Then sparking the imagination.
Unleashing thunderous groans.
Spiraling in pain and destruction.
Until it can grow no more …

Then bursting, breaking, gushing
In tears of joy and pain.
Gently released then 
Gathering in momentum and size
To nourish once more
A parched throat,
A withered leaf,
And a new season of life."}, {"title": "Loyal Pen", "date": "2015-07-18", "content": "Oh pen, what tool of wonder thou.
With you I write your praises now.
'Though greater than the mighty sword,
You patiently my thoughts record.

How dull you must believe I am,
As rubble to a polished gem.
How crude my strokes with you I draw,
My aimless rambling, rife with flaw.

I do have pity for your plight.
For in another's hand you might
Great works of literature send
Or noble cause with strength defend.

But loyal at my side you stand
Prepared to follow each command.
Thus dutif'lly your ink you give;
The life blood which allows you live.

As senselessly I babble on
Your mission in this world, a pawn.
For 'though I know you'll soon run dry,
I force you write until you die.

Photo Credit: takis kolokotronis"}, {"title": "Testimony", "date": "2015-07-19", "content": "Seeking an assurance of truth,
I follow paths 
Worn well by wiser souls.
Digging through dust, debris and clay
To lay a foundation on the bedrock of my soul.

Like planting seeds,
And causing water flow
Through parched and dusty fields
Morn’ and evening for a
Harvest yet unseen.

And in my wanderings, 
I happen upon stones
Of miracles and faith.
Evidencing the unseen, 
At unexpected times.

The edges rough 
Must now be chiseled smooth.
And placed with care 
In the foundation 
Of my heart.

I gain proficiency 
Adding stone on stone
And line upon line;
Until the walls are formed
And roof set firmly o’er my head.

My spirit’s temple.
A holy haven where
I might find solace for my soul;
That God might bless 
And leave His spirit there.

Like as a flame in the hearth,
Where loaves are baked
For light and life and
Nourishment to feed
The spirit grown within;

A sacred site that I
With weary travelers may share
To seek refreshment, peace and rest.
As their foundations now are dug.
And stones of sacrifice are hewn."}, {"title": "Black", "date": "2015-07-20", "content": "Black is bats up in the sky,
Coal and tar and household fly,

Caves and forests after fires,
Magic hats and tractor tires,

Oil, records, holes in space,
Zebra stripes, a racoon’s face,

Bugs like roaches, beetles, ants,
Horses, sheep, a preacher’s pants,

Burglar's clothes, a bad guy's hat,
Lic’rice vines, unlucky cat,

Bottom of a frying pan,
Or the skin of Kenyan man,

Widow spiders, funny light,
Shade of famous evil knight,

Judge's robe and panthers too,
Puppy's nose and blind man's view. 

If more black I want to see 
I, outside will run with glee,

On a cloudy moonless night,
Or I'll shut my eyes real tight."}, {"title": "Goals?", "date": "2015-07-21", "content": "Since my childhood they've implored
That I should my goals record.
And ‘though this counsel may be true, 
At times I share another view. 

But when I humbly counter back, 
That a direction I don't lack; 
They with me bluntly disagree 
And hence my point they fail to see. 

Although it's agonizing clear 
After my argument they hear, 
I in minority am found 
As they dogmatic hold their ground. 

So I'll attempt to clearly state, 
In order that I may relate 
With you the feelings which I hold 
As I'll feel better when they're told. 

A goal will do us little good 
Unless we do all that we should 
To reach it. And I think it's smart 
To carry it within your heart. 

As ink will smear and paper burn. 
And will you likely oft return, 
To ponder what you've written there? 
And so this final thought I'll share: 

‘Though you may pen a constant stream, 
A written goal is still a dream."}, {"title": "The Writer's Retreat", "date": "2015-07-22", "content": "The rain comes down about me as
I sit here on my stool. 
The people rushing quickly by 
Must think of me a fool. 

All soaking wet I sit here 
Inventing lines of prose,
While mud hurled from the car tires
Makes ruin of my clothes. 

But on I sit, 
And sit I must. 
Unless of course, 
I start to rust. 

For inspiration's struck me 
And I'm rather on a roll."}, {"title": "A Wandering Soul", "date": "2015-07-23", "content": "A wandering soul have I, I know. 
From where I am, I soon will go, 
To once again the world go 'round. 
No walls have I by which I'm bound. 

I think I'd like to see one day 
The bustle of the Hong Kong bay. 
Then ride along the Kenyan plain; 
Relive medieval times in Spain. 

Then to explore a Scottish bog 
And lose myself in London fog. 
I'll navigate the Amazon; 
Deplete my savings ‘til their gone 

And then I will again return 
And in my office memos spurn. 
Until I can create the wealth 
With which I may enjoy my health. 

I don't know if it's wrong or right 
To always want to take to flight. 
But rather than decay at home, 
I much prefer the world to roam.

Photo Credit: Dariusz Bargiel"}, {"title": "I Wonder Where She Is Today", "date": "2015-07-24", "content": "Along a sun drenched tropic cay?
Reclined on rocks above the bay?
Perhaps she's in her room this day,
Reflecting on the words she'll say

On that fair day when love she'll find.
Then in its snares become entwined,
To reason and to logic blind,
Emotion overcoming mind.

Oh, for that day to come I plea
When to unite we both agree.
That fin'lly we may joyful be;
Forever living ecstasy.

But we for now apart remain.
Her name to know I do not feign.
Just hope one day her love I'll gain —
That I don't search for her in vain. 

Photo Credit: Mario Alberto Magallanes Trejo"}, {"title": "Cries of Wolf (Aesop)", "date": "2015-07-25", "content": "There was a boy who tended sheep,
In valleys wide and canyons steep.

On summer days he’d laugh and run,
On fields of green beneath the sun.

On winter nights he’d wear a cap,
And tightly ‘round a blanket wrap.

He never would the flock neglect,
For each he loved and would protect.

But oft he’d find his job a chore,
As sitting could be quite a bore.

So clever games the boy would play
To pass the time throughout the day.

And once he thought it would be fun
To watch all of the village run.

So from outside the city gate,
A trick he’d play, and then would wait.

With terror in his voice he cried;
“A wolf, a wolf!” the fellow lied.

In haste they came with sword and spear
To keep the beast from coming near.

This answer to his calls of fright
Did give the boy a great delight.

When finding peace within the fold,
The angry men the lad did scold.

As time passed by, the restless boy
Again did try his naughty ploy.

Again alarms were sounded wide.
Again the men rushed to his side.

And finding calm, they were irate,
And did the shepherd boy berate.

As seasons passed without a thought,
About his prank the boy forgot.

One night while all the lambs did sleep
A pack of wolves, in stealth, did creep.

The boy cried out for help that night
To save him from the awful plight.

But no one came with spear or sword.
His pleas for help were now ignored.

Thus for deceit he paid the cost,
As many of his sheep were lost.

-----

When one is known to oft deceive,
We’re not as likely to believe.

Photo Credit: Andrea Kratzenberg"}, {"title": "Art Thou He?", "date": "2015-07-26", "content": "When the heavens yielded glory to that bright new shining star,
Was it you in humble manger born in Bethlehem afar?
Who came as son of deity encased in mortal skin, 
To save us from a second death, o'er Satan's power win?

When the sun above the hillside cast jewels across the sea,
Was it you in meager raiment who did with the masses plea?
The same who loaves and fishes took to feed the hungry throng?
The man who gave his life for me, who ne'er committed wrong?

Art thou he, redeemer of all man?
Art thou he, to chaff - the mighty fan?
Art thou he who taught the world the truth, that all might ransomed be,
Art thou he my lord, I pray thee, art thou he?

Could it be that you're the same as he who did this world form,
All powerful and mighty who delivers from the storm?
Is it you, my sins with mercy, will forgive if I repent?
For to atone for mankind's guilt, you willingly were sent.

Art thou he, redeemer of all man?
Art thou he, to chaff — the mighty fan?
Art thou he who taught the world the truth, that all might ransomed be,
Art thou he my lord, I pray thee, art thou he?

In early morning solitude, I on my knees did pray.
As shadows of the night did fade to meet the coming day.
I gave my thanks for blessings and did ask for help divine,
That I about my weakened flesh might righteousness entwine.

Then spirit spoke to spirit and my heart did graceful fly.
I knew that these new feelings I could not again deny.
A testimony of the truth I could not thus dismiss,
As every fiber of my soul did witness to me this:

Thou art he, redeemer of all man!
Thou art he, to chaff — the mighty fan!
Thou art he who taught the world the truth, that all might ransomed be, 
Thou art he my Lord, I now know, thou art he!

Photo Credit: Ashley Platell"}, {"title": "Silent Soliloquy", "date": "2015-07-27", "content": "Should I have a wond'rous thought
Or answer for a question sought;
Would throngs of people gather near
Or would it fall on deafened ear?
If I did paint a masterpiece
Or found a way, a war to cease,
Should I, with the world share —
Or do you think they'd really care?

No, I'm afraid that jaded we
Have grown as a society.
And so absorbed within our sphere,
That rare another’s thoughts we hear.
Thus I alone content must be
To revel in tranquility;
While singing my soliloquy,
Singing for no one but me."}, {"title": "White", "date": "2015-07-28", "content": "White as Angels, fallen snow, 
Brides and Buttons, Ribboned Bow,
Pure and Soft as fluffy cloud,
Dreams of Heaven shared aloud,
Flowers blooming o'er the land, 
Water falling, coral sand,
Glist'ning mountain top at dawn,
Fresh and clean, the tail of fawn,
Swans out floating in a pair,
Lily petal, Arctic bear,
Cauliflower, milk and cream,
'Taters, sugar, salt and steam, 
Flour, short’ning, bakers dough,
Kitchen counters' shining glow,
Stucco, walls and paper ream, 
Hospitals and lights that gleam, 
Even presidential home,
Color of Alaska's Gnome, 
Padded cells and teeth and socks, 
Shirts and suits and old folk’s locks. 
’Though I try with all my might, 
All I see around me — White."}, {"title": "That's Life!", "date": "2015-07-29", "content": "Now let's suppose one day you found 
Your home had burned right to the ground. 
Then sifting through the ashen mess, 
You badly soil your only dress
(For all the rest were lost). 

Now many would profanely swear. 
Or yell and pull out all their hair. 
Then sit upon the ground and cry 
\"Why always me? Oh why? Oh why?\" 
(And drink until they're sauced). 

But after all it seems to me, 
That life's not always meant to be 
Devoid of worries, fear and strife. 
And ‘though it's sometimes rough, that's life! 
(As someone great once said). 

And even if the wrath of God 
One day the polar ice caps thawed.
Or all the world went to war, 
And missiles through our cities tore. 
(And left us all for dead). 

I hope that we, through all the pain, 
Could find the strength to not complain. 
But rather sing a glad refrain 
And always calm and cool remain; 
(For after all, THAT'S LIFE!)."}, {"title": "Sand", "date": "2015-07-30", "content": "Have you counted sand on seashores?
I could never get past one.
For my mind begins to wander
As I gaze off toward the sun.

Because, you see, each grain of sand
From somewhere made its way;
And now upon this stretch of beach
Has found a place to stay.

And grain by grain they immigrate,
Presumably because of fate.
Then by the sea they congregate.
And under sunlit skies they wait.

So o'er this fair and sandy shore
Ten thousand years or maybe more -
Have flown across as eagles soar,
Undaunted by the oceans roar.

But wait for what, or who, and why?
And ‘though I search, find no reply
For rarely does a soul pass by
Beneath this azure, cloud specked sky

Until one day, the answer came.
‘Twas simple I admit.
The Lord, our God this all did frame,
As place for me to sit.

Have you counted sand on seashores?
‘Though you might not get past one,
You will know that God has blessed us
He has blessed us, Every One. 

Photo Credit: Daniel Tan"}, {"title": "The Stone Carving", "date": "2015-07-31", "content": "I saw a beautiful stone carving
In the window of the Gallery.
But I didn't want it in my house
Because it wasn't really for me.

If I had sailed across the ocean
And climbed a great mountain
And cut my way through a rain forest
Where I found a lost civilization

Then taught them to dig wells
And build good homes
And make pizza
And cure cancer

And then they made a beautiful stone carving
To express their appreciation
For the time I had spent with them
And the wonderful experiences we had,

And I carried it through the forest
And over the mountain and sea
Then I would want it in my home,
Because then it would really be for me."}, {"title": "Song of the Grasshopper (Aesop)", "date": "2015-08-01", "content": "The tiny ant did march away
Much of the night, and all the day.

In spring and summer and the fall,
He answered brave to duty’s call.

Searching food, both far and near;
Never a cry, never a tear.

Hefting morsels larger than he –
Carrying back to colony.

And while the ant did hike along
The grasshopper would sing a song.

On summer days he’d play and dance.
Future’s destiny left to chance.

Both care and worry he did spurn.
And storing food was no concern.

On he sang his melody still,
As autumn closed with frost and chill.

Winter brought its sleet and snows.
Crops were covered, water froze.

Now begging help and charity,
The grasshopper did humbly plea:

“Without some food I’ll surely die!”
The ant would offer no reply.

“Next year, my ways of idle end!”
The ant, however, did not bend.

The grasshopper did not survive. 
The ant through winter stayed alive.

---
Diligence often returns with a gain,
While laziness likely will only bring pain.

Photo Credit: Martin Kessel"}, {"title": "An Introduction (to a poem I never wrote)", "date": "2015-08-02", "content": "I'd like to write of things unknown, 
Epistles fresh and new. 
Of feelings, thoughts, expressions
That are known to very few.

I would like to write of blessings
And count mine one by one.
To thank my heav'nly Father
As a grateful heav'nly son.

To expound the holy scriptures
And the gospel truths extol;
So that my words might edify
The tired and weary soul.

But alas, I'm just a poet -
And a lousy one at that.
So please forgive my rhyming phrase
For all that it may lack."}, {"title": "Streamlet", "date": "2015-08-03", "content": "Born from melting ice and snow
Wending round the rocks you go,
Easing gently down the hill,
Over craggy ledges spill. 

Gaining speed and volume too,
Frigid cold and pure are you.
Quenching mountain climber's thirst.
O'er your fragile banks you burst. 

Spawning fish of every kind.
Through the canyon floors you wind.
Bringing life to bush and tree.
Down you flow to pass by me."}, {"title": "Words", "date": "2015-08-04", "content": "Words can be beautiful,
Words can have power.
Read to a child and then
Later they flower. 

Read me a nurs'ry rhyme
Nightly in bed.
I will remember it
Well ‘til I'm dead. 

Words can be moving and
Rhymes will endure.
See that they're righteous
And wholesome and pure. 

Photo Credit: Horton Web Design"}, {"title": "Grandmother's Clock", "date": "2015-08-05", "content": "Just you and me, old chum, are left;
And only one of us bereft
At consequence of passing time.
For you 'tis merely endless rhyme. 

If tick does rhyme with tick,
And tock with tock. 

When first we hung you on the wall
Above the hearth, secure from fall
And each week careful wound your spring
That faithful time to us might bring;

How could we know that we
Would now be me.

And surely as your hands go round
I too will be laid underground;
As mortal springs cannot be wound
Refreshing life with each turn found.

But reassuring is
That you'll tick on.

Good company for me you make
As little, from me, do you take.
And as you sound upon the wall
I know I'm not alone at all.

As tick does follow tock
And tock does tick."}, {"title": "Twisted Tree", "date": "2015-08-06", "content": "Old Twisted tree
On craggy cliff, above the sea,
Warped by wind and constant storm
To this knotted, pitted form. 

Young sapling, straight, 
Within the forests's sheltered gate 
Tall, unmarred one day will stand. 
Thing of beauty on the land.

If left alone
Just one, past seige, the vict'ry own
For trials bestow the strength
To last the war’s full length. 

But as a group,
Protected and not forced to stoop.
Both tall and true you grow,
But strength of battle do not know. 

Photo Credit: Scott Liddell"}, {"title": "Tradewind", "date": "2015-08-07", "content": "I wonder if there's one who knows
The source from where the tradewind blows.
That font of airy cool retreat
From tropic sun and summer heat. 

The breeze that with it memories bring
Of younger days and love in spring.
For as it blows from island shores
It soothes the day and youth restores.

Oh tradewind, blow my way today.
And ‘though I know you may not stay,
Please leave with me a fragrance sweet
And take my love to all you meet.

Oh fabled wind of bygone date,
I know from where you emanate
Must be indeed a wond'rous place
Replete with beauty love and grace.

So if there's one who knows the source
I wish for me he'd chart the course.
Then for the place where tradewinds blow
I'd pack my bags and off I'd go. 

Photo Credit: Jules Bloemen"}, {"title": "The Old Lion (Aesop)", "date": "2015-08-08", "content": "A lion growing sick and old
No longer could roar brave and bold.

Within his lair the lion stayed.
On passing creatures there he preyed.

A bright young fox did happen by
And he the lion’s lair did spy.

The lion called, “dear fox, good day!
Come join me in my cave, I pray.

It’s clean and cool, come rest your feet,
Enjoy this shade from desert heat.

I’m feeling all alone and sad,
Your company would make me glad.”

The fox was smart and saw some clues
That this perhaps might be a ruse:

“The tracks which enter are quite clear,
But none are going out, I fear.”

“Some travelers who found my room,
I must admit, I did consume.

But you, good friend, I would not eat,
Just curl yourself up at my feet.

My good intentions you will see,
I’ll grant to you immunity.”

With caution then, the fox did tread –
Although he should have quickly fled.

Then his tracks too went in the den,
And never saw the sun again.

---

To not fall prey to evil schemes,
Observe if others reach their dreams.

(Index references: Oxford-Gibbs 18, Perry 142)"}, {"title": "Direction", "date": "2015-08-09", "content": "Within the fragile human soul
There's space for but a single goal.
Hence all attempts must prove in vain
To pry the blessed thing in twain.

The limbs and mind may part their ways,
And mouth a separate homage pays,
But deep within, a noble aim,
Or else desire for evil's name.

The choice is ours to careful make
And opt the path to onward take.
Then urge the body to conform
That we might weather brewing storm.

The path at times is slow indeed
With hindrance, sweat; with foe, we bleed
For mortal errors we may pay -
The soul, though, points a single way.  

Photo Credit: Thomas Pate"}, {"title": "One More Try", "date": "2015-08-10", "content": "The greatest authors of our age
Have found it hard to fill a page.

Each leader great has sadly known
A time when he just stood alone.

No athlete who won vict'ry sweet
Has also not been soundly beat.

The path to each great artwork hewn
Is with it share of failures strewn.

Remember, 'though you fail today,
Success may be one try away.

Inspired by:

\"Our greatest weakness lies in giving up. 
The most certain way to succeed is always 
to try just one more time.\"
Thomas A. Edison"}, {"title": "Foreign Aid", "date": "2015-08-11", "content": "I hear that NASA's looking for
Some life out there in space.
Perhaps another planet on
Which lives another race. 

Now some say that we should only
Exert our energies
On helping those around us, and 
Reacting to their pleas. 

Well, I believe we ought to help 
Our fellow man, like you. 
But maybe we can find someone 
Out there to help us too."}, {"title": "The Telephone", "date": "2015-08-12", "content": "The telephone, the telephone,
That ringing, ringing, constant drone.
From far and near, they all call here.
I really wish they wouldn't dear.

For I do dread to answer back
Through plastic tubes and relay stack.
‘Though wonder of the modern age,
At times it does my soul enrage.

When in a tranquil state of mind,
It's shrill, unnerving sound does wind
And I as servant do attend.
My faithfulness I solemn rend.

For only worse than this dread state,
Is silence, when a call I wait."}, {"title": "Talents", "date": "2015-08-13", "content": "I wish that o'er the keyboard I,
Could make my fingers dance and fly.
To gently on the ivories
Sound joyful airy melodies.

Or on a canvas paint a scene
With careful strokes, precise and clean,
That more than simple scene retold,
But moved the soul in color bold.

I'd also like to one day write
A book with all convincing might.
To alter lives and cause new thought,
That by my deed great works be wrought.

But talent great is rather rare
And meted out with such great care,
That those of us of common birth
Do find within a certain dearth.

And so our lot I do suppose
Is to enjoy the work of those
Who have been blessed by touch of fate
And do possess that gift so great.

But don't forget that gifts have all
And everyone a certain call.
And we must each perform our role
To realize the greater whole."}, {"title": "Shades of Gray", "date": "2015-08-14", "content": "The world, some say, is black and white.
And I suppose 'tis true,
With limited perspective, or
A narrow point of view.

To some there is a right and wrong,
There is no other way.
Enforcing their morality;
They do not ever stray.

Now, I won't write there is no wrong.
Nor will I thus dismiss
The presence of a moral right.
My point is simply this:

In the spectrum of the colors
Are many shades and hues.
And from this vast selection, with
Discretion, we may choose.

There are limits. There are guidelines;
And truths we can't deny.
However, many avenues
Are there for us to try.

For some things matter little, from
A more eternal view.
To show this, I'll a question pose
And prove my point to you:

In the morning when you wake up
And crawl out of your bed,
Should you firstly opt to brush your teeth
Or wash your face instead?"}, {"title": "Dinner Guests (Aesop)", "date": "2015-08-15", "content": "One afternoon a fox did see
A stork relaxing by the sea.

He asked if she at 7:10 
Would like to dine within his den.

And she agreed and so they met
Around a table finely set.

The fox then on a dish quite ﬂat
Served soup, and in his place he sat.

He lapped it up and didn’t stop.
The stork, did not consume a drop.

For her long beak could not obtain
The soup, but she did not complain.

But rather asked if in a day,
The fox might like to pass her way.

And they could eat beside her nest
For she made soup, the very best.

He said he’d come and did regret
That she could not enjoy his fête.

Then on the morrow, when he came
The stork had played a kindred game

For she had set two vases out
With necks too narrow for a snout

And as she sipped her soup with glee
The fox kept pleasant company.

But he could not the soup enjoy,
As he was tricked by his own ploy.

---

For unto others should you do,
As you would have them treat you too.

(Index references: Oxford-Gibbs 156, Perry 426)"}, {"title": "Son of Thunder", "date": "2015-08-16", "content": "As witness of the light you shine 
On earth as beacon true. 
And no one since has written of 
The Word as well as you. 

Your life was changed that day long past 
When on the shore stood He, 
And leaving nets and fishing boats, 
You followed willingly. 

Oh John, the one whom Jesus loved,
A son of thunder still, 
Remaining with the wicked to
Administer His will.

Oh John the one whom Jesus loved,
A son of thunder still,
A mission for the latter days
A greater work fulfill. 

As with Him to the mount you went
And saw a cloud of flame, 
A witness to His godly pow'r, 
You watched Him tempest tame.

Then faithful by His side as you
Went to Gethsemane.
A comfort to His mother as
They hanged Him on that tree. 

So when in banishment were sent
In chains to Patmos' Isle, 
The heavens to you opened and
Upon you they did smile. 

For when the angel with the book
Commanded you to eat,
Without a hesitation, you 
Did obligations meet.

Oh John, the one whom Jesus loved,
A son of thunder still, 
Remaining with the wicked to
Administer His will.

Oh John the one whom Jesus loved,
A son of thunder still,
A mission for the latter days
A greater work fulfill."}, {"title": "Start", "date": "2015-08-17", "content": "The pathway to a mountain peak
Goes through a valley, 'cross a creek.
And ev'ry climber first steps take,
Before they can a summit make.

A boat that crosses o'er the sea,
Does first the harbor have to flee.
Its sails unfurl, its anchor raise
Before upon a new coast gaze.

A painter first her paint does mix.
A drummer must pick up his sticks.
A chef must take in hand a knife,
And so it seems to be in life;

If you aspire to something more,
you have to first walk through the door.
Success, it's true, can be an art.
The secret though, is just to start.

Inspired by:
\"The secret of getting ahead is getting started.\"
Mark Twain"}, {"title": "Market Forces", "date": "2015-08-18", "content": "The forces which the markets drive 
Appear to be well and alive.
And little do the traders care
If it's a bull or it's a bear. 

As long as players always play
The wheels grind throughout the day.
It's just a roller coaster ride
An ebb and flow of changing tide.

Each day are fortunes gained and lost,
With arbitrage and margins crossed.
And every day we see more clear
The give and take of greed and fear."}, {"title": "Setting Sail", "date": "2015-08-19", "content": "To sail on seas of blue and green
With azure skies above -
Is like a song, a symphony,
A harmony of love.

The rolling swells below me dwell -
A playful, teasing sea,
That seems by some entrancing force
To call and beckon me.

A plea to leave the harbor,
To fly before the wind,
To set my sights on distant lights -
My life on land rescind."}, {"title": "The Painting", "date": "2015-08-20", "content": "I saw a picture hanging
In the local gallery.
And I knew at once that this one
Was the perfect one for me.

’Twas a painting of the seashore,
And waves along the sand.
With gulls and rocks and clouded sky -
I thought that it was grand.

The water was a greenish blue
That sparkled in the light.
The soft white clouds across the sky
Were really quite a sight.

The sand was white and soft and clean
With shells tossed here and there.
The gulls were also pretty,
As they hung there in the air.

And so I asked the merchant
Who was sitting at the till;
\"If I were to buy this painting
Just how much would be the bill?\"

He then began relating
All the long harsh years it took,
How it had won some special prize -
Was published in a book.

And then he boldly told me
How much I'd have to pay.
And I quite unabashedly
Said there was just no way.

Although I do appreciate
That painting on the wall,
To ask of me such large a sum
Requires quite some gall.

Then I did walk along the beach
And found that I could see
A scene surpassing that old frame -
And it was all for free."}, {"title": "Love Line", "date": "2015-08-21", "content": "I wish I had some clever lines
And knew just what to say.
I wish that I were handsome, and
The heroes role could play.

I also wish that charm and grace
Came easily to me.
And for my style and bearing, you
Impressed with me would be.

Yet nonetheless I‘m standing here,
Adoring only you;
And hope that by some quirk of fate
You're thinking of me too.

So if you have some idle time
With nothing really planned,
I wonder if you'd like to take
A walk along the sand.

And we could talk of life and love
And politics awhile,
Then if you like the company
You'll look my way and smile.

I thought I'd write this little note
With honesty unfeigned.
I only have my pride to lose -
And nothing ventured, nothing gained."}, {"title": "The Worth of a Hare (Aesop)", "date": "2015-08-22", "content": "The kingdom of all beasts did hold
A council great for young and old.

Each animal did then suggest
New laws they thought would serve them best.

So, many creatures concepts shared
That in the group they might be aired.

Aware of his low standing there,
A thought was offered by a hare:

“Regardless of a creature’s birth,
Each one should be of equal worth.”

This edict he did then propose
To see who might his words oppose.

The smaller creatures thought this grand,
And cheered as they did all then stand.

The lions sought to calm restore
And all let out a piercing roar.

Then all the lions gathered ‘round
To say, “small hare there, on the ground.

We only see your furry paws –
Where are your fangs? Where are your claws?”

In silence did the hare retreat.
He knew, on this, he had been beat.

---

Only fools propose new laws
Opposing those with sharper claws.

(Index references: Oxford-Gibbs 21, Perry 450)"}, {"title": "Morning Conversation", "date": "2015-08-23", "content": "Oh Lord, I ask this morning as I wake;
That I thy spirit with me I might take.

That I might feel thy loving care.
That I might know you're standing there,
Along my side, when troubles come my way. 

Dear Father, hear this prayer of mine
As I now put my faith in thine 
Eternal care and for thy kingdom seek.

I ask thee lead me down thy path.
Protect me from the tempters wrath.
Please make me strong, oh Lord, for I am weak.

Oh Lord, I thank thee for thy light divine.
And pray that truth, my actions will define.

That I might love my fellow man,
Enough to share with him thy plan.
And help a friend obtain thy glorious rest.

As through another day of life I pass,
Though I know, Satan, armies will amass;

I ask thee only that I see
Creation thou hast framed for me,
And joy in that. For I do know I'm blessed.

Dear Father, hear this prayer of mine
As I now put my faith in thine
Eternal care and for thy kingdom seek.

I ask thee, lead me down thy path.
Protect me from the tempters wrath.
Please make me strong, oh Lord, for I am weak."}, {"title": "Choices", "date": "2015-08-24", "content": "It really doesn't matter if 
I sink or if I swim.
But should I choose the former, things
Might look a bit more grim. 

And so it is in life it seems,
As options fill the day.
It's up to no one else but me
To choose my chosen way. 

The problem I have found of late
Is that I wish I knew,
Of all the good alternatives,
Which of them I should do.

To sail the seven oceans or
To climb the mountains tall
Or paint the perfect masterpiece...
Perhaps, I'll do them all."}, {"title": "Education", "date": "2015-08-25", "content": "Education, education, 
There's no need for provocation. 
Won't you trust me to my studies, sir? 

I'm a dreamer, not a scholar. 
But I'll wear the student's collar, 
As I read the next soliloquy. 

For I suppose with facts in hand 
I'll on a greater plateau stand. 
But do you think it really worth the pain? 

For as each novel piece of fact 
When with my brain does make impact 
I feel cerebrum painfully expand. 

And this is what I have to show,
Because I've truly found it so,
The more I learn the less I find I know!"}, {"title": "Red", "date": "2015-08-26", "content": "Roses, blood and Scottish hair,
Apples, cherries, steak that's rare,

Ketchup, fire, chicken pocks,
Lobsters, lips and molten rocks,

Cardinals, strawberry tarts,
Cape of matadors and hearts,

Fire truck and sunburned neck,
Half the cards in playing deck,

Pirate beard and lipstick too,
U.S. flag with white and blue,

Tile roofs above your head,
Wagon by a child led,

Watermelon, sunset sky,
Flashy sports car racing by,

Square in Moscow, angry hue,
Sea that Moses walked right through,

Stop sign, royal robe and ants,
Viking Eric, Mickey's pants,

All the things that I've just said,
Each and every one is red."}, {"title": "Well Read", "date": "2015-08-27", "content": "I met a man who in his home
Had books of every kind.
Of every subject, shape and size,
Why, you would surely find.

But never did he turn a page
Or bend a binding back.
He just admired them each day,
And added to his stack.

I met a man who didn't have
A pair of shoes, to walk.
But he had read most ev’ry book,
And with him I would talk...

He didn't own a palace where,
Within he lounged reclined.
But he owned treasures great and vast
Within his eager mind."}, {"title": "Ruins", "date": "2015-08-28", "content": "Shafts of morning light
Through castle's gaping crack,
Reflect the moment
When foe did make attack.

Sheltered royal court
Awakened to the sun,
The harshness of life,
Which heretofore did shun.

Did I, now dead lord,
Build battlement to hide
The sick and helpless,
Who suffer by my side."}, {"title": "Flattery of the Fox (Aesop)", "date": "2015-08-29", "content": "A crow was gliding through the air,
The sun was out, the day was fair.

She found some cheese beside a creek
And now did have it in her beak.

She soon would eat each tasty bite,
And rest from her long morning ﬂight.

But down below a fox did creep
And on a rock he then did leap.

He saw the cheese, his mind then raced,
At how delicious it would taste.

He called, \"Dear Crow how well you fly.
Your presence brightens up the sky.

And how your coat of feathers shines,
Like diamonds from the deepest mines.

I’ve also heard you sing so fair,
Far sweeter than the song birds there.

Please sing for me your happy song,
And I will go, I won’t stay long.\"

Then as she blurted out a Caw,
The cheese fell to the fox’s paw.

And she learned a great lesson true.
That I will share again with you:

---

You never, never, never must
Give to a ﬂatterer your trust.

(Aesop index references: Oxford-Gibbs 104, Perry 124)"}, {"title": "Isaiah 49 - Zion", "date": "2015-08-30", "content": "O isles listen unto me -
Come forth that ye might hear.
The Lord hath called me from the womb,
Yea, all the earth come near.

The Lord hath called me Is-ra-el,
Much like a sharpened sword;
A polished shaft that’s hid within
The quiver of the Lord.

My labor I have done in vain,
My strength is spent for naught.
Yea, I shall by my Lord be judged,
And His great work be wrought.

‘Though Is-ra-el is yet dispersed,
And I have worked at length.
In God’s eyes shall I glory find –
My God shall be my strength.

Yea, in the womb was Isra’l called,
A faithful servant true;
A light unto the Gentiles, who
Her people would renew.

And though she was despised of man,
Abhorred, ashamed and beat;
Both kings and princes shall arise,
And worship at her feet. 

The Lord hath said, in His own time,
Would hear her and preserve –
Would give her for a covenant –
Inheritance reserve.

The Lord hath heard her prayers upon
The isles of the sea.
A servant shall He call up then,
That she might gathered be.

Through the mountains they shall travel –
On highways great shall flee –
From north and west, from far and lo,
From prison they’ll be free.

They shall not hunger nor shall thirst,
They in the way shall feed.
By springs of water shall they pass,
As God above doth lead.

O heavens shout, be joyful earth,
The Lord doth comfort bring.
His people shall not suffer more,
The mountains all shall sing.

Though Zion feels forsaken now,
God shall not them ignore.
‘Though mothers may forget their babes,
God’s people He’ll restore. 

For they are graven on His palms,
And also on His walls.
Their conquerors shall lay as waste,
If they do heed His calls.

Lift up thine eyes, and look about,
The Lord doth stand with pride.
As Is-ra-el He doth adorn
In clothing of a bride.

And though her children first were lost,
God others did replace.
And now in all the land there’s not,
For all sufficient space.

Yea, God shall lift again His hand;
And through the Gentiles, He
Will raise a standard high so that
All Is-ra-el might see.

The Gentiles then shall Isra’l nurse,
And lead them back once more;
Upon their shoulders carry them,
To Is-ra-el restore.

And kings and queens shall be their nurse,
‘Til all the work be done;
That all of mortal flesh should know
The Lord – The Mighty One. 

To Is-ra-el they all shall bow,
And lick her dusty feet
As they who for their God do wait.
Shall have redemption sweet.

The Lord shall free the captives and
Deliver all the prey.
And God from the oppressor then,
Shall take them in that day.

And God shall cause they that oppress,
On their own flesh to feed.
The Lord, the Great Redeemer, shall
The people all then heed. 

Excerpt from the book \"The Ballad of Isaiah\" by"}, {"title": "Look to the Stars", "date": "2015-08-31", "content": "Some people work all night and day.
They \"punch the clock\" and get their pay.
With windows closed, and door tight shut,
They carve an ever deeper rut.

While others never work, it seems,
And hope to pay their rent with dreams.
They live apparently on air,
And don't appear to have a care.

But those whom I have seen succeed,
Are quite a different acting breed.
They'll dream until they have a thought,
Then work until results are wrought.

So, if you care to pay the price,
I have some rather good advice:
Look to the stars, where dreams are found.
But keep your feet upon the ground.

Inspired by:

\"Keep your eyes on the stars, and your feet on the ground.\"
- Theodore Roosevelt"}, {"title": "Lunch", "date": "2015-09-01", "content": "You send your loved ones off to school
With lunch bag neatly packed.
Nutritious little nuggets all
Are delicately stacked.

But most folks miss the point here, and
Possess the foolish thought
Their offspring will of course consume
The meal that she brought.

Though, it is well established when the
Lunchbell starts to ring.
The children start their trading
Of the things that they did bring.

And it indeed is very rare
That what a mother sends,
Does not get traded right away
For what is brought by friends.

And so I've formed a theory that
The parent who pack sweets
Will have a kid who trades them off,
And hence the system beats."}, {"title": "Exploration", "date": "2015-09-02", "content": "The earth is so wonderful spacious and wide,
I want to explore it on every side.

I want to climb the highest peaks,
And wander through the trees.
Then brave the deserts parching heat,
And sail the seven seas.

I want to see the arctic floes,
All animals and birds.
I want to see what man has made,
And read the author's words.

The world is so vast and so deep and so high,
I want to see everything under the sky."}, {"title": "The Castle", "date": "2015-09-03", "content": "Far from peasant strife and hassle,
On the hill, there stands a castle.

What great lord did there reside,
And the lady by his side?

In the castle on the hill,
Stern, foreboding, stands there still.

To inhabit this great castle
Did they win a bloody battle?

Or by marriage did they pact
To share in peace this noble tract?

But the castle on the hill,
As a beacon, stands there still.

Was it true, nobless oblige,
Speak to me, thy faithful liege.

Now the weeds have taken o'er
The tower and the gilded door.

Yet the castle on the hill,
‘Though a relic, stands there still.

Many travelers will say
As they pass along this way;

\"Who I wonder, filled the hall,
'Fore the weeds did grow so tall.\"

And the castle on the hill,
In silent glory, stands there still."}, {"title": "Jealousy", "date": "2015-09-04", "content": "She to another, I do find
Does seem a trifle more inclined.
It's not a new scenario.
But once again it's time to go.

And so to where the shadows loom,
In distant corners of the room;
I'll hastily make quick retreat.
And there in darkness take my seat.

I cannot bear to see her face,
Her shining radiance and grace.
Espec'lly when she takes his hand
And when embracing they do stand.

It makes no sense why I should be
In such a state of misery.
When those who know, have all told me
\"More fish there are within the sea.\"

But feeble minds like mine, you see,
Do not with rationality
React to things emotional,
But rather lose complete control.

My flesh is turning shades of green.
I never such a sight have seen.
It's awful when so helplessly
I prey do fall to jealousy."}, {"title": "The Hares and the Foxes (Aesop)", "date": "2015-09-05", "content": "Upon the hares, an eagle preyed.
Each day, it seemed, a friend he slayed.

In council, they decreed “No More!”
And on that bird declared a war.

But to fulfill their rash decree,
They lacked a winning strategy.

An ally they would have to bring
To beat this foe with claw and wing.

Unto the foxes they did plea:
“Combined we may win victory!”

The foxes being rather wise
Knew well the creature in the skies.

And in their wisdom did opine
That they this skirmish should decline.

For ‘though the cause was just and right,
To wage this fight was not too bright.

---

Assess which foes your might can quell,
And always choose your battles well."}, {"title": "The Faith of One as Weak as I", "date": "2015-09-06", "content": "If I had faith as Moses had
To make the Red Sea part;
Or just as a small mustard seed
Placed somewhere in my heart;

I know that I could mountains move.
And miracles perform...
Impart the blind their vision, and
To tame the savage storm.

But at times I feel I'm lacking 
(Between just me and you)
I fear that I have much to learn
Before these feats I do.

I truly know that God does live.
His son was crucified.
To all the resurrection is
Most graciously applied.

But line by line, the method, by
The which we all must learn.
And bit by bit the progress, as
We greater power earn.

So I thank my Heav'nly Father
Each morning as I pray;
For the faith I have to wake up
And face another day.

The faith I have to earn my keep;
To buy my daily bread.
To overcome temptation and
To choose the right instead.

And so if I, each week or so
A bit more faith do gain,
Perhaps my own celestial crown
I will one day obtain.

Copyright ©"}, {"title": "Time", "date": "2015-09-07", "content": "Time,
A succession of events
Leading in no particular direction, but
Leading nonetheless. 

Millenia,
Centuries, decades, years, months,
Weeks, days, hours, minutes, seconds:
Measurements of time. 

Attempts 
To assign precise calibrations
To events of rather uncertain duration.
Leading to confusion.

Order.
Events without a sequence in time reject reason.
Chickens before eggs, carts before horses …
Is reason so important?"}, {"title": "Anti Anarchism", "date": "2015-09-08", "content": "I don't believe that freedom is
To do what e'er you will.
I do not think it was designed
To selfish whims fulfill. 

I don't feel errant actions a
Society maintains;
Reject that prudent law, in fact,
My liberty restrains.

Some thousand years of humankind
Existing on this world,
Have spawned a lot of sovereignties
Whose banners they’ve unfurled.

And every one was guided by
A form of civic code.
For under this agreement they
In harmony abode. 

But when they tired of it, and
Found out it was a chore;
They picked up all their armies and
Then marched again to war. 

We struggle to be bound by laws
That other men did write;
But far less detrimental than
A rifle take to fight. 

I don't condone that blindly we
Corruption should support;
Attempt to overpower us
As honesty purport. 

I just know that civ'lization
Could justify its name,
If everyone on rules agreed
And faithful played the game."}, {"title": "Yellow", "date": "2015-09-09", "content": "Yellow is a color bright,
Like a flashing caution light,

Mustard, egg yolk, lions, corn,
Newspaper that's old and worn,

Goldenrod and fireman's clothes,
Half a bee and Texas rose,

Coward's belly, fire’s glow,
And some non—edible snow,

Dandelions, hair that's fair,
Slickers in the rain you wear,

Baby chicks and cheddar cheese,
Could you pass the butter please?

Sunflowers that turn and sway,
Sunshine bright throughout the day;

Goldfish and Canary wings,
Why, there's just so many things -

Ripe bananas, post—it notes,
Legal pads for writing quotes,

Jaundiced skin, papaya, gosh,
Duck feet, Bird's beak, summer squash

Deadly fever, lemon rind,
Yellow’s all that's on my mind."}, {"title": "A Simple Rhyme", "date": "2015-09-10", "content": "I think that I shall never win
A Pulitzer.
For that does talent, intellect
And work infer.

But If I should a simple rhyme
just happen on,
I'll write it in my little pad
And when I'm gone —

If one should read that little phrase
And think it nice,
My life will then have been a worth —
While sacrifice."}, {"title": "Love", "date": "2015-09-11", "content": "You      Me
One      Two
Hot      Cold
Joy      Misery
Near     Far
True     False
Here     There
Life     Death
Hope     Despair
Found    Lost
Right    Wrong 
Forever  Never 
Growing  Falling 
Adoring  Loathing
Together Apart
Rational Irrational
Caressing Pounding

Love."}, {"title": "The Hare and the Sparrow (Aesop)", "date": "2015-09-12", "content": "Enjoying all the fresh, clean air,
Upon the meadow was a hare.

A shadow on the ground was cast,
And with a start, the hare moved fast.

But with a cry, and then a gasp,
Sharp talons ‘round his sides did clasp.

And then the hare began to rise
Into the boundless summer skies.

Held firmly by the eagle’s grip,
The hare would take this final trip.

A sparrow fluttered ‘round about,
Then at the hare began to shout:

“What happened to your fabled speed?
It failed you in your time of need!”

“They said that you were oh so quick –
But now it seems you’re not so slick!”

But while the sparrow thus did tease,
A hawk, the bird did quickly seize.

The hare despite his own grave plight
Did say, “my friend, that serves you right!”

And so with his last, final breath,
He felt much better facing death.

---

We see that those who ridicule,
May one day soon become the fool."}, {"title": "Isaiah 30:15-25", "date": "2015-09-13", "content": "The Holy One of Is-ra-el,
The Lord thy God hath said -
Although my children, I would save,
Another chose instead.

Yea, ye said no – for we will flee,
On horses swift shall ride.
Yet God shall grant your enemies
To swiftly reach thy side.

As many flee, ye shall be left
As desolate and still –
As beacon on a mountain top –
An ensign on a hill.

And then shall God, with mercy great,
Be gracious unto you.
Yea blessed are all they that wait
For God’s great judgment true.

In Zion, at Jerusalem,
The people shall then dwell.
They’ll no more weep, their cries He’ll hear,
Their fears, He all shall quell.

That thy eyes might see thy teachers
God giveth thee, before
The bread of dark adversity –
Affliction’s water pour.

And in thine ears, the spirits voice -
To on the path stay straight;
First to the right, and then the left,
And safely through the gate.

All other gods and images
You’ll melt and cast away.
And bread of increase shall be thine,
As rain shall bless that day.

Thy cattle in large pastures feed,
The oxen and young ass.
With fan and shovel ye shall reap
The grains and all the grass.

Yea, streams and rivers shall then run
On hills and mountain tall -
Upon that day of slaughter great,
Yea, when the towers fall.

Scriptural Reference: Isaiah 30:15-25"}, {"title": "Win", "date": "2015-09-14", "content": "I’ll tell you who you cannot beat –
The fellow who stays on his feet.
Or if knocked down, he gets back up –
He’s always going to win the cup!

You may be faster, or more wise –
But he will always claim the prize.
He’ll take a punch right to the chin,
And somehow, he will always win.

You try to squash his spirit down,
He’ll come right back, and win the crown.
You beat him ‘til he’s on the floor,
And there he comes, right back for more.

So if a vict’ry is your plan.
You simply have to be that man!

Inspired by:
“You just can’t beat the person who never gives up.”
Babe Ruth"}, {"title": "Are One Thousand Words Worth A Picture?", "date": "2015-09-15", "content": "A picture’s worth a thousand words.
I'm told that it is so,
By those who feign authority.
And I suppose they know. 

But if we're mathematical,
And turn the phrase around;
Does, under thorough scrutiny,
The theory remain sound. 

If I should pen and paper take,
One thousand words did write,
Then paste them o'er my mantle, 
Would It make a pretty sight? 

And regardless of the masses,
And what they may believe;
A book with only pictures would
Be cause for me to grieve. 

So please keep pictures on the wall;
And words inside of books.
You'll make your life much easier;
And get less funny looks."}, {"title": "Estrellas", "date": "2015-09-16", "content": "Estrellas brillantes
Tan altas que son.
Mi Dios me ha dado
Un gran gallardón.

Ahora soy niño,
Espero aquí.
Arriba está,
Esperando a mí.

Estrellas brillantes
Con la luz pido ya,
Enseñen la ruta
Al cielo allá."}, {"title": "Contemplation", "date": "2015-09-17", "content": "Along this stretch of beach I sit
That I may contemplate a bit;
O'er life and love and peace and war,
And calmness to my soul restore. 

For as my idle thoughts do soar
Now tempered by the oceans roar;
I wonder what's to come of me
And what, if anything, I'll be. 

I query if true love I'll find.
Or if in loneliness entwined,
I'll wander ‘lone throughout my days,
A pris'ner in an endless maze. 

I ponder how on foreign lands
Perhaps a gallant army stands
Prepared to fight, that some may live
In freedom, and their lives will give.

I then can see the children play
On meadows green throughout the day.
And then in tranquil beds they sleep.
Their innocence the peace will keep. 

I know the world does little care
About these thoughts that I now air.
For if a cause I do endorse
Or wish to change the world’s course 

I must not stay upon my shelf,
Rely on no one but myself...
However, now I think I'll stay
Upon this beach along the bay."}, {"title": "Waves", "date": "2015-09-18", "content": "It wasn't all that long ago
When to each other, we
Were nothing more than passing waves
In life's tumultuous sea.

But as the waves, direction take
When coming nigh to land -
We too did change our courses, and
Forge onward hand in hand.

Although, as waves, our mortal lives
Quite temporary are.
The limits of eternal souls
Extend out rather far.

Thus now I pray that we might strength
In one another find.
That unlike waves, the wind and storm,
Our actions may not bind.

But rather, arm in arm we may
On plotted course abide.
United through this life and on,
Untouched by changing tide."}, {"title": "The Lion’s Court (Aesop)", "date": "2015-09-19", "content": "Upon a time, there was a place
Where each and all did peace embrace.

The lion king was just and fair,
For all the creatures he did care.

And so to disagreements thwart
He often held a public court.

Then each would come unto his mount,
And to the king make full account.

The tiger did respect the deer,
Who now did not have cause to fear.

The leopard did not harm the goat.
In fact, on him, did rather dote.

The wolf no longer hunted sheep,
Who now could very peaceful sleep.

The timid hare was heard to say;
“’Tis true, we all are free today.”

And thus they lived in harmony,
The way a kingdom ought to be.

---

If anyone must live in fear,
Then justice is but insincere.

(Aesop index references: Oxford-Gibbs 20, Perry 334)"}, {"title": "How Great Thy Love", "date": "2015-09-20", "content": "They chained, then scourged and sentenced you
For being Son of God.
How vain and foolish are the souls
Who walk on earthly sod. 

For hanging on the cross in pain,
You did not power shew.
But asked for their forgiveness, as
They \"know not what they do.\" 

How great thy love for mortal man.
How infinite and true thy plan.
As death for mercy didst thou pay
And for me down, your life did lay. 

How great thy love I now can see.
Indebted then I'll always be.
How great, my Lord, thy love for me.
To save my soul and set me free. 

The destitute, the murderer,
The righteous, wicked and impure,
Thou lovest all in equity.
And hope from sin they all will flee. 

‘Though man dost lose the iron rod
And wander farther from his God.
In holy courts you sit above
And never failing offer love. 

Then as a simple mortal I,
In wonderment do stand.
As I your love do feel for me,
The kindness of your hand. 

I hope to one day comprehend
This gift of love you give,
That I might also love the world
And as you've taught me live. 

For hanging on the cross in pain,
You did not power shew.
But asked for their forgiveness, as
They \"know not what they do.\" 

How great thy love for mortal man.
How infinite and true thy plan.
As death for mercy didst thou pay
And for me down, your life did lay."}, {"title": "Solitary", "date": "2015-09-21", "content": "Alone, solitary,
Only sounds of nature heard.
To some, prospect scary,
There alone with tree and bird.

To me, sanctuary,
Far from sprawling city street.
Where on occasion, I
May alone with feelings meet.

Have, per chance, you been there?
I do wonder if you know,
If he who lives within
Is a friend or rather foe.

And so I'll leave this message,
As now this poem ends:
That loneliness is peaceful,
When with yourself, you're friends."}, {"title": "Rhyme On", "date": "2015-09-22", "content": "A poet doesn't always know
Just what he wants to write.
He often will just ramble on -
A tragic sort of plight.

What should be said in just one word
He might jot down in ten.
And as his aim he only might
On paper try to pen: 

A bit of miscellan’ous rhyme
Perhaps he'll use another time."}, {"title": "The Yarnball", "date": "2015-09-23", "content": "When I was but a little lad,
A studyin' in school,
I learned ‘bout math and languages
And of the golden rule.

There was one thing they taught me though,
That's caused a lot of strife.
And though I've searched solutions,
It has plagued me all my life.

The scientists of times long past
Once made some firm resolves:
\"Our planet flies through outer space
And ‘round the sun revolves.\"

Not only this, these fellows claimed,
(Now listen to this riddle),
But as it makes this journey, it
Spins around its middle.\"

Now for a child young as I,
This concept was quite new
And so I thought about it and
I'll share these thoughts with you.

I pictured one large ball of yarn
And on the top stood I.
And then this ball of yarn, you see,
Was hurled up in the sky.

Then someone grabbed the end of it so
As my yarn ball traveled
It spun and jerked and dove ...
Until it came unraveled.

Imagine with me if you will
How hard it is to keep
Your body stationary
With this madness 'neath your feet.

Then if you think about it
(And I really think you should)
Our earth's just like a yarn ball, and
It's spinning pretty good.

Now some folks have a handle
And on to it they hold.
They never sail the seven seas
Or leave in search of gold.

They say it's due to gravity -
I really can't believe -
For when I loosen up my grip
From where I've been I leave.

I have no ties that bind me
Or roots to hold me down
And so I slip and slide you see,
Around from town to town.

It's quite a large sized yarnball though,
And fortunate for me,
It's got a lot of crevices
I'd really like to see.

I know that of this journey
One day I'll surely tire
And to keep a roof above my head
Is to what I will aspire.

At times I wish that I were still
A little lad in school
And didn't know ‘bout algebra
Or of King Henry's rule,

But I'm o'erjoyed that I was there
The day they taught the scheme
Of planetary orbits
And expanded on the theme.

For although I wish they'd change it
And allow the world to stop.
Or at least to slow it down a bit
And let me climb on top,

It's nice I understand it
And know the foe I fight.
So one day I might discover
A solution to my plight."}, {"title": "Grandma Dear", "date": "2015-09-24", "content": "Our grandma dear, your soft words shared,
Have taught me truths and proved you cared.
A humble nurse - you've brought us health.
And shown that love's the greatest wealth.

A faithful wife and mother too,
You've cared for everyone but you.
You've brought us song, and filled our bowl,
You've cheered the tired and weary soul.

A tribute to you now we share,
You are a jewel most prized and rare."}, {"title": "Beauty", "date": "2015-09-25", "content": "Should beauty all be gathered unto one single place?
Or should we rather spread it out o'er all the worlds face?

Now as I'm not a scholar or expert in the field,
I think to greater intellects I will the problem yield.

But rather selfishly, I thought if I could find a way,
I'd bring together earths most treasured beauties here today.

And so for you, these roses I, specific'lly did buy,
That I might see them next to you — and you alongside I."}, {"title": "The Fox and the Grapes (Aesop)", "date": "2015-09-26", "content": "A fox one day was passing by
Below a sunny summer sky.

Along a dusty dirty trail,
He dragged his bushy, furry tail.

And as he walked, he paused to think
How much he’d like to have a drink.

And then a bunch of grapes he spied,
With juicy nectar full inside.

They looked so sweet, about to burst,
He knew that they would quench his thirst.

And so with all his strength he hopped,
Though, short of those fine grapes he stopped,

For they were just a bit too high.
But once again, the fox did try.

And though he tried with all his might
It was, alas, a losing ﬁght.

And after trying for an hour,
He cried, \"Those grapes are surely sour.\"

---

For he who fails the prize to gain,
Will often scorn it in his pain."}, {"title": "Quest", "date": "2015-09-27", "content": "You see, before the mountains were;
Before the rivers ran;
Before the tall majestic trees
Gave shade to mortal man;

Before the earth was shaped and formed
And beasts placed there to dwell;
Before the firstling raindrops did
On sun baked soil fell;

I lived and learned and prospered while
Along my Fathers side,
And yearned to gain his fullness, and
To measure with his stride.

He loved me as a Father would.
Was pleased with my desire.
But cautioned that the only path
Was through the tempters fire.

I told him that the foe I'd fight,
And conquer valiantly.
He bowed his head and softly spoke:
\"Then blessed shalt thou be.\"

At times when I'm discouraged, and
Feel that life's unfair, I
Recall my pre—existence and
The promise I made there.

For though I travel far and wide
And sail o'er the sea,
I know my Heav'nly Father still
Is watching over me.

So I must always overcome
And further truth and right.
As always must I serve him with
My heart, strength, mind and might.

Then soon I'll see his face again
And bowing at his feet
I'll know that I am as he is
And for his glory meet.

Then he will say \"my son thou art,
And faithful thou hast been.
You've overcome all wickedness,
The slavery of sin.

And now back to my presence you
Have faithfully returned.
I'll place a crown upon your head;
A kingdom you have earned.\" 

Quest"}, {"title": "Origins", "date": "2015-09-28", "content": "I'm told that years and years have past,
Since came a quite enormous blast.
And from this mess of strewn debris,
Our earth emerged victor'ously.

Upon which atoms' frolickings
Did random create living things.
Then as the planet did revolve,
These organisms did evolve.

And this did happen by degree
Until were born both you and me.
This process then will follow on
Long after you and I are gone. 

This theory has remained intact,
And almost can be called a fact.
So while this all may be quite true
I have to share 'tween me and you,

I think there's likely much to learn,
As new facts may the old upturn.
And when we know the story whole,
God likely played a crucial role.

But as things stand right now, today,
There is one thing I'd like to say: 
I'd like to think I'm more than chance — 
A random bit of happenstance.            

Origins"}, {"title": "The Aeroplane", "date": "2015-09-29", "content": "Composed on a flight from Los Angeles to Amsterdam … or so they say! 
 
I've seen the craft up in the air.
I've seen it on the ground.
I find it quite amazing, how
It seems to fly around. 

They say they'll take you ‘cross the state
Or even o'er the sea.
They'll do it all quite gladly, for
A reasonable fee.

They load it up with people and
Of course their baggage too.
It must weigh several hundred tons
With all the gas and crew. 

And then they drive it down the road
Until it starts to rise,
And onward, upward through the clouds
To vanish in the skies. 

It's really quite intriguing, how
This hoax they perpetrate,
As I'm certain it's all fiction —
This illusion they create. 

For to soar around the world in
A cylinder of steel,
Defies all basic reason, and
I won't accept it's real! 

I like to climb aboard them though
Although it's rather strange,
For when I take a ride on one
The scen'ry seems to change. 

So let them play their little game
(Although it's all in fun).
It's often quite enjoyable
When all is said and done.  

Aeroplane"}, {"title": "Mr. Moon", "date": "2015-09-30", "content": "When through the woods I walk at night,
With daddy by my side,
I see the moon up in the sky.
And I from it do hide.

I hide beneath the tall pine trees
And ‘round the hillside too.
And then the moon goes in a cloud,
And pops out — Peek a Boo!

I love to play this hide—n—seek
With Mr. Moon at night.
And when I close my eyes to sleep
He goes out of my sight."}, {"title": "The Bloom", "date": "2015-10-01", "content": "A horticulturist by trade
One day upon his garden gazed;
Collections of the prized and rare,
Together with the common fair. 

Now in one corner of this plot,
A withered bud began to rot.
\"A tragedy\" the folks declared
And at this gardener they glared. 

For once upon that very stem
Was found a budding blooming gem.
\"A masterpiece\" the people said.
But now it hung all limp and dead. 

\"'Twas your neglect,\" the neighbors stated,
\"And you this bloom eradicated.\" 
So thus the accusations flew,
As our dear friend at once withdrew.

And contemplated what they'd said
Reclining on his garden bed.
Although he knew great care he took,
Upon a careful, closer look,

He realized mistakes he'd made.
And so its death, the price he paid. 
\"But wait!!\" he yelled in joyous tones,
Which cut right through the choir of moans.

\"Although this bud will bite the dust,
Then rot decay and turn to must. 
The ground below will fertilize
As our dear plant will energize.

And thus its form and size will change.
And though right now it may seem strange.
