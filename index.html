One day you'll pass this way again,
And look, and look and stare and then,

A new bud in its blooming phase
Will earn your highest form of praise.\""}, {"title": "I Love You, Friend", "date": "2015-10-02", "content": "Come now with me and walk a while,
You need not talk, but merely smile.

I like your look, your way, your style,
Don't put me through a lengthy trial.

The world is full, with much to see,
And by your side I wish to be.

The paths ahead are new to me,
But we to travel them are free.

Alone I've come a distance great,
I hope I haven't come too late.

I think I'm rather sent by fate
That we might share this joyful state.

Your beauty does with nature blend,
My heart to paradise does send.

Forever you, would I defend
Because, you see, I love you, friend."}, {"title": "The Hares and the Frogs (Aesop)", "date": "2015-10-03", "content": "The hares all lived in constant fear
Of dangers present, far and near.

This burden heavy on them weighed,
And for relief they often prayed.

Then as the months and years passed by,
They often thought they’d rather die.

In death, their suff’ring might be brief.
Thus suicide could bring relief.

As courage they most surely lacked,
They made this most distressing pact:

They marched in sadness, with a frown
Off to the pond where they would drown.

The frogs who lived there, in the mud,
Did hear their steps – each thump and thud.

In terror were the frogs then led,
And from the bank they quickly fled.

Adieu to lily pad they bid,
And underneath the water hid.

The hares this exodus did view
Which taught them something rather new.

An elder hare did then observe,
“These frogs have lost all of their nerve.

I didn’t think that it could be,
But they’re more cowardly than we.

Perhaps a lesson does this give –
Good hares, let’s choose this day to live!”

---

Although your life may seem a curse,
Another fellow has it worse.

(Index references: Oxford-Gibbs 248, Perry 138)"}, {"title": "The Faith", "date": "2015-10-04", "content": "To have the faith that Moses had, to cause the Red Sea part;
Or even of a mustard seed placed deep within my heart.
With faith I could great mountains move, and miracles perform.
Impart the blind their vision, and could tame the savage storm.
With faith I would possess the key, the power of the Lord;
The key to that great treasure house where blessings all are stored.

With faith within me, I could climb the highest peak.
With faith within me, I could find all that I seek.
For faith is power given freely from above -
To conquer all our enemies and spread the cause of love.

But I, oh Lord, in weakness stand, an humbled lowly lamb.
And of these great and noble feats, quite undeserving am.
A sinner in Thine eyes I fear, ‘though good works I do try.
And for the great Redeemers blood, I in my garden cry.
But I shall not relinquish hope, and trust in Thy great love.
As grace and mercy Thou dost send, from Thy great realm above.

With faith within me, I could climb the highest peak.
With faith within me, I could find all that I seek.
For faith is power given freely from above —
To conquer all our enemies and spread the cause of love.

So I thank my Heav'nly Father, each morning as I pray;
For the faith I have to wake up and face another day.
The faith I have to earn my keep, to buy my daily bread.
To overcome temptation and to choose the right instead.
And so if I, each week or so, a bit more faith do gain,
Perhaps my own celestial crown I will one day obtain.

With faith within me, I could climb the highest peak.
With faith within me, I could find all that I seek.
For faith is power given freely from above -
To conquer all our enemies and spread the cause of love."}, {"title": "Flight", "date": "2015-10-05", "content": "With weary eyes and tired feet
You wander ‘long that deep‘ning rut.
Through day long selfsame tiresome tasks,
You ever climb but never reach the summit. 

And then with jealous eyes you look
Above the clouds and in them see
With goss'mer wings, he floats and dives.
And though you sit quite dreary, the bird flies free.
 
Then watch the cars fly blurry past
The window from the which you stare
And I confused must simply ask,
Why is it that you churn away your life there?
 
Why don't you come along with me
I'll take you where the birds fly free.
That past the summit you might see
A place where worldly cares are not important.

And though we must industr'ous be;
We needn't press our nose so hard on grindstones.
Because at times our minds must flee,
Then for a moment burdens drop, and rest. 

Flight"}, {"title": "Water Works", "date": "2015-10-06", "content": "Pounding surf along the coast
Molding dunes of sand,
Carving solid rocky cliffs,
Where the water meets the land.

Melting snow to stream gives rise
Flowing down the valley sides,
Forming valleys, canyons grand,
Where the water meets the land.

Falling rain On arid plain,
Natural Springs
That lifeblood brings,
Balanced by God's gentle hand -
Where the water meets the land."}, {"title": "Q", "date": "2015-10-07", "content": "Q is the queerest letter you
Could ever hope to see.
And some think quite un-useful, though
It's handy as can be.

For if you wish to quarrel, quake 
Or quit or quantify;
You couldn't really do it well,
Without a Q nearby.

A duck would be quite silent, as
A voice it would then lack 
If it did not have access to
A Q to make a quack.

A queen could never quiver or
Feel queasy quietly.
And her power might be quashed although
Quite qualified she'd be. 

You'd never see a quail hur-
Ry quickly ‘cross the quad.
And couldn't quarry quartz at all,
I think it would be sad.

But if you think the questions
On a quiz lack quality -
Without a Q the whole thing would
Just disappear, you see. 

Though if quadruplets on a quest
In quicksand did just sink,
A quart of water, thirst would quench,
If they did take a drink.

I hope you liked my little rhyme,
I've one more tip for you.
A Q must almost always be
Escorted by a U."}, {"title": "Relics", "date": "2015-10-08", "content": "Gleaming turret, sparkling tower,
Shewing forth a kingly power.
Walls of stone with bands of steel -
Bells from yonder belfry peal.

Signs of strength when knights did reign
0'er the vast and open plain.
Clashing sword and lances crossed,
Leaving victims by as dross.

Muscles forged of steel and fire -
Of great deeds they did not tire.
Now they groan beneath the sand,
'Cross this gray and dreary land.

Relics of a bygone age
Force did rule o'er wisdom sage -
Once where chivalry did bloom
Now the briars, rust, and gloom."}, {"title": "Dunce", "date": "2015-10-09", "content": "I've always been quite good at games
Where mind skills proved the key.
But I have found a riddle now
I can't solve logic’lly.

The problem is: the woman.
And try all that I may,
I cannot understand her.
I've little else to say.

I've tried to analyze her.
I've tried to understand.
And still without an answer,
In solitude I stand.

I only want to win the love
Of one with whom I'd stay.
And love her back profoundly.
Then from her never stray.

It seems though, I'm unlucky,
Although it takes just once.
And since success I cannot find,
I feel as if a dunce."}, {"title": "The Race (Aesop)", "date": "2015-10-10", "content": "Come, hear a tale I’d like to share
About a tortoise and a hare:

The hare ran all about the wood,
And laughed and played, as right he should.

The tortoise moved more like a snail
And leisurely moved down the trail.

The hare did boast that none indeed
In all the world could match his speed.

And then the tortoise he did tease
About his funny feet and knees.

The tortoise then in anger cried,
“How dare you others so deride!”

As shades of red transformed his face,
The hare he challenged to a race.

The hare, a hearty laugh did make,
But happily the chance did take.

The fox they chose as referee
Because both wise and fair he’d be.

And on the morrow they would see
Which one would grasp the victory.

The day dawned bright, both were prepared,
A glance, and then a handshake shared.

The fox, with grace, his tail did wag.
To mark the start, he waved a flag.

The tortoise started down the track,
A firm resolve he did not lack.

The hare with confidence did grin,
“I do not have to run to win!”

He had the time, and more, to spare
And so he thought he’d linger there.

Now thinking all of this a bore,
He took a nap and did then snore.

All afternoon, the hare did sleep.
The tortoise steady pace did keep.

The hare did finally awake
That he, his foe, might now o’er take.

With all the time he took to doze
There was a mighty gap to close.

Into the race his all he thrust
And left behind a cloud of dust.

The tortoise thought “the race is mine!”
Just inches from the finish line

But with a burst, the hare closed fast,
Upon the outcome doubt was cast.

The hare knew he must end on top.
He took a final giant hop.

First through the air the hare did glide –
Then ‘cross the tortoise shell did slide.
 
But with an outstretched neck and head,
The tortoise still the contest led.

The hare collapsed there in a huff,
And knew it wasn’t quite enough.

The woodland creatures fixed their eyes
As none foresaw this great surprise.

And when it all was said and done
The tortoise had the vict’ry won.

The fox declared, that day at least,
The tortoise was the faster beast
---

While some may set a faster pace,
Just slow and steady wins the race.

(Index references: Oxford-Gibbs 237, Perry 226)"}, {"title": "I Sometimes Stop to Wonder", "date": "2015-10-11", "content": "I sometimes stop to wonder
Why I have come to earth.
Why these, the last days of the world,
Was I ordained to birth?

When famine and destruction
Have been prophesied to come.
And some were to be chosen, why,
Pray, was I of the some?

I think there was an error,
For valiant I am not.
I must have slipped right through the cracks
And fell down to this spot.

I will not though contest it.
I'm rather glad I'm here.
Although for my own safety,
I, Do tremble for my fear.

As trials will befall me
Temptations come my way.
It will be difficult, at least,
To on the pathway stay.

But hope I have to make it
With all the help of God,
My knuckles will be white, I fear,
From clinging on the rod.

‘Though soon it will be over.
The way will be made clear.
The Savior of the world will come
To gather His flock near.

Then when the heavens open,
And when I see the Lord,
He'll wear a garment red as blood
And wield a mighty sword.

And then, He, many blessings
Will on my head bestow.
And then His loving kindness I,
Again will come to know.

So even if it's just a cruel
And terrible mistake -
I will be better off if I
The best of it do make."}, {"title": "1492", "date": "2015-10-12", "content": "\"In fourteen hundred ninety two ...\"
As one great poet wrote.
A thing occurred that I feel was
Of some historic note:

A fellow named Columbus did
Right of the charts set sail.
To find a route to China, thus,
He on that point did fail.

He happened on America,
As others had before.
But he did open up his mouth
And talked about it more.

Now as we mark another year
From that historic date;
The natives of this continent
His journey might berate.

But someone else was bound to come —
The continent can't hide.
You really can't go very far
And not with it collide."}, {"title": "I Wonder", "date": "2015-10-13", "content": "I wonder,
Shall I wander
Over all this earthly sphere;

And never
Find the answers,
'Though I search both far and near?

Perplexing
And unnerving
It increasingly does seem.

Like falling,
Ever falling
In a re-occurring dream.

I wish to
Know the future.
What will happen in advance;

Destiny
Within my view,
That each step won't be by chance.

But the years,
Ever passing,
Do now seem to hold the clue.

The present,
Not the future,
Will decide what I will do.

For answers
Sought to questions
Which are yet to be discussed.

Will never
Be uncovered,
‘Though in them we may trust.

Then plainly,
Ever plainly,
As we on our course do stay;

The answers,
For the questions,
Will surely come our way."}, {"title": "Cactus", "date": "2015-10-14", "content": "My daddy said you're prickly, like
His beard at evening time.
My mother likes your greenish hue,
A lovely shade of lime. 

But I'm amazed at how your roots
Stretch so far down below
To find some water for your thirst,
You could to China go. 

But silent sentry of the west,
I will not pat your head.
For you would likely poke me, so
I'll wave hello instead."}, {"title": "Zero", "date": "2015-10-15", "content": "I wish within this rhyme to state
My feelings t'ward a number great.
And voice concerns I've had of late
‘Bout those who would my theme equate To nothing.

‘Though zero added to itself
Remains unchanged upon its shelf.
And when to other sums combined,
There's been no change, we do this find

Amazing; When rather than combine the two,
We set them side by side and do
Examine the result we see
It's increased value by degree of ten.

So never underestimate
The problems which we can create
By overlooking zeroes and
Not noticing just where they stand.

The End."}, {"title": "For Someone", "date": "2015-10-16", "content": "As my heart does careless run,
My hand does write a poem, for someone.

Time and economics slide,
As on a cloud in heaven, with you ride.

Falls from clouds can be quite far,
‘Though true the only transit, to a star.

If we hold each other tight,
Less likely would we plummet, pray we might."}, {"title": "Aesop's Book Review (Aesop)", "date": "2015-10-17", "content": "A certain man who wrote a book
Asked Aesop if he’d take a look.

“Please tell me in your own fine way
The brilliance that my words display.

Is there a single page or phrase
That do your senses most amaze?

Although my other works are great, 
This surely is the best to date.

The genius of it shines right through…
But please, I’d like to hear from you.

Just how would you my book appraise?
Do I, myself, give too much praise?”

...

The book was such a wretched bore,
Each page was worse than that before.

So Aesop barely made it through,
Then said, “Good sir, I’ll say to you:

“I think you should voice your acclaim,
As no one else will feel the same.”
---
Write that to what your heart is true,
Although your fans may be quite few."}, {"title": "Tithing", "date": "2015-10-18", "content": "They say that moth and rust corrupt
And 'though all you might try,
You cannot take your earthly gains
Along the day you die.

I won't say that I disagree
But just ‘tween you and me,
A way to overcome this plight
There may quite likely be.

You see, I take just ten percent
Of all that I do gain,
And put it in a special fund.
Now, why I will explain:

The plan is simply stated, for
With tithes and off'rings I,
Am making a down payment
On a mansion in the sky."}, {"title": "Wings", "date": "2015-10-19", "content": "There is no shore beyond
The reach of our imagination,
Nor altitude above the range
Of our wings of aspiration."}, {"title": "Lonely Cipher", "date": "2015-10-20", "content": "Lonely cipher, where do you go?
In silence, what do you know?
Are you a poet in some kind of righteous rage?
Against a world you decry page after page.
Please tell me mister, do you have a place to go?
Or do you like to wander, out in the snow.

A loner, in quiet thought.
I wonder what wars you've fought.
Have you now given up on what life once stood for;
And chosen other means to settle up the score?
Have you at last denounced the throne you earned at birth,
To search for answers at the corners of the earth.

Lonely cipher, where do you go?
In silence, what do you know?
Are you a poet in some kind of righteous rage?
Against a world you decry page after page.
Please take me with you, please let me see,
A new perspective and philosophy."}, {"title": "Bee", "date": "2015-10-21", "content": "Black and yellow little bees,
floating on a summer breeze.
On each flower she does hop
And then back at the hive does stop.

She fills it up with honey sweet.
There is no more delicious treat.
But if back home, I wish to bring
Some honey, she might try to sting.

But though the pain may make me cry,
The bee, you see will surely die.
And so this tale, you see, my friend,
Might have a rather tragic end."}, {"title": "Onward", "date": "2015-10-22", "content": "The time has come, I think, at last,
To shed a tear and leave the past.
And onward trek on new found trails,
Old ties unleash, unfurl the sails.

For yesterday is in the past,
Tomorrow new, now forming fast.
And as the moon sets dim and pale,
The sun breaks forth, its rays unveil;

A brand new world of dreams come true,
Infinities of things to do.
A time of opportunity,
To be just what I want to be.

‘Though honestly I must admit
To leave the past hurts quite a bit;
I look toward the morning star
And know that ‘though I may roam far,

A little bit of now I'll keep
Within my heart amid the heap
Of long past trials and victories,
Of tears, and smiles, and pleasantries. 

For what more could I really ask?
‘Neath morrows mid—day sun I'll bask.
A new adventure underway,
The heroes role for me to play.

And always forward without fail,
‘Though glimmers of the past I'll trail.
For I believe the quest of men
Should be to learn from where they've been."}, {"title": "Beyond", "date": "2015-10-23", "content": "Beyond the thoughts we comprehend,
Beyond the words that may be penned;

Our souls may whisper like a dove
With messages of truest love.

When strength or courage we do lack,
When difficulties do attack;

We are sustained by mem’ries of
The warm and caring arms of love.

When walking hand in hand with you,
With earth’s great beauties in our view;

Like angel choirs voiced above,
Our hearts may sing in joy with love."}, {"title": "The Thirsty Hare (Aesop)", "date": "2015-10-24", "content": "A hare hopped down a dusty trail,
With weariness he dragged his tail.

But more, his thirst did plague the hare –
No water found he anywhere.

And then good fortune his way fell –
Aside the road, there was a well.

Despite his luck, he found a flaw –
There was no means to water draw.

Not thinking very much at all,
Into the well he chose to fall.

Then in that water dark and chill
He cooled his brow and drank his fill.

And after having all his fun,
He stopped to think what he had done.

In desperation he did shout,
“Please, someone stop and let me out!”

A fox did happen by the site
And heard the hare scream out in fright.

As she peered down the hole to see,
The hare did plead; “oh, please save me.”

The hare, his story did relate
And what led to his sorry state.

Then after hearing of his plight
The fox just said; “It serves you right.

Before you dove to quench your thirst,
You should have thought about it first.”

Then after having had her say,
She gave a wave and walked away.

---

For consequences, give a thought,
To not within a trap be caught.

Aesop index references: Oxford-Gibbs 444, Perry 408"}, {"title": "Nebuchadnezzar", "date": "2015-10-25", "content": "Head of gold, great king -
What sorrow time must bring. 

Foreknowledge of the end of time,
When only iron and clay doth stand.

Soon rent and in its stead
The kingdom of our living head.

Stone cut without hands
Will cover all the earth —

Would you rather stand as servant in our Father's land,
Than king in yours with pure command?"}, {"title": "Aspirations", "date": "2015-10-26", "content": "If I were a king...
I would be the greatest king in the world.
I would only enact good laws and treat everyone well.
People would come from all over the world
Just to look at my kingdom and maybe live in it.

If I were a chef...
I would be the greatest chef in the world.
I would prepare food like it had never been done before.
People would come from all over the world
Just to watch me prepare food and maybe taste it.

If I were a tailor...
I would be the greatest tailor in the world.
I would make the nicest clothes anyone has ever seen.
People would come from all over the world
Just to see my clothes and maybe try them on.

If I were a fisherman...
I would be the greatest fisherman in the world.
I would catch the biggest and best fish in the sea.
People would come from all over the world
Just to see my fish and maybe taste them.

If I were a builder...
I would be the greatest builder in the world.
I would make the most beautiful houses ever.
People would come from all over the world
Just to see my houses and maybe live in them.

But what am I? What am I?
I shall be the greatest me in the whole world.
Although I don't know exactly what it is I will do,
People will come from all over the world
And say, \"you are the greatest you I have ever seen.\""}, {"title": "The Trek", "date": "2015-10-27", "content": "I set out on a little trek,
That I, the world might see.
The weather, it was balmy, clear,
Not nicer could it be.

The sun shone down about me as
I Trottled right along.
The birds joined in the chorus, as
I sang aloud my song.

I happened on a cobbler, who
Said, \"My-good-golly-pete,
You can't be travelin' my lad
With nothin' on your feet.

Although I hadn't thought of it,
I saw some I did like,
And without too much dickering,
A bargain we did strike.

And then I met a tailor, who
Said, \"My dear boy, it's rare,
To see a fellow clad in shoes
While other than that bare.\"

A speech ensued about the pros
Of fashion and did run
From tying a cravat just right,
To harmful rays of sun.

Of course I bought that suit of clothes
And then I bought a home.
With all of the accouterments
And ceased the world to roam.

Sometimes now in the evenings, while
Just lying in my bunk,
I think about my life thus far
And all my bloomin' junk.

If I had other paths then walked;
The cobbler had I passed;
The world I'd have gone around
And seen all that it hast.

I wouldn't have this pile of stuff
To lug around and clean,
But wisdom great from all would I
Have had the chance to glean."}, {"title": "Wolves", "date": "2015-10-28", "content": "Wolves in the forest
Advance in a pack,
Looking for something
That they can attack.

Shiny white teeth and
A silver gray coat,
Lurking in darkness
In forest remote."}, {"title": "Little Fingers", "date": "2015-10-29", "content": "You struggle with those fingers, child.
The thumb gets in the way.
Appendages that still are wild -
Keep testing them, I pray.

For now just grip my steady thumb,
And hold on to it tight.
Then soon you'll lift a breaded crumb,
And later learn to write."}, {"title": "Free", "date": "2015-10-30", "content": "If you ask me why I'm free
Of some female company,
I'll surely on her head the blame imply.

As in the past I've failed,
In competition paled.
I'm sure her future answers will be \"no.\"

I suppose I likely would,
If I halfway thought she could,
Respond with an affirmative reply.

But being that I'm me.
And knowing she is she.
I fear the odds particularly low.

Thus to avoid a fall,
I will opt to her not call.
But rather sit alone in misery."}, {"title": "Trick or Treat", "date": "2015-10-31", "content": "There is but one night every year
When all your fears come true.
When Ghosts and Goblins Haunt the town
With shrieks and shouts of \"Boo.\"

So if you have a heart that's faint,
You shouldn't roam the street.
For you might likely see them there -
Sent out for Trick or Treat!"}, {"title": "Repentance", "date": "2015-11-01", "content": "One night I lay upon my cot
In prayerful and absorbing thought.
But all my faults did fill my head
And hence for His forgiveness plead.

\"My lord, in my indignity,
I come before thy throne to plea.
’Though, true at times, a sinful son,
I ask that I, thou might not shun.

And pray that t'ward thy shining light
I may with courage bravely fight.
That ever I might on thy path
Remain, in spite of Satan's wrath.

Oh Father, to be meet I pray,
To kneel before thee on that day.
And that without reluctancy,
Thou might say; \"son, reside with me.\"

I then a quiet stillness felt
And knew that He in mercy dealt.
For as I drifted off to sleep,
A thought I heard, my heart did leap:

\"Thy sins I have forgiven thee,
With Christ as intercessory,
For all the world's guilt did pay
That through repentance find the way.\"

In sum, a message apropos -
For as He said, so long ago,
Now go thy way and sin no more —
And I shall wait thee at the door."}, {"title": "Commuter", "date": "2015-11-02", "content": "When queried what it is I do
To earn my livelihood,
I answer with my tongue in cheek
(My diction's not real good).

I do rise up in the morning,
Put on a suit of clothes,
And eat my breakfast quickly, as
I watch the morning shows.

'Tis then I take my auto,
Depart from my abode
And join my colleagues everyday
Out there upon the road.

We glance at one another, and
We cut each other off,
And scream and yell and rant and rave
And at each other scoff.

Then when we reach our offices
We do a little lunch,
And talk about our morning drive,
Our time clocks then we punch.

Then back out to the highway, where
We curse and spit and swear.
To reach our homes in safety, and
In no time, we are there.

My title of vice president
Is somewhat incorrect.
I'm really a commuter, and
Demand my due respect!"}, {"title": "A Vote", "date": "2015-11-03", "content": "I slowly walked down to the polls.
My head was hanging low.
For who or what I ought to vote,
I did not really know.

The choices seemed so loathsome, and
The candidates so weak.
In fact I think as bad does go
We've likely hit the peak.

But as a patriot would do,
I swallowed hard and chose
The ones I thought would hurt me least ...
But one just never knows.

And then I thought how fortunate
We are to have a vote.
So bad or good, I love this land.
I'll end now on that note."}, {"title": "Post-Election Blues", "date": "2015-11-04", "content": "I had wished that it were over.
I wanted it to end.
But God does often, spitefully,
Our dearest wishes send.

I'd had enough of candidates,
Of slogans and of bills,
Of propositions, promises,
And special interest wills.

But on returning from the polls,
Just right around the block,
I tuned in my old TV and
Received a major shock.

Instead of all the pleas and threats
To vote for this or that,
They wanted me to purchase things
And so I donned my hat.

And went out to the local mall
To do just what they asked;
Where I depleted all my funds -
And did it rather fast.

So then without a penny, I
Out on the street was tossed.
And insult upon injury,
My candidate had lost."}, {"title": "Dark Ages", "date": "2015-11-05", "content": "My thoughts quite often I do cast
Upon the rather distant past.
And I would like to make remark
Upon the famous Ages Dark.

An age of glory, brave and bold
With castles all arrayed with gold.
When knights with sword would prove the right
By showing forth their awesome might.

A maiden would not need to fear
With men in armor ever near.
But dragons fierce kept on the run,
As knights would slay them - just for fun.

But life in castles made of stone
Without a proper telephone
Would be a cause for great despair;
Cold and alone I'd shiver there.

No cars, no planes, no window panes,
The humid smell of must;
And standing out beneath the rain,
My armor'd surely rust.

And so I feel there likely may,
A reason to in our time to stay.
As from a more relaxed position,
I may watch knights on television."}, {"title": "Sometimes", "date": "2015-11-06", "content": "Sometimes,
There's a gleam in your eyes.
It happens most often
When the corners of your mouth
Turn up.
And the lips separate just a bit.

It may be the reflection from your teeth
Or from a star.
I think though that its a
Reflection from your spirit.
And when you smile just right,
The light comes in And bounces off your soul
Then comes back through your eyes.

I love that sparkle.
It is more valuable to me
Than the sparkle of your diamonds,
Although they symbolize our covenant
To spend together forever.

It is more beautiful than the moon
Reflecting on the ocean around our home.
It tells me that you're happy and
That you love me.
I love you and that light that you bring to my life.

Sometimes,
A gleam I see.
When corners of your mouth do rise
And lips part just a bit."}, {"title": "Run for Your Life! (Aesop)", "date": "2015-11-07", "content": "Some goats were grazing on the grass.
The goatherd watched the clouds drift pass.

Their dog was sniffing at the air,
And thought he smelled a wild hare.

He walked toward a leafy bush
And gave the branch a gently push.

A hare out from the shrub did dart.
The dog in quick pursuit did start.

Across the field at frenzied pace,
Then through some trees the pair did race.

Then under thorny hedges near,
The hare again did disappear.

The dog back to the herd returned.
This time without his meal earned.

The goatherd laughed, and teased his friend;
“This isn’t how it used to end.

You used to be so very fast –
I guess that now is in the past.”

The dog a quick retort did make –
“The hare had more than I at stake.”

---

One’s effort to a goal obtain
Is less than to his life retain.

\"Running hare\". Licensed under CC BY-SA 3.0 via Wikimedia Commons

Index references: Oxford-Gibbs 396, Perry 331"}, {"title": "Discontent", "date": "2015-11-08", "content": "Far flung from greater place, I'm sure;
Why else so discontent am I.
And why does heaven so allure?
Why do I yearn to yonder fly?

If merely molten clay am hewn,
My aspirations might not soar.
Oh yes! I'm more than dust and rain.
I know not what, but much, much more.

Once in a quiet, shaded wood,
In contemplation I did stand.
A gentle unheard loving voice
With power did my ear demand.

The message clear - I now know why,
A higher plane I would explore.
These mortal days, are but a test,
For destiny I can't ignore."}, {"title": "Believe!", "date": "2015-11-09", "content": "The things on which we now insist,
Not long ago did not exist;

The mobile phone and internet,
The radio and TV set,

The car and satellites and planes,
Electric blankets too, and trains.

They once were just ideas, or less,
And did not all the world impress.

Each took a thought, and then an act,
Before they could our lives impact.

So, let me make it crystal clear,
You should not doubt, or failure fear.

There's nothing you cannot achieve,
If in your dreams you do believe.

Inspired by:
\"If you can dream it, you can do it.\"
Walt Disney"}, {"title": "Paranoia", "date": "2015-11-10", "content": "When you see them on the corner
Or hiding in the store,
When they're in the car behind you
And always ‘hind the door;

When paranoia's got you, and
You can't sleep through the night,
For with every creak and rustle
You sit up straight in fright;

Remember that it's only fear
You need to reckon with,
And ghoulies, ghosts and goblins are
Exclusively in myth.

But on the other hand my friend,
When lights are fading off;
'Though the dead may not afflict you,
At the living never scoff.

'Though paranoia's crazy, and
It tears you up inside;
I would never feign to postulate
Your fears aren't justified."}, {"title": "The Sea", "date": "2015-11-11", "content": "The sea's a place for roaming,
To seek the wandering star.
Where we can go discover
And see the lands afar.

The sea's a place of beauty
Where seagulls dive and play.
The waves show forth their fury
And the sun sets 'cross the bay.

The sea's a place for children,
Building castles in the sand.
To show God's great creation
And the power of His hand."}, {"title": "Shipwreck", "date": "2015-11-12", "content": "They sailed o'er the spanish main,
And 'cross the raging sea.
But now they're fathoms down below
Reduced just to debris.

And there they lie, some leagues submerged,
Where kelp and coral grow.
A haven for the fish at play
As barnacles do grow.

I wonder ’bout the sailors brave,
And if they lived or died.
And if a treasure in a chest
Is hidden down inside."}, {"title": "Turning Tide", "date": "2015-11-13", "content": "At six o'clock on Saturday,
The memory still clear,
Of when her ship set sail that day
And left me on this pier.

The seagulls cried the lament loud -
The surf roared loud in pain.
But I sat quiet, listlessly,
My heart now rent in twain.

I said I wished she wouldn't leave.
I'd rather she would stay.
But now she's gone and I alone
Endure each passing day.

Tide is turning, currents flow,
Ebbing, flooding, apropos.
All adrift upon the sea,
Passing through eternity.

Hoping love won't fade away,
Harder with each passing day.
Tide is turning, currents change.
Lives like oceans rearrange.

But I, as well, have left the pier
With someone mourning me.
And ’though I cried a tear or two,
I felt that it must be.

Then ships will come and also go,
And on them all will ride.
As often as the circling moon
Does bring again the tide.

Tide is turning, currents flow,
Ebbing, flooding, apropos.
Tide is turning, currents change.
Lives like oceans rearrange."}, {"title": "The Hare's Antlers (Aesop)", "date": "2015-11-14", "content": "A stag upon a hilltop stood.
He was the prince of all the wood.

With antlers glorious and grand,
No finer creature could there stand.

In jealousy a hare did cry
To Jupiter, the god on high –

That he great horns should also wear
So he might look so strong and fair.

And with sharp horns upon his head,
His enemies would run with dread.

But Jupiter, the god of Greek,
Informed the hare he was too weak.

With pleading voice, the hare did cry;
“I know I can, and beg to try.”

So warned, the hare had been well told,
He could not bear the heavy load;

The god, his wish did then bestow,
And on his head the horns did grow.

Fine branching horns both tall and wide –
The lowly hare did beam with pride.

And under the oppressive weight,
He showed to all his prize so great.

And then along the road did pass
A flock of sheep to find green grass.

The shepherds saw this little beast,
And thought to make of it a feast.

The hare did sense their appetite
And turned to scurry far from sight.

But with the burden on his head
He now did feel a sense of dread.

He could not run, or jump, or hop,
Or their most cruel intentions stop.

And so to those great antlers win,
The hare paid dearly, with his skin.

---

Beware, the dream you wish achieve
May be the one you do receive."}, {"title": "Dawn", "date": "2015-11-15", "content": "The day has dawned anew,
The last day of the Lord.
His praise we as a carol send
In love with one accord.

The signs of prophets dead
Now blazen ‘cross the sky.
The righteous know He soon will come,
Our Lord and God most high.

The wicked, blind with sin,
His warnings will not heed.
As stubble then, they must now burn
When he does come with speed.

We will be gathered then.
The stakes all gathered tight.
When in a cloud and dyed of red
He comes adorned in light."}, {"title": "Kindness", "date": "2015-11-16", "content": "As you endure your daily grind,
Whenever possible, be kind.

When someone near has lost their way,
When things don't always go your way,

When tempers flare and others shout,
When someone's sanity you doubt,

When running late, when you are tired,
Perhaps the day when you are fired,

When others fail to do their part,
When you are left with broken heart,

'Though difficult at times, I find -
It's always possible. Be kind!"}, {"title": "Shadows of a Philosophical Daydream", "date": "2015-11-17", "content": "From here to there, and there to here,
The shapeless blobs are drawing near.
The lifeless forms that hurry past —
To work, to school, to ballet class. 

It really doesn't matter much.
You've got your lives to which you clutch.
I've got my own life too, you see;
I dread your drab conformity.

There's much to learn, absorb, and grasp,
While your short lives are rushing past.
I wish you could be one with me
To soar into eternity,

To visit endless bounds of space,
And lose all track of time and place,
To study out the human mind
And all the hidden powers find.

From here to there, and there to here,
The shapeless blobs still drawing near
The lifeless forms more quickly pass —
To work to school, to ballet class.

And I alone now hope and pray
That humankind may come to say:
\"The race is o'er and no one won,
The struggle now an inward one.

And we must grow and learn to be
As brothers, yearning harmony.
The race we run‘s an inward test
And not to beat another's best.\"

But hopes are dreams and dreams, alas,
Are not as good as hard cold facts.
From here to there, and there to here,
The shapeless blobs are close, I fear.

The lifeless forms as bullets pass —
To school, to work, to ballet class.
And over-run I soon will be
By someone else's fantasy.

Then try I will with mind and might
To never lose the endless fight.
As pressures from the mass prevail,
I'll always hope of glory trail,

And carry on through muck and mire,
And strive to raise the banner higher;
To defend the truth and just,
I always have and always must!

From there to here, and here to there,
I run around and blankly stare,
As minutes on the clock roll past,
I'm late again for ballet class!"}, {"title": "The Little Bug", "date": "2015-11-18", "content": "I saw it crawling in the dirt
A half a block away.
And put it in my pocket, then,
I took it home to play.

It was the weirdest little bug
You'd ever hope to see.
It crawled upon the sidewalk and
Then it did crawl on me.

I thought I'd put it in the house
Right on the tile floor.
And let my mother see it and
Then listen to her roar.

And then I thought I'd throw it up
Into my father's hair.
To see if when he pulled it off
It might the old guy scare.

But after playing baseball, and
Then jumping on my bed,
I pulled the little fellow out
And he was very dead."}, {"title": "A Not So Ordinary View", "date": "2015-11-19", "content": "The other morning when I woke
I did the help of Him invoke.
For comprehension I did pray,
To see the world a different way.

As deep within life's daily grind
I more than often myself find.
And rarely ever make the time
To out from under schedules climb.

And thus I travel through my life,
My calendar with nonsense rife.
My mind, however, blank is found
Where idle thoughts did once abound,

When I was younger and was free
From vain responsibility.
I took the time to stop and sit
And thoughts to wander off permit.

As Alice in her wonderland
On distant planets I would stand,
Reflecting on the universe,
Or lines of Shakespeare did rehearse.

But somewhere ’tween a fool and sage
You reach a rather awkward stage.
Where fool enough to think you're wise,
The foolish things of earth you prize.

And hence in circles 'round you spin,
Convinced that you might someday win.
But rather soon you'll come to tell —
The end result: a dizzy spell.

So if you have a moment free,
I bid you spend some time with me.
And let me share, of life, with you
A not so ordinary view."}, {"title": "Celebration of Time", "date": "2015-11-20", "content": "Of all the things in life that we
Do o'er our lives collect,
It's years passed by that are the best,
As I do now reflect.

For each year brings a dozen months,
Three hundred some odd days
Of time that I may spend with you
And in your eyes may gaze. 

Today, in recognition of
Your vast and boundless worth,
I give to you my heart-felt love -
The greatest gift on earth.

Devotion to you, I bequeath,
My time and honor too.
And knowledge that my time most prized
Is what I've spent with you."}, {"title": "The Art of the Fox (Aesop)", "date": "2015-11-21", "content": "A fox upon the road did stroll.
And as he passed a grassy knoll,

A hare did wave and shout, “good day!”
And quizzically went on to say;

“In all the wood you stand apart,
As famous for your skillful art.

But many of us do not know
What talent caused your fame to grow.”

The fox replied with knowing glow;
“My secrets I will gladly show.

I do appreciate your zeal,
Come join me for a lovely meal.

Please hop down to my den at nine,
As that is when I plan to dine.

All day the hare prepared with haste
That of the art, might get a taste.

And wanting to appear his best,
The hare arrived fresh cleaned and dressed.

The table was quite finely set
But food had not been placed there yet.

The fox did then his plan reveal,
The hare, himself, would be the meal.

The fox left no one to applaud
His art of cunning and of fraud.

---

Should curiosity arise,
Consider also what is wise."}, {"title": "Below a Starry Sky", "date": "2015-11-22", "content": "Have you, below a starry sky
Thought much on who you are?
A child of Almighty God
From royal courts afar.

Have you considered what it means
To be a godly heir?
The promise, if you're worthy, to
All endless worlds share.

Can you imagine what it means
To have all strength and power?
That on the heads of all mankind
Rich blessings you might show'r.

And so I think I'll work toward
That elevated goal.
For I do know I have the pow'r
Within my humble soul.

It's not that I am discontent
Completely with my state.
It's just that I would always like
My status elevate.

And from my humble mortal view,
I see no cause to stop
At any intervening point,
In transit to the top."}, {"title": "Lowly Seed", "date": "2015-11-23", "content": "From lowly seed, when careful sown,
The mighty tree in time is grown.
The drops of melting glacier field,
Does in its course a river yield.

As tiny tillers great ships steer
Back to their sheltered home port pier.
And thus it goes, though small in size
A larger end they realize.

So please remember this I ask,
Before commencing any task:
When visions of grand things you scheme
Or planning out a lifelong dream;

Without providing great detail
Your brilliant plan will soon derail.
For no one cares how grand the scale,
Without the little things, ‘twill fail.

And likewise don't discount the worth
Of all the smaller things on earth.
For value's such a vaguery
Before the end result we see."}, {"title": "Lingering Doubts", "date": "2015-11-24", "content": "Why is it that you linger here?
Do you enjoy our company so much
That you endure the pain of being old.
And fight each day the grasp of mother earth. 

Why is it that you linger here?
In younger days the bands of life were strong
But today, the will to live is barter
Sufficient for release from earthly woe.

Why is it that you linger here?
Perhaps it is the fear of unknown paths?
Reluctance to forsake familiar ways?
And hesitance to tell God of your worth?

Why is it that you linger here?
I do not know, but each day that you stay
Please know that we do cherish and are glad.
For when you leave, more than you'll ever know -

You will be missed and you, we won't forget."}, {"title": "The Pier", "date": "2015-11-25", "content": "Pilings rotting in the surf
Useless now to all;
Faint is now the memory
When they once stood tall.

When a pier did span the waves,
When the boats did stop,
Where on lazy afternoons
Fishing hooks did drop.

Under moonlit star-filled skies,
Holding lover's hands -
There they traded vows and then
Accepted wedding bands.

Lives must be too busy now,
City lights too bright;
For those children to return
And view this lonely sight.

Barnacles have taken o'er
What's left of yesteryear.
Soon the pounding waves will take
What once was held so dear."}, {"title": "The Setting Sun", "date": "2015-11-26", "content": "I spend my days upon the sea.
From land's firm grasp my soul runs free.
I stare at passing gulls that soar,
Until they've gone and pass no more.

The sails flap at changing winds
And dolphins bare their sloping fins.
The tiller kicks as swells resist,
While memories rise of loved ones missed.

The days pass on, and what is done?
No clock is punched, no love is won.
And yet fulfilled in bed I lie,
When sun gives way to moonlit sky.

For often in this sea, called life,
When burdened down with care and strife.
The goal, when all is said and done:
To last until the setting sun."}, {"title": "Sails on the Bay", "date": "2015-11-27", "content": "Sometimes life
Becomes a little hairy.
Stress and strife,
More than just remotely scary.

Friction mounts,
I find trouble's underway.
So I run
To my secret hide-away.

Where I flee the daily grind
And might relaxation find -
To escape life's schrapnel fray,
Watching sails on the bay. 

Watching sails on the bay
Blows my mundane cares away.
And 'though all that you may say,
Yes, forever here I'll stay,
Watching sails on the bay. 

You ask me:
If I would like to travel.
Carefree be,
And let my mind unravel.

But I think -
If I were to leave here baby,
Out of sync
I'd be and absolutely crazy.

So complacently I sit,
And though selfish I admit,
I just think I'd rather stay
Watching sails on the bay. 

Watching sails on the bay
Blows my mundane cares away.
And 'though all that you may say,
Yes, forever here I'll stay,
Watching sails on the bay. 

I love you,
So I hope you understand.
That it seems
Things don't happen as they're planned.

So my dear
When I can't be by your side;
Remember me
And when you went out with the tide.

‘Cause I know you can't remain,
But I'm tethered by a chain.
And the price of love I'll pay.
Watching sails on the bay.

Watching sails on the bay
Blows my mundane cares away.
And 'though all that you may say,
Yes, forever here I'll stay,
Watching sails on the bay.

Watching sails on the bay."}, {"title": "Home (Aesop)", "date": "2015-11-28", "content": "When Zeus, the god, his wedding planned,
He sent the news to all the land.

Each creature he did then invite,
That they might share in his delight.

And on that day they all did stand
As witness to the fête so grand.

Except for one, there on the list,
The tortoise had been sorely missed.

So Zeus inquired of the slight,
And where the tortoise was that night.

In meekness did the tortoise say,
“In fact, I stayed at home all day.

I’m sure you had delicious fare,
And everyone was gathered there,

But from my youth, and now full grown,
I’d often rather be alone.

And ‘though it’s not a palace dome,
There’s really no place quite like home.

Perhaps I missed a lovely band,
But I was quite contended.” And,

This answer did not Zeus appease
And so his scepter he did seize.

An edict he did firmly state:
“Forever, from this very date,

Because the tortoise likes to stay
Within her house both night and day,

She’ll carry it upon her back.
And thus, her home she’ll never lack.

And will not offer this excuse,
If summoned once again by Zeus.”

So, as you may know very well,
That’s why a tortoise has a shell.

---

‘Though you may ‘round the world roam,
Some peace is only felt at home."}, {"title": "More", "date": "2015-11-29", "content": "To some it seems is given more.
This topic then I must explore.
For why to them and not to me?
Injustice done, you must agree!

While lovers walking hand in hand
Do pass my way, I solemn stand.
Alone I pass away my time.
In solitude I wax sublime.

In commerce, some reach lofty heights.
They wield their pow'r in corp'rate fights.
While I my memos churn and file,
With hopes to emulate their style.

Then others travel ‘round the globe.
Exotic ports they daily probe.
As I more static on my stool,
Appear to all, the village fool.

And some are wise and some are proud,
While some stand tall above the crowd.
As some have wealth to high degree,
And others rare lack company.

Is this then some eternal scheme,
To thwart my every waking dream?
Or may I from this state redeem
A little more than it may seem.

For fame, good looks and mounds of gold
Do not a great man make, I'm told.
And this I certain must believe
Should I to greatness wish achieve.

So rather curse in heaven's name,
I will not unfair practice claim,
But simply live my life each day,
And on the straight and narrow stay.

So when I see my Maker's face
He won't resist my warm embrace.
That by His side I'll take my place.
And progress on within His grace.

So whether rich or famous I
Should be the day I'm called to die;
As long as I am free of sin,
Celestial glory I shall win."}, {"title": "Uplift", "date": "2015-11-30", "content": "Some dream to garner fortunes great.
And some to rule a sovereign state.
While others wish to show their might
By killing others in a fight.

And there are those that seek great fame
With passion that all know their name.
I only wish, by verse I may,
Uplift a single soul this day."}, {"title": "Lucre", "date": "2015-12-01", "content": "'Though green and wrinkled in a wad
To modern man thou art a god.
From humble tree along a hill
You now incite some men to kill.

As lives are spent in your pursuit
To some is felt, art evil's root.
To others, panacea true,
The cure for mankind's troubles, you

'Tis you that makes the master, slave.
Commercial highways do you pave.
You feign to judge the worth of man.
And worse, the masses think you can.

O What repugnant filth you are,
Your kind, we should with fervor bar.
But now I'll pen remove from page,
As off I go to earn my wage."}, {"title": "Thacher Rising", "date": "2015-12-02", "content": "From a distant ridge,
The future now appears suddenly;
Carried on proven hooves and strong backs.

Stirring dust around them,
They arrive hesitantly and perhaps unsure;
But with the courage to rise to any challenge.

Encircled by love,
And the wisdom of the ages;
Fallen riders rise again in glory.

Time and trials flee,
As the thunder of the herd passes swiftly;
On to mountaintops and pastures unknown.

Armed with honor and integrity,
Imbued with fairness and curiosity;
Each wave of fresh riders, undaunted, nourish distant shores.

Entering each new day,
Horse and rider take wing;
Soaring through clouds of splendor to unseen heights.

And as a distant dream unfolds,
The past becomes the future once again;
And memories of greatness ride to lofty peaks above."}, {"title": "Stupor of Thought", "date": "2015-12-03", "content": "In past thought of stupor,
Or stupor of thought,
A concept before my
Cerebrum was brought.

Are ideas that I think,
Fresh, novel and new,
Or are they just seeds that
Were planted and grew?

Can a mind, made of goo
And ancient decay
Create out of nothing
A something, I pray?

Could a library grand
Be floating around,
Where thoughts and ideas on
Great scrolls may abound?

Does God, with syringe, Force
Them into our brain,
And the smartest just don't
Allow them to drain?

Whatever conclusion 
From this query's wrought,
Remember it all just
Began with one thought."}, {"title": "Looking For Company", "date": "2015-12-04", "content": "Is it beauty past description —
The quality I seek?
The intelligence of Einstein,
Or a disposition meek?

Would it help if she had talents,
If she could dance ballet?
Or if she could a portrait paint,
Perhaps enact a play?

If she an occupation had -
Accountant, engineer?
If she could cook and clean and sew?
Were wealthy without peer?

If she had all these attributes
And maybe several more —
Should I think her worth my while, to
Relinquish freedom for?

The answer makes such little sense,
Although I know it's true.
Hence without explanation,
I will share my thoughts with you.

The heart does not read resumes.
Emotions heed not facts.
It is not to simple logic
To which my love reacts.

But one day when she walks my way,
And simply says \"hello.“
If with her I'll forever stay,
Immediately I'll know."}, {"title": "A Missed Meal (Aesop)", "date": "2015-12-05", "content": "A lion found a sleeping hare.
And with the prey quite cornered there,

The great cat hungry now did feel,
And thought to have it for a meal.

But as his claw was set to wield,
He saw a deer out in the field.

The hare still in his sleep did sprawl,
Yet through the grass the cat did crawl.

Approaching now in speed and stealth,
He’d feast upon his new found wealth.

But as the lion close did creep,
The deer jumped clear with mighty leap.

The lion ran, fast as he could -
The deer, more swift, ran through the wood.

The losing race that then ensued
Did leave the lion with no food.

Defeated he returned to where
He left in peace the sleeping hare.

But in the leaves, there on the ground,
The dozing hare could not be found.

---

Pursuing further wealth and greed,
You may lose what you have and need.

(Index references: Oxford-Gibbs 286, Perry 148)"}, {"title": "The Season", "date": "2015-12-06", "content": "An odd phenomenon I've found,
Is as each year does roll around; 
The advent of the Christmas season
Comes sooner, for whatever reason.

Not only does it fill December,
But very nearly all November.
And soon we'll dress on Halloween
Like the plumb sugar fairy queen.

Now bells and toys and Santa Clause 
In mid July may give one pause
But as I see it, all is well,
The simple reason, I will tell;

These holidays, it seems, my friend
Do peace, goodwill and mercy send,
To all the people of the earth
And fill the world with love and mirth.

So if on January first
The season on the world did burst
And lasted throughout all the year
With 'biding Christmas joy and cheer,

I think it would be quite a boon.
And let us pray it happens soon."}, {"title": "Hero", "date": "2015-12-07", "content": "I've never known a hero,
Who thought that he was brave.
Whose conscious aim was to forsake
His life, to other's save.

Not that he wouldn't do it,
A time or two or more.
Or that a call to duty, he'd
Off-handedly ignore.

But rarely does the need arise
And only fools pursue,
The opportunity to die -
I wouldn't now, would you?

So I might be a hero, just
Awaiting my great test.
I'd rather like to think so.
Optimism’s always best.

So throw me in the jaws of hell -
Great feats require of me.
Allow me opportunity,
My valor we might see.

Or take my word for it, old friend,
That we might never see,
The day when my great test does come
And ’fore the foe I flee."}, {"title": "El Cid", "date": "2015-12-08", "content": "In all of the peninsula
Of Spain and Portugal;
His name's revered by young and old.
His exploits known by all.

There never was a greater man
To ride a horse in mail.
In battle he was fearsome, brave,
And never known to fail.

But evil and convincing men
Persuaded Christian Crown;
That our fair knight with jealousy
Would soon the King bring down.

They warned that he be sent away,
Refused by all the land.
By royal proclamation, that
Intact the throne might stand.

So, banished by the Christian and
The enemy of Moor;
Oh my Cid wept, the fabled knight,
Without a home and poor.

But honor was his byword, and
True loyalty his creed.
He flew to conquer kingdoms,
Aboard his mighty steed.

And then the mighty treasures
He did share with his duped King:
Convincing him with kindness
That no danger would he bring.

Vast fortunes did he bring the King,
Much land and peoples too.
And for his strength and bravery,
The Moor from Spain withdrew.

Time honored now by Spaniard as
Protector from the Moor.
His Armor shining brightly, he -
El Cid, Campeador."}, {"title": "Skis", "date": "2015-12-09", "content": "On skis through whitened wood I go.
Around me pines fresh laced with snow.
I hear the sound of shifting ice,
As sharpened skis do o'er it slice.

I love to see the pristine wood.
If you could too, you really should,
To feel the icy mountain breeze
Blow carefully amid the trees.

And see the woodland creatures peek
As under skis the snow does creak.
The air is crystal clean and new,
I've never seen a grander view."}, {"title": "Rhyme", "date": "2015-12-10", "content": "Some think it not too easy
To write a theme in rhyme;
To organize a meter,
And fit the words in time.

They say to write a poem,
In fact is awf’lly hard.
And admiration follows
The writing of a bard.

But I, the situation,
Do now with thought review.
I think I'll pen a couple thoughts
To share results with you:

The fact is, poets often
The english language bend.
They'll often cut and splice their words,
The rules of grammar rend.

But more than that, cohesive thought
Is often set aside.
Although my purpose is not to
The poets work deride.

It's simply that I rather think
That even you or I
Could write a piece of poetry -
If we were pleased to try."}, {"title": "A Little Romance", "date": "2015-12-11", "content": "Excuse me, would you like to dance?
I couldn't help but catch your glance,
And so I thought I'd take a chance —
In hopes of finding some romance.

It seems my time is rather full
When trying my fair weight to pull.
And work can rather be a chore,
While sitting home's an awful bore.

But when in love, the world does change,
Priorities then rearrange.
And life just seems to glide along,
Like in some old forgotten song.

A rose, a kiss, with hand in hand,
A list'ning ear to understand.
A walk at midnight on the pier,
And someone who will hold me near.

And so I‘d rather like to find
Another who is so inclined
To throw the dice and take a chance,
In hopes of finding some romance."}, {"title": "Grasping Victory (Aesop)", "date": "2015-12-12", "content": "A little tortoise made her way
Along a path, one summer day.

Inside she felt a little dread –
An eagle circled overhead.

And soon, the eagle from the sky
With talons sharp came swooping by.

Her fears she then did realize
As she was lifted in the skies.

The tortoise did not lose her cool,
And said “great eagle, you’re no fool.

I’m very small and hard to eat -
I’ll guide you to a tasty treat.

The eagle to the plan agreed,
And to the tortoise he did heed.

Along the river they did fly,
Until a grove of trees came by.

And underneath the leafy stand
They found a place where they could land,

Beside a clear and tranquil pond,
Where fish for many years had spawned.

The eagle picked them out with ease
And ate his fill beneath the trees.

The tortoise with relief did sigh,
And nibbled on the plants nearby,

Expecting that this time of day
A bear might happen by this way.

Then, as she thought, the bear came by
And found the bird too fat to fly.

The bear enjoyed an eagle dish,
Before a second course of fish.

The eagle swift was thus undone
By tortoise, far too slow to run.

---

Both the mighty and the fleet,
May with trickery be beat."}, {"title": "The Brightest Christmas", "date": "2015-12-13", "content": "There was no brightly colored tree
Nor carols sung with joy and glee;
When Christ the Lord, the Son of God
Did come to dwell on earthly sod.
 
But since that time in many lands
Have gifts of splendor traded hands,
In mem’ry of that humble birth,
In hidden corner of the earth.
 
Now Santa Claus and lighted trees
With jingle bells and pine bough wreaths,
Beneath an evening crisp and clear,
Have brought the season joy and cheer.
 
But throughout all the land is told
That all the riches and the gold
Could never buy the love unfeigned
As in that humble stable reigned.
 
And never did the angels sing
As when they did the good news bring;
That through this meek and lowly birth,
Our Savior came to save the earth."}, {"title": "The Greatest Legacy", "date": "2015-12-14", "content": "For some, the course they navigate
Is building fortunes vast and great.
And for this monetary goal,
They focus all their mind and soul.

And some succeed and treasures leave
For those who at their coffins grieve.
While others at great wealth do fail,
And leave the destitute to wail.

But greatest is the legacy
Of those who served quite happily;
Who minister to poor and sick,
And friends remain through thin and thick.

Who cling to what they know is true
And always seek the higher view.
And 'though it's not their only quest,
Oft' times with riches they are blessed.

Which they apply most willingly
To acts of generosity -
Pursuing causes most worthwhile,
They share their comfort and a smile.

But either way, I would maintain,
We should remember this refrain:
It's not the stuff we leave behind.
It's what we've done for humankind."}, {"title": "Dessert", "date": "2015-12-15", "content": "My mother made the greatest cakes
And cookies too and pies.
But when I asked her how, why,
Her response was a surprise...

I wrote her just a little note,
And pleaded that she might
Just forward desert recipes
The next time she did write.

I opened up her envelope,
And in it there was sand
And also seeds for cactus, and,
I did not understand.

She also wrote a little note and
Said, with one more S,
I could have got a cookbook.
She was right, I must confess.

So after supper for a treat
Remember, one more S.
And if you want a barren place,
Just one will do, I guess."}, {"title": "Golden Gate", "date": "2015-12-16", "content": "I crossed the golden gate today
Above the churning, hostile sea.
And with a pen and paper, I
Did write the thoughts that came to me.

How many souls have crossed this span?
How many architects did plan;
When raising, how many did die;
And how many at home did cry?

Before it was, did no one cross;
Or did they, to ensuing loss?
Does it the landscape now disface;
Or rather does it add its grace?

How many have their lives destroyed
By plummeting into the void?
How many others does it save;
By carrying above the wave?

I will the trestle now traverse,
As honor do I give in verse.
For I need only question why,
To build the thing I need not try."}, {"title": "Fellow Wonderer", "date": "2015-12-17", "content": "On a bench in random thought,
No great answer herein sought.
As the brain does slowly rot,
Expectations never wrought.

Fog encircling 'round the pier.
Mind in some slow motion gear.
Only sounds of seabirds hear.
Footsteps from the mist draw near.

Bell from passing ship does ring.
Bird does suddenly take wing,
As my random thoughts do sing.
Who might those dark footsteps bring?

Fellow wonderer is there.
Strolling by, a nod we share.
Do you think the world should care,
What was thought and pondered there?"}, {"title": "Tribute", "date": "2015-12-18", "content": "I've never had a better friend.
She'd stand beside me ’til the end.
With understanding look and smile,
She reassures with calming style.

Along the beach we often run;
Then stop to view the setting sun.
When others seem to little care,
I know that she is ever there.

My life is her raison d'etre,
This mortal life we've come to share.
The motive for this monologue:
To pay a tribute to ... my dog."}, {"title": "A Flying Lesson (Aesop)", "date": "2015-12-19", "content": "A tortoise by the marsh did play,
And to the birds around did say;

“Oh shearwaters, and gulls, and terns,
A great desire within me burns.

To fly, like you, would be a thrill.
Please teach to me this wond’rous skill!”

An eagle overheard the plea,
And asked, “what would you give to me,

To tutor you up in the sky,
To touch the clouds … the trees soar by?”

The tortoise offered fortune great:
“The treasures of the sea await.

A great reward I’ll surely pay,
If you’ll teach me to fly today.”

And so the eagle grasped her tight,
And flapped his wings with all his might.

And up into the skies they rose
Just as their deal did propose.

Above the trees, the two did soar,
And through the clouds they did explore.

The tortoise never felt so free,
And shouted out with joy and glee.

The eagle said “we’re nearly done.”
I think that you have had your fun.

And where’s that treasure of the sea?
It’s time to pay my salary.”

The tortoise then her thanks did give,
But said, “I ask you please forgive

The offer that I rashly made.
For ‘though I would have gladly paid,

I did my wealth misrepresent.
You see, I do not have a cent.

Then high above a mountain top,
The eagle did the tortoise drop.

And without any wings at all,
The tortoise from the height did fall.

The helpless tortoise then did cry;
“In foolishness I yearned to fly.

I struggled just to learn to walk.
And now will die upon a rock.”

So with her life, the price to pay,
In pieces on the ground she lay.

---

Tomorrow often brings regrets,
When merriments are paid with debts."}, {"title": "Bethlehem", "date": "2015-12-20", "content": "O’er all the many centuries,
In all the principalities;
Would that small village, through the earth
Be known, were not it for his birth?
 
And more, the twelfth month of the year
Would likely not be filled with cheer.
Nor would we each have trees of pine
Adorned with lights that color shine.
 
Our calendar, confused would be,
No need for Christianity,
In sum, the world would markedly
Be different from the one we see.
 
But greater far, remember that
If Mary, Christ had not begat;
He could not for our sins have paid -
And thus my humble accolade."}, {"title": "Hands of Love", "date": "2015-12-21", "content": "Who was the carpenter -
With skilled and calloused hands,
Who built a manger
And sold it to an innkeeper?

Who was the farmer –
Having sown good seeds,
Did harvest, heap, and bundle hay
Upon a cart, to trade in Bethlehem?

Who was the weaver –
Spinning fibers into thread,
Then worked the loom to yield cloth
For a young girl to fashion swaddling clothes?

Did they know the child –
Who was gently placed therein?
And with His hands did heal and teach
And save a world from sin."}, {"title": "The Mirths of Christmas", "date": "2015-12-22", "content": "The scholars of our time do say;
Christ was not born on Christmas day.
 
And more, the wise men came too late
To be in Bethlehem that date.
 
The carols likely not were sung
And not one single bell was rung.
 
What's more, the story of S. Clause,
Does also have its share of flaws.
 
And don't forget that tree of pine
Is nothing more than pagan sign.
 
But should these truths at all detract
From that most all consuming fact;
 
That Christ was born, and love he brought
And truth to all the masses taught?
 
So sing the carols loud and strong,
And let the church bells peal long;
 
Then trim the tree and deck the halls
And let the shoppers fill the malls.
 
For there is cause to celebrate!
What e'er the season or the date.
 
And let us at this time recall
Our savior came to save us all."}, {"title": "The Brightest Star", "date": "2015-12-23", "content": "In distant heavens long ago
A little star once shone;
A tiny little flicker there,
Not even half-way grown.

Now, news had traveled far and wide
That soon would come the night
When Jesus Christ to earth would come,
The King of truth and light.

The star with all her heart and might
Did wish to see the birth.
And so she flew across the skies
Toward our tiny earth.

But where on earth would Jesus come?
The star now yearned to know.
And so to wise men from the east
The little light did go.

The wise men knew the Lord would come
And were prepared to find
The birthplace of the holy child,
The Savior of mankind.

The wise men plead, \"O precious star,
If you will shine above;
Together we will find the babe,
The Prince of peace and love.

They traveled to Jerusalem,
And once within the gate
The wise men went to ask the king
And bid the star to wait.

Our friend, the little star did gaze
At all the earth that night
And then in yonder heaven, she
Did see a wond'rous sight.

An angel in the heavens spoke
Good tidings of great joy -
\"In humble manger lays our Lord,
An holy infant boy.\"

As hosts of angels filled the sky
And shepherds knelt below.
The little star was filled with joy,
And brighter did she glow.

Angelic choirs sang of peace.
\"Glory to God\" they cried.
Carols, beautiful sweet and pure,
Echoed on ev'ry side.

As shepherds walked to Bethlehem,
The star so brightly shined.
To help them on their way that night,
The baby Lord to find.

Then, in a stable they did see
The baby in the hay,
While Joseph held his Mary sweet
Upon that Christmas day.

The little star, who once was dim
In heaven seen afar,
Descended on that holy scene,
And was the brightest star.

The wise men looked and saw her there -
Her light so bright and pure;
And brought the child their precious gifts
Gold, frankincense and myrrh.

Oh little star, we thank you now
For giving us your light -
Illuminating all the earth
That holy Christmas night."}, {"title": "Holiday Memories", "date": "2015-12-24", "content": "As Christmas bows are tied with care
And candy canes delight
When carols through the halls do sound,
And candles sparkle bright;

My memories of holidays
In times long past bring cheer.
And expectations lift my heart,
As Christmas comes each year.

When youth was my companion dear
And I from stress was free –
Awaiting reindeer and St. Nick
Would fill my heart with glee.

Each present I would hold with care 
And guess the gift unseen,
Imagining the treasure held
Within the red and green.

But now that streaks of gray and white
Adorn my aging head
I’d gladly trade the presents for
My children near instead.

Preparing feasts for loved ones dear
And setting out each plate
We listen for their footsteps now
Within our garden gate.

We sit around a blazing fire
And talk of days gone by;
As smells beyond the kitchen waft
Of roast, potatoes, pie…

We tuck the little ones in bed,
Upon them blankets throw,
And decorate for Christmas ‘morn
As embers lose their glow.

And hope that in a child’s heart
Our legacy lives on.
And Christmas’ spirit lingers still
When all of us are gone."}, {"title": "A Christmas Thought", "date": "2015-12-25", "content": "Wast born 'neath crisp and clear dark night,
In a manger, lovely sight.
'Though humbler place could not be found,
Angels with their trumps did sound.
The baby Jesus, Son of God,
Thy great mission we do laud.
 
'Though many years have passed away
Since that sacred, holy day;
Pray, we might not forget Thy love
Poured abundant from above.
That cheer might fill the empty heart
As we, with others, love impart.
 
All through the season, and the year
May the feelings linger near.
That when the tree and glitter's gone;
The spirit, we might carry on."}, {"title": "Hold On Tight! (Aesop)", "date": "2015-12-26", "content": "A tortoise watched the birds all fly,
And chipmunks quickly scamper by;

And thought where he would like to go,
If he did not move quite so slow.

If like the hare, with speed could run,
Each day he’d chase the setting sun.

But on his back, his shell did weigh,
And slowed each step throughout the day.

The world had surely much to see,
If he could of his shell be free.

Two ducks did all this overhear,
And to the tortoise waddled near.

With feathers they did dry his tear,
And shared a thought to bring him cheer:

“Perhaps we could bestow a gift,
And give to you a little lift…

We’ll find a stick that’s strong, but light –
Well suited to a lengthy flight.

Then in our beaks, we’ll hold each end.
And you’ll bite in the middle, friend.

Then all the world you’ll get to see,
As you fly in our company.”

The tortoise did no longer grieve,
And said with glee, “when can we leave?”

So, quickly they did all prepare,
To leave the ground and take to air.

Again the ducks, the tortoise told,
“You never must release your hold!”

Then slowly first, the three did rise,
Toward the clear and sunny skies.

And ever upward, they rose higher,
Just as the tortoise did desire.

A crow did happen by in flight,
And paused at this amazing sight.

She asked, “who is this that you bring,
Is this indeed the tortoise king?”

This praise, the tortoise did surprise,
And in response, though quite unwise,

The tortoise shouted, “thank you ma’m,”
Then found himself in quite a jam.

As from his mouth the stick did slip
And he had lost his precious grip.

The world now, he would never view,
His travels now completely through.

Upon the rocks, now just debris …
But from his shell, he was now free.

---

Just focus on the task at hand,
Or suffer destiny unplanned.

: 2, Aesop’s Fables (1884): 188)

Traditional"}, {"title": "My Lord", "date": "2015-12-27", "content": "Humble savior, born in stall;
Come to save the world all.
Condescension of a God,
In the robes of peasant shod.
 
Mission holy sent to do,
How I wish they only knew!
Why does man not understand
Prophets in his very land?
 
Often simple minds reject
Treasures great and truths correct.
May I always comprehend,
All the wondrous gifts you send.
 
And the earth, the truth be taught,
That thy suff'ring be for aught.
Oh my savior, holy lamb,
In thy debt I always am."}, {"title": "Problems", "date": "2015-12-28", "content": "Be grateful for the problems that
You face each day at work.
Embrace each challenge as it comes,
And do not from them shirk.

Because, you see, if all went smooth
And no one had a care -
It's very likely you would find
They wouldn't need you there!"}, {"title": "A Better Way", "date": "2015-12-29", "content": "Each one of us is born, does die;
At both events, our loved ones cry.
In the remaining time between,
The bounties of this earth we glean.

But I must query all, this day
To answer this, if someone may;
Whose duty is it to decide
How long, we on this earth reside?

Who sends the soldier off to kill,
To take a life against its will.
Who doles out medicines and care
When bodies fall in disrepair.

Who, with a fetus does away,
As death to comatose does stay.
Who, great sums spend on sick and old
When strong and healthy suffer cold.

As lack of food a child does kill
Who, for the dying pays on still.
The answer, I don't feign to know,
And so my search must onward go.

But this I'll dare to state today;
There ought to be a better way!"}, {"title": "Joshua Tree", "date": "2015-12-30", "content": "O, there you stand with hands upraised
Like Joshua of old.
In praise of the almighty God -
At least that's what I'm told.

Joshua Tree from desert stand
You rise above the rest.
Surviving heat and swirling sand,
You make of it the best.

Good fellowship you offer to
The lonely traveler.
And without company yourself,
So faithful, you endure."}, {"title": "River of Time", "date": "2015-12-31", "content": "River of time,
Flowing ever onward.
A paradigm,
With many thoughts inferred.

An element so pure is not
As water from the source is brought
Beginnings in the melted ice
A streamlet does begin arise,
As infant grows to larger size;
I wonder how it's banks should rise

The rapids clean and purify,
The pools reflecting question why.
At times I feel an undertow,
While later it does slowly flow.
And then, at last, when all is done
It meets the sea and flows as one.

River of time,
Flowing ever onward.
A paradigm,
With many thoughts inferred."}, {"title": "New Year", "date": "2016-01-01", "content": "The New Year dawns with hope renewed,
As through a clearer window viewed.

The burdens of the months behind
No longer clutter up the mind.

New possibilities abound,
A firm resolve within us found.

As resolutions fill our heart -
A better course this year we’ll chart."}, {"title": "The Crow's Counsel (Aesop)", "date": "2016-01-02", "content": "An eagle perched atop a beach
Did spot a tortoise near his reach.

He had not seen this thing before
And walked up close to now explore.

The tortoise was within his shell,
And there remained, protected well.

With mighty beak, he pecked its back.
But no response from this attack.

With talons he did slash and rake.
But hardly did a scratch it make.

And so he thought he’d fly away,
To find another meal that day.

Just then appeared a smiling crow,
Who said, “let’s talk before you go.

Inside this shell’s a meal for two,
And I can tell you what to do.

With your great strength and my quick brain,
We both can something good obtain.

And so the eagle said he’d share
The shell now held within his care.

Then as the crow his trick did tell,
The eagle listened very well.

And did just what he had been told -
With claws, the shell did tightly hold.

Then with the tortoise, up he flew
Toward the sunny skies of blue.

And with the rocks now far below,
He let his package quickly go.

With stones below, it made impact
And open wide the shell did crack.

The crow was waiting close at hand,
Nearby the rocks, upon the sand.

And quickly did the meat then seize
And flew away, beneath some trees.

Upon returning to the place,
The eagle did not find a trace

Of crafty crow or meat to share –
The shell had been left fully bare.

So while the crow did eat his fill,
The eagle stood there hungry still.

---
When following a charted course,
Consider well, how true the source."}, {"title": "Praise", "date": "2016-01-03", "content": "With the angels, praise we give thee —
Father of the light.
Crying loud our adoration,
For thy grace and might.

From thy presence, holy offspring
Here on earth to dwell;
May we not deny our lineage.
May we serve thee well.

Share thy gospel with our neighbor;
Teach our children love.
Labor in thy holy temple,
Pray to thee above."}, {"title": "Power", "date": "2016-01-04", "content": "The only time over which 
We have power
To exercise control
Is now!"}, {"title": "A Very Sad Story of Our Little Will (Who Tried With His Might, But Just Could Not Sit Still)", "date": "2016-01-05", "content": "Young William was seven, but as I'll relate;
Tomorrow the small boy would be turning eight.

A party was scheduled three months in advance,
And nothing at all would be left up to chance.

A pony would be there, and also a clown.
And children were coming from all over town.

As soon as the school bell had ended the day,
They'd start with the party with haste, right away.

Now, Will was excited and couldn't quite sleep.
He tried singing songs, and he tried counting sheep.

Then soon he was sleeping, and make no mistake,
He dreamed of balloons and of ice cream and cake.

Quite early that morning did William arise,
Before the bright sun had appeared in the skies.

Will stopped for some breakfast of waffles and juice.
He tried to relax, but it just was no use.

He had to keep moving, he had to get dressed.
He wore just the clothes that he thought would look best.

His mother fixed lunch, and he took it to school.
He went to his classroom and sat on his stool.

The teacher was teaching the class how to spell,
But Will wasn't able to listen real well.

And when the nice teacher called out William's name,
He didn't respond and so over she came.

She said, \"Dear young man, I was talking to you.
And paying attention is what you should do.\"

He said he was sorry, and tried to be good,
But just couldn't do it as well as he should.

He twiddled his thumbs and then twiddled his toes.
And then with his eyes tried to look at his nose.

If the bell for his recess had not rung just then,
He was going to write on his desk with a pen.

But now he was free and he ran with his might.
He ran till the classroom was just out of sight.

And then he ran back just as fast as he could,
And climbed on a ladder and fort made of wood.

Then he swung on a swing and he played in the sand.
And he dug several tunnels around with his hand.

But when the bell rang to return to his seat,
He trudged slowly back and was dragging his feet.

He sat and he listened, but couldn't just sit.
And so he decided he'd stretch for a bit.

His arms and his legs went all over the place,
And he walloped his classmate right smack in the face.

A pretty young girl, who then started to cry.
And Will hid his face as the teacher came by.

The teacher consoled the poor whimpering lass,
And told little Will to report after class.

When school had concluded, the children all ran
To get to Will's party before it began.

But Will had to face the effects of his might,
And the teacher instructed the poor boy to write:

\"William Won't Wiggle and Will not act Wild.\"
(A difficult phrase for an eight-year-old child.)

She told him to write it down five hundred times.
(A punishment fitting some much harsher crimes.)

He missed half his party before he was done,
And then quickly home the sad boy had to run.

He sat on the pony, ate ice cream and cake.
And for him, the clown, funny faces did make.

Will smiled and with all the children did play.
But he learned a wonderful lesson that day -

Sometimes we must listen and sit very still.
And that is the story of our little Will."}, {"title": "Dear Dolphin", "date": "2016-01-06", "content": "One thousand miles from my home,
One thousand miles at sea,
Dear dolphin you're a welcome sight.
I'm glad you've come to me.

Presumably your home is here,
I trust you've not come far.
You know that I'm a stranger here,
Lead onward by a star.

Your knowing nod and playful smile
Diversion do provide.
Go on and play along my wake,
And travel by my side.

I wonder really what you know,
And if your tongue could speak,
What wondrous tales of the deep
You could, to me, repeat.

Though prior to a dialogue,
You choose to glide away.
