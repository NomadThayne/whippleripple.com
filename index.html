{"title":"A Very Sad Story of Our Little Will (Who Tried With His Might, But Just Could Not Sit Still)","date":"2016-01-05","content":"Young William was seven, but as I'll relate;\nTomorrow the small boy would be turning eight.\n\nA party was scheduled three months in advance,\nAnd nothing at all would be left up to chance.\n\nA pony would be there, and also a clown.\nAnd children were coming from all over town.\n\nAs soon as the school bell had ended the day,\nThey'd start with the party with haste, right away.\n\nNow, Will was excited and couldn't quite sleep.\nHe tried singing songs, and he tried counting sheep.\n\nThen soon he was sleeping, and make no mistake,\nHe dreamed of balloons and of ice cream and cake.\n\nQuite early that morning did William arise,\nBefore the bright sun had appeared in the skies.\n\nWill stopped for some breakfast of waffles and juice.\nHe tried to relax, but it just was no use.\n\nHe had to keep moving, he had to get dressed.\nHe wore just the clothes that he thought would look best.\n\nHis mother fixed lunch, and he took it to school.\nHe went to his classroom and sat on his stool.\n\nThe teacher was teaching the class how to spell,\nBut Will wasn't able to listen real well.\n\nAnd when the nice teacher called out William's name,\nHe didn't respond and so over she came.\n\nShe said, \"Dear young man, I was talking to you.\nAnd paying attention is what you should do.\"\n\nHe said he was sorry, and tried to be good,\nBut just couldn't do it as well as he should.\n\nHe twiddled his thumbs and then twiddled his toes.\nAnd then with his eyes tried to look at his nose.\n\nIf the bell for his recess had not rung just then,\nHe was going to write on his desk with a pen.\n\nBut now he was free and he ran with his might.\nHe ran till the classroom was just out of sight.\n\nAnd then he ran back just as fast as he could,\nAnd climbed on a ladder and fort made of wood.\n\nThen he swung on a swing and he played in the sand.\nAnd he dug several tunnels around with his hand.\n\nBut when the bell rang to return to his seat,\nHe trudged slowly back and was dragging his feet.\n\nHe sat and he listened, but couldn't just sit.\nAnd so he decided he'd stretch for a bit.\n\nHis arms and his legs went all over the place,\nAnd he walloped his classmate right smack in the face.\n\nA pretty young girl, who then started to cry.\nAnd Will hid his face as the teacher came by.\n\nThe teacher consoled the poor whimpering lass,\nAnd told little Will to report after class.\n\nWhen school had concluded, the children all ran\nTo get to Will's party before it began.\n\nBut Will had to face the effects of his might,\nAnd the teacher instructed the poor boy to write:\n\n\"William Won't Wiggle and Will not act Wild.\"\n(A difficult phrase for an eight-year-old child.)\n\nShe told him to write it down five hundred times.\n(A punishment fitting some much harsher crimes.)\n\nHe missed half his party before he was done,\nAnd then quickly home the sad boy had to run.\n\nHe sat on the pony, ate ice cream and cake.\nAnd for him, the clown, funny faces did make.\n\nWill smiled and with all the children did play.\nBut he learned a wonderful lesson that day -\n\nSometimes we must listen and sit very still.\nAnd that is the story of our little Will."},
{"title":"Dear Dolphin","date":"2016-01-06","content":"One thousand miles from my home,\nOne thousand miles at sea,\nDear dolphin you're a welcome sight.\nI'm glad you've come to me.\n\nPresumably your home is here,\nI trust you've not come far.\nYou know that I'm a stranger here,\nLead onward by a star.\n\nYour knowing nod and playful smile\nDiversion do provide.\nGo on and play along my wake,\nAnd travel by my side.\n\nI wonder really what you know,\nAnd if your tongue could speak,\nWhat wondrous tales of the deep\nYou could, to me, repeat.\n\nThough prior to a dialogue,\nYou choose to glide away.\nAnd with an airborne twist and flip,\nYou signal me good—day."},
{"title":"Beginning","date":"2016-01-07","content":"At Birth Commences\nDeath’s Entre.\nFate Gnarls Human\nInterplay.\n\nJeweled Kings, Loved Mothers\nNow Omitted,\nPost Quintessential\nRites Submitted.\n\nTruth Undaunted, Vaulted Wide\nXanadu, Yet Zeitgeist."},
{"title":"Only a Lonely Miner","date":"2016-01-08","content":"I'm only a lonely miner,\nA million miles from home.\nI've left my home and family\nFor a few lousy nuggets of gold.\n\nBut what will I do when I find it?\nI've no use for the yellowish muck.\nI think I'll go down into town\nAnd show the folks my luck.\n\nAnd then will I write a letter\nTo all of my family and friends.\nTo tell them of my adventures\nAnd for them how my heart now rends.\n\nI'll tell them about my hardships -\nOf the wolves that howl at the moon.\nBut most of all I'll tell them ‘bout\nThe Malamute Saloon.    \n\n(Reprise)\n\nThen when you depart our presence,\nAnd travel home to bed,\nWe hope that rather than scoff us,\nYou'll sing our praises instead.\nAnd the next time you hear of the Yukon,\nBeneath a yellowish moon.\nWe hope you remember this evening in\nThe Malamute Saloon.\nOh, the Malamute Saloon\nYes, the Malamute Saloon"},
{"title":"Choosing Sides (Aesop)","date":"2016-01-09","content":"A hare was fleeing an attack\nFrom dog who bit his legs and back.\n\nThey both through wood and field did dart,\nAnd never were too far apart.\n\nAt times the dog would vicious snap,\nThen later flowing blood would lap.\n\nThe dog continued on his play,\nAnd teased his weak and wounded prey.\n\nThe hare in desperation cried,\n“Please dog, would you just choose a side!\n\nIf playmate you desire of me,\nI need to rest, so let me be.\n\nOr if my death you really want,\nJust end me now, and cease to taunt!”\n\n---\nTrue colors you should always show –\nIf loyal friend, or rather foe."},
{"title":"A Message","date":"2016-01-10","content":"To preach to my brothers,\nProclaiming His name.\nTo do it for His sake;\nAnd not for the fame.\n\nI hope to be worthy,\nI hope you will hear,\nThat we might be raised up,\nWhen judgement draws near."},
{"title":"The Beaten Path","date":"2016-01-11","content":"No one has ever made\nA great discovery\nBy following\nThe beaten path."},
{"title":"Daily Breath","date":"2016-01-12","content":"Is it our right,\nWe mortal souls who err,\n\nTo take away\nThat which we cannot give?\n\nAre we as God\nWho gives life daily breath?\n\nOr merely are \nWe beggars for that gift?\n\nIf one should not\nDeprive a fellow life -\n\nIn symphony,\nThis power should we wield?"},
{"title":"Whale","date":"2016-01-13","content":"Largest living mammal, you,\nKind and gentle giant too.\n\nSinging whale songs to all,\nI have heard your stately call.\n\nYou are gorgeous when you leap\nFrom the ocean dark and deep.\n\nSplashing tail, you say hi,\nI with waving arm reply.\n\nThen you dive and swim below.\nWhere you go, I'll never know.\n\nBut I'll watch the sea about,\nAnd again I'll see your spout."},
{"title":"A Canvas","date":"2016-01-14","content":"A palette filled with many shades\nA canvas, frame and skill\nA brush, a thought, but even more -\nAn artist's untamed will;\n\nDoes hang above my faded couch\nAmidst a peeling wall,\nAnd oversees my life's charade,\nFor aren't we actors all?\n\nI only hope that once life's o'er\nA masterpiece I'll leave.\nAnd not just doodles on a pad -\nThat some my death might grieve."},
{"title":"Gatsby","date":"2016-01-15","content":"The moonlight glistened through the sky\nAs Gatsby gazed across the bay –\nAnd through the darkness glimmered bright\nA light of green now on display.\n\nIt seemed more than a life ago.\nAcross the ravages of war;\nAnd time and place and Wasteland woes - \nWhen things were as they were before…\n\nHow many memories were lost – \nBecause of choices made in haste?\nAnd dreams that sailed o’er the bay,\nBelow the waves in death encased.\n\nHow different would his life now be – \nIf he were Tom and Tom were he?\nAnd looking ‘cross the bay at night –\nA lonely silhouette he’d see.\n\nWas Daisy’s dock a mere mirage?\nWhere once he dreamed of happy times?\nOr is the coldness of the night,\nA penalty for all his crimes?"},
{"title":"The Best Escape (Aesop)","date":"2016-01-16","content":"A fox and hare did argue long,\nAnd tried to prove each other wrong,\n\nAbout which one could best evade\nA hot pursuit by hunter made.\n\nThe hare did boast about his speed –\nThat he could outrun hound or steed.\n\nAnd how his feet so strong and swift,\nDelivered well the needed lift.\n\nThe fox then angrily opined;\n“The better thing's a clever mind.\n\nFor ‘though your speed is very fast –\nAs time wears on, you cannot last.\n\nWith trickery I win the day,\nTo keep my predators away.\n\nAnd it is known both far and wide\nThat I can more discreetly hide.\n\nAnd on they bickered through the night –\nUntil the sun’s first morning light.\n\n---\n\nThe swiftest may not win the prize,\nWhen facing foes who are more wise."},
{"title":"Gospel Light","date":"2016-01-17","content":"Because the Christ upon the cross\nDid long ago atone,\nAnd to the prophet of our day\nThe gospel light was shown;\n\nWe may enjoy the gifts of God\nAbundantly today.\nAnd find the path to heav'n above,\nAnd there might ever stay."},
{"title":"The Light of Love","date":"2016-01-18","content":"'Though fire may a fire fight,\nMore darkness will not bring the light.\n\nA moonless night will darker seem\nWhen turning off a flashlight beam.\n\nAnd flipping off another switch\nWon't brighten rooms as dark as pitch.\n\nYet caves alone I'll dare to tame\nWith just a tiny candle flame.\n\nIt doesn't take a fire bright\nTo guide your feet through darkest night.\n\nAs light unto the darkness brings,\nThe same is true with other things:\n\nTo evil from the earth abate -\nDo not attempt by spreading hate.\n\nThis lesson proven very well -\nThat love, alone, can hate dispel.\n\nAnd like a spark can soon ignite\nA raging fire, burning bright.\n\nA global love can simply start\nWithin one humble beating heart.\n\nFor small and simple things grow tall,\nAs you may easily recall ...\n\nThe Spirit witnessed God's great love\nWith just a lowly, little dove.\n\nInspired by:\n\n\"Darkness cannot drive out darkness; only light can do that. Hate cannot drive out hate; only love can do that.\"\n- Martin Luther King, Jr."},
{"title":"What's a Name","date":"2016-01-19","content":"I’m awfully glad that at my birth\nMy parents didn’t call me ‘Dearth,’\n\nOr ‘Parsininthreopraphy’\nOr ‘Catchattorriaminy.’\n\nBecause the children like to tease\nAnd would have put me ill at ease.\n\nBut even though they all would laugh\nWhen glancing o’er my autograph,\n\nIf I did one day gain great fame\nThey all would wish they had my name!"},
{"title":"Little Sailor","date":"2016-01-20","content":"I am quite a little sailor\nHere standing on the dock.\nThe seagulls dive at passing fish,\nAnd hover in a flock.\n\nThe sails drift by on gentle breeze\nTo cross the deep and spacious seas.\nI have a life-vest so I'll float.\nNow all I need is just a boat!"},
{"title":"Nervous Laughter","date":"2016-01-21","content":"Always coming, always going,\nEver ebbing, ever flowing;\nMotion constant, always changing,\nOnly ceaseless rearranging.\n\nInterest rates will fall and rise.\nOne does sell, the other buys.\nInfant cries in shrilling tones,\nEcho through the ancients' bones.\n\nNervous laughter - on the edge of sanity. \nNervous laughter - mind is sailing off to sea.\nNervous laughter - symptom I may crazy be.\nNervous laughter - won't you listen to my plea!\n\nPlanet spinning ‘round and ‘round,\nWhere it stops is where we're found.\nWitch or warlock, wise man, saint,\nHidden under body paint.\n\nMind is turning all about,\nFirst a flood and then a drought.\nLike a painted smiling face,\nUndercurrent shows no trace. \n\nNervous laughter - echoing inside my ears.\nNervous laughter - magnifies my deepest fears.\nNervous laughter - reality is what you see.\nNervous laughter - ha ha ha, can you see me?\n\nMay I not control my mind?\nRest in tranquil corners find?\nMaking time for wounds to mend,\nEither that or face the end.\n\nNervous laughter, nervous laughter..."},
{"title":"Eternal Bonds","date":"2016-01-22","content":"Across the altar of the Lord,\nI pause to glance at you.\nAs something in your countenance,\nRemarkably is new. \n\n'Though beauty, you have always had,\nAs viewed within my eyes,\nThe radiance you now emit\nAppears as from the skies.\n\nEternal bonds of love we make\nTogether on this day,\nAs one, beyond these earthly realms,\nForever we will stay.\n\nFor comfort in the trials and\nTo share in victory,\nWe in this house do covenant\nAnd solemnly agree.\n\nI'll love you then forever from\nThe bottom of my heart.\nAssured that neither life nor death\nMay ever force us part.\n\nEternal bonds of love our souls\nEntwine on this great day,\nAs one beyond these earthly realms,\nForever we will stay.\n\nThe heavens in their glory sing\nOur praises from above.\nAs we, within this holy house,\nDo demonstrate our love.\n\nNo longer as mere mortal friends,\nBut rather man and wife,\nAs we perfect each other, hand-\nIn-hand, throughout this life.\n\nAnd then when our probation's o'er\nAnd dust is laid to dust,\nAs in the Lord's redeeming pow'r\nWe place our hope and trust.\n\nUnited once again we'll stand\nIn our eternal reign,\nTo bask in our unbounded love,\nCelestial peace obtained.\n\nEternal bonds of love we make\nTogether on this day,\nAs one, beyond these earthly realms,\nForever we will stay.\n\nFor comfort in the trials and\nTo share in victory,\nWe in this house do covenant\nAnd solemnly agree.\n\nI'll love you then forever from\nThe bottom of my heart.\nAssured that neither life nor death\nMay ever force us part.\n\nEternal bonds of love our souls\nEntwine on this great day,\nAs one beyond these earthly realms,\nForever we will stay."},
{"title":"The Faint-Hearted Hare (Aesop)","date":"2016-01-23","content":"The morning sun revealed a haze,\nWhere goats did on a hillside graze.\n\nAnd in the tall grass, slow did creep\nThe lion king, who soon would leap.\n\nAnd on an unsuspecting goat\nHe pounced, and seized him by the throat.\n\nThe goat was strong and did resist,\nAs both the beasts did writhe and twist.\n\nThe lion did the battle win,\nBut goat-horns had pierced deep his skin.\n\nIn rage he acted on his scorn,\nAnd banished ev’ry beast with horn.\n\nThroughout his kingdom went decree;\n“Within the day those beasts must flee!”\n\nA hare that morning heard the news,\nAnd wishing not his life to lose,\n\nInspected close his shadow tall\nThat now was cast upon a wall.\n\nHe hardly could believe his eyes –\nTwo horns seemed from his head to rise!\n\n(And ‘though they only were his ears,\nThey conjured up his darkest fears.)\n\nSo thinking he might be destroyed,\nH ran away to harm avoid.\n\n---\nSelf-doubt and fear a soul will break.\nAnd rob more than a thief can take."},
{"title":"Peace and Joy","date":"2016-01-24","content":"When thoughts are turned to Father in\nThe heavens up above,\nMy mind is filled with peace and joy,\nMy heart is filled with love.\n\nFor He created all the earth\nEach flower and each bird.\nAnd teaches me what I should do,\nWith His most caring word.\n\nHe asked that we build temples where\nWe all could work and learn,\nThat with Him in His heaven we,\nMight all a place there earn.\n\nYes, Heav’nly father loves me\nAnd when to him I pray,\nHe fills my soul with peace and love\nAnd brightens up my day."},
{"title":"Enemies & Allies","date":"2016-01-25","content":"The world is full of enemies and allies.\nThe error is not in realizing this,\nBut mistaking one for the other."},
{"title":"Quake","date":"2016-01-26","content":"The world it seems is shaking,\nAnd trembling everywhere.\nIt's got some people nervous -\nThey're running here and there.\n\nWe're waiting for the big one\nTo lay the city low...\nEven lots of little ones\nCan put on quite a show.\n\nI don't know if it's a sign\nOf things to come grotesque...\nYou'll have to let me finish here -\nAnd dive below my desk."},
{"title":"Octopus","date":"2016-01-27","content":"Octopus, Octopus, tentacles eight -\nIf eight arms I had, why I'd play baseball great.\n\nSuction cups everywhere, nothing escapes\nYour dreadful grasp as now wide your mouth gapes.\n\nFloating and crawling along the sea floor,\nYou're always hungry and always want more.\n\nBut when a predator bigger than you\nWants you for dinner, here's just what you do:\n\nOut of your middle, a cloud black and thick\nYou spray in the water, and run away quick!"},
{"title":"The Writer's Block","date":"2016-01-28","content":"The deadline came, the deadline passed.\nMy life in peril now is cast.\nWith worry I am constant frock,\nSince overcome by writer's block.\n\nThe writer's only mortal dread,\nThe empty page, does loom ahead.\nAnd thoughts no longer fill my mind,\nBut rather, vacant space I find.\n\nI pray, I pace, I cannot think.\nMy brain it seems is on the blink.\nWhat ho! I think a thought has come.\nOh well..., 'twas just a stupid one.\n\nCopyright ©"},
{"title":"What's Wrong?","date":"2016-01-29","content":"You woke up in the morning, and\nYou didn't feel so hot?\nYou couldn't keep your breakfast down,\nBut didn't eat a lot?\n\nYour monthly pattern isn't?\nAnd your chest is rather sore?\nIt's 3 AM and you insist\nOn pickles from the store?\n\nI didn't go to Med School, but\nI do believe I know,\nUnless you've picked up some new flu,\nYour belly's gonna grow.\n\nBut don't you fear, although you'll bloat\nBeyond your wildest dreams.\nIt's nothing like a tranquil night ...\nDestroyed by baby's screams!"},
{"title":"Preparations for War (Aesop)","date":"2016-01-30","content":"A war throughout the land did tear\nBetween the beasts and birds of air.\n\nThe lion king his troops did call,\nAnd they did gather – one and all.\n\nGreat herds of donkeys came that day.\nAnd all the hares did swift obey.\n\nCommanders did the troops review,\nBut did not know quite what to do …\n\nAs hares and donkeys do not fight –\nAnd neither were they very bright.\n\nThis to the king, they then did say,\nAnd asked to send them all away.\n\nThe lion was a wiser soul,\nAnd said, “For each we’ll find a role.\n\nThe donkeys with their frightful bray\nAs trumpeters will sound our way.\n\nThe hares will also fill a need,\nRelaying messages with speed.\n\nAnd thus the ranks were organized,\nAnd each his talents recognized.\n\n---\nEach one of us can find a way\nTo in this life a part to play."},
{"title":"Saviour of My Soul","date":"2016-01-31","content":"From Bethlehem, beneath the star,\nAlthough you never travelled far,\nAnd ‘though the years did pass by swift,\nYou brought the world a priceless gift.\n\nYou ceaseless walked o'er dusty trail,\nThat light o'er darkness might prevail.\nI wish that I, my gratefulness,\nTo you might someday full express.\n\nFor 'though I cannot comprehend,\nThe magnitude of gifts you send,\nI know that only by thy grace,\nMay I return to see thy face.\n\nMy friend, example and my guide.\n\nOh Saviour, Redeemer of this world,\nAs Satan, from thy midst was hurled;\nI too my sins might also spurn,\nThat godhood, one day, I might earn.\n\nAnd live with thee in peace forever more.\n\nFor on this earth you suffered all,\nRedeeming mankind from the fall.\nA feat above the mortal man,\nWithin the jaws of hell you ran.\n\nAnd then returned, the Saviour of my soul.\n\nIn humble manger wert thou born.\nYou lived a life of pain and scorn.\nAnd though you suffered Satan's wrath,\nYou never varied from the path.\n\nAnd thus I marvel at thee Lord, \nFor me thy life blood freely poured.\nAnd on the cross in pain were racked,\nAs courage thou hast never lacked.\n\nAnd this, a ransom not of gold,\nAs prophets long before foretold.\nYou paid with blood and pain and life.\nYou overcame the world's strife.\n\nIndebted then, I'll be eternally.\n\nOh Saviour, redeemer of this world,\nAs Satan, from thy midst was hurled;\nI too my sins might also spurn,\nThat godhood, one day, I might earn.\n\nAnd live with thee in peace forever more.\n\nFor on this earth you suffered all,\nRedeeming mankind from the fall.\nA feat above the mortal man,\nWithin the jaws of hell you ran.\n\nThy glory earned, oh Saviour of my soul."},
{"title":"My Debt","date":"2016-02-01","content":"As now the sun's last light does fade,\nIs my great debt to others paid?\nTo others did I give my aid?\nHave I a better world made?"},
{"title":"Wiggly Worms","date":"2016-02-03","content":"You slither through the fertile soil.\nBeneath my toes you ceaseless toil.\nBoth death and refuse you consume,\nAnd make the prairie flowers bloom.\n\nWhen heaven cedes the raindrops fall,\nYou fearless on the surface crawl.\nBut when the sun fills up the skies,\nYou dry up quick and fossilize.\n\nIn rusty can on fishing hook,\nWithin my favorite picture book,\nYou make the little girls squirm.\nBut you're my friend, O little worm."},
{"title":"A Lonely Figure","date":"2016-02-04","content":"A lonely figure\nIn the sands of time,\nJust walking endless\nOn the paths you find.\n\nI see your face, and\nThen it disappears,\nInto a crowd of\nFaces changed by years.\n\nI call to you, but\nYou do not respond.\nYou just continue...\nT'ward your great beyond.\n\nAnd so I sit, and\nWonder who you are.\nWhy do you haunt me,\nWhy have you come so far?\n\nAre you my future,\nAre you my past?\nPlease tell me specter -\nWhat it is thou hast.\n\nOr will I wander\nEndless as you do,\nIn search of answers\nWhich I wish I knew."},
{"title":"My Dear Jay","date":"2016-02-05","content":"Before my dreams of West Egg fade,\nI’ll pen my final thoughts.\nBefore the setting sun does fall\nBeyond the graceful yachts.\n\nYour life was like a shooting star –\nSo brilliant yet so short.\nI wouldn’t be consumed by flames - \nAnd sought a safer port.\n\nHow hard you tried to lure me back\nWith life so fast and free\nThe dream of any other girl -\nBut I could only flee.\n\nI might have thought that I could try -\nIf only for a day -\nTo join you in your life of dreams\nAcross the frothy bay.\n\nBut as it is – I’m far from there -\nI know you won’t reply.\nFor life is short at such a speed -\nA gunshot echoes by."},
{"title":"The Tortoises and the Frogs (Aesop)","date":"2016-02-06","content":"A group of tortoises stood ‘round,\nUpon a little earthy mound.\n\nAnd did observe the meadow there,\nAs frogs were playing without care.\n\nThey nimbly jumped and frolicked free,\nAnd raced from bush to rock to tree.\n\nThe tortoises then shared dismay\nThat they were not well built to play.\n\nBut then they did observe a duck,\nA frog from off the meadow pluck.\n\nMore birds and fishes they did see\nEat many frogs quite easily.\n\nThen started feeling very well,\nProtected by their solid shell.\n\nOne shared aloud that “even though\nWe’re heavy and we move quite slow,\n\nI’d rather live while crawling by,\nThan quickly run and sooner die.”\n\n---\nTrue joy is found when we embrace\nOur role in life, and find our place."},
{"title":"Humble Servants","date":"2016-02-07","content":"Humble servants,\nCalled by revelation -\nMandate of the most High God,\nTo lay foundations\nFor His Kingdom.\n\nImperfect vessels\nBeing purified in fire —\nLeading righteous youth,\nThrough sins\nDark Clouds.\n\nHolding high our lamps,\nAnd teaching willing hearts\nTo do the same.\nFighting sin with truth,\nAnd wickedness with love.\n\nWhen he descends in scarlet robes,\nMay he be pleased\nWith every brick we've laid,\nAnd floor we've swept,\nIn His most holy Kingdom."},
{"title":"A Journey Through Hell","date":"2016-02-08","content":"When on a path that leads through hell,\nDon't stop and sit to rest a spell.\nIf on your problems you don't dwell,\nIn time, you'll see, they'll turn out well.\n\nWhen in the throes of hell you're found,\nKeep moving on to higher ground.\nWhere you can clearly look around,\nAnd see your blessings do abound.\n\nWhen hope is lost and friends are gone -\nYour life is hell ... keep moving on.\nAnd as you fight with brain and brawn,\nYou'll surely see a brighter dawn.\n\nEach one of us has felt some pain,\nAnd had a hard time staying sane.\nDo not succumb to stress and strain.\nYou've everything in life to gain!\n\nInspired by:\n\"If you're going through hell, keep going.\"\n- Winston Churchill"},
{"title":"DNA","date":"2016-02-09","content":"“Your father’s head is going bald.”\n“Your mother’s toes are funny.”\n“Your uncle has a nervous tick.”\n“Your cousin’s nose is runny.”\n\nYes, child recent to the world,\nYour fate is not your own.\nThe body you’ll be using\nIs something of a clone.\n\nThe scientists have coined a word –\nGenetics is the name.\nIt means you might look funny, but,\nWe’ll love you just the same."},
{"title":"Blue","date":"2016-02-10","content":"Birds like peacock, parrot, jay;\nWater in a sparkling bay,\n\nNavy Angels flying team,\nEdvard Munch’s famous scream,\n\nVelvet movie, sunny skies,\nLittle boy, and Nordic eyes,\n\nDonald’s hat, and cartoon clues,\nGlacier ice, and nasty bruise,\n\nRhapsody and Danube song,\nCrayon, tropical sarong,\n\nPoets say that violets are,\nNew York City police car,\n\nSuede shoes in that Elvis tune,\nForget-me-not, infrequent moon,\n\nDress clothes for US Marines,\nCookie Monster, denim jeans,\n\nPeriwinkle, Smurfs so cute,\nWinner’s ribbon, pin-stripe suit\n\n‘Vegas man group, butterfly\nWhales, and bubbles, berry pie\n\nSkin that’s really, really cool;\nColor of a swimming pool\n\nSapphires, and dresses too …\nNow I’m feeling kind of blue."},
{"title":"Lint","date":"2016-02-11","content":"I put my wardrobe in the wash\nAnd spun it round about.\nThen in the dryer did it go -\nAnd then I took it out.\n\nThe thing, though, that amazes me\nIs all the lint there was.\nI asked a friend from whence it came,\nShe told me, \"It's clothes fuzz.\"\n\nI couldn't see how it could be —\nMy clothes were all still there\nAnd so I thought I'd test it out\nAnd my results I'll share.\n\nI washed my clothes a million times\nThe lint I piled high.\nFrom just a modest bag of clothes\nThe lint reached to the sky.\n\nA new resource for energy\nI've found, that's very green.\nAnd as a nice by—product, we\nWill all look very clean."},
{"title":"Valentine","date":"2016-02-12","content":"In the month of February,\nThere's a day, or so I'm told,\nEspecially for lovers young ...\nOr middle-aged or old.\n\nSo on this day with thoughtful gift\nAnd with romance in the air,\nThey find a quiet corner, and\nThen all the evening share.\n\nBut ever since I can recall\nThere has been a fellow who\nHas really taken over, and\nI don't know what to do.\n\nHis name it seems is Valentine\nAnd they thus have named the day\nBut hope I have to him o'erthrow\nThat to love, I also may!"},
{"title":"The Fox Who Praised the Hare (Aesop)","date":"2016-02-13","content":"A fox with flowing tail did race,\nFor close behind a dog gave chase.\n\nAs now the fox his end did fear,\nA hare did suddenly appear.\n\nThe fox called out, “Don’t miss your chance!”\nAnd at the hare did throw a glance.\n\n“Hey dog, that hare is quite a dish –\nMore tender meat you could not wish.\n\nSuch tasty flesh – beyond compare.\nGo hurry now and catch the hare!”\n\nMy meat is old, and hard to chew.\nIt’s rotten now and tainted too.\n\nWhy, just one bite might do the trick –\nTo poison you and make you sick.”\n\nThe dog indeed the hare pursued,\nIn hopes of tasting such fine food.\n\nThe hare was fresh, and won the race;\nThe dog could not keep up the pace.\n\nThe hare was lost beyond a hill.\nThe tired dog was hungry still.\n\nUpon another summer day,\nThe hare did see the fox at play,\n\nAnd said, “Good fox, though you are wise,\nI think you should apologize.\n\nYour words that day about my taste\nDid nearly end my life with haste!”\n\nThe fox replied in calming tone,\n“Good hare, why would you think to moan?\n\nHave you not thought these last few days,\nI only gave you highest praise.\n\nThe words I spoke, they were not lies,\nAnd neither did I criticize.”\n\n---\nBeware, the praise you now receive\nMay someday cause for you to grieve."},
{"title":"Missionary Ode","date":"2016-02-14","content":"A very short time\nFor the Lord set aside,\nTo put away strife\nAnd contentions and pride.\n\nA moment in time\nI will spend here with you.\nI tarry not long,\n'Fore I bid you adieu.\n\nI'm here for my Brother.\nHe asked me to spread\nThe news that He lives,\nThat He rose from the dead."},
{"title":"Lessons Learned","date":"2016-02-16","content":"My daughter is a charming lass\nAnd now is nearly one.\nPlease have a seat, and rest, so I\nCan tell you what I’ve done.\n\nYou see she got the Clorox out\nAnd almost took a drink.\nBut I grabbed it rather swiftly\nAnd then I stopped to think.\n\nI read in some swell magazine\nHow children are so mild;\nThat we should never smack them, no\nNot even if they’re wild.\n\nBut rather, I sat down with her\nAnd told her all about\nThe health aspects of drinking bleach –\nI abstinence did tout.\n\nWe discussed all the factors. For\nAssurances I plead.\nAnd she made some strange gurgling sound\nAnd nodded with her head.\n\nI think she learned the lesson too -\nFrom bleach she now refrains.\nFor now she’s rather partial to\nThe stuff for cleaning drains."},
{"title":"Pelican","date":"2016-02-17","content":"Pelican, Pelican out on the rock -\nYou look so funny it's hard not to mock.\nPelican, Pelican flying so high -\nWhy won't you fly to me, why are you shy?\n\nPelican, Pelican with those big feet,\nYou can swim faster than any you meet.\nPelican, Pelican dive in the sea —\nWith all those fish, oh how happy you'll be.\n\nPelican, Pelican with that big beak -\nCould you swallow the ocean and not even leak?\nPelican, Pelican eat all the sea -\nBut please Mr. Pelican, do not eat me!"},
{"title":"The Malamute Saloon","date":"2016-02-18","content":"Welcome everybody\nTo the Malamute Saloon.\nWe've been working on this show\nSince early on in June.\nIt's something you aint seen before -\nWe're fairly sure of that.\nThere's food on all the tables, and\nWe hope you leave here fat.\n\nCome on everybody,\nWe have good times planned ahead.\nBut if you throw your food at us\nWe'll send you home to bed.\nSo join the fun and sing along -\nJust please don't boo or hiss.\nAnd we'll keep entertaining you\nWith silly stuff like this.\n\nWe know you've cancelled other plans\nTo be with us tonight.\nAnd so we'll do our very best\nTo try and treat you right.\nWe've got some pretty funny acts\nJust lurking up ahead.\nAnd songs we think will make you cry -\nIf you're into that instead.\n\n(Reprise)\n\nWelcome everybody to the Malamute Saloon.\nThe entertainment's started, and the food should be here soon.\nSo sit right back, and clap your hands,\nAnd maybe stomp your feet.\nWe've got a program planned for you —\nWe think is really ... neat!     \n\nFINALE\n\nThe show is almost finished,\nAnd we're really glad you came.\nWe're sorry that it's over,\nAnd we hope you feel the same.\nBut if you'd like to hang around,\nAnd join us for dessert,\nYou'll have a chance to mingle,\nAnd maybe even flirt."},
{"title":"Am I Pregnant?","date":"2016-02-19","content":"Am I pregnant?\nDid egg and sperm unite?\nAs a mother,\nWill I derive delight?\n\nCould I be great with child?\nAt birth will I endure\nThe plight of mother Eve?\nThat tribulation sure.\n\nThey now say that I’m expecting;\nBut what, my mind can’t hold.\nAnd have I love within my soul\nTo shield that child from cold?"},
{"title":"The Hare and the Wolf (Aesop)","date":"2016-02-20","content":"A wolf did on the meadow walk,\nAnd with a hare began to talk.\n\nThen after chatting for a while,\nThey shared some stories and a smile.\n\nThe wolf then thought he’d eat the hare.\nBut wishing to appear more fair\n\nHe said, “Good hare, it’s time to eat,\nAnd while you’d make a tasty treat –\n\nConsidering the circumstance,\nI’d like to give you half a chance.\n\nI’ll with you now a wager make,\nAnd hope that you my deal will take.\n\nI challenge you to fight today,\nAnd if I win, you’ll dearly pay.\n\nBut at the end, if you have won,\nI’ll gladly pay you ten-to-one.”\n\nThe hare did gladly then agree,\nAnd hoped for a swift victory.\n\nThey faced off just a pace apart\nAnd counted 3 before the start.\n\nBut then, before the wolf could bite,\nThe hare did quickly take to flight.\n\nWith swiftness he did hop away,\nAnd left the wolf there in dismay.\n\nBut soon the wolf was in pursuit,\nTo finish off their hot dispute.\n\nAnd did the hare with vigor chase,\nAs both did through the forest race.\n\nAnd ‘round the meadow ran about,\nUntil the wolf was well worn out.\n\nAnd that is how the race did stop,\nAs did the wolf exhausted drop.\n\nThe hare, then to the wolf returned\nFor payment of the wager earned.\n\nThe wolf, in protest, blurted out,\n“You did not win, there is no doubt!\n\nYou did not fight with me today,\nYou simply turned and ran away.”\n\nThe hare said, “I won with my feet.\nAnd here you lie in full defeat.\n\nI fight this way most ev’ry day –\nWith dogs I find along my way.”\n\nThe wolf, when all his strength he gained,\nWent to the lion king who reigned.\n\nAnd in the court laid out his case,\nAbout the fight … or rather, chase.\n\nThe king, his verdict stated there:\n“The victor truly was the hare.”\n\n---\nIf you desire to save your skin,\nThere are a lot of ways to win."},
{"title":"Creation?","date":"2016-02-21","content":"What is it to make a world?\nIs it an artistic endeavor?\nA creation simply to muse at\nFrom afar in tranquil moments?\n\nIs there perhaps a purpose?\nA physical experiment?\nA possible answer to a vexing\nUniversal problem?\n\nAre we laboratory mice?\nWould we disturb the balance of existence\nIf we pondered such things?\nWill we be graded?\n\nHave a nice day."},
{"title":"Cheer","date":"2016-02-23","content":"The home team is not doing well.\nIt doesn't happen much.\nBut now they're losing all their games -\nThose no good so and such.\n\nBut let us not let some defeat\nGet in the way of play.\nIt after all just is a game\nOn top they'll be some day.\n\nLet's cheer them on no matter, if\nThey lose or tie or win.\nWhat if in triumph we were loved,\nIn loss, knocked on the chin?"},
{"title":"Jellyfish","date":"2016-02-24","content":"Floating through the ocean blue,\nI, your body see right through.\nLike a fabric in the breeze,\nGracefully propelled with ease.\n\nAll the streamers that you flaunt\nFor potential dinner taunt.\nAs when by them you do coast,\nPoison paralyzes most.\n\nYou're so beautiful it's true,\nBut it's evil that you do.\nSo I'll watch you ripple past,\nBluish hue in ocean cast."},
{"title":"Rainbow's End","date":"2016-02-25","content":"In a trenchcoat 'neath a streetlight,\nOn a corner in the dark.\nOn a cold steel bench at midnight,\nWith the lovers in the park.\nOn a fog swept pier at sunset,\nWaiting for some clearer skies -\nLive the world's still hopeful losers.\nHave you listened to their cries?\nHave you been out there past bedtime,\nIn the city on the street?\nIt's a jungle, so they tell me,\nGetting licked until your beat.\nBut the strongest seem to make it,\nOn their cunning they depend.\nIt's a life of dreams and nightmares.\nDestination: Rainbow's End. \n\nChasing rainbow after rainbow\nLooking for that pot of gold.\nFighting odds and taking punches,\nIt's that same old tale retold.\nRainbow's End, I've got to make it!\nRainbow's End, I'm almost there!\nRainbow's End - the magic gateway\nTo a new life free from care.\n\nIn a tricked out Maserati, cruising highway number one,\nOn their yachts they spend their Sundays,\nSipping soda in the sun.\nThey wear french designer track shoes,\nLive in mansions in Bel-Air,\nRide in chauffeur driven golf carts,\nLive their lives without a care.\nHave you seen them in the movies?\nHave you seen them where they meet?\nHave you seen them in their limos,\nSporting fashions, looking neat?\nThey're the ones who make the papers.\nThey're the ones that set the trends.\nIt's a life of dreams and nightmares.\nDestination: Rainbow's End.\n\nCatching rainbow after rainbow.\nCashing in that pot of gold.\nBeating odds with lucky hunches,\nIt's that same old tale retold.\nRainbows end I've got to make it!\nCover up those battle scars,\nFor a world without horizon,\nRainbow stairway to the stars."},
{"title":"Nesting","date":"2016-02-26","content":"My wife is quite ambitious, and\nShe felt our home was drab.\nShe thought we ought to decorate\nI said, ‘give it a stab!’\n\nI told her I’d go shopping for\nThe things that we would need.\nAnd she could then arrange them at\nHer own leisurely speed.\n\nI’d done some decorating too\nIn youthful days now past.\nAnd knew it didn’t take a lot\nTo spice a place up fast.\n\nMy wife had something else in mind,\nApparently I found;\nFor she said words I’d never heard\nAnd made a dreadful sound.\n\nUpon return, she said to me,\n‘You’re madder than the loons,’\nAnd ‘why the devil did you buy\nCrepe paper and balloons!?!’"},
{"title":"The Hare’s Friends (Aesop)","date":"2016-02-27","content":"The sun above the hills did rise\nAnd filled with light the morning skies.\n\nThe hare awoke and hopped away\nTo visit all her friends that day.\n\nAnd nearly all did call her “friend,”\nAs she did daily greetings send.\n\nBut on this morn, a sound she heard\nThat startled ev’ry beast and bird.\n\nThe hounds were loose to run and play.\nAnd now with speed did come her way.\n\nThe hounds were known to eat a hare,\nIf any were caught unaware.\n\nAnd so the hare her friends did seek,\nTo save her from a fate quite bleak.\n\nFirst, to the horse she made her plea;\n“Please take e on your back to flee!”\n\nBut he said, “I have chores today,\nAnd cannot with you go away.\n\nBut you have many friends, it’s true,\nAnd they should all give aid to you.”\n\nThen to the bull she ran forlorn –\n“Please friend, protect me with your horn!”\n\nThe bull replied, “You’ve come too late.\nI have to leave now for a date.\n\nAnd for the timing I regret …\nThe goat will help you out, I bet.”\n\nThe goat did also help decline,\nFor if the hare rode on his spine,\n\nShe might slip off (as she’s so small)\nAnd suffer quite an awful fall.\n\nAnd so he said, “I’m sorry ma’am,\nI think you’d better ask the ram.”\n\nThen to the ram her case she plead.\nBut in a fearful voice he said;\n\n“While help I’d like to offer you,\nHounds have been known to eat sheep too.\n\nAnd so, although I sympathize,\nI do not think it would be wise.”\n\nNow to the calf she did report,\nAppealing as a last resort.\n\nThe calf said, “I am quite concerned,\nAs all the beasts your cries have spurned.\n\nI really don’t like to decide,\nI think I’ll with the others side.\n\nThey’re older, and know more than I.\nI wish you well my friend, goodbye.”\n\nWith barking hounds now close at hand,\nThe hare alone did tearful stand.\n\nWith no real friends to save the day;\nTo save her life, she ran away.\n\n---\n\nIf many friends you have to call,\nIn truth, you may have none at all."},
{"title":"The Worth of Souls","date":"2016-02-28","content":"The worth of souls is great in the sight of God. \n\nGod, the creator of the universe.\nThe worker of all miracles.\nThe author of salvation.\n\nAm I worthy to be of great worth in his sight?\n\nAs his son,\nA son of God Almighty,\nThe king and ruler of this universe;\nAnd the infinite realms of eternity,\nOf which we can only imagine.\nI should be!\n\nI fought valiantly\nTo thwart the cause of Satan.\nAnd because of my faithfulness,\nEarned the right to become as my father.\nIf I prove worthy.\nI must be!\n\nI need only remain firm\nWithin the guidelines my Father has given.\nThen hold fast to the teachings\nWhich lead to exaltation.\nI can be!\n\nAnd though perhaps not perfect,\nI will be!"},
{"title":"Pink & Blue","date":"2016-03-01","content":"In days of yore, they couldn’t tell\nWhat sex your child might be.\nBut now with tests and gadgets, they\nCan very quickly see.\n\nTo me it doesn’t matter much\nIf it’s a girl or boy.\nAs long as it is healthy, and\nA long life will enjoy.\n\nBut as a loving parent does –\nWhen they’re sixteen, I pray,\nI’ll know if it’s a lad or lass –\nWithout testing DNA."},
{"title":"Ode to a Hare","date":"2016-03-02","content":"Furry, long-eared little hare\nSitting on the meadow there.\n\nSilent in a field of grass,\nDreaming as the clouds o’er pass.\n\nI have seen you hop and run\nUnderneath the summer sun.\n\nReflex sharp, you twitch and turn,\nOne more day of life to earn.\n\nFull of fear, but quick to act,\nBy most carnivores attacked.\n\nDodge and dart, then circle back.\nSprinter’s speed you do not lack.\n\nLeaping with a forceful lift\nFrom your feet so strong and swift.\n\nWhen exhausted, off your stride -\nQuickly find a place to hide.\n\nYou have outrun bird and beast\nLooking for a tasty feast.\n\nStamina though, not your strength,\nFearing chase of any length.\n\nPredators indeed abound;\nEagle, fox, the man, and hound.\n\nThreats you face are strong and fleet,\nHungry for your tasty meat.\n\nNever one to win a fight,\nNeither are you very bright.\n\nTimid and faint-hearted too,\nScared of being served in stew.\n\nWhat a fearful life you lead,\nMercy do you beg and plead.\n\nJump and scamper, carefree nap –\nNot so wary of a trap.\n\nCuriosity’s a curse.\nRash behavior makes it worse.\n\nConsequences seem so cruel\nFor a reckless, careless fool.\n\nShowing off before a crowd –\nBoastful, arrogant and proud.\n\nArguing gives you delight –\nSometimes through the day and night.\n\nSometimes with your wit prevail.\nLikely though, your plan will fail.\n\nChatty, happy kind of bloke,\nFriendly to the other folk.\n\nLiked by everyone it’s true.\nLoyal friends are very few.\n\nFeeling you may be the least,\nJealous of both fowl and beast.\n\nFurry, long-eared little hare –\nOften we don’t see you there."},
{"title":"A Fool","date":"2016-03-03","content":"I rhyme my way through life they say\nAnd leave my cares along the way.\n\n\"A fool\" you say that I must be —\nPerhaps, I say, but we shall see.\n\nFor when I'm gone, a book will stand\nA testament to all that's grand.\n\nOr worse perhaps, my friend, I fear\nThe only monument - a tear."},
{"title":"Due Date","date":"2016-03-04","content":"I just heard that you’re expecting.\nYou might not know the date.\nI wrote a little poem, which\nShould further obfuscate.\n\nBecause you see, I bought a book\nAnd read last night in bed,\nFrom guesses on one hundred births,\nJust one’s picked on the head.\n\nSome say that it takes nine months,\nI’ve heard some say it’s more.\nOr you can count in moons or suns\nLike ancient jungle lore.\n\nBut if you take your Ti leaves, and\nYour Tarot’s, Crystal Ball;\nMix gently with a Rabbits Foot,\nAnd give a Banshee call;\n\nI’ll share with you a formula\nThat’s sure to promulgate\nWith no degree of certainty\nA real live ball-park date.\n\nIf you recall the first day of\nThe period you had\nBefore they stopped completely,\nThen please note it on a pad.\n\nNow add to that just seven days.\nAnd when you’ve got the sum,\nCount backwards three months, very good,\nNow write down where we’ve come.\n\nWith this date very firm in hand\nYou add to it a year.\nAnd that is when they’ll pull it out…\nThat day or very near."},
{"title":"The Hare and the Cowherd (Aesop Ballad 16)","date":"2016-03-05","content":"A hunter was in hot pursuit…\nThe hare did dodge past log and root.\n\nThen scampered o’er a grassy field,\nAnd hedge he found to act as shield.\n\nA cowherd saw the hare dive through\nAnd so the hiding place he knew.\n\nThe hare in pleading voice did say\n“Please sir, do not give me away!”\n\nThe cowherd said, “you’re safe with me\nAnd in a moment you’ll be free.”\n\nThe hunter soon came by that way,\nAnd asked if had passed by his prey.\n\nThe cowherd lied, “I saw him pass,\nAnd down the road he went, alas.”\n\nBut with a smile upon his face,\nHe motioned to the hiding place.\n\nAnd then to make the hunter think,\nThe cowherd gave a knowing wink.\n\nThe hunter did not get the hint,\nSo down the road the man did sprint.\n\nThe hare, his hiding place did leave.\nThe cowherd, thanks thought to receive.\n\nThe cowherd said, “my furry friend –\nYour life was spared, and did not end.\n\nIt seems you owe to me a debt.”\nThe hare replied, “no thanks you’ll get.\n\nFor ‘though your words gave me a chance,\nI saw your arm and saw your glance.\n\nDeceipt was fully half your game.\nI rather think to give you blame.\n\nThat I’m so small is just your luck,\nOr both your eye’s I’d like to pluck.\n\n---\n\nWhile words may not a lie convey,\nOne’s actions may the truth betray.\n\n(Index references: Oxford-Gibbs 387, Perry 22)"},
{"title":"Curiosity","date":"2016-03-06","content":"Father, how can you know -\nHave you seen tomorrow?\nDo you remember the future?\nHave you seen the smile —\nOn children's faces yet unborn?\nAm I there?\nWhen will it be?\nDon't think me impertinent —\nOnly curious,\nTo know your majesty.\nAnd pray that I might add —\nAnd not detract."},
{"title":"Doctor","date":"2016-03-08","content":"When my pregnancy first started,\nI went to see the ‘Doc.’\nHe’s gonna cost me plenty, so\nI put the house in hock.\n\nHe lets me hear the baby’s heart.\nHe tells me what to do.\nHe put the kid right on TV,\nAnd tells a joke or two.\n\nHe lets me call him any time.\nI very rarely do.\nBut that is what he’s there for, so\nHe charges for that too.\n\nI think though that he’s worth each cent,\nYes ev’ry little bit.\nFor when I pop that kid out, He\nWill bring his catcher’s mitt!"},
{"title":"Y","date":"2016-03-09","content":"While in my Youth, some years ago\nWhile sailing on my yacht;\nI pondered on the letter Y\nAnd I learned quite a lot.\n\nI had a Yen to see the world\nAnd asked all I could see,\nIf Y was very useful — this\nIs what they said to me:\n\nOn Yom Kippur, a Yarmulke,\nI saw on someone's head.\nHe spun a Yarn in Yiddish, and\nI don't know what he said.\n\nI saw a woman on a Yak\nWho wore bright Yellow shoes.\nShe was playing with a Yo—Yo\nBut had no further clues.\n\nDon't Yawn, I'm almost finished, but\nThere is one more thing too.\nYes, Y's are quite important, for\nWithout them, there's no You."},
{"title":"Seashell","date":"2016-03-10","content":"Now, every seashell on the shore\nDid once a home provide,\nTo some small creature of the deep -\nA place to sleep and hide.\n\nA refuge from the raging storm,\nRelief from cold, and more;\nIt offered some protection from\nEach threat'ning predator.\n\nSo every time you pick one up\nAnd hold it in your hand -\nPlease ponder who once lived there\nUnderwater, in the sand."},
{"title":"A Birth With Class","date":"2016-03-11","content":"I signed up for some classes.\nThey’ll teach me how to ‘birth.’\nI’ve never heard such folly,\nIn all my life on earth.\n\nThe Bible says four-thousand years,\nAnd science even more,\nThat women have been giving birth.\nWhat do they have in store?\n\nI hear they teach you how to breathe,\nTo get more air, I guess.\nAnd how to cope with pain a bit,\nAnd overcome the stress.\n\nSo I will go each day to class,\nAnd listen up real well.\nThat I might know just how to look,\nAnd how to scream like hell!"},
{"title":"Wild and Free","date":"2016-03-12","content":"A wild donkey made his way\nAcross a farm one summer day.\n\nHe saw then in a stable fair\nA donkey who resided there.\n\n\"I'm jealous friend,\" he blurted out.\n\"Your home is nice without a doubt -\n\nYou have nice food on which to dine,\nYour muscles toned, your coat is fine.\n\nYou seem to have no stress or strife.\nYou're lucky to enjoy this life!\"\n\nThen later, on a dusty road,\nThe captive donkey bore a load.\n\nAnd as he made this tiresome trip,\nA driver beat him with a whip.\n\nThe wild donkey saw the scene -\nThe sweaty work, the driver mean.\n\nAnd as he freely grazed about,\nBack to his fried he gave a shout:\n\n\"All envy for you I have lost.\nI would not want to pay the cost!\"\n\nTo live a life that's viewed as nice,\nOne often pays a hefty price."},
{"title":"Sacrament","date":"2016-03-13","content":"Remember our great God above.\nRemember Christ, and His great love.\n\nRemember each and ev’ry soul\nWho comes to make their spirit whole.\n\nRemember Christ’s great sacrifice,\nAs for our sins He paid the price.\n\nRemember that we bear His name,\nAnd gospel truth with love proclaim.\n\nRemember to God’s law abide,\nAnd through His grace be purified.\n\nRemember our all loving Lord –\nHis Spirit will our faith reward."},
{"title":"An Offering","date":"2016-03-14","content":"What gift can I offer the world today?\nWhat can I do now to brighten your way?\nPerhaps something helpful my words can convey?\nSomething to push out the blue and the gray?\n\nPerhaps someone's burden I'll lift for a spell?\nBring soup to the sick, and make them feel well?\nEncouraging words I can lovingly tell?\nLift someone's spirits that recently fell?\n\nBefore the sun sets and gives way to the night,\nIs there a wrong I can find to make right?\nCan I somehow prevent a struggle or fight?\nHow can I share with another my light?"},
{"title":"Term Limits","date":"2016-03-15","content":"They're asking us this year to vote\nIf seats in Congress should\nBe limited to some set term,\nOr if this would be good.\n\nNow on this theme, I lately feel,\nTo calm potential strife,\nThe good ones ought to get six years -\nBut, give the bad ones life!"},
{"title":"Seal","date":"2016-03-16","content":"I saw a seal sitting in\nThe sun out on the sea.\nHe'd had a half a halibut\nAnd had no use for me.\n\nHe then dropped down into the foam\nAnd floated by some fish.\nHe spied some plumpish mackerel -\nA perfect luncheon dish.\n\nThen after feasting on his food\nAnd barking at a bird;\nHe waved with outstretched flipper, and\nSwam off without a word."},
{"title":"The Day That Arnold J. Crumpet Did Just Disappear","date":"2016-03-17","content":"Poor Arnold was sad. He was so very sad.\nHe cried all-the tears in his eyes that he had.\n\nHis father was leaving, his father named Walt.\nAnd Arnold believed that it all was his fault.\n\nArnold once said a bad word, once kicked the cat.\nAnd once, in the laundry he put a dead rat.\n\nAnd for these transgressions, he figured, of course -\nHis parents were going to get a divorce.\n\nSo he was quite worried and thought if he might\nBe lost out of sight, things again would be right.\n\nAnd so he enlisted the help of a witch,\nWho lived down the street, by the side of a ditch.\n\nHe asked if she might make him quick disappear.\nHe said this as he wiped away a big tear.\n\nShe said that she could, but she'd rather he stay.\nBut he said he could not, not even one day.\n\nAnd so to her store-room she hurriedly ran, \nFilled up her black cauldron and then she began:\n\nShe oofed and she poofed with a magical gaze.\nAnd he disappeared in a very thick haze.\n\nHe looked, and indeed, he could not see his toes,\nHis legs or his middle, or even his nose.\n\nWhy, he was invisible! No hands or hair!\nHe knew not where he was, for he wasn't there.\n\nHe ran quickly home, and he did so with care.\nBecause, no one else could have known he was there.\n\nHis parents were worried. They stewed and they paced.\nFrom neighbor to neighbor they quickly did race.\n\nThey asked every one if they'd seen Arnold go.\nExcept for the witch ... because she wouldn't know.\n\nAnd then in the dark, they did come home and sit.\nHis mother did find Arnold's old baseball mitt.\n\nShe cried and she cried as she looked at that glove.\nHis father cried too, for his fatherly love.\n\nHis mother remembered (his mother Marie),\nShe used to bounce Arnold about on her knee.\n\nAnd Walt, that's his father, did also recall,\nThe two of them used to play catch with a ball.\n\nThey weren't mad at him, the boy quickly did learn.\nBut he disappeared, and now could not return.\n\nHe just sat on the floor, feeling quite crummy.\nThen a strange noise heard he, rise from his tummy.\n\nBecause of his terrible, horrible mood,\nHe forgot about sitting down for some food.\n\nBefore he could think what he'd like to consume,\nHe heard a loud noise rising up from the room.\n\nWhy his parents were fighting, fighting a lot.\nAnd blaming each other that Arnold was not.\n\nThey yelled and they screamed, and he plainly could see\nThat it might be much better if parted they'd be.\n\nAnd so he discovered, right there on the spot -\nHis parents just disliked each other a lot.\n\nAs it turned out, the witch wasn't so clever.\nHer nifty spell, well, did not last forever.\n\nAnd Arnold appeared, he just found himself there,\nYes, standing between the TV and a chair.\n\nHis parents were glad that he wasn't still gone.\nBut, father of course, would be still moving on.\n\nAnd as a bright note to this tale I've spun,\nOur Arnold enjoyed having two homes, not one.\n\nAnd spent many Saturdays out with his dad.\nAnd all added up, why it wasn't so bad.\n\nAnd by this experience Arnold was taught;\nHis parents did love him, they loved him a lot!"},
{"title":"Eternal Wishes","date":"2016-03-18","content":"To join together, you agree,\nFor time and all eternity.\n\nMay all your hopes and dreams come true\nAnd as for trials, may they be few."},
{"title":"The Will To Live","date":"2016-03-21","content":"Why, I could write a million words\nIn meter and in rhyme.\nBut if no one would read them, it\nWould be a waste of time.\n\nSo, buy my books by trailer loads\nAnd give them all away.\nAnd I will have the will to live\nAnd write another day."},
{"title":"The Fiber of Society","date":"2016-03-22","content":"The fiber of society\nWas woven with great care.\nOf fabric largely moral, which\nI fear is not all there.\n\nThis fact does cause me great concern,\nFor should we lose it all,\nOur world as we know it now\nWould be quite prone to fall.\n\nIt would mean the ann'hilation\nOf society and home.\nAnd it wouldn't be the first time.\nCase in point is ancient Rome.\n\nSo if the view is radical\nTo disdain war and sin,\nI'll stand in the minority\nAnd take it on the chin.\n\nBut please don't sit by idly as\nThe tapestry does fray.\nWe need to stand together now.\nThere is no other way."},
{"title":"Termites","date":"2016-03-23","content":"Some kinds fly in a vicious swarm,\nOr wriggle on the floor.\nThey are a very scary bug.\nNow I will tell you more:\n\nThe termite loves to chew on wood\nAnd never gets it's fill.\nIt chews on rafters in your house,\nOr on the window sill.\n\nWhy, they could eat your whole house up -\nEat every board and stick.\nSo if you see one coming, you\nShould call somebody quick!"},
{"title":"Bard Work!","date":"2016-03-24","content":"Some say; \"a poem's easy,\nTo scribble on a page.\nSure, I could write a line of verse -\nAnd it would be the rage.\"\n\nBut let me tell you, one and all,\nThat you would surely shirk.\nWhen finding out how really tough\nIt is to do Bard Work!"},
{"title":"Play Ball!","date":"2016-03-28","content":"I met a man who said to me\nHe'd never don a mitt,\nOr throw a ball to second base\nOr hit it with a stick.\n\nHe said it was an awful game\nA bore, and slow as goo\nHe said all this and even more,\nI swear to you it's true.\n\nIt's not that I'm a champion,\nBut I'll accept the call\nAnd line up on the baseline\nAnd heed the yell \"play ball.\"\n\nIt's like this life we're living.\nIt isn't always fun.\nYou win some and you lose some.\nThey hit and steal and run.\n\nBut after every inning\nThe count goes back to naught\nAnd once again you have the chance\nTo prove what you've been taught.\n\nAnd as in 'The Beginning', it\ncontinues to this day -\nThe rule that no one ever may\nUp in the bleachers stay."},
{"title":"Nigel, the Knight, Had a Terrible Fright","date":"2016-03-29","content":"Now, Nigel the knight, was a brave lad of course.\nHe wore shining armour and rode a white horse.\n\nHe saved lovely damsels from towers quite high.\nAnd dragons he fought that could breathe smoke and fly.\n\nBut when he was tucked in his snug little bed,\nThe scariest nightmares would fill up his head.\n\nAnd when the bright lamp by his bedside went out,\nHe thought that he saw scary creatures about.\n\nHe'd shiver and tremble and quiver and quake,\nNot anything like when the boy was awake.\n\nFor nighttime is scary for brave little knights.\nAs in their young minds they see many strange sights.\n\nHe dreamed of a witch on a polka dot goat,\nAnd big purple snakes swimming out in the moat.\n\nOne night in his bed he was drifting at sea,\nAnd another, his bed was perched up in a tree.\n\nSo he couldn't sleep well with these dreams going on,\nAnd he always was tired and cranky at dawn.\n\nOne night from a deep sleep he woke with a start.\nAnd out of his bedroom he quickly did dart.\n\nHe ran to his mother's and father's big bed.\nThey cuddled him close and here's just what they said:\n\n\"In the morning at dawn when the sun brightly shines,\nWe'll visit the wizard who lives near the pines.\"\n\nAnd that's what they did, in the morning they went,\nAnd found in his cave that old magical gent.\n\nHe was brewing a brew and stopped to explain,\nHis mixture made clouds that would cause it to rain.\n\nAnd then he announced when with this one he's done,\nHe'll brew up a brew that will bring back the sun.\n\nAnd on all his shelves he had bottles and vials -\nAnd other strange things in the corners in piles.\n\nNigel stepped up and said, please Mr. Wizard,\nI know that you're busy concocting a blizzard;\n\nBut if you've a moment, it shouldn't take long,\nI do have a problem, yes, something is wrong.\n\nMy parents have brought me way up to this site,\nIn hopes you could possibly help with my plight.\n\nYou see, said young Nigel, I can't seem to sleep.\nFor the most frightful thoughts in my mind seem to creep.\n\nWell, the wizard sat down on a stool and he thought,\nThen from a back—room a large basket he brought.\n\nAnd from it he pulled out a furry stuffed bear,\nWho wore a red jacket and had short brown hair.\n\nThe wizard then waved a black wand all around,\nAnd made a bip—boppity-skoppity sound.\n\nThen he handed the bear to our Nigel and said,\n\"Just sleep with the bear snuggled tight in your bed.\n\nIt will frighten those nightmares right out of your mind,\nBut it is quite loving and gentle and kind.\n\nNow I need to work so please go, let me be -\nThe bear has a thirty day wear—guarantee.\"\n\nThen Nigel completed his chores for the day.\nHe put on his jammies and prayers he did say.\n\nHe jumped in his bed and he held the bear tight,\nAnd didn't have nightmares at all through the night.\n\nAnd his dreams were most pleasant from that moment on.\nAnd all of those horrible creatures were gone.\n\nBut the wizard it seems was chased right out of town,\nBecause all his rain, well, it didn't come down.\n\nSo there wasn't a real magic spell on the bear,\nBut Nigel felt better when it was right there.\n\nThe love of a little one’s bear, so it seems,\nWill keep all the monsters right out of your dreams."},
{"title":"Starfish","date":"2016-03-30","content":"Starfish in the tidal pool,\nStarfish on the sand,\nPerched there like a shining jewel,\nIn my little hand.\n\nPriceless treasure from the deep\nVisit here with me.\nI'll return the favor, and\nToss you out to sea."},
{"title":"School Prayer","date":"2016-04-05","content":"Dear God, I humbly to thee pray:\nAnd thank thee for this day,\nFor this great land of liberty,\nAnd for each sunshine ray.\n\nI'll have to end my prayer now, Lord\nI'm getting close to school.\nAnd they won't let me pray there now\nIt is against the rule.\n\nLike Daniel, who for prayer was cast\nInto the lions den.\nI fear they might expel me, thus\nI'll have to say, Amen."},
{"title":"Meteor","date":"2016-04-06","content":"When brilliant star, up in the sky,\nDoes t'ward the earth in glory fly;\nAlthough on impact gives a shock,\nThe end result; an ugly rock.\n\nAnd so it is in life it seems,\nReality must uproot dreams.\nAnd hopes against the rocks do crash\nWhen with the facts they harshly clash.\n\nThus, this advice I have for you,\nAs in my life it's proven true;\nA remedy for undue grief\nThat from a fall, might find relief.\n\nWhen Idols in your life do light,\nQuick! elevate them out of sight.\nOn pedestal they should remain,\nBefore they cause you any pain.\n\nAnd this is why, my little friend,\nI've chosen to, this message send:\nWhen under any scrutiny\nYour idol's faults you'll surely see."},
{"title":"Rabbit Test","date":"2016-04-08","content":"I thought that I was pregnant,\nAnd wished to ascertain\nIf I should call the doctor -\nAnd brace myself for pain?\n\nI wandered to the market,\nA dozen tests to buy.\n(I thought I'd need the practice -\nDon't ask, I don't know why.)\n\nIt's just like high school chemistry.\nThere's test tubes, cups and more.\nI think there's a diploma too,\nIf on the test you score.\n\nIt's easier than drawing blood.\nA lot less painful too.\nYou just put urine in a cup,\nAnd watch the strip turn blue.\n\nMay mother told me way back when,\nA thousand years ago,\nThey used to kill a rabbit ...\nI thought you'd like to know.\n\nBut then because of activists\nThey found another way.\nI guess perhaps it's nicer,\nWhatever works ... they say."},
{"title":"Drill","date":"2016-04-12","content":"They shout a lot about the way\nThe oil business works.\nThat all they want are profits, and\nIn sum are only jerks.\n\nThey don't want them to drill the coasts\nOr tanker ships to spill.\nOr send our boys to fight for it.\nBut tell me, where's their will?\n\nTheir world is made of plastic\nThey waste it, as a rule.\nThey climb into their motor cars\nAnd burn up tons of fuel.\n\nSo if you want to criticize,\nAnd drilling want to quit.\nThen tell us with your actions —\nDon't be a hypocrite!"},
{"title":"Shark","date":"2016-04-13","content":"Could there be a shark below?\nYou say, you will never know?\nFor fear has overcome you\nAnd you dread to venture in?\n\nWell, they tell me (those who know)\nIt's quite safe, and they can show;\nThat sharks will likely never\nEven nibble on your toe.\n\nAnd I'll share a little tip\nTo loosen fear's strong grip,\nWhen swimming in the ocean -\nKeep a buddy by your hip."},
{"title":"Have You Heard?","date":"2016-04-15","content":"She told me that she had some news\nTo share with me today.\nThen without hesitation, she\nDid voice her thoughts and say:\n\n“We’re going to have a baby;\nI don’t know when or where.\nBut since you’ll have to change its pants,\nI thought you might just care.”\n\nTo some a revolution or,\nAn earthquake, or a fire,\nWould on the nightly evening news\nA bulletin require.\n\nBut never in my life have I\nHeard such a wond’rous fact.\nAnd I could hardly manage to\nMy senses keep intact.\n\nAnd so we grasped each other tight,\nWe might have even cried;\nIn reverence to this blessed day,\nAnd what she held inside."},
{"title":"Discovery","date":"2016-04-19","content":"I saw an item in the news,\nThat brightened up my face.\nOur nation's still committed to\nDiscovery in space.\n\nI don't know what is out there, or\nJust what we'll likely find.\nIt might cost us a fortune, but\nI do not really mind.\n\nIt seems that in the distant past\nThe people who did well;\nLooked over the horizon - on\nThe past they did not dwell.\n\nSo here's to Cook, Columbus,\nAdmiral Peary, Richard Byrd,\nEarhart, Armstrong and a host\nOf names we've never heard."},
{"title":"Z","date":"2016-04-20","content":"We've Zoomed right through the alphabet,\nSome questions though remain.\nDo Zebras eat Zucchini in\nThe Zoo out in the rain?\n\nYou guessed quite right, the letter left\nTo introduce is Z.\nAnd now it's done I thank you all\nFor spending time with me!"},
{"title":"The Toxic Inhalers of Planetoid Zim","date":"2016-04-26","content":"Just three light years away and a few miles more,\nThere's a planet called Zim in the orbit of Zor.\n\nNow it used to be pleasant to visit that sphere,\nBut now hardly anyone ever goes near.\n\nThe beaches are white and the water is warm\nAnd tourists would flock there, they'd come in a swarm.\n\nBut some years ago, if my brain's working right,\nBegan a most tragic, lamentable plight.\n\nWhen a fellow with brains, just the size of a pea\nDid drink toxic waste, for its outcome to see.\n\nHe then turned quite green, an unusual hue,\nAnd then everyone tried it, no, not just a few.\n\nThey all drank toxic waste, 'cause it made them turn green -\nNot a neon or forest, but aqua-marine.\n\nNow the king, he was outraged, and firmly decreed,\nThat all would be punished who did this strange deed.\n\nBut they did continue, and some rumors did bloom,\nYes, that even the king drank it up in his room.\n\nBut the stores couldn't sell it, well that was the law.\nYou just only could buy it from gangsters you saw.\n\nAnd they sold so much that they all got quite rich,\nAnd they killed anybody they thought was a snitch.\n\nTo make toxic waste, they built sev’ral reactors\nAnd this caused some other quite dreadful bad factors.\n\nBecause ev'ry so often one might just explode,\nAnd the people would die as they walked down the road.\n\nBut the gangsters just kept on, they weren't gonna stop.\nAnd the tourism industry suffered a drop.\n\nBecause if you went there, one quickly would learn,\nWell, the chances were good you might never return.\n\nIt is here that my story does really begin\nOf a small little creature named Sally Z. Prim.\n\nNow our Sally was tiny, but had a big brain,\nAnd she was the only one there that seemed sane.\n\nWhen she went on her walks, which she did ev'ry day,\nAll the people would tease her and loudly would say;\n\n\"Dear Sally please try some, you can be green like us!\"\nBut she couldn't see what could be the big fuss.\n\nSo she asked why they drank it, they said, \"Cause its cool.\"\nAnd the shocked litle girl answered, \"I'm not a fool.\"\n\nAs the medical research declares that its bad,\nAnd its stupid to die on behalf of a fad.\n\nBut they wouldn't stop, cause they had so much fun.\nAnd they loved to turn greeen while they sat in the sun.\n\nThen one day it happened - you thought that it might.\nI saw it myself and it was quite a sight.\n\nAs each one of the people who drank toxic waste\nIn the sun melted into a pool of green paste.\n\nYes they each just became a small pool of green slime,\nAnd it happened to each of them, one at a time.\n\nWhen the first ones dissolved, they just thought it was funny,\nBut no one enjoys turning liquid and runny.\n\nThen everyone yelled and they shouted and cried,\nUntil they felt oozy and squishy inside.\n\n'Til soon Sally had to start wearing galoshes,\nAnd rather than comments, she only heard sploshes.\n\nAnd soon there was no one on planetoid Zim -\nExcept for, of course, our enchanting Miss. Prim.\n\nThe last time I stopped by the planet of Zim,\nI saw Sally cleaning the beach for a swim.\n\nAnd soon I am sure that it will be quite pretty ...\nA beautiful beach with a bright shiny city.\n\nAnd the tourists will come as they used to come once,\nAnd Sally will profit, for she's not a dunce!"},
{"title":"Blowfish","date":"2016-04-27","content":"I saw a little blowfish,\nJust swimming in the sea.\nHe wasn't much to look at, though,\nUntil he looked at me.\n\nHe thought that I would eat him, and\nAlthough it wasn't true,\nHe blew himself like a balloon,\nAnd grew, and grew, and grew.\n\nHe now was much, much larger,\nAnd scary looking too.\nAnd I will end this poem here,\nAs now my story's through."},
{"title":"Ode to a Tortoise","date":"2016-05-04","content":"Crawling down the trail slow,\nAlways with your shell you go.\n\nNot concerned with speed or grace,\nKeeping just a steady pace.\n\nAnd your funny knees and feet\nServe you well in rain or heat.\n\nAll alone inside your shell –\nSafe, protected very well.\n\nOnly if your shell they crack\nDo you fear a foe’s attack.\n\nSome would say you wear a frown.\nHelpless when you’re upside down.\n\nSlow to act, but quick to rage –\nLiving to a ripe, old age.\n\nDevious and clever too –\nNo one plays a trick on you.\n\nWatching others hurry by\nOn the ground and in the sky.\n\n‘Though you seem a little stern,\nSometimes for adventure yearn.\n\nMeek, and shy, and quite polite –\nFor a creature, fairly bright.\n\nWith your firm resolve and pride,\nTeasing you will not abide.\n\nCompetitor, through and through -\nStriving hard at all you do.\n\nShouting out with joy and glee,\nWhen from worries you are free.\n\nNot weighed down with care and strife,\nMostly just content with life.\n\nBy yourself, no need to roam –\nHappy just to stay at home"},
{"title":"A Mother's Love","date":"2016-05-08","content":"A Mother's love,\nHer caring heart;\nShe gave to us\nHer better part.\n\nHer role unmatched,\nShe served with love;\nOur conduit\nFrom heav'n above.\n\nShe nurtures too,\nWith careful spade,\nAs infants grow\nWith loving aid.\n\nA tribute grant\nWe her today,\nFor love and care\nWe can't repay."},
{"title":"Back and Forth","date":"2016-05-10","content":"I Watched the candidates debate,\nAnd state their point of view.\nThey talked for quite a lengthy spell,\nBut I heard nothing new.\n\nThey quoted numbers back and forth\nThat didn't mean a thing.\nAnd told us all the wonders that\nThe next four years might bring.\n\nBut if you think it means a thing\nYou're more naive than me.\nThey all sound equally as bad,\nJust wait around, you'll see.\n\nimage Credit:"},
{"title":"Downtrend","date":"2016-05-17","content":"I've seen the signs for some time\nOutside, and on T.V.,\nOur nation is not doing well\nNow, economically.\n\nIt is a global problem too,\nAnd though tough times we face,\nTo have some challenges right now\nIs really no disgrace.\n\nThe government can't fix it — is\nThere anything they could?\nBut if we make the best of it,\nSome day things will be good."},
{"title":"Mr. President","date":"2016-05-24","content":"Beneath the spacious skies, I hear\nOur nation did elect\nA President to lead us, and\nTo give our full respect.\n\nI must admit, I didn't put\nA check beside his name.\nBut I wish all the best for him\nAnd all should do the same.\n\nAnd work to strengthen our great land\nA little more each day.\nA place where we can prosper, and\nOur grandchildren can play.\n\nSo Mr. President, I ask,\nPlease don't deny our trust.\nWe've chosen you to guide us and\nThe job fulfill, you must."},
{"title":"Birthday Rhyme","date":"2016-05-27","content":"Dear daughter on your birthday, I\nWould like to pen a little rhyme.\nTo share with you my love and say,\nHow quickly has passed by the time.\n\nA year ago through heaven's veil,\nYou flew into our warm embrace.\nAnd you have brought us peace and joy\nWith every smile upon your face.\n\nAs now you learn to walk and talk,\nAnd roll a ball along the floor;\nPlease know dear one from heaven sent,\nI couldn’t love you any more."},
{"title":"MIA","date":"2016-05-30","content":"I've lost my keys, I've lost a shoe,\nBut thanks to heav’n above\nI've never in a bloody war\nLost someone that I love.\n\nBut worse than that, if it could be\nInstead of their demise.\nNot knowing if in jungle camp\nThe Lord does hear their cries.\n\nIn this cold world, of rhetoric\nI earnest hope and pray\nThat we might somehow, somewhere find\nEach cherished MIA."},
{"title":"A Tentative Peace","date":"2016-05-31","content":"I'm sure that I would rather see\nThe earth in peace and harmony.\nAnd notions of a bloody war\nBe nothing more than ancient lore.\n\nBut in this world of great distrust\nIt seems that some, to kill, do lust.\nAnd for all man as one to come,\nWe'll have to kill those vermin scum!\n\n‘Though short of that, a good defense -\nAn S.D.I. might make them tense.\nOr even just a gun or club,\nA fleet of tanks, a trident sub...\n\nI wouldn't want to use them though,\nJust have them close to scare the foe.\nThat home and family be safe,\nShould world tensions start to chafe.\n\nRemember many men have died\nThat we in freedom might reside.\nThus to maintain this resolutely\nI feel is our inherent duty.\n\nAnd 'though I pray each night for peace,\nI doubt that war will ever cease.\nAnd so I hope that few will die,\nAs for each one, a tear, I'll cry."},
{"title":"Sunburn","date":"2016-06-01","content":"I basked out on my beach mat,\nAnd felt the sun so hot.\nMy mother said I'd been out long\nEnough, and I said \"Not!\"\n\nShe said I'd better come inside\nAnd wash my sandy feet.\nBut I just wished to lay there more,\nTo revel in the heat.\n\nWell, first my skin turned pinkish white,\nAnd then a shade of red.\nAnd now I cannot move an inch,\nAs I lay here in bed.\n\nMy mother was, of course, correct.\nAnd I should have obeyed.\nBut under ultraviolet rays\nI misbehaving stayed.\n\nI feel like I am burning up.\nMy mother says I'll peel.\nBut I'm just hoping someday soon,\nI will not like this feel."},
{"title":"A Proper Time","date":"2016-06-07","content":"My son is tugging at my arm\nTo play with him some ball.\nI told him I was writing now -\nMy readers to enthrall.\n\nI want to share my deep concerns\nOn Corp’ral Discipline.\nAnd though effective it might be,\nIt really is a sin.\n\nMy son is quite emphatic though,\nAnd makes it hard to write.\nI told him ‘take a chill pill,\nHang out right now, sit tight.’\n\n…And now as I was saying,\nThere never could be cause;\nTo whip an offspring with a belt\nOr smack him ‘cross the jaws.\n\nOh, now the brat is on the desk\nAnd yelling in my face.\nAnd I’ve decided spankings have\nA proper time and place."},
{"title":"Undertow","date":"2016-06-08","content":"I sat out on the sand a while,\nAnd got a little hot.\nAnd thought I'd take a little swim.\nOf course, you say, why not?\n\nI waded out into the surf,\nAnd felt the current tug.\nIf I'd been in my bathtub, I\nWould simply pull the plug.\n\nBut this was not a bathtub,\nAnd I was headed out.\nI would have found a desert isle,\nHad I not turned about.\n\nThe undertow had caught me,\nAnd pulled me with its might.\nNow it took ev'ry bit of strength,\nBut with it I did fight.\n\nI won the battle this time.\nBut sprawleed out on the sand,\nI vowed I'd warn my little friends\nTo stay back on the land.\n\nAnd if you some day venture out\nInto the mighty sea -\nPlease hold your mom's or daddy's hand.\nThis lesson learn from me."},
{"title":"Misplaced Sand","date":"2016-06-14","content":"Sand is in my hair and nose,\nIn my shorts and 'tween my toes,\nOn my arms and back and knees.\nWill you clean the sand off please!\n\nSand belongs around a lake,\nDeserts too, make no mistake,\nOn the ocean's shing shores.\nBut no sir, not inside my drawers!"},
{"title":"Waves","date":"2016-06-15","content":"Crashing waves along the shore -\nOne, then two, then millions more;\nShaping coasts of rock and sand,\nClaiming victory over land.\n\nPlaying with you now my friend,\nCool refreshment you do send.\nYou retreat, I venture in ...\nThen I run to save my skin!"},
{"title":"Blighted Bay","date":"2016-06-21","content":"The other day, I thought I would\nGo swimming at the beach.\nBut when I walked out on the sand\nThe lifeguard made a speech.\n\nHe said we could sit in the sand\nAnd look around, you know...\nBut in the cooling water we\nCould not this weekend go.\n\nBacteria had leaked all out\nAnd spread around the bay.\nBut in a day or two with luck\nWe'll swim again, they say.\n\nI only worry that if we\nDo not our bay treat right,\nIt will not be a playground; but\nA smelly, ugly sight."},
{"title":"Five Rocks","date":"2016-06-22","content":"Five Rocks in the ocean sprinkled,\nClouds are floating in the sky.\nIn the Valley - old Lāʻie.\nOn the Point, the time drifts by.\n\nTradewinds blowing through the palm trees.\nWaves below us constant churn.\nSoon we'll cross the many waters,\nBut again we will return."},
{"title":"Beach Trip","date":"2016-06-28","content":"I asked my mother if we might\nOff to the seashore go.\nShe said; \"my dear, of course we may\nBut we must pack, you know.\n\nA cooler for our soda pop,\nA sandwich and a snack,\nA lotion bottle for your nose,\nAnother for your back.\n\nA jacket if it's cold outside,\nSome shorts in case it's hot,\nA surfboard if the waves are big,\nA beach-ball if they're not.\n\nA colorful umbrella, and\nA beach mat made of foam...\"\nYou know, I think I'd rather stay\nRight here, and play at home."},
{"title":"Surf's Up","date":"2016-06-29","content":"They walk upon the water, and\nThey dance above the waves.\nAnd from the girls on the beach\nGet accolades and raves.\n\nThey call their surfboards guns and sticks\nAnd rub on lots of wax..\nThen paddle past the breakers, and\nJust sit back and relax.\n\nSo when a big one's on its way\nThey race the coming bulk.\nThen slash the face and bottom turn\nAnd face the massive hulk.\n\nAnd then they cut and shoot the tube,\nTo feel the power there.\nFrom there they pull out on the face,\nAnd rip and shred and tear.\n\nI like to watch the surfers too.\nAnd best of all, no doubt,\nIs when the ocean shows her might,\nAnd some poor dude wipes out!"}
]
let filtered = [...POEMS];
let currentIdx = null;

function formatDate(d) {
  const [y, m, day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(m)-1] + ' ' + parseInt(day) + ', ' + y;
}

function renderList() {
  const sidebar = document.getElementById('sidebar');
  const info = document.getElementById('results-info');
  info.textContent = filtered.length + ' of ' + POEMS.length + ' poems';
  
  if (filtered.length === 0) {
    sidebar.innerHTML = '<div class="no-results">No poems found</div>';
    return;
  }
  
  sidebar.innerHTML = filtered.map((p, i) => `
    <div class="poem-list-item ${currentIdx === i ? 'active' : ''}" onclick="showPoem(${i})">
      <div class="poem-list-title">${p.title}</div>
      <div class="poem-list-date">${formatDate(p.date)}</div>
    </div>
  `).join('');
}

function showPoem(idx) {
  currentIdx = idx;
  const p = filtered[idx];
  
  // Format content into stanzas
  const content = p.content.replace(/\\n/g, '\n');
  const stanzas = content.split(/\n\n+/);
  const stanzaHtml = stanzas
    .filter(s => s.trim())
    .map(s => `<div class="poem-stanza">${s.trim().replace(/\n/g, '<br>')}</div>`)
    .join('');
  
  const viewer = document.getElementById('viewer');
  viewer.classList.remove('empty');
  viewer.innerHTML = `
    <div class="poem-header">
      <div class="poem-number">Poem ${idx + 1} of ${filtered.length}</div>
      <div class="poem-title">${p.title}</div>
      <div class="poem-date">${formatDate(p.date)}</div>
    </div>
    <div class="poem-body">${stanzaHtml}</div>
    <div class="poem-author">— Thayne Whipple</div>
    <div class="poem-nav">
      <button class="nav-btn" onclick="showPoem(${idx - 1})" ${idx === 0 ? 'disabled' : ''}>&#8592; Previous</button>
      <button class="nav-btn" onclick="showPoem(${idx + 1})" ${idx === filtered.length - 1 ? 'disabled' : ''}>Next &#8594;</button>
    </div>
  `;
  viewer.scrollTop = 0;
  
  // Highlight active in sidebar
  document.querySelectorAll('.poem-list-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  
  // Scroll sidebar to active
  const active = document.querySelector('.poem-list-item.active');
  if (active) active.scrollIntoView({ block: 'nearest' });
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort').value;
  const filter = document.getElementById('filter').value;
  
  filtered = POEMS.filter(p => {
    const matchQ = !q || p.title.toLowerCase().includes(q) || p.content.replace(/\\n/g,'\n').toLowerCase().includes(q);
    const matchF = filter === 'all' || 
      (filter === 'aesop' && p.title.includes('Aesop')) ||
      (filter === 'other' && !p.title.includes('Aesop'));
    return matchQ && matchF;
  });
  
  if (sort === 'date-asc') filtered.sort((a, b) => a.date.localeCompare(b.date));
  else if (sort === 'date-desc') filtered.sort((a, b) => b.date.localeCompare(a.date));
  else filtered.sort((a, b) => a.title.localeCompare(b.title));
  
  currentIdx = null;
  renderList();
  
  const viewer = document.getElementById('viewer');
  viewer.className = 'poem-viewer empty';
  viewer.innerHTML = `<div class="empty-state"><div class="big-quote">"</div><p>Select a poem to read</p></div>`;
}

document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('sort').addEventListener('change', applyFilters);
document.getElementById('filter').addEventListener('change', applyFilters);
document.getElementById('random-btn').addEventListener('click', () => {
  if (filtered.length) showPoem(Math.floor(Math.random() * filtered.length));
});

// Init
applyFilters();
// Show first poem on load
if (filtered.length) showPoem(0);
</script>
</body>
</html>
