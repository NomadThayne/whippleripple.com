And with an airborne twist and flip,
You signal me good—day."}, {"title": "Beginning", "date": "2016-01-07", "content": "At Birth Commences
Death’s Entre.
Fate Gnarls Human
Interplay.

Jeweled Kings, Loved Mothers
Now Omitted,
Post Quintessential
Rites Submitted.

Truth Undaunted, Vaulted Wide
Xanadu, Yet Zeitgeist."}, {"title": "Only a Lonely Miner", "date": "2016-01-08", "content": "I'm only a lonely miner,
A million miles from home.
I've left my home and family
For a few lousy nuggets of gold.

But what will I do when I find it?
I've no use for the yellowish muck.
I think I'll go down into town
And show the folks my luck.

And then will I write a letter
To all of my family and friends.
To tell them of my adventures
And for them how my heart now rends.

I'll tell them about my hardships -
Of the wolves that howl at the moon.
But most of all I'll tell them ‘bout
The Malamute Saloon.    

(Reprise)

Then when you depart our presence,
And travel home to bed,
We hope that rather than scoff us,
You'll sing our praises instead.
And the next time you hear of the Yukon,
Beneath a yellowish moon.
We hope you remember this evening in
The Malamute Saloon.
Oh, the Malamute Saloon
Yes, the Malamute Saloon"}, {"title": "Choosing Sides (Aesop)", "date": "2016-01-09", "content": "A hare was fleeing an attack
From dog who bit his legs and back.

They both through wood and field did dart,
And never were too far apart.

At times the dog would vicious snap,
Then later flowing blood would lap.

The dog continued on his play,
And teased his weak and wounded prey.

The hare in desperation cried,
“Please dog, would you just choose a side!

If playmate you desire of me,
I need to rest, so let me be.

Or if my death you really want,
Just end me now, and cease to taunt!”

---
True colors you should always show –
If loyal friend, or rather foe."}, {"title": "A Message", "date": "2016-01-10", "content": "To preach to my brothers,
Proclaiming His name.
To do it for His sake;
And not for the fame.

I hope to be worthy,
I hope you will hear,
That we might be raised up,
When judgement draws near."}, {"title": "The Beaten Path", "date": "2016-01-11", "content": "No one has ever made
A great discovery
By following
The beaten path."}, {"title": "Daily Breath", "date": "2016-01-12", "content": "Is it our right,
We mortal souls who err,

To take away
That which we cannot give?

Are we as God
Who gives life daily breath?

Or merely are 
We beggars for that gift?

If one should not
Deprive a fellow life -

In symphony,
This power should we wield?"}, {"title": "Whale", "date": "2016-01-13", "content": "Largest living mammal, you,
Kind and gentle giant too.

Singing whale songs to all,
I have heard your stately call.

You are gorgeous when you leap
From the ocean dark and deep.

Splashing tail, you say hi,
I with waving arm reply.

Then you dive and swim below.
Where you go, I'll never know.

But I'll watch the sea about,
And again I'll see your spout."}, {"title": "A Canvas", "date": "2016-01-14", "content": "A palette filled with many shades
A canvas, frame and skill
A brush, a thought, but even more -
An artist's untamed will;

Does hang above my faded couch
Amidst a peeling wall,
And oversees my life's charade,
For aren't we actors all?

I only hope that once life's o'er
A masterpiece I'll leave.
And not just doodles on a pad -
That some my death might grieve."}, {"title": "Gatsby", "date": "2016-01-15", "content": "The moonlight glistened through the sky
As Gatsby gazed across the bay –
And through the darkness glimmered bright
A light of green now on display.

It seemed more than a life ago.
Across the ravages of war;
And time and place and Wasteland woes - 
When things were as they were before…

How many memories were lost – 
Because of choices made in haste?
And dreams that sailed o’er the bay,
Below the waves in death encased.

How different would his life now be – 
If he were Tom and Tom were he?
And looking ‘cross the bay at night –
A lonely silhouette he’d see.

Was Daisy’s dock a mere mirage?
Where once he dreamed of happy times?
Or is the coldness of the night,
A penalty for all his crimes?"}, {"title": "The Best Escape (Aesop)", "date": "2016-01-16", "content": "A fox and hare did argue long,
And tried to prove each other wrong,

About which one could best evade
A hot pursuit by hunter made.

The hare did boast about his speed –
That he could outrun hound or steed.

And how his feet so strong and swift,
Delivered well the needed lift.

The fox then angrily opined;
“The better thing's a clever mind.

For ‘though your speed is very fast –
As time wears on, you cannot last.

With trickery I win the day,
To keep my predators away.

And it is known both far and wide
That I can more discreetly hide.

And on they bickered through the night –
Until the sun’s first morning light.

---

The swiftest may not win the prize,
When facing foes who are more wise."}, {"title": "Gospel Light", "date": "2016-01-17", "content": "Because the Christ upon the cross
Did long ago atone,
And to the prophet of our day
The gospel light was shown;

We may enjoy the gifts of God
Abundantly today.
And find the path to heav'n above,
And there might ever stay."}, {"title": "The Light of Love", "date": "2016-01-18", "content": "'Though fire may a fire fight,
More darkness will not bring the light.

A moonless night will darker seem
When turning off a flashlight beam.

And flipping off another switch
Won't brighten rooms as dark as pitch.

Yet caves alone I'll dare to tame
With just a tiny candle flame.

It doesn't take a fire bright
To guide your feet through darkest night.

As light unto the darkness brings,
The same is true with other things:

To evil from the earth abate -
Do not attempt by spreading hate.

This lesson proven very well -
That love, alone, can hate dispel.

And like a spark can soon ignite
A raging fire, burning bright.

A global love can simply start
Within one humble beating heart.

For small and simple things grow tall,
As you may easily recall ...

The Spirit witnessed God's great love
With just a lowly, little dove.

Inspired by:

\"Darkness cannot drive out darkness; only light can do that. Hate cannot drive out hate; only love can do that.\"
- Martin Luther King, Jr."}, {"title": "What's a Name", "date": "2016-01-19", "content": "I’m awfully glad that at my birth
My parents didn’t call me ‘Dearth,’

Or ‘Parsininthreopraphy’
Or ‘Catchattorriaminy.’

Because the children like to tease
And would have put me ill at ease.

But even though they all would laugh
When glancing o’er my autograph,

If I did one day gain great fame
They all would wish they had my name!"}, {"title": "Little Sailor", "date": "2016-01-20", "content": "I am quite a little sailor
Here standing on the dock.
The seagulls dive at passing fish,
And hover in a flock.

The sails drift by on gentle breeze
To cross the deep and spacious seas.
I have a life-vest so I'll float.
Now all I need is just a boat!"}, {"title": "Nervous Laughter", "date": "2016-01-21", "content": "Always coming, always going,
Ever ebbing, ever flowing;
Motion constant, always changing,
Only ceaseless rearranging.

Interest rates will fall and rise.
One does sell, the other buys.
Infant cries in shrilling tones,
Echo through the ancients' bones.

Nervous laughter - on the edge of sanity. 
Nervous laughter - mind is sailing off to sea.
Nervous laughter - symptom I may crazy be.
Nervous laughter - won't you listen to my plea!

Planet spinning ‘round and ‘round,
Where it stops is where we're found.
Witch or warlock, wise man, saint,
Hidden under body paint.

Mind is turning all about,
First a flood and then a drought.
Like a painted smiling face,
Undercurrent shows no trace. 

Nervous laughter - echoing inside my ears.
Nervous laughter - magnifies my deepest fears.
Nervous laughter - reality is what you see.
Nervous laughter - ha ha ha, can you see me?

May I not control my mind?
Rest in tranquil corners find?
Making time for wounds to mend,
Either that or face the end.

Nervous laughter, nervous laughter..."}, {"title": "Eternal Bonds", "date": "2016-01-22", "content": "Across the altar of the Lord,
I pause to glance at you.
As something in your countenance,
Remarkably is new. 

'Though beauty, you have always had,
As viewed within my eyes,
The radiance you now emit
Appears as from the skies.

Eternal bonds of love we make
Together on this day,
As one, beyond these earthly realms,
Forever we will stay.

For comfort in the trials and
To share in victory,
We in this house do covenant
And solemnly agree.

I'll love you then forever from
The bottom of my heart.
Assured that neither life nor death
May ever force us part.

Eternal bonds of love our souls
Entwine on this great day,
As one beyond these earthly realms,
Forever we will stay.

The heavens in their glory sing
Our praises from above.
As we, within this holy house,
Do demonstrate our love.

No longer as mere mortal friends,
But rather man and wife,
As we perfect each other, hand-
In-hand, throughout this life.

And then when our probation's o'er
And dust is laid to dust,
As in the Lord's redeeming pow'r
We place our hope and trust.

United once again we'll stand
In our eternal reign,
To bask in our unbounded love,
Celestial peace obtained.

Eternal bonds of love we make
Together on this day,
As one, beyond these earthly realms,
Forever we will stay.

For comfort in the trials and
To share in victory,
We in this house do covenant
And solemnly agree.

I'll love you then forever from
The bottom of my heart.
Assured that neither life nor death
May ever force us part.

Eternal bonds of love our souls
Entwine on this great day,
As one beyond these earthly realms,
Forever we will stay."}, {"title": "The Faint-Hearted Hare (Aesop)", "date": "2016-01-23", "content": "The morning sun revealed a haze,
Where goats did on a hillside graze.

And in the tall grass, slow did creep
The lion king, who soon would leap.

And on an unsuspecting goat
He pounced, and seized him by the throat.

The goat was strong and did resist,
As both the beasts did writhe and twist.

The lion did the battle win,
But goat-horns had pierced deep his skin.

In rage he acted on his scorn,
And banished ev’ry beast with horn.

Throughout his kingdom went decree;
“Within the day those beasts must flee!”

A hare that morning heard the news,
And wishing not his life to lose,

Inspected close his shadow tall
That now was cast upon a wall.

He hardly could believe his eyes –
Two horns seemed from his head to rise!

(And ‘though they only were his ears,
They conjured up his darkest fears.)

So thinking he might be destroyed,
H ran away to harm avoid.

---
Self-doubt and fear a soul will break.
And rob more than a thief can take."}, {"title": "Peace and Joy", "date": "2016-01-24", "content": "When thoughts are turned to Father in
The heavens up above,
My mind is filled with peace and joy,
My heart is filled with love.

For He created all the earth
Each flower and each bird.
And teaches me what I should do,
With His most caring word.

He asked that we build temples where
We all could work and learn,
That with Him in His heaven we,
Might all a place there earn.

Yes, Heav’nly father loves me
And when to him I pray,
He fills my soul with peace and love
And brightens up my day."}, {"title": "Enemies & Allies", "date": "2016-01-25", "content": "The world is full of enemies and allies.
The error is not in realizing this,
But mistaking one for the other."}, {"title": "Quake", "date": "2016-01-26", "content": "The world it seems is shaking,
And trembling everywhere.
It's got some people nervous -
They're running here and there.

We're waiting for the big one
To lay the city low...
Even lots of little ones
Can put on quite a show.

I don't know if it's a sign
Of things to come grotesque...
You'll have to let me finish here -
And dive below my desk."}, {"title": "Octopus", "date": "2016-01-27", "content": "Octopus, Octopus, tentacles eight -
If eight arms I had, why I'd play baseball great.

Suction cups everywhere, nothing escapes
Your dreadful grasp as now wide your mouth gapes.

Floating and crawling along the sea floor,
You're always hungry and always want more.

But when a predator bigger than you
Wants you for dinner, here's just what you do:

Out of your middle, a cloud black and thick
You spray in the water, and run away quick!"}, {"title": "The Writer's Block", "date": "2016-01-28", "content": "The deadline came, the deadline passed.
My life in peril now is cast.
With worry I am constant frock,
Since overcome by writer's block.

The writer's only mortal dread,
The empty page, does loom ahead.
And thoughts no longer fill my mind,
But rather, vacant space I find.

I pray, I pace, I cannot think.
My brain it seems is on the blink.
What ho! I think a thought has come.
Oh well..., 'twas just a stupid one.

Copyright ©"}, {"title": "What's Wrong?", "date": "2016-01-29", "content": "You woke up in the morning, and
You didn't feel so hot?
You couldn't keep your breakfast down,
But didn't eat a lot?

Your monthly pattern isn't?
And your chest is rather sore?
It's 3 AM and you insist
On pickles from the store?

I didn't go to Med School, but
I do believe I know,
Unless you've picked up some new flu,
Your belly's gonna grow.

But don't you fear, although you'll bloat
Beyond your wildest dreams.
It's nothing like a tranquil night ...
Destroyed by baby's screams!"}, {"title": "Preparations for War (Aesop)", "date": "2016-01-30", "content": "A war throughout the land did tear
Between the beasts and birds of air.

The lion king his troops did call,
And they did gather – one and all.

Great herds of donkeys came that day.
And all the hares did swift obey.

Commanders did the troops review,
But did not know quite what to do …

As hares and donkeys do not fight –
And neither were they very bright.

This to the king, they then did say,
And asked to send them all away.

The lion was a wiser soul,
And said, “For each we’ll find a role.

The donkeys with their frightful bray
As trumpeters will sound our way.

The hares will also fill a need,
Relaying messages with speed.

And thus the ranks were organized,
And each his talents recognized.

---
Each one of us can find a way
To in this life a part to play."}, {"title": "Saviour of My Soul", "date": "2016-01-31", "content": "From Bethlehem, beneath the star,
Although you never travelled far,
And ‘though the years did pass by swift,
You brought the world a priceless gift.

You ceaseless walked o'er dusty trail,
That light o'er darkness might prevail.
I wish that I, my gratefulness,
To you might someday full express.

For 'though I cannot comprehend,
The magnitude of gifts you send,
I know that only by thy grace,
May I return to see thy face.

My friend, example and my guide.

Oh Saviour, Redeemer of this world,
As Satan, from thy midst was hurled;
I too my sins might also spurn,
That godhood, one day, I might earn.

And live with thee in peace forever more.

For on this earth you suffered all,
Redeeming mankind from the fall.
A feat above the mortal man,
Within the jaws of hell you ran.

And then returned, the Saviour of my soul.

In humble manger wert thou born.
You lived a life of pain and scorn.
And though you suffered Satan's wrath,
You never varied from the path.

And thus I marvel at thee Lord, 
For me thy life blood freely poured.
And on the cross in pain were racked,
As courage thou hast never lacked.

And this, a ransom not of gold,
As prophets long before foretold.
You paid with blood and pain and life.
You overcame the world's strife.

Indebted then, I'll be eternally.

Oh Saviour, redeemer of this world,
As Satan, from thy midst was hurled;
I too my sins might also spurn,
That godhood, one day, I might earn.

And live with thee in peace forever more.

For on this earth you suffered all,
Redeeming mankind from the fall.
A feat above the mortal man,
Within the jaws of hell you ran.

Thy glory earned, oh Saviour of my soul."}, {"title": "My Debt", "date": "2016-02-01", "content": "As now the sun's last light does fade,
Is my great debt to others paid?
To others did I give my aid?
Have I a better world made?"}, {"title": "Wiggly Worms", "date": "2016-02-03", "content": "You slither through the fertile soil.
Beneath my toes you ceaseless toil.
Both death and refuse you consume,
And make the prairie flowers bloom.

When heaven cedes the raindrops fall,
You fearless on the surface crawl.
But when the sun fills up the skies,
You dry up quick and fossilize.

In rusty can on fishing hook,
Within my favorite picture book,
You make the little girls squirm.
But you're my friend, O little worm."}, {"title": "A Lonely Figure", "date": "2016-02-04", "content": "A lonely figure
In the sands of time,
Just walking endless
On the paths you find.

I see your face, and
Then it disappears,
Into a crowd of
Faces changed by years.

I call to you, but
You do not respond.
You just continue...
T'ward your great beyond.

And so I sit, and
Wonder who you are.
Why do you haunt me,
Why have you come so far?

Are you my future,
Are you my past?
Please tell me specter -
What it is thou hast.

Or will I wander
Endless as you do,
In search of answers
Which I wish I knew."}, {"title": "My Dear Jay", "date": "2016-02-05", "content": "Before my dreams of West Egg fade,
I’ll pen my final thoughts.
Before the setting sun does fall
Beyond the graceful yachts.

Your life was like a shooting star –
So brilliant yet so short.
I wouldn’t be consumed by flames - 
And sought a safer port.

How hard you tried to lure me back
With life so fast and free
The dream of any other girl -
But I could only flee.

I might have thought that I could try -
If only for a day -
To join you in your life of dreams
Across the frothy bay.

But as it is – I’m far from there -
I know you won’t reply.
For life is short at such a speed -
A gunshot echoes by."}, {"title": "The Tortoises and the Frogs (Aesop)", "date": "2016-02-06", "content": "A group of tortoises stood ‘round,
Upon a little earthy mound.

And did observe the meadow there,
As frogs were playing without care.

They nimbly jumped and frolicked free,
And raced from bush to rock to tree.

The tortoises then shared dismay
That they were not well built to play.

But then they did observe a duck,
A frog from off the meadow pluck.

More birds and fishes they did see
Eat many frogs quite easily.

Then started feeling very well,
Protected by their solid shell.

One shared aloud that “even though
We’re heavy and we move quite slow,

I’d rather live while crawling by,
Than quickly run and sooner die.”

---
True joy is found when we embrace
Our role in life, and find our place."}, {"title": "Humble Servants", "date": "2016-02-07", "content": "Humble servants,
Called by revelation -
Mandate of the most High God,
To lay foundations
For His Kingdom.

Imperfect vessels
Being purified in fire —
Leading righteous youth,
Through sins
Dark Clouds.

Holding high our lamps,
And teaching willing hearts
To do the same.
Fighting sin with truth,
And wickedness with love.

When he descends in scarlet robes,
May he be pleased
With every brick we've laid,
And floor we've swept,
In His most holy Kingdom."}, {"title": "A Journey Through Hell", "date": "2016-02-08", "content": "When on a path that leads through hell,
Don't stop and sit to rest a spell.
If on your problems you don't dwell,
In time, you'll see, they'll turn out well.

When in the throes of hell you're found,
Keep moving on to higher ground.
Where you can clearly look around,
And see your blessings do abound.

When hope is lost and friends are gone -
Your life is hell ... keep moving on.
And as you fight with brain and brawn,
You'll surely see a brighter dawn.

Each one of us has felt some pain,
And had a hard time staying sane.
Do not succumb to stress and strain.
You've everything in life to gain!

Inspired by:
\"If you're going through hell, keep going.\"
- Winston Churchill"}, {"title": "DNA", "date": "2016-02-09", "content": "“Your father’s head is going bald.”
“Your mother’s toes are funny.”
“Your uncle has a nervous tick.”
“Your cousin’s nose is runny.”

Yes, child recent to the world,
Your fate is not your own.
The body you’ll be using
Is something of a clone.

The scientists have coined a word –
Genetics is the name.
It means you might look funny, but,
We’ll love you just the same."}, {"title": "Blue", "date": "2016-02-10", "content": "Birds like peacock, parrot, jay;
Water in a sparkling bay,

Navy Angels flying team,
Edvard Munch’s famous scream,

Velvet movie, sunny skies,
Little boy, and Nordic eyes,

Donald’s hat, and cartoon clues,
Glacier ice, and nasty bruise,

Rhapsody and Danube song,
Crayon, tropical sarong,

Poets say that violets are,
New York City police car,

Suede shoes in that Elvis tune,
Forget-me-not, infrequent moon,

Dress clothes for US Marines,
Cookie Monster, denim jeans,

Periwinkle, Smurfs so cute,
Winner’s ribbon, pin-stripe suit

‘Vegas man group, butterfly
Whales, and bubbles, berry pie

Skin that’s really, really cool;
Color of a swimming pool

Sapphires, and dresses too …
Now I’m feeling kind of blue."}, {"title": "Lint", "date": "2016-02-11", "content": "I put my wardrobe in the wash
And spun it round about.
Then in the dryer did it go -
And then I took it out.

The thing, though, that amazes me
Is all the lint there was.
I asked a friend from whence it came,
She told me, \"It's clothes fuzz.\"

I couldn't see how it could be —
My clothes were all still there
And so I thought I'd test it out
And my results I'll share.

I washed my clothes a million times
The lint I piled high.
From just a modest bag of clothes
The lint reached to the sky.

A new resource for energy
I've found, that's very green.
And as a nice by—product, we
Will all look very clean."}, {"title": "Valentine", "date": "2016-02-12", "content": "In the month of February,
There's a day, or so I'm told,
Especially for lovers young ...
Or middle-aged or old.

So on this day with thoughtful gift
And with romance in the air,
They find a quiet corner, and
Then all the evening share.

But ever since I can recall
There has been a fellow who
Has really taken over, and
I don't know what to do.

His name it seems is Valentine
And they thus have named the day
But hope I have to him o'erthrow
That to love, I also may!"}, {"title": "The Fox Who Praised the Hare (Aesop)", "date": "2016-02-13", "content": "A fox with flowing tail did race,
For close behind a dog gave chase.

As now the fox his end did fear,
A hare did suddenly appear.

The fox called out, “Don’t miss your chance!”
And at the hare did throw a glance.

“Hey dog, that hare is quite a dish –
More tender meat you could not wish.

Such tasty flesh – beyond compare.
Go hurry now and catch the hare!”

My meat is old, and hard to chew.
It’s rotten now and tainted too.

Why, just one bite might do the trick –
To poison you and make you sick.”

The dog indeed the hare pursued,
In hopes of tasting such fine food.

The hare was fresh, and won the race;
The dog could not keep up the pace.

The hare was lost beyond a hill.
The tired dog was hungry still.

Upon another summer day,
The hare did see the fox at play,

And said, “Good fox, though you are wise,
I think you should apologize.

Your words that day about my taste
Did nearly end my life with haste!”

The fox replied in calming tone,
“Good hare, why would you think to moan?

Have you not thought these last few days,
I only gave you highest praise.

The words I spoke, they were not lies,
And neither did I criticize.”

---
Beware, the praise you now receive
May someday cause for you to grieve."}, {"title": "Missionary Ode", "date": "2016-02-14", "content": "A very short time
For the Lord set aside,
To put away strife
And contentions and pride.

A moment in time
I will spend here with you.
I tarry not long,
'Fore I bid you adieu.

I'm here for my Brother.
He asked me to spread
The news that He lives,
That He rose from the dead."}, {"title": "Lessons Learned", "date": "2016-02-16", "content": "My daughter is a charming lass
And now is nearly one.
Please have a seat, and rest, so I
Can tell you what I’ve done.

You see she got the Clorox out
And almost took a drink.
But I grabbed it rather swiftly
And then I stopped to think.

I read in some swell magazine
How children are so mild;
That we should never smack them, no
Not even if they’re wild.

But rather, I sat down with her
And told her all about
The health aspects of drinking bleach –
I abstinence did tout.

We discussed all the factors. For
Assurances I plead.
And she made some strange gurgling sound
And nodded with her head.

I think she learned the lesson too -
From bleach she now refrains.
For now she’s rather partial to
The stuff for cleaning drains."}, {"title": "Pelican", "date": "2016-02-17", "content": "Pelican, Pelican out on the rock -
You look so funny it's hard not to mock.
Pelican, Pelican flying so high -
Why won't you fly to me, why are you shy?

Pelican, Pelican with those big feet,
You can swim faster than any you meet.
Pelican, Pelican dive in the sea —
With all those fish, oh how happy you'll be.

Pelican, Pelican with that big beak -
Could you swallow the ocean and not even leak?
Pelican, Pelican eat all the sea -
But please Mr. Pelican, do not eat me!"}, {"title": "The Malamute Saloon", "date": "2016-02-18", "content": "Welcome everybody
To the Malamute Saloon.
We've been working on this show
Since early on in June.
It's something you aint seen before -
We're fairly sure of that.
There's food on all the tables, and
We hope you leave here fat.

Come on everybody,
We have good times planned ahead.
But if you throw your food at us
We'll send you home to bed.
So join the fun and sing along -
Just please don't boo or hiss.
And we'll keep entertaining you
With silly stuff like this.

We know you've cancelled other plans
To be with us tonight.
And so we'll do our very best
To try and treat you right.
We've got some pretty funny acts
Just lurking up ahead.
And songs we think will make you cry -
If you're into that instead.

(Reprise)

Welcome everybody to the Malamute Saloon.
The entertainment's started, and the food should be here soon.
So sit right back, and clap your hands,
And maybe stomp your feet.
We've got a program planned for you —
We think is really ... neat!     

FINALE

The show is almost finished,
And we're really glad you came.
We're sorry that it's over,
And we hope you feel the same.
But if you'd like to hang around,
And join us for dessert,
You'll have a chance to mingle,
And maybe even flirt."}, {"title": "Am I Pregnant?", "date": "2016-02-19", "content": "Am I pregnant?
Did egg and sperm unite?
As a mother,
Will I derive delight?

Could I be great with child?
At birth will I endure
The plight of mother Eve?
That tribulation sure.

They now say that I’m expecting;
But what, my mind can’t hold.
And have I love within my soul
To shield that child from cold?"}, {"title": "The Hare and the Wolf (Aesop)", "date": "2016-02-20", "content": "A wolf did on the meadow walk,
And with a hare began to talk.

Then after chatting for a while,
They shared some stories and a smile.

The wolf then thought he’d eat the hare.
But wishing to appear more fair

He said, “Good hare, it’s time to eat,
And while you’d make a tasty treat –

Considering the circumstance,
I’d like to give you half a chance.

I’ll with you now a wager make,
And hope that you my deal will take.

I challenge you to fight today,
And if I win, you’ll dearly pay.

But at the end, if you have won,
I’ll gladly pay you ten-to-one.”

The hare did gladly then agree,
And hoped for a swift victory.

They faced off just a pace apart
And counted 3 before the start.

But then, before the wolf could bite,
The hare did quickly take to flight.

With swiftness he did hop away,
And left the wolf there in dismay.

But soon the wolf was in pursuit,
To finish off their hot dispute.

And did the hare with vigor chase,
As both did through the forest race.

And ‘round the meadow ran about,
Until the wolf was well worn out.

And that is how the race did stop,
As did the wolf exhausted drop.

The hare, then to the wolf returned
For payment of the wager earned.

The wolf, in protest, blurted out,
“You did not win, there is no doubt!

You did not fight with me today,
You simply turned and ran away.”

The hare said, “I won with my feet.
And here you lie in full defeat.

I fight this way most ev’ry day –
With dogs I find along my way.”

The wolf, when all his strength he gained,
Went to the lion king who reigned.

And in the court laid out his case,
About the fight … or rather, chase.

The king, his verdict stated there:
“The victor truly was the hare.”

---
If you desire to save your skin,
There are a lot of ways to win."}, {"title": "Creation?", "date": "2016-02-21", "content": "What is it to make a world?
Is it an artistic endeavor?
A creation simply to muse at
From afar in tranquil moments?

Is there perhaps a purpose?
A physical experiment?
A possible answer to a vexing
Universal problem?

Are we laboratory mice?
Would we disturb the balance of existence
If we pondered such things?
Will we be graded?

Have a nice day."}, {"title": "Cheer", "date": "2016-02-23", "content": "The home team is not doing well.
It doesn't happen much.
But now they're losing all their games -
Those no good so and such.

But let us not let some defeat
Get in the way of play.
It after all just is a game
On top they'll be some day.

Let's cheer them on no matter, if
They lose or tie or win.
What if in triumph we were loved,
In loss, knocked on the chin?"}, {"title": "Jellyfish", "date": "2016-02-24", "content": "Floating through the ocean blue,
I, your body see right through.
Like a fabric in the breeze,
Gracefully propelled with ease.

All the streamers that you flaunt
For potential dinner taunt.
As when by them you do coast,
Poison paralyzes most.

You're so beautiful it's true,
But it's evil that you do.
So I'll watch you ripple past,
Bluish hue in ocean cast."}, {"title": "Rainbow's End", "date": "2016-02-25", "content": "In a trenchcoat 'neath a streetlight,
On a corner in the dark.
On a cold steel bench at midnight,
With the lovers in the park.
On a fog swept pier at sunset,
Waiting for some clearer skies -
Live the world's still hopeful losers.
Have you listened to their cries?
Have you been out there past bedtime,
In the city on the street?
It's a jungle, so they tell me,
Getting licked until your beat.
But the strongest seem to make it,
On their cunning they depend.
It's a life of dreams and nightmares.
Destination: Rainbow's End. 

Chasing rainbow after rainbow
Looking for that pot of gold.
Fighting odds and taking punches,
It's that same old tale retold.
Rainbow's End, I've got to make it!
Rainbow's End, I'm almost there!
Rainbow's End - the magic gateway
To a new life free from care.

In a tricked out Maserati, cruising highway number one,
On their yachts they spend their Sundays,
Sipping soda in the sun.
They wear french designer track shoes,
Live in mansions in Bel-Air,
Ride in chauffeur driven golf carts,
Live their lives without a care.
Have you seen them in the movies?
Have you seen them where they meet?
Have you seen them in their limos,
Sporting fashions, looking neat?
They're the ones who make the papers.
They're the ones that set the trends.
It's a life of dreams and nightmares.
Destination: Rainbow's End.

Catching rainbow after rainbow.
Cashing in that pot of gold.
Beating odds with lucky hunches,
It's that same old tale retold.
Rainbows end I've got to make it!
Cover up those battle scars,
For a world without horizon,
Rainbow stairway to the stars."}, {"title": "Nesting", "date": "2016-02-26", "content": "My wife is quite ambitious, and
She felt our home was drab.
She thought we ought to decorate
I said, ‘give it a stab!’

I told her I’d go shopping for
The things that we would need.
And she could then arrange them at
Her own leisurely speed.

I’d done some decorating too
In youthful days now past.
And knew it didn’t take a lot
To spice a place up fast.

My wife had something else in mind,
Apparently I found;
For she said words I’d never heard
And made a dreadful sound.

Upon return, she said to me,
‘You’re madder than the loons,’
And ‘why the devil did you buy
Crepe paper and balloons!?!’"}, {"title": "The Hare’s Friends (Aesop)", "date": "2016-02-27", "content": "The sun above the hills did rise
And filled with light the morning skies.

The hare awoke and hopped away
To visit all her friends that day.

And nearly all did call her “friend,”
As she did daily greetings send.

But on this morn, a sound she heard
That startled ev’ry beast and bird.

The hounds were loose to run and play.
And now with speed did come her way.

The hounds were known to eat a hare,
If any were caught unaware.

And so the hare her friends did seek,
To save her from a fate quite bleak.

First, to the horse she made her plea;
“Please take e on your back to flee!”

But he said, “I have chores today,
And cannot with you go away.

But you have many friends, it’s true,
And they should all give aid to you.”

Then to the bull she ran forlorn –
“Please friend, protect me with your horn!”

The bull replied, “You’ve come too late.
I have to leave now for a date.

And for the timing I regret …
The goat will help you out, I bet.”

The goat did also help decline,
For if the hare rode on his spine,

She might slip off (as she’s so small)
And suffer quite an awful fall.

And so he said, “I’m sorry ma’am,
I think you’d better ask the ram.”

Then to the ram her case she plead.
But in a fearful voice he said;

“While help I’d like to offer you,
Hounds have been known to eat sheep too.

And so, although I sympathize,
I do not think it would be wise.”

Now to the calf she did report,
Appealing as a last resort.

The calf said, “I am quite concerned,
As all the beasts your cries have spurned.

I really don’t like to decide,
I think I’ll with the others side.

They’re older, and know more than I.
I wish you well my friend, goodbye.”

With barking hounds now close at hand,
The hare alone did tearful stand.

With no real friends to save the day;
To save her life, she ran away.

---

If many friends you have to call,
In truth, you may have none at all."}, {"title": "The Worth of Souls", "date": "2016-02-28", "content": "The worth of souls is great in the sight of God. 

God, the creator of the universe.
The worker of all miracles.
The author of salvation.

Am I worthy to be of great worth in his sight?

As his son,
A son of God Almighty,
The king and ruler of this universe;
And the infinite realms of eternity,
Of which we can only imagine.
I should be!

I fought valiantly
To thwart the cause of Satan.
And because of my faithfulness,
Earned the right to become as my father.
If I prove worthy.
I must be!

I need only remain firm
Within the guidelines my Father has given.
Then hold fast to the teachings
Which lead to exaltation.
I can be!

And though perhaps not perfect,
I will be!"}, {"title": "Pink & Blue", "date": "2016-03-01", "content": "In days of yore, they couldn’t tell
What sex your child might be.
But now with tests and gadgets, they
Can very quickly see.

To me it doesn’t matter much
If it’s a girl or boy.
As long as it is healthy, and
A long life will enjoy.

But as a loving parent does –
When they’re sixteen, I pray,
I’ll know if it’s a lad or lass –
Without testing DNA."}, {"title": "Ode to a Hare", "date": "2016-03-02", "content": "Furry, long-eared little hare
Sitting on the meadow there.

Silent in a field of grass,
Dreaming as the clouds o’er pass.

I have seen you hop and run
Underneath the summer sun.

Reflex sharp, you twitch and turn,
One more day of life to earn.

Full of fear, but quick to act,
By most carnivores attacked.

Dodge and dart, then circle back.
Sprinter’s speed you do not lack.

Leaping with a forceful lift
From your feet so strong and swift.

When exhausted, off your stride -
Quickly find a place to hide.

You have outrun bird and beast
Looking for a tasty feast.

Stamina though, not your strength,
Fearing chase of any length.

Predators indeed abound;
Eagle, fox, the man, and hound.

Threats you face are strong and fleet,
Hungry for your tasty meat.

Never one to win a fight,
Neither are you very bright.

Timid and faint-hearted too,
Scared of being served in stew.

What a fearful life you lead,
Mercy do you beg and plead.

Jump and scamper, carefree nap –
Not so wary of a trap.

Curiosity’s a curse.
Rash behavior makes it worse.

Consequences seem so cruel
For a reckless, careless fool.

Showing off before a crowd –
Boastful, arrogant and proud.

Arguing gives you delight –
Sometimes through the day and night.

Sometimes with your wit prevail.
Likely though, your plan will fail.

Chatty, happy kind of bloke,
Friendly to the other folk.

Liked by everyone it’s true.
Loyal friends are very few.

Feeling you may be the least,
Jealous of both fowl and beast.

Furry, long-eared little hare –
Often we don’t see you there."}, {"title": "A Fool", "date": "2016-03-03", "content": "I rhyme my way through life they say
And leave my cares along the way.

\"A fool\" you say that I must be —
Perhaps, I say, but we shall see.

For when I'm gone, a book will stand
A testament to all that's grand.

Or worse perhaps, my friend, I fear
The only monument - a tear."}, {"title": "Due Date", "date": "2016-03-04", "content": "I just heard that you’re expecting.
You might not know the date.
I wrote a little poem, which
Should further obfuscate.

Because you see, I bought a book
And read last night in bed,
From guesses on one hundred births,
Just one’s picked on the head.

Some say that it takes nine months,
I’ve heard some say it’s more.
Or you can count in moons or suns
Like ancient jungle lore.

But if you take your Ti leaves, and
Your Tarot’s, Crystal Ball;
Mix gently with a Rabbits Foot,
And give a Banshee call;

I’ll share with you a formula
That’s sure to promulgate
With no degree of certainty
A real live ball-park date.

If you recall the first day of
The period you had
Before they stopped completely,
Then please note it on a pad.

Now add to that just seven days.
And when you’ve got the sum,
Count backwards three months, very good,
Now write down where we’ve come.

With this date very firm in hand
You add to it a year.
And that is when they’ll pull it out…
That day or very near."}, {"title": "The Hare and the Cowherd (Aesop Ballad 16)", "date": "2016-03-05", "content": "A hunter was in hot pursuit…
The hare did dodge past log and root.

Then scampered o’er a grassy field,
And hedge he found to act as shield.

A cowherd saw the hare dive through
And so the hiding place he knew.

The hare in pleading voice did say
“Please sir, do not give me away!”

The cowherd said, “you’re safe with me
And in a moment you’ll be free.”

The hunter soon came by that way,
And asked if had passed by his prey.

The cowherd lied, “I saw him pass,
And down the road he went, alas.”

But with a smile upon his face,
He motioned to the hiding place.

And then to make the hunter think,
The cowherd gave a knowing wink.

The hunter did not get the hint,
So down the road the man did sprint.

The hare, his hiding place did leave.
The cowherd, thanks thought to receive.

The cowherd said, “my furry friend –
Your life was spared, and did not end.

It seems you owe to me a debt.”
The hare replied, “no thanks you’ll get.

For ‘though your words gave me a chance,
I saw your arm and saw your glance.

Deceipt was fully half your game.
I rather think to give you blame.

That I’m so small is just your luck,
Or both your eye’s I’d like to pluck.

---

While words may not a lie convey,
One’s actions may the truth betray.

(Index references: Oxford-Gibbs 387, Perry 22)"}, {"title": "Curiosity", "date": "2016-03-06", "content": "Father, how can you know -
Have you seen tomorrow?
Do you remember the future?
Have you seen the smile —
On children's faces yet unborn?
Am I there?
When will it be?
Don't think me impertinent —
Only curious,
To know your majesty.
And pray that I might add —
And not detract."}, {"title": "Doctor", "date": "2016-03-08", "content": "When my pregnancy first started,
I went to see the ‘Doc.’
He’s gonna cost me plenty, so
I put the house in hock.

He lets me hear the baby’s heart.
He tells me what to do.
He put the kid right on TV,
And tells a joke or two.

He lets me call him any time.
I very rarely do.
But that is what he’s there for, so
He charges for that too.

I think though that he’s worth each cent,
Yes ev’ry little bit.
For when I pop that kid out, He
Will bring his catcher’s mitt!"}, {"title": "Y", "date": "2016-03-09", "content": "While in my Youth, some years ago
While sailing on my yacht;
I pondered on the letter Y
And I learned quite a lot.

I had a Yen to see the world
And asked all I could see,
If Y was very useful — this
Is what they said to me:

On Yom Kippur, a Yarmulke,
I saw on someone's head.
He spun a Yarn in Yiddish, and
I don't know what he said.

I saw a woman on a Yak
Who wore bright Yellow shoes.
She was playing with a Yo—Yo
But had no further clues.

Don't Yawn, I'm almost finished, but
There is one more thing too.
Yes, Y's are quite important, for
Without them, there's no You."}, {"title": "Seashell", "date": "2016-03-10", "content": "Now, every seashell on the shore
Did once a home provide,
To some small creature of the deep -
A place to sleep and hide.

A refuge from the raging storm,
Relief from cold, and more;
It offered some protection from
Each threat'ning predator.

So every time you pick one up
And hold it in your hand -
Please ponder who once lived there
Underwater, in the sand."}, {"title": "A Birth With Class", "date": "2016-03-11", "content": "I signed up for some classes.
They’ll teach me how to ‘birth.’
I’ve never heard such folly,
In all my life on earth.

The Bible says four-thousand years,
And science even more,
That women have been giving birth.
What do they have in store?

I hear they teach you how to breathe,
To get more air, I guess.
And how to cope with pain a bit,
And overcome the stress.

So I will go each day to class,
And listen up real well.
That I might know just how to look,
And how to scream like hell!"}, {"title": "Wild and Free", "date": "2016-03-12", "content": "A wild donkey made his way
Across a farm one summer day.

He saw then in a stable fair
A donkey who resided there.

\"I'm jealous friend,\" he blurted out.
\"Your home is nice without a doubt -

You have nice food on which to dine,
Your muscles toned, your coat is fine.

You seem to have no stress or strife.
You're lucky to enjoy this life!\"

Then later, on a dusty road,
The captive donkey bore a load.

And as he made this tiresome trip,
A driver beat him with a whip.

The wild donkey saw the scene -
The sweaty work, the driver mean.

And as he freely grazed about,
Back to his fried he gave a shout:

\"All envy for you I have lost.
I would not want to pay the cost!\"

To live a life that's viewed as nice,
One often pays a hefty price."}, {"title": "Sacrament", "date": "2016-03-13", "content": "Remember our great God above.
Remember Christ, and His great love.

Remember each and ev’ry soul
Who comes to make their spirit whole.

Remember Christ’s great sacrifice,
As for our sins He paid the price.

Remember that we bear His name,
And gospel truth with love proclaim.

Remember to God’s law abide,
And through His grace be purified.

Remember our all loving Lord –
His Spirit will our faith reward."}, {"title": "An Offering", "date": "2016-03-14", "content": "What gift can I offer the world today?
What can I do now to brighten your way?
Perhaps something helpful my words can convey?
Something to push out the blue and the gray?

Perhaps someone's burden I'll lift for a spell?
Bring soup to the sick, and make them feel well?
Encouraging words I can lovingly tell?
Lift someone's spirits that recently fell?

Before the sun sets and gives way to the night,
Is there a wrong I can find to make right?
Can I somehow prevent a struggle or fight?
How can I share with another my light?"}, {"title": "Term Limits", "date": "2016-03-15", "content": "They're asking us this year to vote
If seats in Congress should
Be limited to some set term,
Or if this would be good.

Now on this theme, I lately feel,
To calm potential strife,
The good ones ought to get six years -
But, give the bad ones life!"}, {"title": "Seal", "date": "2016-03-16", "content": "I saw a seal sitting in
The sun out on the sea.
He'd had a half a halibut
And had no use for me.

He then dropped down into the foam
And floated by some fish.
He spied some plumpish mackerel -
A perfect luncheon dish.

Then after feasting on his food
And barking at a bird;
He waved with outstretched flipper, and
Swam off without a word."}, {"title": "The Day That Arnold J. Crumpet Did Just Disappear", "date": "2016-03-17", "content": "Poor Arnold was sad. He was so very sad.
He cried all-the tears in his eyes that he had.

His father was leaving, his father named Walt.
And Arnold believed that it all was his fault.

Arnold once said a bad word, once kicked the cat.
And once, in the laundry he put a dead rat.

And for these transgressions, he figured, of course -
His parents were going to get a divorce.

So he was quite worried and thought if he might
Be lost out of sight, things again would be right.

And so he enlisted the help of a witch,
Who lived down the street, by the side of a ditch.

He asked if she might make him quick disappear.
He said this as he wiped away a big tear.

She said that she could, but she'd rather he stay.
But he said he could not, not even one day.

And so to her store-room she hurriedly ran, 
Filled up her black cauldron and then she began:

She oofed and she poofed with a magical gaze.
And he disappeared in a very thick haze.

He looked, and indeed, he could not see his toes,
His legs or his middle, or even his nose.

Why, he was invisible! No hands or hair!
He knew not where he was, for he wasn't there.

He ran quickly home, and he did so with care.
Because, no one else could have known he was there.

His parents were worried. They stewed and they paced.
From neighbor to neighbor they quickly did race.

They asked every one if they'd seen Arnold go.
Except for the witch ... because she wouldn't know.

And then in the dark, they did come home and sit.
His mother did find Arnold's old baseball mitt.

She cried and she cried as she looked at that glove.
His father cried too, for his fatherly love.

His mother remembered (his mother Marie),
She used to bounce Arnold about on her knee.

And Walt, that's his father, did also recall,
The two of them used to play catch with a ball.

They weren't mad at him, the boy quickly did learn.
But he disappeared, and now could not return.

He just sat on the floor, feeling quite crummy.
Then a strange noise heard he, rise from his tummy.

Because of his terrible, horrible mood,
He forgot about sitting down for some food.

Before he could think what he'd like to consume,
He heard a loud noise rising up from the room.

Why his parents were fighting, fighting a lot.
And blaming each other that Arnold was not.

They yelled and they screamed, and he plainly could see
That it might be much better if parted they'd be.

And so he discovered, right there on the spot -
His parents just disliked each other a lot.

As it turned out, the witch wasn't so clever.
Her nifty spell, well, did not last forever.

And Arnold appeared, he just found himself there,
Yes, standing between the TV and a chair.

His parents were glad that he wasn't still gone.
But, father of course, would be still moving on.

And as a bright note to this tale I've spun,
Our Arnold enjoyed having two homes, not one.

And spent many Saturdays out with his dad.
And all added up, why it wasn't so bad.

And by this experience Arnold was taught;
His parents did love him, they loved him a lot!"}, {"title": "Eternal Wishes", "date": "2016-03-18", "content": "To join together, you agree,
For time and all eternity.

May all your hopes and dreams come true
And as for trials, may they be few."}, {"title": "The Will To Live", "date": "2016-03-21", "content": "Why, I could write a million words
In meter and in rhyme.
But if no one would read them, it
Would be a waste of time.

So, buy my books by trailer loads
And give them all away.
And I will have the will to live
And write another day."}, {"title": "The Fiber of Society", "date": "2016-03-22", "content": "The fiber of society
Was woven with great care.
Of fabric largely moral, which
I fear is not all there.

This fact does cause me great concern,
For should we lose it all,
Our world as we know it now
Would be quite prone to fall.

It would mean the ann'hilation
Of society and home.
And it wouldn't be the first time.
Case in point is ancient Rome.

So if the view is radical
To disdain war and sin,
I'll stand in the minority
And take it on the chin.

But please don't sit by idly as
The tapestry does fray.
We need to stand together now.
There is no other way."}, {"title": "Termites", "date": "2016-03-23", "content": "Some kinds fly in a vicious swarm,
Or wriggle on the floor.
They are a very scary bug.
Now I will tell you more:

The termite loves to chew on wood
And never gets it's fill.
It chews on rafters in your house,
Or on the window sill.

Why, they could eat your whole house up -
Eat every board and stick.
So if you see one coming, you
Should call somebody quick!"}, {"title": "Bard Work!", "date": "2016-03-24", "content": "Some say; \"a poem's easy,
To scribble on a page.
Sure, I could write a line of verse -
And it would be the rage.\"

But let me tell you, one and all,
That you would surely shirk.
When finding out how really tough
It is to do Bard Work!"}, {"title": "Play Ball!", "date": "2016-03-28", "content": "I met a man who said to me
He'd never don a mitt,
Or throw a ball to second base
Or hit it with a stick.

He said it was an awful game
A bore, and slow as goo
He said all this and even more,
I swear to you it's true.

It's not that I'm a champion,
But I'll accept the call
And line up on the baseline
And heed the yell \"play ball.\"

It's like this life we're living.
It isn't always fun.
You win some and you lose some.
They hit and steal and run.

But after every inning
The count goes back to naught
And once again you have the chance
To prove what you've been taught.

And as in 'The Beginning', it
continues to this day -
The rule that no one ever may
Up in the bleachers stay."}, {"title": "Nigel, the Knight, Had a Terrible Fright", "date": "2016-03-29", "content": "Now, Nigel the knight, was a brave lad of course.
He wore shining armour and rode a white horse.

He saved lovely damsels from towers quite high.
And dragons he fought that could breathe smoke and fly.

But when he was tucked in his snug little bed,
The scariest nightmares would fill up his head.

And when the bright lamp by his bedside went out,
He thought that he saw scary creatures about.

He'd shiver and tremble and quiver and quake,
Not anything like when the boy was awake.

For nighttime is scary for brave little knights.
As in their young minds they see many strange sights.

He dreamed of a witch on a polka dot goat,
And big purple snakes swimming out in the moat.

One night in his bed he was drifting at sea,
And another, his bed was perched up in a tree.

So he couldn't sleep well with these dreams going on,
And he always was tired and cranky at dawn.

One night from a deep sleep he woke with a start.
And out of his bedroom he quickly did dart.

He ran to his mother's and father's big bed.
They cuddled him close and here's just what they said:

\"In the morning at dawn when the sun brightly shines,
We'll visit the wizard who lives near the pines.\"

And that's what they did, in the morning they went,
And found in his cave that old magical gent.

He was brewing a brew and stopped to explain,
His mixture made clouds that would cause it to rain.

And then he announced when with this one he's done,
He'll brew up a brew that will bring back the sun.

And on all his shelves he had bottles and vials -
And other strange things in the corners in piles.

Nigel stepped up and said, please Mr. Wizard,
I know that you're busy concocting a blizzard;

But if you've a moment, it shouldn't take long,
I do have a problem, yes, something is wrong.

My parents have brought me way up to this site,
In hopes you could possibly help with my plight.

You see, said young Nigel, I can't seem to sleep.
For the most frightful thoughts in my mind seem to creep.

Well, the wizard sat down on a stool and he thought,
Then from a back—room a large basket he brought.

And from it he pulled out a furry stuffed bear,
Who wore a red jacket and had short brown hair.

The wizard then waved a black wand all around,
And made a bip—boppity-skoppity sound.

Then he handed the bear to our Nigel and said,
\"Just sleep with the bear snuggled tight in your bed.

It will frighten those nightmares right out of your mind,
But it is quite loving and gentle and kind.

Now I need to work so please go, let me be -
The bear has a thirty day wear—guarantee.\"

Then Nigel completed his chores for the day.
He put on his jammies and prayers he did say.

He jumped in his bed and he held the bear tight,
And didn't have nightmares at all through the night.

And his dreams were most pleasant from that moment on.
And all of those horrible creatures were gone.

But the wizard it seems was chased right out of town,
Because all his rain, well, it didn't come down.

So there wasn't a real magic spell on the bear,
But Nigel felt better when it was right there.

The love of a little one’s bear, so it seems,
Will keep all the monsters right out of your dreams."}, {"title": "Starfish", "date": "2016-03-30", "content": "Starfish in the tidal pool,
Starfish on the sand,
Perched there like a shining jewel,
In my little hand.

Priceless treasure from the deep
Visit here with me.
I'll return the favor, and
Toss you out to sea."}, {"title": "School Prayer", "date": "2016-04-05", "content": "Dear God, I humbly to thee pray:
And thank thee for this day,
For this great land of liberty,
And for each sunshine ray.

I'll have to end my prayer now, Lord
I'm getting close to school.
And they won't let me pray there now
It is against the rule.

Like Daniel, who for prayer was cast
Into the lions den.
I fear they might expel me, thus
I'll have to say, Amen."}, {"title": "Meteor", "date": "2016-04-06", "content": "When brilliant star, up in the sky,
Does t'ward the earth in glory fly;
Although on impact gives a shock,
The end result; an ugly rock.

And so it is in life it seems,
Reality must uproot dreams.
And hopes against the rocks do crash
When with the facts they harshly clash.

Thus, this advice I have for you,
As in my life it's proven true;
A remedy for undue grief
That from a fall, might find relief.

When Idols in your life do light,
Quick! elevate them out of sight.
On pedestal they should remain,
Before they cause you any pain.

And this is why, my little friend,
I've chosen to, this message send:
When under any scrutiny
Your idol's faults you'll surely see."}, {"title": "Rabbit Test", "date": "2016-04-08", "content": "I thought that I was pregnant,
And wished to ascertain
If I should call the doctor -
And brace myself for pain?

I wandered to the market,
A dozen tests to buy.
(I thought I'd need the practice -
Don't ask, I don't know why.)

It's just like high school chemistry.
There's test tubes, cups and more.
I think there's a diploma too,
If on the test you score.

It's easier than drawing blood.
A lot less painful too.
You just put urine in a cup,
And watch the strip turn blue.

May mother told me way back when,
A thousand years ago,
They used to kill a rabbit ...
I thought you'd like to know.

But then because of activists
They found another way.
I guess perhaps it's nicer,
Whatever works ... they say."}, {"title": "Drill", "date": "2016-04-12", "content": "They shout a lot about the way
The oil business works.
That all they want are profits, and
In sum are only jerks.

They don't want them to drill the coasts
Or tanker ships to spill.
Or send our boys to fight for it.
But tell me, where's their will?

Their world is made of plastic
They waste it, as a rule.
They climb into their motor cars
And burn up tons of fuel.

So if you want to criticize,
And drilling want to quit.
Then tell us with your actions —
Don't be a hypocrite!"}, {"title": "Shark", "date": "2016-04-13", "content": "Could there be a shark below?
You say, you will never know?
For fear has overcome you
And you dread to venture in?

Well, they tell me (those who know)
It's quite safe, and they can show;
That sharks will likely never
Even nibble on your toe.

And I'll share a little tip
To loosen fear's strong grip,
When swimming in the ocean -
Keep a buddy by your hip."}, {"title": "Have You Heard?", "date": "2016-04-15", "content": "She told me that she had some news
To share with me today.
Then without hesitation, she
Did voice her thoughts and say:

“We’re going to have a baby;
I don’t know when or where.
But since you’ll have to change its pants,
I thought you might just care.”

To some a revolution or,
An earthquake, or a fire,
Would on the nightly evening news
A bulletin require.

But never in my life have I
Heard such a wond’rous fact.
And I could hardly manage to
My senses keep intact.

And so we grasped each other tight,
We might have even cried;
In reverence to this blessed day,
And what she held inside."}, {"title": "Discovery", "date": "2016-04-19", "content": "I saw an item in the news,
That brightened up my face.
Our nation's still committed to
Discovery in space.

I don't know what is out there, or
Just what we'll likely find.
It might cost us a fortune, but
I do not really mind.

It seems that in the distant past
The people who did well;
Looked over the horizon - on
The past they did not dwell.

So here's to Cook, Columbus,
Admiral Peary, Richard Byrd,
Earhart, Armstrong and a host
Of names we've never heard."}, {"title": "Z", "date": "2016-04-20", "content": "We've Zoomed right through the alphabet,
Some questions though remain.
Do Zebras eat Zucchini in
The Zoo out in the rain?

You guessed quite right, the letter left
To introduce is Z.
And now it's done I thank you all
For spending time with me!"}, {"title": "The Toxic Inhalers of Planetoid Zim", "date": "2016-04-26", "content": "Just three light years away and a few miles more,
There's a planet called Zim in the orbit of Zor.

Now it used to be pleasant to visit that sphere,
But now hardly anyone ever goes near.

The beaches are white and the water is warm
And tourists would flock there, they'd come in a swarm.

But some years ago, if my brain's working right,
Began a most tragic, lamentable plight.

When a fellow with brains, just the size of a pea
Did drink toxic waste, for its outcome to see.

He then turned quite green, an unusual hue,
And then everyone tried it, no, not just a few.

They all drank toxic waste, 'cause it made them turn green -
Not a neon or forest, but aqua-marine.

Now the king, he was outraged, and firmly decreed,
That all would be punished who did this strange deed.

But they did continue, and some rumors did bloom,
Yes, that even the king drank it up in his room.

But the stores couldn't sell it, well that was the law.
You just only could buy it from gangsters you saw.

And they sold so much that they all got quite rich,
And they killed anybody they thought was a snitch.

To make toxic waste, they built sev’ral reactors
And this caused some other quite dreadful bad factors.

Because ev'ry so often one might just explode,
And the people would die as they walked down the road.

But the gangsters just kept on, they weren't gonna stop.
And the tourism industry suffered a drop.

Because if you went there, one quickly would learn,
Well, the chances were good you might never return.

It is here that my story does really begin
Of a small little creature named Sally Z. Prim.

Now our Sally was tiny, but had a big brain,
And she was the only one there that seemed sane.

When she went on her walks, which she did ev'ry day,
All the people would tease her and loudly would say;

\"Dear Sally please try some, you can be green like us!\"
But she couldn't see what could be the big fuss.

So she asked why they drank it, they said, \"Cause its cool.\"
And the shocked litle girl answered, \"I'm not a fool.\"

As the medical research declares that its bad,
And its stupid to die on behalf of a fad.

But they wouldn't stop, cause they had so much fun.
And they loved to turn greeen while they sat in the sun.

Then one day it happened - you thought that it might.
I saw it myself and it was quite a sight.

As each one of the people who drank toxic waste
In the sun melted into a pool of green paste.

Yes they each just became a small pool of green slime,
And it happened to each of them, one at a time.

When the first ones dissolved, they just thought it was funny,
But no one enjoys turning liquid and runny.

Then everyone yelled and they shouted and cried,
Until they felt oozy and squishy inside.

'Til soon Sally had to start wearing galoshes,
And rather than comments, she only heard sploshes.

And soon there was no one on planetoid Zim -
Except for, of course, our enchanting Miss. Prim.

The last time I stopped by the planet of Zim,
I saw Sally cleaning the beach for a swim.

And soon I am sure that it will be quite pretty ...
A beautiful beach with a bright shiny city.

And the tourists will come as they used to come once,
And Sally will profit, for she's not a dunce!"}, {"title": "Blowfish", "date": "2016-04-27", "content": "I saw a little blowfish,
Just swimming in the sea.
He wasn't much to look at, though,
Until he looked at me.

He thought that I would eat him, and
Although it wasn't true,
He blew himself like a balloon,
And grew, and grew, and grew.

He now was much, much larger,
And scary looking too.
And I will end this poem here,
As now my story's through."}, {"title": "Ode to a Tortoise", "date": "2016-05-04", "content": "Crawling down the trail slow,
Always with your shell you go.

Not concerned with speed or grace,
Keeping just a steady pace.

And your funny knees and feet
Serve you well in rain or heat.

All alone inside your shell –
Safe, protected very well.

Only if your shell they crack
Do you fear a foe’s attack.

Some would say you wear a frown.
Helpless when you’re upside down.

Slow to act, but quick to rage –
Living to a ripe, old age.

Devious and clever too –
No one plays a trick on you.

Watching others hurry by
On the ground and in the sky.

‘Though you seem a little stern,
Sometimes for adventure yearn.

Meek, and shy, and quite polite –
For a creature, fairly bright.

With your firm resolve and pride,
Teasing you will not abide.

Competitor, through and through -
Striving hard at all you do.

Shouting out with joy and glee,
When from worries you are free.

Not weighed down with care and strife,
Mostly just content with life.

By yourself, no need to roam –
Happy just to stay at home"}, {"title": "A Mother's Love", "date": "2016-05-08", "content": "A Mother's love,
Her caring heart;
She gave to us
Her better part.

Her role unmatched,
She served with love;
Our conduit
From heav'n above.

She nurtures too,
With careful spade,
As infants grow
With loving aid.

A tribute grant
We her today,
For love and care
We can't repay."}, {"title": "Back and Forth", "date": "2016-05-10", "content": "I Watched the candidates debate,
And state their point of view.
They talked for quite a lengthy spell,
But I heard nothing new.

They quoted numbers back and forth
That didn't mean a thing.
And told us all the wonders that
The next four years might bring.

But if you think it means a thing
You're more naive than me.
They all sound equally as bad,
Just wait around, you'll see.

image Credit:"}, {"title": "Downtrend", "date": "2016-05-17", "content": "I've seen the signs for some time
Outside, and on T.V.,
Our nation is not doing well
Now, economically.

It is a global problem too,
And though tough times we face,
To have some challenges right now
Is really no disgrace.

The government can't fix it — is
There anything they could?
But if we make the best of it,
Some day things will be good."}, {"title": "Mr. President", "date": "2016-05-24", "content": "Beneath the spacious skies, I hear
Our nation did elect
A President to lead us, and
To give our full respect.

I must admit, I didn't put
A check beside his name.
But I wish all the best for him
And all should do the same.

And work to strengthen our great land
A little more each day.
A place where we can prosper, and
Our grandchildren can play.

So Mr. President, I ask,
Please don't deny our trust.
We've chosen you to guide us and
The job fulfill, you must."}, {"title": "Birthday Rhyme", "date": "2016-05-27", "content": "Dear daughter on your birthday, I
Would like to pen a little rhyme.
To share with you my love and say,
How quickly has passed by the time.

A year ago through heaven's veil,
You flew into our warm embrace.
And you have brought us peace and joy
With every smile upon your face.

As now you learn to walk and talk,
And roll a ball along the floor;
Please know dear one from heaven sent,
I couldn’t love you any more."}, {"title": "MIA", "date": "2016-05-30", "content": "I've lost my keys, I've lost a shoe,
But thanks to heav’n above
I've never in a bloody war
Lost someone that I love.

But worse than that, if it could be
Instead of their demise.
Not knowing if in jungle camp
The Lord does hear their cries.

In this cold world, of rhetoric
I earnest hope and pray
That we might somehow, somewhere find
Each cherished MIA."}, {"title": "A Tentative Peace", "date": "2016-05-31", "content": "I'm sure that I would rather see
The earth in peace and harmony.
And notions of a bloody war
Be nothing more than ancient lore.

But in this world of great distrust
It seems that some, to kill, do lust.
And for all man as one to come,
We'll have to kill those vermin scum!

‘Though short of that, a good defense -
An S.D.I. might make them tense.
Or even just a gun or club,
A fleet of tanks, a trident sub...

I wouldn't want to use them though,
Just have them close to scare the foe.
That home and family be safe,
Should world tensions start to chafe.

Remember many men have died
That we in freedom might reside.
Thus to maintain this resolutely
I feel is our inherent duty.

And 'though I pray each night for peace,
I doubt that war will ever cease.
And so I hope that few will die,
As for each one, a tear, I'll cry."}, {"title": "Sunburn", "date": "2016-06-01", "content": "I basked out on my beach mat,
And felt the sun so hot.
My mother said I'd been out long
Enough, and I said \"Not!\"

She said I'd better come inside
And wash my sandy feet.
But I just wished to lay there more,
To revel in the heat.

Well, first my skin turned pinkish white,
And then a shade of red.
And now I cannot move an inch,
As I lay here in bed.

My mother was, of course, correct.
And I should have obeyed.
But under ultraviolet rays
I misbehaving stayed.

I feel like I am burning up.
My mother says I'll peel.
But I'm just hoping someday soon,
I will not like this feel."}, {"title": "A Proper Time", "date": "2016-06-07", "content": "My son is tugging at my arm
To play with him some ball.
I told him I was writing now -
My readers to enthrall.

I want to share my deep concerns
On Corp’ral Discipline.
And though effective it might be,
It really is a sin.

My son is quite emphatic though,
And makes it hard to write.
I told him ‘take a chill pill,
Hang out right now, sit tight.’

…And now as I was saying,
There never could be cause;
To whip an offspring with a belt
Or smack him ‘cross the jaws.

Oh, now the brat is on the desk
And yelling in my face.
And I’ve decided spankings have
A proper time and place."}, {"title": "Undertow", "date": "2016-06-08", "content": "I sat out on the sand a while,
And got a little hot.
And thought I'd take a little swim.
Of course, you say, why not?

I waded out into the surf,
And felt the current tug.
If I'd been in my bathtub, I
Would simply pull the plug.

But this was not a bathtub,
And I was headed out.
I would have found a desert isle,
Had I not turned about.

The undertow had caught me,
And pulled me with its might.
Now it took ev'ry bit of strength,
But with it I did fight.

I won the battle this time.
But sprawleed out on the sand,
I vowed I'd warn my little friends
To stay back on the land.

And if you some day venture out
Into the mighty sea -
Please hold your mom's or daddy's hand.
This lesson learn from me."}, {"title": "Misplaced Sand", "date": "2016-06-14", "content": "Sand is in my hair and nose,
In my shorts and 'tween my toes,
On my arms and back and knees.
Will you clean the sand off please!

Sand belongs around a lake,
Deserts too, make no mistake,
On the ocean's shing shores.
But no sir, not inside my drawers!"}, {"title": "Waves", "date": "2016-06-15", "content": "Crashing waves along the shore -
One, then two, then millions more;
Shaping coasts of rock and sand,
Claiming victory over land.

Playing with you now my friend,
Cool refreshment you do send.
You retreat, I venture in ...
Then I run to save my skin!"}, {"title": "Blighted Bay", "date": "2016-06-21", "content": "The other day, I thought I would
Go swimming at the beach.
But when I walked out on the sand
The lifeguard made a speech.

He said we could sit in the sand
And look around, you know...
But in the cooling water we
Could not this weekend go.

Bacteria had leaked all out
And spread around the bay.
But in a day or two with luck
We'll swim again, they say.

I only worry that if we
Do not our bay treat right,
It will not be a playground; but
A smelly, ugly sight."}, {"title": "Five Rocks", "date": "2016-06-22", "content": "Five Rocks in the ocean sprinkled,
Clouds are floating in the sky.
In the Valley - old Lāʻie.
On the Point, the time drifts by.

Tradewinds blowing through the palm trees.
Waves below us constant churn.
Soon we'll cross the many waters,
But again we will return."}, {"title": "Beach Trip", "date": "2016-06-28", "content": "I asked my mother if we might
Off to the seashore go.
She said; \"my dear, of course we may
But we must pack, you know.

A cooler for our soda pop,
A sandwich and a snack,
A lotion bottle for your nose,
Another for your back.

A jacket if it's cold outside,
Some shorts in case it's hot,
A surfboard if the waves are big,
A beach-ball if they're not.

A colorful umbrella, and
A beach mat made of foam...\"
You know, I think I'd rather stay
Right here, and play at home."}, {"title": "Surf's Up", "date": "2016-06-29", "content": "They walk upon the water, and
They dance above the waves.
And from the girls on the beach
Get accolades and raves.

They call their surfboards guns and sticks
And rub on lots of wax..
Then paddle past the breakers, and
Just sit back and relax.

So when a big one's on its way
They race the coming bulk.
Then slash the face and bottom turn
And face the massive hulk.

And then they cut and shoot the tube,
To feel the power there.
From there they pull out on the face,

let filtered = [...POEMS];
let currentIdx = null;

function formatDate(d) {
  const [y, m, day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(m)-1] + ' ' + parseInt(day) + ', ' + y;
}

function renderList() {
  const sidebar = document.getElementById('sidebar');
  const info = document.getElementById('results-info');
  info.textContent = filtered.length + ' of ' + POEMS.length + ' poems';
  
  if (filtered.length === 0) {
    sidebar.innerHTML = '<div class="no-results">No poems found</div>';
    return;
  }
  
  sidebar.innerHTML = filtered.map((p, i) => `
    <div class="poem-list-item ${currentIdx === i ? 'active' : ''}" onclick="showPoem(${i})">
      <div class="poem-list-title">${p.title}</div>
      <div class="poem-list-date">${formatDate(p.date)}</div>
    </div>
  `).join('');
}

function showPoem(idx) {
  currentIdx = idx;
  const p = filtered[idx];
  
  // Format content into stanzas
  const stanzas = p.content.split(/\n\n+/);
  const stanzaHtml = stanzas
    .filter(s => s.trim())
    .map(s => `<div class="poem-stanza">${s.trim().replace(/\n/g, '<br>')}</div>`)
    .join('');
  
  const viewer = document.getElementById('viewer');
  viewer.classList.remove('empty');
  viewer.innerHTML = `
    <div class="poem-header">
      <div class="poem-number">Poem ${idx + 1} of ${filtered.length}</div>
      <div class="poem-title">${p.title}</div>
      <div class="poem-date">${formatDate(p.date)}</div>
    </div>
    <div class="poem-body">${stanzaHtml}</div>
    <div class="poem-author">— Thayne Whipple</div>
    <div class="poem-nav">
      <button class="nav-btn" onclick="showPoem(${idx - 1})" ${idx === 0 ? 'disabled' : ''}>&#8592; Previous</button>
      <button class="nav-btn" onclick="showPoem(${idx + 1})" ${idx === filtered.length - 1 ? 'disabled' : ''}>Next &#8594;</button>
    </div>
  `;
  viewer.scrollTop = 0;
  
  // Highlight active in sidebar
  document.querySelectorAll('.poem-list-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  
  // Scroll sidebar to active
  const active = document.querySelector('.poem-list-item.active');
  if (active) active.scrollIntoView({ block: 'nearest' });
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort').value;
  const filter = document.getElementById('filter').value;
  
  filtered = POEMS.filter(p => {
    const matchQ = !q || p.title.toLowerCase().includes(q) || p.content.toLowerCase().includes(q);
    const matchF = filter === 'all' || 
      (filter === 'aesop' && p.title.includes('Aesop')) ||
      (filter === 'other' && !p.title.includes('Aesop'));
    return matchQ && matchF;
  });
  
  if (sort === 'date-asc') filtered.sort((a, b) => a.date.localeCompare(b.date));
  else if (sort === 'date-desc') filtered.sort((a, b) => b.date.localeCompare(a.date));
  else filtered.sort((a, b) => a.title.localeCompare(b.title));
  
  currentIdx = null;
  renderList();
  
  const viewer = document.getElementById('viewer');
  viewer.className = 'poem-viewer empty';
  viewer.innerHTML = `<div class="empty-state"><div class="big-quote">"</div><p>Select a poem to read</p></div>`;
}

document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('sort').addEventListener('change', applyFilters);
document.getElementById('filter').addEventListener('change', applyFilters);
document.getElementById('random-btn').addEventListener('click', () => {
  if (filtered.length) showPoem(Math.floor(Math.random() * filtered.length));
});

// Init
applyFilters();
// Show first poem on load
if (filtered.length) showPoem(0);
</script>
