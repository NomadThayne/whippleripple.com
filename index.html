<style>
  :root {

<script>
const POEMS = [
{"title":"Writer's Block","date":"2015-07-01","content":"I thought to write some lines of verse,\nBut blank page glared and I did curse.\nMy mind went blank, my ears did steam,\nI couldn't even choose a theme! \n\nAnd so I took a walk outside,\nThrough woods for inspiration stride...\nBut mind would just not cerebrate,\nA situation that I hate -\n\nBut have grown quite accustomed to,\nAs my brains often turn to goo.\nAnd so it seems I'll leave the page\nAs white as snow and sit in rage."},
{"title":"Motion","date":"2015-07-02","content":"In constant motion, here to there,\nBy boat and train and now by air.\nI can't imagine any need\nAnd so to stop I humbly plead.\n\nI think it happened long ago.\nExactly when I do not know.\nThat with location discontent\nThey means of travel did invent.\n\nAnd ever since, the problem grew,\nSo now I'll state my case to you.\nOr, plead it, may be better said\nAs I do this situation dread.\n\nAt first 'twas simple I agree\nWhen people wished the world to see,\nOr seeking opportunity,\nOr wanting somewhere else to be, \n\nThey simply packed their bags and left.\nAnd leaving friends a bit bereft\nThey forward trudged along their way\nUntil they found a place to stay.\n\nBut now they're moving everything.\nThey food and clothes and houses bring\nFrom far off corners of the globe.\nAnd this is what I wish to probe.\n\nSo malcontent the world does seem\nAnd fringing on the quite extreme.\nThey've started moving streets around,\nAnd even large pieces of ground.\n\nThe whole idea is simply mad.\nI'm hoping it's a passing fad.\nThe world involved in such a tizzy,\nI'm feeling just a little dizzy.\n\nIn constant motion, here to there,\nBy boat and train and now by air.\nI can't imagine any need,\nAnd so to stop I humbly plead!"},
{"title":"Over-extrapolation","date":"2015-07-03","content":"The poets, novelists, and scribes\nOf yester-years gone by\nBegan to fill the world with words,\nThe land, the sea, and sky.\n\nThe process has continued on,\nThe writers, multiplied.\nAnd with every sentence, phrase, and book\nI grow more terrified.\n\nYou see, they're taking over.\nThey're filling up my mind.\nAnd if we don't control them now\nWe'll be in quite a bind.\n\nThey're flying ‘round my study,\nAnd lurking in the halls,\nAnd filling up the crevices\nIn ancient village walls.\n\nThey're marching on my bookshelf,\nA military troop.\nAnd next they'll fill the kitchen, STOP!\nWhat is this in my soup!?!\n\nNow I've devised a clever plan\nTo keep them on their guard.\nWe'll tie up all the writers\nAnd cinch the rope up hard.\n\nAnd hence eliminate the source,\nTo aid in its demise.\nAnd not allow one blasted word\nBe written ‘till one dies.\n\nThe libraries will close their doors.\nThe erudite will weep.\nAnd though a little harsh appears,\nThe silence it will keep.\n\nAnd so with pen and paper, I,\nAround the world will state;\nThe dangers of the written word,\nAnd journalists berate. \n\nThen lengthy manuscripts I'll pen\nAdmonishing the crowds,\nThat they should ever cautious be\nOf rhetorical shrouds.\n\nBut oh alas, I'm guilty too,\nAnd with the rest condemned.\nThen just to justify myself,\nThe rules I've set, I'll bend. \n\n(attached note)\n\nBut not to fear, the just is just\nAnd tales all must end.\nI found this note one day, you see\nWhile visiting a friend.\n\nHe didn't answer at the door.\nThe blinds had all been shut.\nI couldn't find a trace of life\nWithin his cozy hut.\n\nBut on his desk this note was left\nAside his uncapped pen.\nAnd large cases of erasers\nFilled up his tiny den.\n\nNow some said he was crazy,\nOr better yet a fool.\nBut I don't think he chose to die\nBy drowning in his pool."},
{"title":"Exhortation to the Enlisted","date":"2015-07-04","content":"'Tis heroic to charge into battle.\n'Tis noble to die for the right.\nBut it requires a far greater person\nTo linger and valiantly fight.\n\nIt is courage, I ask, my dear fellow.\nTo wield your sword brave and true.\nTo remember the cause that we fight for\nAnd never give up ‘til it's through.\n\nThen after you've dealt with this conflict, and\nPer chance the opponent's retreat;\nYou may wish to relax for a moment\nAnd relish the victory sweet.\n\nOr perhaps you might lose this small skirmish\nAnd forced by the foe to retrench,\nYour once noble courage now waning, and\nThe victory sweet's now a stench.\n\nBut whatever the day's final outcome\nAnd whether we live or we die\nI ask you my friend to remember, that \nThe conflict is constantly nigh. \n\nWe therefore must never surrender, and\nThere's really no time for a rest. \nWe need always remain at our vigil \nAnd ceaselessly strive for our best."},
{"title":"Progress?","date":"2015-07-05","content":"Although modern innovation Is a marvelous sensation,\nA phenomenon of sorts has come about:\n\nWith space age new appliances,\nWe've shed our old reliances\nOn perspiration; and this fact we tout.\n\nAs we'd rather wear our ruffles\nAnd consume our share of truffles,\nHence our middles are now growing rather stout.\n\nSo then we join a super gym\nTo keep our bodies fit and trim\nYet still our blooming waistlines make us pout.\n\nAnd our savings are depleted\nFrom all these things we've needed\nTo maintain in our society some clout.\n\nMy final question is; would we,\nSave time, our cash and energy\nIf chores we did do manually,\n\nAnd thus I'll cease this silly verse to spout."},
{"title":"The Wonderer","date":"2015-07-06","content":"I sit here in my little room\nWith thoughts of economic theory,\nUntil my feeble little mind\nBegins to grow a trifle weary. \n\nAnd so I ponder life some more\nAnd ask myself, what it's all for.\nThen hope that past this complex bore \nWe'll realize there's something more. \n\nThat ‘ics and ‘isms, theories, schemes,\nAre not the stuff that make up dreams.\nAnd ‘though with institutions teems,\nLife may be saner than it seems. \n\nFor isn't it concern and love\nFrom fam’ly, God and cherished friends,\nThat bring real meaning to our life;\nAnd on which more our life depends."},
{"title":"At Anchor, One Evening","date":"2015-07-07","content":"The greyish mist now darker grows,\nWhile I at bay may now repose.\nThen closer ‘round my jacket wrap\nAnd readjust my well-worn cap.\n\nAlone I sit aboard my ship,\nFar from my tiny home port slip;\nReflecting on my journey here\nAnd why I left my home so dear.\n\nTo seek adventure, truth and fame?\nWas this in fact my foremost aim?\nOr was it for my soul to tame?\nIn search of love, perhaps, I came?\n\nBut I suppose I'll never know\nExactly why I onward go,\nOr which of all the ports I'll see\nOr who I'll choose for company.\n\nI only know that when I wake\nThis little craft I'll with me take.\nAnd as these shores I leave behind,\nSome unknown world I'll surely find."},
{"title":"The Clock","date":"2015-07-08","content":"(An adaptation of a theme which I chose myself and upon which I have now elaborated.)\n\nThe clock ticks on, day after day,\nIt has since Adam's time they say,\nBut what is time? And who are they?\nAnd let it stop, oh please, I pray.\n\nFor time is nothing but a clock — a dumb machine.\nPlease let it stop.\nIt says get up! to go to bed! to go to work!\nOh how I dread that ticking, ticking of the clock\nAs seconds pass and hours fall behind me.\nI'd rather live my life in peace,\nWithout that chiming, ringing beast.\nIt clings! It grabs! It chokes my wrist!\nIt lurks in corners of my room,\nOn table tops, in village shops,\nAt school, at work ... I want to shirk.\nBut still it leads me on.\nAnd I must follow.\n\nWhat man or beast created this –\nA lifeless hunk of metal scrap\nThat leads my life ... my ...\nBut wait, it lives! Or am I daft!?!\nIts hands are moving round and round,\nIts face is staring at me now.\nAnd yes, it even talks,\nOr ticks as I should rather say.\nBut either way, it lives, and leads us all.\nIt tells us to be born and die.\nIt tells us when it's time to cry.\nBut now I'll close this short refrain,\nI'm beckoned by my watch again.\n\nAnd on it ticks, day after day,\nSince Adams time, or so they say.\nBut what is time? And who are they?\nAnd let it stop, oh please, I pray!"},
{"title":"The Kite","date":"2015-07-09","content":"Above she floats, she soars and flies.\nHer colors vibrant grace the skies.\nAnd through the strata does she rise;\nBeyond the length of twine she tries. \n\nYet bounded by that cursed string\nShe cannot t'ward the heavens fling.\nBut rather tethered to the ground,\nAs if by chain, a hostage bound. \n\nSo for her freedom she did fight\nThat by the grace of God she might\nDrift ever upward, out of sight.\nBut even more the cord drew tight. \n\nThen she with her full strength did strain\nTo rend that blasted string in twain.\nAnd with a twist and windy flap\nThe sinews of that line did snap. \n\nThen for a moment she did soar,\nBut kites sans strings may fly no more.\nAnd so from lofty heights did drop\nTo earth below without a stop. \n\nWhere she did light atop a tree,\nReduced to colorful debris. \nAnd thus it stands; ‘though strings may tie,\nWithout them we might never fly."},
{"title":"Freedom of Thought","date":"2015-07-10","content":"Although you may my ankles bind, \nAround my wrists your chains do wind; \nI'll never truly be confined. \nFor you can never stay my mind. \n\nMy thoughts may go where e'er they will- \nMy deepest fantasies fulfill. \nAlthough my body lies here still. \nIdeas, you may not ever kill. \n\nI, to the dungeon you may send. \nIn vain you try my will to rend, \nBut always, I'll my dreams defend. \nAnd thus this poem I will end."},
{"title":"My Friends, The Dreamers","date":"2015-07-11","content":"A world without dreamers - \nI cringe at the thought. \nWho scoff at the standards, \nPut counsels at naught; \nWho stare into space \nAll day and all night;\nAnd whose friends think they're crazy, \nAnd maybe they're right. \nBut I'll always love dreamers, \nThey're idols for me \nAnd I dream to someday \nA great dreamer be.\n \nThe arts and the science, \nThe planes and the trains, \nAre all due to dreamers \nWhom history proclaims \nHad courage above and beyond \nThat of the call, \nAnd made that which is great \nOut of what once was small. \nThey thought and they sat, \nThen they sat and they thought. \nAnd they worked 'til one day \nA discovery they brought \nTo a world full of skeptics \nAnd dreamer beraters \nWho laughed at our friends \nThe new concept creators. \nBut the dreams, they came true \nAnd though say what you may, \nThe world's a much happier \nPlace now, today.\n\nFrom Tchaikovsky and Bach \nBy whom great works were wrought;\nDon Quixote of old \nWho the great windmills fought, \nThen Aesop the writer of Many a fable,\nKing Arthur who founded \nThe famous Roundtable. \nThere've been many a dreamer \nBy whom great works were done \nAnd of course quite a few \nWho were laughed at and shunned. \nBut the fact still remains \nAnd is proven each day, \nWhich the annals of history \nMost clearly display: \nThat while many may ridicule, scoff, and dismay \nIt's the dreamers who \nCreate the future today. \n\nA world without dreamers — \nPlease silence the thought. \nWho scoff at the standards, \nPut counsels at naught; \nWho stare into space \nAll day and all night; \nAnd whose friends think they're crazy \nAnd maybe they're right. \nBut I'll always love dreamers, \nThey're idols for me. \nAnd I dream to someday \nA great dreamer be."},
{"title":"A Little Opposition","date":"2015-07-12","content":"There is something in a sunset \nThat makes me want to stay, \nAnd watch the colors in the sky \nForever and a day. \n\nThere are walks along the seashore \nI wish would never end; \nAnd I treasure quiet moments \nAlone, or with a friend. \n\nAnd it's times like these that help us \nTo make it through this life; \nTo overcome our struggles, and \nTo cope with stress and strife. \n\nBut were it not for crisis, and \nThat same old daily grind; \nThe constant dread of deadlines, and \nThe fear that we're behind, \n\nI suppose they wouldn't mean much, \nAnd though nuisances annoy, \nIf we never felt the sorrow \nWe could never know the joy."},
{"title":"The Girl on the Beach","date":"2015-07-13","content":"I see her sitting on the beach,\nThe sunlight in her hair.\nThe world appears within her reach,\nShe doesn't have a care. \n\nHer thoughts, I'm sure, are far away,\nAs gulls land by her side.\nThe crabs dance swiftly, as they play,\nTo flee the rising tide.\n\nUndoubtedly she dreams that some \nIdyllic prince appear. \nThen on his white horse boldly come\nAnd take her far from here. \n\nSo as I view her from afar,\nI dream she thinks of me.\nThen to her on my white horse ride.\nHer dream prince I would be. \n\nBut I have found that sitting out\nBelow the mid—day sun\nAffects my rationality\nOr brain damage is done. \n\nFor as the fabled dream prince, I\nAlong her side did stride \n(I never had a white horse, so\nThat's why I didn't ride). \n\nAnd then I rather dashingly\nDid sit alongside her.\nShe gathered her belongings and\nDid quickly disappear."},
{"title":"The Poet's Plant","date":"2015-07-14","content":"I have a plant that ceaseless crawls\nAcross my desk and up the walls. \nEspecially it takes delight \nIn growing t'ward a source of light. \n\nIt will not yield this constant aim,\nAlthough with shears its growth I tame.\nBut rather with a vengeance rare \nIt seems to reach more quickly there. \n\nI pondered on this plant awhile \nAnd thought to emulate its style. \nI should reach also for the light;\nWith courage strive to do the right.  \n\nExample I might set for all \nIf in the truth I posture tall. \nThat clear be heard a new descant, \n\"In truth, the poet and his plant.\""},
{"title":"The Wind - part one","date":"2015-07-15","content":"Oh lovely wind I sing your praise,\nFor always you my spirits raise.\nWhen rain-filled clouds you take away,\nAllowing sunlight in my day.\n\nOh wond'rous wind I marvel how\nYou do the world pow'r endow.\nThe sailing ships you take to sea,\nThen create electricity.\n\nOh pleasant wind my chimes you ring\nAnd carry fragrances of spring.\nYou cool the tired worker's face;\nInspire the poet with your grace.\n\nOh artful wind the leaves you churn -\nKaleidoscopic pictures turn.\nAnd fields of grain below you dance.\nThe hardest soul you thus entrance."},
{"title":"The Wind - part two","date":"2015-07-16","content":"Oh hind'ring wind, my way you slow;\nThe papers off my desk do blow.\nThe leaves from off my trees you tear,\nAnd then you leave without a care.\n\nOh awful wind, the storm you bring;\nWith raindrops soak, with hail sting.\nThe birds you drive out of the sky.\nThe fragile land you set awry.\n\nOh horrid wind of days of old;\nThou courier of sleet and cold.\nThrough flesh and bones you drive the chill.\nI plead that thou would now be still.\n\nOh vicious wind, at breakneck speed\nTo lands and homes you give no heed.\nAnd when you're done, a ruin leave,\nThat we alone and homeless grieve."},
{"title":"H 2 Eau","date":"2015-07-17","content":"Steamy jungle heat\nWet with storms and stagnant pools,\nLike a mirage rising\nFrom a desert lake,\nMist from cascading waterfalls,\nAnd pounding ocean breakers;\n\nThe essence of water\nFree from the impurities of\nDust and plant and beast\nGently rising through life-giving air.\n\nBonding with common elements\nTo form a hint of hydration,\nA wisp of wetness.\n\nRising through the strata\nCarried on trade-wind and jet stream.\nTraces of global civilizations\nUnited in a fluid dance,\nJoining together and drifting apart.\n\nTumbling, diving and reaching\nToward the heavens,\nIn silence and serenity.\nThen sparking the imagination.\nUnleashing thunderous groans.\nSpiraling in pain and destruction.\nUntil it can grow no more …\n\nThen bursting, breaking, gushing\nIn tears of joy and pain.\nGently released then \nGathering in momentum and size\nTo nourish once more\nA parched throat,\nA withered leaf,\nAnd a new season of life."},
{"title":"Loyal Pen","date":"2015-07-18","content":"Oh pen, what tool of wonder thou.\nWith you I write your praises now.\n'Though greater than the mighty sword,\nYou patiently my thoughts record.\n\nHow dull you must believe I am,\nAs rubble to a polished gem.\nHow crude my strokes with you I draw,\nMy aimless rambling, rife with flaw.\n\nI do have pity for your plight.\nFor in another's hand you might\nGreat works of literature send\nOr noble cause with strength defend.\n\nBut loyal at my side you stand\nPrepared to follow each command.\nThus dutif'lly your ink you give;\nThe life blood which allows you live.\n\nAs senselessly I babble on\nYour mission in this world, a pawn.\nFor 'though I know you'll soon run dry,\nI force you write until you die.\n\nPhoto Credit: takis kolokotronis"},
{"title":"Testimony","date":"2015-07-19","content":"Seeking an assurance of truth,\nI follow paths \nWorn well by wiser souls.\nDigging through dust, debris and clay\nTo lay a foundation on the bedrock of my soul.\n\nLike planting seeds,\nAnd causing water flow\nThrough parched and dusty fields\nMorn’ and evening for a\nHarvest yet unseen.\n\nAnd in my wanderings, \nI happen upon stones\nOf miracles and faith.\nEvidencing the unseen, \nAt unexpected times.\n\nThe edges rough \nMust now be chiseled smooth.\nAnd placed with care \nIn the foundation \nOf my heart.\n\nI gain proficiency \nAdding stone on stone\nAnd line upon line;\nUntil the walls are formed\nAnd roof set firmly o’er my head.\n\nMy spirit’s temple.\nA holy haven where\nI might find solace for my soul;\nThat God might bless \nAnd leave His spirit there.\n\nLike as a flame in the hearth,\nWhere loaves are baked\nFor light and life and\nNourishment to feed\nThe spirit grown within;\n\nA sacred site that I\nWith weary travelers may share\nTo seek refreshment, peace and rest.\nAs their foundations now are dug.\nAnd stones of sacrifice are hewn."},
{"title":"Black","date":"2015-07-20","content":"Black is bats up in the sky,\nCoal and tar and household fly,\n\nCaves and forests after fires,\nMagic hats and tractor tires,\n\nOil, records, holes in space,\nZebra stripes, a racoon’s face,\n\nBugs like roaches, beetles, ants,\nHorses, sheep, a preacher’s pants,\n\nBurglar's clothes, a bad guy's hat,\nLic’rice vines, unlucky cat,\n\nBottom of a frying pan,\nOr the skin of Kenyan man,\n\nWidow spiders, funny light,\nShade of famous evil knight,\n\nJudge's robe and panthers too,\nPuppy's nose and blind man's view. \n\nIf more black I want to see \nI, outside will run with glee,\n\nOn a cloudy moonless night,\nOr I'll shut my eyes real tight."},
{"title":"Goals?","date":"2015-07-21","content":"Since my childhood they've implored\nThat I should my goals record.\nAnd ‘though this counsel may be true, \nAt times I share another view. \n\nBut when I humbly counter back, \nThat a direction I don't lack; \nThey with me bluntly disagree \nAnd hence my point they fail to see. \n\nAlthough it's agonizing clear \nAfter my argument they hear, \nI in minority am found \nAs they dogmatic hold their ground. \n\nSo I'll attempt to clearly state, \nIn order that I may relate \nWith you the feelings which I hold \nAs I'll feel better when they're told. \n\nA goal will do us little good \nUnless we do all that we should \nTo reach it. And I think it's smart \nTo carry it within your heart. \n\nAs ink will smear and paper burn. \nAnd will you likely oft return, \nTo ponder what you've written there? \nAnd so this final thought I'll share: \n\n‘Though you may pen a constant stream, \nA written goal is still a dream."},
{"title":"The Writer's Retreat","date":"2015-07-22","content":"The rain comes down about me as\nI sit here on my stool. \nThe people rushing quickly by \nMust think of me a fool. \n\nAll soaking wet I sit here \nInventing lines of prose,\nWhile mud hurled from the car tires\nMakes ruin of my clothes. \n\nBut on I sit, \nAnd sit I must. \nUnless of course, \nI start to rust. \n\nFor inspiration's struck me \nAnd I'm rather on a roll."},
{"title":"A Wandering Soul","date":"2015-07-23","content":"A wandering soul have I, I know. \nFrom where I am, I soon will go, \nTo once again the world go 'round. \nNo walls have I by which I'm bound. \n\nI think I'd like to see one day \nThe bustle of the Hong Kong bay. \nThen ride along the Kenyan plain; \nRelive medieval times in Spain. \n\nThen to explore a Scottish bog \nAnd lose myself in London fog. \nI'll navigate the Amazon; \nDeplete my savings ‘til their gone \n\nAnd then I will again return \nAnd in my office memos spurn. \nUntil I can create the wealth \nWith which I may enjoy my health. \n\nI don't know if it's wrong or right \nTo always want to take to flight. \nBut rather than decay at home, \nI much prefer the world to roam.\n\nPhoto Credit: Dariusz Bargiel"},
{"title":"I Wonder Where She Is Today","date":"2015-07-24","content":"Along a sun drenched tropic cay?\nReclined on rocks above the bay?\nPerhaps she's in her room this day,\nReflecting on the words she'll say\n\nOn that fair day when love she'll find.\nThen in its snares become entwined,\nTo reason and to logic blind,\nEmotion overcoming mind.\n\nOh, for that day to come I plea\nWhen to unite we both agree.\nThat fin'lly we may joyful be;\nForever living ecstasy.\n\nBut we for now apart remain.\nHer name to know I do not feign.\nJust hope one day her love I'll gain —\nThat I don't search for her in vain. \n\nPhoto Credit: Mario Alberto Magallanes Trejo"},
{"title":"Cries of Wolf (Aesop)","date":"2015-07-25","content":"There was a boy who tended sheep,\nIn valleys wide and canyons steep.\n\nOn summer days he’d laugh and run,\nOn fields of green beneath the sun.\n\nOn winter nights he’d wear a cap,\nAnd tightly ‘round a blanket wrap.\n\nHe never would the flock neglect,\nFor each he loved and would protect.\n\nBut oft he’d find his job a chore,\nAs sitting could be quite a bore.\n\nSo clever games the boy would play\nTo pass the time throughout the day.\n\nAnd once he thought it would be fun\nTo watch all of the village run.\n\nSo from outside the city gate,\nA trick he’d play, and then would wait.\n\nWith terror in his voice he cried;\n“A wolf, a wolf!” the fellow lied.\n\nIn haste they came with sword and spear\nTo keep the beast from coming near.\n\nThis answer to his calls of fright\nDid give the boy a great delight.\n\nWhen finding peace within the fold,\nThe angry men the lad did scold.\n\nAs time passed by, the restless boy\nAgain did try his naughty ploy.\n\nAgain alarms were sounded wide.\nAgain the men rushed to his side.\n\nAnd finding calm, they were irate,\nAnd did the shepherd boy berate.\n\nAs seasons passed without a thought,\nAbout his prank the boy forgot.\n\nOne night while all the lambs did sleep\nA pack of wolves, in stealth, did creep.\n\nThe boy cried out for help that night\nTo save him from the awful plight.\n\nBut no one came with spear or sword.\nHis pleas for help were now ignored.\n\nThus for deceit he paid the cost,\nAs many of his sheep were lost.\n\n-----\n\nWhen one is known to oft deceive,\nWe’re not as likely to believe.\n\nPhoto Credit: Andrea Kratzenberg"},
{"title":"Art Thou He?","date":"2015-07-26","content":"When the heavens yielded glory to that bright new shining star,\nWas it you in humble manger born in Bethlehem afar?\nWho came as son of deity encased in mortal skin, \nTo save us from a second death, o'er Satan's power win?\n\nWhen the sun above the hillside cast jewels across the sea,\nWas it you in meager raiment who did with the masses plea?\nThe same who loaves and fishes took to feed the hungry throng?\nThe man who gave his life for me, who ne'er committed wrong?\n\nArt thou he, redeemer of all man?\nArt thou he, to chaff - the mighty fan?\nArt thou he who taught the world the truth, that all might ransomed be,\nArt thou he my lord, I pray thee, art thou he?\n\nCould it be that you're the same as he who did this world form,\nAll powerful and mighty who delivers from the storm?\nIs it you, my sins with mercy, will forgive if I repent?\nFor to atone for mankind's guilt, you willingly were sent.\n\nArt thou he, redeemer of all man?\nArt thou he, to chaff — the mighty fan?\nArt thou he who taught the world the truth, that all might ransomed be,\nArt thou he my lord, I pray thee, art thou he?\n\nIn early morning solitude, I on my knees did pray.\nAs shadows of the night did fade to meet the coming day.\nI gave my thanks for blessings and did ask for help divine,\nThat I about my weakened flesh might righteousness entwine.\n\nThen spirit spoke to spirit and my heart did graceful fly.\nI knew that these new feelings I could not again deny.\nA testimony of the truth I could not thus dismiss,\nAs every fiber of my soul did witness to me this:\n\nThou art he, redeemer of all man!\nThou art he, to chaff — the mighty fan!\nThou art he who taught the world the truth, that all might ransomed be, \nThou art he my Lord, I now know, thou art he!\n\nPhoto Credit: Ashley Platell"},
{"title":"Silent Soliloquy","date":"2015-07-27","content":"Should I have a wond'rous thought\nOr answer for a question sought;\nWould throngs of people gather near\nOr would it fall on deafened ear?\nIf I did paint a masterpiece\nOr found a way, a war to cease,\nShould I, with the world share —\nOr do you think they'd really care?\n\nNo, I'm afraid that jaded we\nHave grown as a society.\nAnd so absorbed within our sphere,\nThat rare another’s thoughts we hear.\nThus I alone content must be\nTo revel in tranquility;\nWhile singing my soliloquy,\nSinging for no one but me."},
{"title":"White","date":"2015-07-28","content":"White as Angels, fallen snow, \nBrides and Buttons, Ribboned Bow,\nPure and Soft as fluffy cloud,\nDreams of Heaven shared aloud,\nFlowers blooming o'er the land, \nWater falling, coral sand,\nGlist'ning mountain top at dawn,\nFresh and clean, the tail of fawn,\nSwans out floating in a pair,\nLily petal, Arctic bear,\nCauliflower, milk and cream,\n'Taters, sugar, salt and steam, \nFlour, short’ning, bakers dough,\nKitchen counters' shining glow,\nStucco, walls and paper ream, \nHospitals and lights that gleam, \nEven presidential home,\nColor of Alaska's Gnome, \nPadded cells and teeth and socks, \nShirts and suits and old folk’s locks. \n’Though I try with all my might, \nAll I see around me — White."},
{"title":"That's Life!","date":"2015-07-29","content":"Now let's suppose one day you found \nYour home had burned right to the ground. \nThen sifting through the ashen mess, \nYou badly soil your only dress\n(For all the rest were lost). \n\nNow many would profanely swear. \nOr yell and pull out all their hair. \nThen sit upon the ground and cry \n\"Why always me? Oh why? Oh why?\" \n(And drink until they're sauced). \n\nBut after all it seems to me, \nThat life's not always meant to be \nDevoid of worries, fear and strife. \nAnd ‘though it's sometimes rough, that's life! \n(As someone great once said). \n\nAnd even if the wrath of God \nOne day the polar ice caps thawed.\nOr all the world went to war, \nAnd missiles through our cities tore. \n(And left us all for dead). \n\nI hope that we, through all the pain, \nCould find the strength to not complain. \nBut rather sing a glad refrain \nAnd always calm and cool remain; \n(For after all, THAT'S LIFE!)."},
{"title":"Sand","date":"2015-07-30","content":"Have you counted sand on seashores?\nI could never get past one.\nFor my mind begins to wander\nAs I gaze off toward the sun.\n\nBecause, you see, each grain of sand\nFrom somewhere made its way;\nAnd now upon this stretch of beach\nHas found a place to stay.\n\nAnd grain by grain they immigrate,\nPresumably because of fate.\nThen by the sea they congregate.\nAnd under sunlit skies they wait.\n\nSo o'er this fair and sandy shore\nTen thousand years or maybe more -\nHave flown across as eagles soar,\nUndaunted by the oceans roar.\n\nBut wait for what, or who, and why?\nAnd ‘though I search, find no reply\nFor rarely does a soul pass by\nBeneath this azure, cloud specked sky\n\nUntil one day, the answer came.\n‘Twas simple I admit.\nThe Lord, our God this all did frame,\nAs place for me to sit.\n\nHave you counted sand on seashores?\n‘Though you might not get past one,\nYou will know that God has blessed us\nHe has blessed us, Every One. \n\nPhoto Credit: Daniel Tan"},
{"title":"The Stone Carving","date":"2015-07-31","content":"I saw a beautiful stone carving\nIn the window of the Gallery.\nBut I didn't want it in my house\nBecause it wasn't really for me.\n\nIf I had sailed across the ocean\nAnd climbed a great mountain\nAnd cut my way through a rain forest\nWhere I found a lost civilization\n\nThen taught them to dig wells\nAnd build good homes\nAnd make pizza\nAnd cure cancer\n\nAnd then they made a beautiful stone carving\nTo express their appreciation\nFor the time I had spent with them\nAnd the wonderful experiences we had,\n\nAnd I carried it through the forest\nAnd over the mountain and sea\nThen I would want it in my home,\nBecause then it would really be for me."},
{"title":"Song of the Grasshopper (Aesop)","date":"2015-08-01","content":"The tiny ant did march away\nMuch of the night, and all the day.\n\nIn spring and summer and the fall,\nHe answered brave to duty’s call.\n\nSearching food, both far and near;\nNever a cry, never a tear.\n\nHefting morsels larger than he –\nCarrying back to colony.\n\nAnd while the ant did hike along\nThe grasshopper would sing a song.\n\nOn summer days he’d play and dance.\nFuture’s destiny left to chance.\n\nBoth care and worry he did spurn.\nAnd storing food was no concern.\n\nOn he sang his melody still,\nAs autumn closed with frost and chill.\n\nWinter brought its sleet and snows.\nCrops were covered, water froze.\n\nNow begging help and charity,\nThe grasshopper did humbly plea:\n\n“Without some food I’ll surely die!”\nThe ant would offer no reply.\n\n“Next year, my ways of idle end!”\nThe ant, however, did not bend.\n\nThe grasshopper did not survive. \nThe ant through winter stayed alive.\n\n---\nDiligence often returns with a gain,\nWhile laziness likely will only bring pain.\n\nPhoto Credit: Martin Kessel"},
{"title":"An Introduction (to a poem I never wrote)","date":"2015-08-02","content":"I'd like to write of things unknown, \nEpistles fresh and new. \nOf feelings, thoughts, expressions\nThat are known to very few.\n\nI would like to write of blessings\nAnd count mine one by one.\nTo thank my heav'nly Father\nAs a grateful heav'nly son.\n\nTo expound the holy scriptures\nAnd the gospel truths extol;\nSo that my words might edify\nThe tired and weary soul.\n\nBut alas, I'm just a poet -\nAnd a lousy one at that.\nSo please forgive my rhyming phrase\nFor all that it may lack."},
{"title":"Streamlet","date":"2015-08-03","content":"Born from melting ice and snow\nWending round the rocks you go,\nEasing gently down the hill,\nOver craggy ledges spill. \n\nGaining speed and volume too,\nFrigid cold and pure are you.\nQuenching mountain climber's thirst.\nO'er your fragile banks you burst. \n\nSpawning fish of every kind.\nThrough the canyon floors you wind.\nBringing life to bush and tree.\nDown you flow to pass by me."},
{"title":"Words","date":"2015-08-04","content":"Words can be beautiful,\nWords can have power.\nRead to a child and then\nLater they flower. \n\nRead me a nurs'ry rhyme\nNightly in bed.\nI will remember it\nWell ‘til I'm dead. \n\nWords can be moving and\nRhymes will endure.\nSee that they're righteous\nAnd wholesome and pure. \n\nPhoto Credit: Horton Web Design"},
{"title":"Grandmother's Clock","date":"2015-08-05","content":"Just you and me, old chum, are left;\nAnd only one of us bereft\nAt consequence of passing time.\nFor you 'tis merely endless rhyme. \n\nIf tick does rhyme with tick,\nAnd tock with tock. \n\nWhen first we hung you on the wall\nAbove the hearth, secure from fall\nAnd each week careful wound your spring\nThat faithful time to us might bring;\n\nHow could we know that we\nWould now be me.\n\nAnd surely as your hands go round\nI too will be laid underground;\nAs mortal springs cannot be wound\nRefreshing life with each turn found.\n\nBut reassuring is\nThat you'll tick on.\n\nGood company for me you make\nAs little, from me, do you take.\nAnd as you sound upon the wall\nI know I'm not alone at all.\n\nAs tick does follow tock\nAnd tock does tick."},
{"title":"Twisted Tree","date":"2015-08-06","content":"Old Twisted tree\nOn craggy cliff, above the sea,\nWarped by wind and constant storm\nTo this knotted, pitted form. \n\nYoung sapling, straight, \nWithin the forests's sheltered gate \nTall, unmarred one day will stand. \nThing of beauty on the land.\n\nIf left alone\nJust one, past seige, the vict'ry own\nFor trials bestow the strength\nTo last the war’s full length. \n\nBut as a group,\nProtected and not forced to stoop.\nBoth tall and true you grow,\nBut strength of battle do not know. \n\nPhoto Credit: Scott Liddell"},
{"title":"Tradewind","date":"2015-08-07","content":"I wonder if there's one who knows\nThe source from where the tradewind blows.\nThat font of airy cool retreat\nFrom tropic sun and summer heat. \n\nThe breeze that with it memories bring\nOf younger days and love in spring.\nFor as it blows from island shores\nIt soothes the day and youth restores.\n\nOh tradewind, blow my way today.\nAnd ‘though I know you may not stay,\nPlease leave with me a fragrance sweet\nAnd take my love to all you meet.\n\nOh fabled wind of bygone date,\nI know from where you emanate\nMust be indeed a wond'rous place\nReplete with beauty love and grace.\n\nSo if there's one who knows the source\nI wish for me he'd chart the course.\nThen for the place where tradewinds blow\nI'd pack my bags and off I'd go. \n\nPhoto Credit: Jules Bloemen"},
{"title":"The Old Lion (Aesop)","date":"2015-08-08","content":"A lion growing sick and old\nNo longer could roar brave and bold.\n\nWithin his lair the lion stayed.\nOn passing creatures there he preyed.\n\nA bright young fox did happen by\nAnd he the lion’s lair did spy.\n\nThe lion called, “dear fox, good day!\nCome join me in my cave, I pray.\n\nIt’s clean and cool, come rest your feet,\nEnjoy this shade from desert heat.\n\nI’m feeling all alone and sad,\nYour company would make me glad.”\n\nThe fox was smart and saw some clues\nThat this perhaps might be a ruse:\n\n“The tracks which enter are quite clear,\nBut none are going out, I fear.”\n\n“Some travelers who found my room,\nI must admit, I did consume.\n\nBut you, good friend, I would not eat,\nJust curl yourself up at my feet.\n\nMy good intentions you will see,\nI’ll grant to you immunity.”\n\nWith caution then, the fox did tread –\nAlthough he should have quickly fled.\n\nThen his tracks too went in the den,\nAnd never saw the sun again.\n\n---\n\nTo not fall prey to evil schemes,\nObserve if others reach their dreams.\n\n(Index references: Oxford-Gibbs 18, Perry 142)"},
{"title":"Direction","date":"2015-08-09","content":"Within the fragile human soul\nThere's space for but a single goal.\nHence all attempts must prove in vain\nTo pry the blessed thing in twain.\n\nThe limbs and mind may part their ways,\nAnd mouth a separate homage pays,\nBut deep within, a noble aim,\nOr else desire for evil's name.\n\nThe choice is ours to careful make\nAnd opt the path to onward take.\nThen urge the body to conform\nThat we might weather brewing storm.\n\nThe path at times is slow indeed\nWith hindrance, sweat; with foe, we bleed\nFor mortal errors we may pay -\nThe soul, though, points a single way.  \n\nPhoto Credit: Thomas Pate"},
{"title":"One More Try","date":"2015-08-10","content":"The greatest authors of our age\nHave found it hard to fill a page.\n\nEach leader great has sadly known\nA time when he just stood alone.\n\nNo athlete who won vict'ry sweet\nHas also not been soundly beat.\n\nThe path to each great artwork hewn\nIs with it share of failures strewn.\n\nRemember, 'though you fail today,\nSuccess may be one try away.\n\nInspired by:\n\n\"Our greatest weakness lies in giving up. \nThe most certain way to succeed is always \nto try just one more time.\"\nThomas A. Edison"},
{"title":"Foreign Aid","date":"2015-08-11","content":"I hear that NASA's looking for\nSome life out there in space.\nPerhaps another planet on\nWhich lives another race. \n\nNow some say that we should only\nExert our energies\nOn helping those around us, and \nReacting to their pleas. \n\nWell, I believe we ought to help \nOur fellow man, like you. \nBut maybe we can find someone \nOut there to help us too."},
{"title":"The Telephone","date":"2015-08-12","content":"The telephone, the telephone,\nThat ringing, ringing, constant drone.\nFrom far and near, they all call here.\nI really wish they wouldn't dear.\n\nFor I do dread to answer back\nThrough plastic tubes and relay stack.\n‘Though wonder of the modern age,\nAt times it does my soul enrage.\n\nWhen in a tranquil state of mind,\nIt's shrill, unnerving sound does wind\nAnd I as servant do attend.\nMy faithfulness I solemn rend.\n\nFor only worse than this dread state,\nIs silence, when a call I wait."},
{"title":"Talents","date":"2015-08-13","content":"I wish that o'er the keyboard I,\nCould make my fingers dance and fly.\nTo gently on the ivories\nSound joyful airy melodies.\n\nOr on a canvas paint a scene\nWith careful strokes, precise and clean,\nThat more than simple scene retold,\nBut moved the soul in color bold.\n\nI'd also like to one day write\nA book with all convincing might.\nTo alter lives and cause new thought,\nThat by my deed great works be wrought.\n\nBut talent great is rather rare\nAnd meted out with such great care,\nThat those of us of common birth\nDo find within a certain dearth.\n\nAnd so our lot I do suppose\nIs to enjoy the work of those\nWho have been blessed by touch of fate\nAnd do possess that gift so great.\n\nBut don't forget that gifts have all\nAnd everyone a certain call.\nAnd we must each perform our role\nTo realize the greater whole."},
{"title":"Shades of Gray","date":"2015-08-14","content":"The world, some say, is black and white.\nAnd I suppose 'tis true,\nWith limited perspective, or\nA narrow point of view.\n\nTo some there is a right and wrong,\nThere is no other way.\nEnforcing their morality;\nThey do not ever stray.\n\nNow, I won't write there is no wrong.\nNor will I thus dismiss\nThe presence of a moral right.\nMy point is simply this:\n\nIn the spectrum of the colors\nAre many shades and hues.\nAnd from this vast selection, with\nDiscretion, we may choose.\n\nThere are limits. There are guidelines;\nAnd truths we can't deny.\nHowever, many avenues\nAre there for us to try.\n\nFor some things matter little, from\nA more eternal view.\nTo show this, I'll a question pose\nAnd prove my point to you:\n\nIn the morning when you wake up\nAnd crawl out of your bed,\nShould you firstly opt to brush your teeth\nOr wash your face instead?"},
{"title":"Dinner Guests (Aesop)","date":"2015-08-15","content":"One afternoon a fox did see\nA stork relaxing by the sea.\n\nHe asked if she at 7:10 \nWould like to dine within his den.\n\nAnd she agreed and so they met\nAround a table finely set.\n\nThe fox then on a dish quite ﬂat\nServed soup, and in his place he sat.\n\nHe lapped it up and didn’t stop.\nThe stork, did not consume a drop.\n\nFor her long beak could not obtain\nThe soup, but she did not complain.\n\nBut rather asked if in a day,\nThe fox might like to pass her way.\n\nAnd they could eat beside her nest\nFor she made soup, the very best.\n\nHe said he’d come and did regret\nThat she could not enjoy his fête.\n\nThen on the morrow, when he came\nThe stork had played a kindred game\n\nFor she had set two vases out\nWith necks too narrow for a snout\n\nAnd as she sipped her soup with glee\nThe fox kept pleasant company.\n\nBut he could not the soup enjoy,\nAs he was tricked by his own ploy.\n\n---\n\nFor unto others should you do,\nAs you would have them treat you too.\n\n(Index references: Oxford-Gibbs 156, Perry 426)"},
{"title":"Son of Thunder","date":"2015-08-16","content":"As witness of the light you shine \nOn earth as beacon true. \nAnd no one since has written of \nThe Word as well as you. \n\nYour life was changed that day long past \nWhen on the shore stood He, \nAnd leaving nets and fishing boats, \nYou followed willingly. \n\nOh John, the one whom Jesus loved,\nA son of thunder still, \nRemaining with the wicked to\nAdminister His will.\n\nOh John the one whom Jesus loved,\nA son of thunder still,\nA mission for the latter days\nA greater work fulfill. \n\nAs with Him to the mount you went\nAnd saw a cloud of flame, \nA witness to His godly pow'r, \nYou watched Him tempest tame.\n\nThen faithful by His side as you\nWent to Gethsemane.\nA comfort to His mother as\nThey hanged Him on that tree. \n\nSo when in banishment were sent\nIn chains to Patmos' Isle, \nThe heavens to you opened and\nUpon you they did smile. \n\nFor when the angel with the book\nCommanded you to eat,\nWithout a hesitation, you \nDid obligations meet.\n\nOh John, the one whom Jesus loved,\nA son of thunder still, \nRemaining with the wicked to\nAdminister His will.\n\nOh John the one whom Jesus loved,\nA son of thunder still,\nA mission for the latter days\nA greater work fulfill."},
{"title":"Start","date":"2015-08-17","content":"The pathway to a mountain peak\nGoes through a valley, 'cross a creek.\nAnd ev'ry climber first steps take,\nBefore they can a summit make.\n\nA boat that crosses o'er the sea,\nDoes first the harbor have to flee.\nIts sails unfurl, its anchor raise\nBefore upon a new coast gaze.\n\nA painter first her paint does mix.\nA drummer must pick up his sticks.\nA chef must take in hand a knife,\nAnd so it seems to be in life;\n\nIf you aspire to something more,\nyou have to first walk through the door.\nSuccess, it's true, can be an art.\nThe secret though, is just to start.\n\nInspired by:\n\"The secret of getting ahead is getting started.\"\nMark Twain"},
{"title":"Market Forces","date":"2015-08-18","content":"The forces which the markets drive \nAppear to be well and alive.\nAnd little do the traders care\nIf it's a bull or it's a bear. \n\nAs long as players always play\nThe wheels grind throughout the day.\nIt's just a roller coaster ride\nAn ebb and flow of changing tide.\n\nEach day are fortunes gained and lost,\nWith arbitrage and margins crossed.\nAnd every day we see more clear\nThe give and take of greed and fear."},
{"title":"Setting Sail","date":"2015-08-19","content":"To sail on seas of blue and green\nWith azure skies above -\nIs like a song, a symphony,\nA harmony of love.\n\nThe rolling swells below me dwell -\nA playful, teasing sea,\nThat seems by some entrancing force\nTo call and beckon me.\n\nA plea to leave the harbor,\nTo fly before the wind,\nTo set my sights on distant lights -\nMy life on land rescind."},
{"title":"The Painting","date":"2015-08-20","content":"I saw a picture hanging\nIn the local gallery.\nAnd I knew at once that this one\nWas the perfect one for me.\n\n’Twas a painting of the seashore,\nAnd waves along the sand.\nWith gulls and rocks and clouded sky -\nI thought that it was grand.\n\nThe water was a greenish blue\nThat sparkled in the light.\nThe soft white clouds across the sky\nWere really quite a sight.\n\nThe sand was white and soft and clean\nWith shells tossed here and there.\nThe gulls were also pretty,\nAs they hung there in the air.\n\nAnd so I asked the merchant\nWho was sitting at the till;\n\"If I were to buy this painting\nJust how much would be the bill?\"\n\nHe then began relating\nAll the long harsh years it took,\nHow it had won some special prize -\nWas published in a book.\n\nAnd then he boldly told me\nHow much I'd have to pay.\nAnd I quite unabashedly\nSaid there was just no way.\n\nAlthough I do appreciate\nThat painting on the wall,\nTo ask of me such large a sum\nRequires quite some gall.\n\nThen I did walk along the beach\nAnd found that I could see\nA scene surpassing that old frame -\nAnd it was all for free."},
{"title":"Love Line","date":"2015-08-21","content":"I wish I had some clever lines\nAnd knew just what to say.\nI wish that I were handsome, and\nThe heroes role could play.\n\nI also wish that charm and grace\nCame easily to me.\nAnd for my style and bearing, you\nImpressed with me would be.\n\nYet nonetheless I‘m standing here,\nAdoring only you;\nAnd hope that by some quirk of fate\nYou're thinking of me too.\n\nSo if you have some idle time\nWith nothing really planned,\nI wonder if you'd like to take\nA walk along the sand.\n\nAnd we could talk of life and love\nAnd politics awhile,\nThen if you like the company\nYou'll look my way and smile.\n\nI thought I'd write this little note\nWith honesty unfeigned.\nI only have my pride to lose -\nAnd nothing ventured, nothing gained."},
{"title":"The Worth of a Hare (Aesop)","date":"2015-08-22","content":"The kingdom of all beasts did hold\nA council great for young and old.\n\nEach animal did then suggest\nNew laws they thought would serve them best.\n\nSo, many creatures concepts shared\nThat in the group they might be aired.\n\nAware of his low standing there,\nA thought was offered by a hare:\n\n“Regardless of a creature’s birth,\nEach one should be of equal worth.”\n\nThis edict he did then propose\nTo see who might his words oppose.\n\nThe smaller creatures thought this grand,\nAnd cheered as they did all then stand.\n\nThe lions sought to calm restore\nAnd all let out a piercing roar.\n\nThen all the lions gathered ‘round\nTo say, “small hare there, on the ground.\n\nWe only see your furry paws –\nWhere are your fangs? Where are your claws?”\n\nIn silence did the hare retreat.\nHe knew, on this, he had been beat.\n\n---\n\nOnly fools propose new laws\nOpposing those with sharper claws.\n\n(Index references: Oxford-Gibbs 21, Perry 450)"},
{"title":"Morning Conversation","date":"2015-08-23","content":"Oh Lord, I ask this morning as I wake;\nThat I thy spirit with me I might take.\n\nThat I might feel thy loving care.\nThat I might know you're standing there,\nAlong my side, when troubles come my way. \n\nDear Father, hear this prayer of mine\nAs I now put my faith in thine \nEternal care and for thy kingdom seek.\n\nI ask thee lead me down thy path.\nProtect me from the tempters wrath.\nPlease make me strong, oh Lord, for I am weak.\n\nOh Lord, I thank thee for thy light divine.\nAnd pray that truth, my actions will define.\n\nThat I might love my fellow man,\nEnough to share with him thy plan.\nAnd help a friend obtain thy glorious rest.\n\nAs through another day of life I pass,\nThough I know, Satan, armies will amass;\n\nI ask thee only that I see\nCreation thou hast framed for me,\nAnd joy in that. For I do know I'm blessed.\n\nDear Father, hear this prayer of mine\nAs I now put my faith in thine\nEternal care and for thy kingdom seek.\n\nI ask thee, lead me down thy path.\nProtect me from the tempters wrath.\nPlease make me strong, oh Lord, for I am weak."},
{"title":"Choices","date":"2015-08-24","content":"It really doesn't matter if \nI sink or if I swim.\nBut should I choose the former, things\nMight look a bit more grim. \n\nAnd so it is in life it seems,\nAs options fill the day.\nIt's up to no one else but me\nTo choose my chosen way. \n\nThe problem I have found of late\nIs that I wish I knew,\nOf all the good alternatives,\nWhich of them I should do.\n\nTo sail the seven oceans or\nTo climb the mountains tall\nOr paint the perfect masterpiece...\nPerhaps, I'll do them all."},
{"title":"Education","date":"2015-08-25","content":"Education, education, \nThere's no need for provocation. \nWon't you trust me to my studies, sir? \n\nI'm a dreamer, not a scholar. \nBut I'll wear the student's collar, \nAs I read the next soliloquy. \n\nFor I suppose with facts in hand \nI'll on a greater plateau stand. \nBut do you think it really worth the pain? \n\nFor as each novel piece of fact \nWhen with my brain does make impact \nI feel cerebrum painfully expand. \n\nAnd this is what I have to show,\nBecause I've truly found it so,\nThe more I learn the less I find I know!"},
{"title":"Red","date":"2015-08-26","content":"Roses, blood and Scottish hair,\nApples, cherries, steak that's rare,\n\nKetchup, fire, chicken pocks,\nLobsters, lips and molten rocks,\n\nCardinals, strawberry tarts,\nCape of matadors and hearts,\n\nFire truck and sunburned neck,\nHalf the cards in playing deck,\n\nPirate beard and lipstick too,\nU.S. flag with white and blue,\n\nTile roofs above your head,\nWagon by a child led,\n\nWatermelon, sunset sky,\nFlashy sports car racing by,\n\nSquare in Moscow, angry hue,\nSea that Moses walked right through,\n\nStop sign, royal robe and ants,\nViking Eric, Mickey's pants,\n\nAll the things that I've just said,\nEach and every one is red."},
{"title":"Well Read","date":"2015-08-27","content":"I met a man who in his home\nHad books of every kind.\nOf every subject, shape and size,\nWhy, you would surely find.\n\nBut never did he turn a page\nOr bend a binding back.\nHe just admired them each day,\nAnd added to his stack.\n\nI met a man who didn't have\nA pair of shoes, to walk.\nBut he had read most ev’ry book,\nAnd with him I would talk...\n\nHe didn't own a palace where,\nWithin he lounged reclined.\nBut he owned treasures great and vast\nWithin his eager mind."},
{"title":"Ruins","date":"2015-08-28","content":"Shafts of morning light\nThrough castle's gaping crack,\nReflect the moment\nWhen foe did make attack.\n\nSheltered royal court\nAwakened to the sun,\nThe harshness of life,\nWhich heretofore did shun.\n\nDid I, now dead lord,\nBuild battlement to hide\nThe sick and helpless,\nWho suffer by my side."},
{"title":"Flattery of the Fox (Aesop)","date":"2015-08-29","content":"A crow was gliding through the air,\nThe sun was out, the day was fair.\n\nShe found some cheese beside a creek\nAnd now did have it in her beak.\n\nShe soon would eat each tasty bite,\nAnd rest from her long morning ﬂight.\n\nBut down below a fox did creep\nAnd on a rock he then did leap.\n\nHe saw the cheese, his mind then raced,\nAt how delicious it would taste.\n\nHe called, \"Dear Crow how well you fly.\nYour presence brightens up the sky.\n\nAnd how your coat of feathers shines,\nLike diamonds from the deepest mines.\n\nI’ve also heard you sing so fair,\nFar sweeter than the song birds there.\n\nPlease sing for me your happy song,\nAnd I will go, I won’t stay long.\"\n\nThen as she blurted out a Caw,\nThe cheese fell to the fox’s paw.\n\nAnd she learned a great lesson true.\nThat I will share again with you:\n\n---\n\nYou never, never, never must\nGive to a ﬂatterer your trust.\n\n(Aesop index references: Oxford-Gibbs 104, Perry 124)"},
{"title":"Isaiah 49 - Zion","date":"2015-08-30","content":"O isles listen unto me -\nCome forth that ye might hear.\nThe Lord hath called me from the womb,\nYea, all the earth come near.\n\nThe Lord hath called me Is-ra-el,\nMuch like a sharpened sword;\nA polished shaft that’s hid within\nThe quiver of the Lord.\n\nMy labor I have done in vain,\nMy strength is spent for naught.\nYea, I shall by my Lord be judged,\nAnd His great work be wrought.\n\n‘Though Is-ra-el is yet dispersed,\nAnd I have worked at length.\nIn God’s eyes shall I glory find –\nMy God shall be my strength.\n\nYea, in the womb was Isra’l called,\nA faithful servant true;\nA light unto the Gentiles, who\nHer people would renew.\n\nAnd though she was despised of man,\nAbhorred, ashamed and beat;\nBoth kings and princes shall arise,\nAnd worship at her feet. \n\nThe Lord hath said, in His own time,\nWould hear her and preserve –\nWould give her for a covenant –\nInheritance reserve.\n\nThe Lord hath heard her prayers upon\nThe isles of the sea.\nA servant shall He call up then,\nThat she might gathered be.\n\nThrough the mountains they shall travel –\nOn highways great shall flee –\nFrom north and west, from far and lo,\nFrom prison they’ll be free.\n\nThey shall not hunger nor shall thirst,\nThey in the way shall feed.\nBy springs of water shall they pass,\nAs God above doth lead.\n\nO heavens shout, be joyful earth,\nThe Lord doth comfort bring.\nHis people shall not suffer more,\nThe mountains all shall sing.\n\nThough Zion feels forsaken now,\nGod shall not them ignore.\n‘Though mothers may forget their babes,\nGod’s people He’ll restore. \n\nFor they are graven on His palms,\nAnd also on His walls.\nTheir conquerors shall lay as waste,\nIf they do heed His calls.\n\nLift up thine eyes, and look about,\nThe Lord doth stand with pride.\nAs Is-ra-el He doth adorn\nIn clothing of a bride.\n\nAnd though her children first were lost,\nGod others did replace.\nAnd now in all the land there’s not,\nFor all sufficient space.\n\nYea, God shall lift again His hand;\nAnd through the Gentiles, He\nWill raise a standard high so that\nAll Is-ra-el might see.\n\nThe Gentiles then shall Isra’l nurse,\nAnd lead them back once more;\nUpon their shoulders carry them,\nTo Is-ra-el restore.\n\nAnd kings and queens shall be their nurse,\n‘Til all the work be done;\nThat all of mortal flesh should know\nThe Lord – The Mighty One. \n\nTo Is-ra-el they all shall bow,\nAnd lick her dusty feet\nAs they who for their God do wait.\nShall have redemption sweet.\n\nThe Lord shall free the captives and\nDeliver all the prey.\nAnd God from the oppressor then,\nShall take them in that day.\n\nAnd God shall cause they that oppress,\nOn their own flesh to feed.\nThe Lord, the Great Redeemer, shall\nThe people all then heed. \n\nExcerpt from the book \"The Ballad of Isaiah\" by"},
{"title":"Look to the Stars","date":"2015-08-31","content":"Some people work all night and day.\nThey \"punch the clock\" and get their pay.\nWith windows closed, and door tight shut,\nThey carve an ever deeper rut.\n\nWhile others never work, it seems,\nAnd hope to pay their rent with dreams.\nThey live apparently on air,\nAnd don't appear to have a care.\n\nBut those whom I have seen succeed,\nAre quite a different acting breed.\nThey'll dream until they have a thought,\nThen work until results are wrought.\n\nSo, if you care to pay the price,\nI have some rather good advice:\nLook to the stars, where dreams are found.\nBut keep your feet upon the ground.\n\nInspired by:\n\n\"Keep your eyes on the stars, and your feet on the ground.\"\n- Theodore Roosevelt"},
{"title":"Lunch","date":"2015-09-01","content":"You send your loved ones off to school\nWith lunch bag neatly packed.\nNutritious little nuggets all\nAre delicately stacked.\n\nBut most folks miss the point here, and\nPossess the foolish thought\nTheir offspring will of course consume\nThe meal that she brought.\n\nThough, it is well established when the\nLunchbell starts to ring.\nThe children start their trading\nOf the things that they did bring.\n\nAnd it indeed is very rare\nThat what a mother sends,\nDoes not get traded right away\nFor what is brought by friends.\n\nAnd so I've formed a theory that\nThe parent who pack sweets\nWill have a kid who trades them off,\nAnd hence the system beats."},
{"title":"Exploration","date":"2015-09-02","content":"The earth is so wonderful spacious and wide,\nI want to explore it on every side.\n\nI want to climb the highest peaks,\nAnd wander through the trees.\nThen brave the deserts parching heat,\nAnd sail the seven seas.\n\nI want to see the arctic floes,\nAll animals and birds.\nI want to see what man has made,\nAnd read the author's words.\n\nThe world is so vast and so deep and so high,\nI want to see everything under the sky."},
{"title":"The Castle","date":"2015-09-03","content":"Far from peasant strife and hassle,\nOn the hill, there stands a castle.\n\nWhat great lord did there reside,\nAnd the lady by his side?\n\nIn the castle on the hill,\nStern, foreboding, stands there still.\n\nTo inhabit this great castle\nDid they win a bloody battle?\n\nOr by marriage did they pact\nTo share in peace this noble tract?\n\nBut the castle on the hill,\nAs a beacon, stands there still.\n\nWas it true, nobless oblige,\nSpeak to me, thy faithful liege.\n\nNow the weeds have taken o'er\nThe tower and the gilded door.\n\nYet the castle on the hill,\n‘Though a relic, stands there still.\n\nMany travelers will say\nAs they pass along this way;\n\n\"Who I wonder, filled the hall,\n'Fore the weeds did grow so tall.\"\n\nAnd the castle on the hill,\nIn silent glory, stands there still."},
{"title":"Jealousy","date":"2015-09-04","content":"She to another, I do find\nDoes seem a trifle more inclined.\nIt's not a new scenario.\nBut once again it's time to go.\n\nAnd so to where the shadows loom,\nIn distant corners of the room;\nI'll hastily make quick retreat.\nAnd there in darkness take my seat.\n\nI cannot bear to see her face,\nHer shining radiance and grace.\nEspec'lly when she takes his hand\nAnd when embracing they do stand.\n\nIt makes no sense why I should be\nIn such a state of misery.\nWhen those who know, have all told me\n\"More fish there are within the sea.\"\n\nBut feeble minds like mine, you see,\nDo not with rationality\nReact to things emotional,\nBut rather lose complete control.\n\nMy flesh is turning shades of green.\nI never such a sight have seen.\nIt's awful when so helplessly\nI prey do fall to jealousy."},
{"title":"The Hares and the Foxes (Aesop)","date":"2015-09-05","content":"Upon the hares, an eagle preyed.\nEach day, it seemed, a friend he slayed.\n\nIn council, they decreed “No More!”\nAnd on that bird declared a war.\n\nBut to fulfill their rash decree,\nThey lacked a winning strategy.\n\nAn ally they would have to bring\nTo beat this foe with claw and wing.\n\nUnto the foxes they did plea:\n“Combined we may win victory!”\n\nThe foxes being rather wise\nKnew well the creature in the skies.\n\nAnd in their wisdom did opine\nThat they this skirmish should decline.\n\nFor ‘though the cause was just and right,\nTo wage this fight was not too bright.\n\n---\n\nAssess which foes your might can quell,\nAnd always choose your battles well."},
{"title":"The Faith of One as Weak as I","date":"2015-09-06","content":"If I had faith as Moses had\nTo make the Red Sea part;\nOr just as a small mustard seed\nPlaced somewhere in my heart;\n\nI know that I could mountains move.\nAnd miracles perform...\nImpart the blind their vision, and\nTo tame the savage storm.\n\nBut at times I feel I'm lacking \n(Between just me and you)\nI fear that I have much to learn\nBefore these feats I do.\n\nI truly know that God does live.\nHis son was crucified.\nTo all the resurrection is\nMost graciously applied.\n\nBut line by line, the method, by\nThe which we all must learn.\nAnd bit by bit the progress, as\nWe greater power earn.\n\nSo I thank my Heav'nly Father\nEach morning as I pray;\nFor the faith I have to wake up\nAnd face another day.\n\nThe faith I have to earn my keep;\nTo buy my daily bread.\nTo overcome temptation and\nTo choose the right instead.\n\nAnd so if I, each week or so\nA bit more faith do gain,\nPerhaps my own celestial crown\nI will one day obtain.\n\nCopyright ©"},
{"title":"Time","date":"2015-09-07","content":"Time,\nA succession of events\nLeading in no particular direction, but\nLeading nonetheless. \n\nMillenia,\nCenturies, decades, years, months,\nWeeks, days, hours, minutes, seconds:\nMeasurements of time. \n\nAttempts \nTo assign precise calibrations\nTo events of rather uncertain duration.\nLeading to confusion.\n\nOrder.\nEvents without a sequence in time reject reason.\nChickens before eggs, carts before horses …\nIs reason so important?"},
{"title":"Anti Anarchism","date":"2015-09-08","content":"I don't believe that freedom is\nTo do what e'er you will.\nI do not think it was designed\nTo selfish whims fulfill. \n\nI don't feel errant actions a\nSociety maintains;\nReject that prudent law, in fact,\nMy liberty restrains.\n\nSome thousand years of humankind\nExisting on this world,\nHave spawned a lot of sovereignties\nWhose banners they’ve unfurled.\n\nAnd every one was guided by\nA form of civic code.\nFor under this agreement they\nIn harmony abode. \n\nBut when they tired of it, and\nFound out it was a chore;\nThey picked up all their armies and\nThen marched again to war. \n\nWe struggle to be bound by laws\nThat other men did write;\nBut far less detrimental than\nA rifle take to fight. \n\nI don't condone that blindly we\nCorruption should support;\nAttempt to overpower us\nAs honesty purport. \n\nI just know that civ'lization\nCould justify its name,\nIf everyone on rules agreed\nAnd faithful played the game."},
{"title":"Yellow","date":"2015-09-09","content":"Yellow is a color bright,\nLike a flashing caution light,\n\nMustard, egg yolk, lions, corn,\nNewspaper that's old and worn,\n\nGoldenrod and fireman's clothes,\nHalf a bee and Texas rose,\n\nCoward's belly, fire’s glow,\nAnd some non—edible snow,\n\nDandelions, hair that's fair,\nSlickers in the rain you wear,\n\nBaby chicks and cheddar cheese,\nCould you pass the butter please?\n\nSunflowers that turn and sway,\nSunshine bright throughout the day;\n\nGoldfish and Canary wings,\nWhy, there's just so many things -\n\nRipe bananas, post—it notes,\nLegal pads for writing quotes,\n\nJaundiced skin, papaya, gosh,\nDuck feet, Bird's beak, summer squash\n\nDeadly fever, lemon rind,\nYellow’s all that's on my mind."},
{"title":"A Simple Rhyme","date":"2015-09-10","content":"I think that I shall never win\nA Pulitzer.\nFor that does talent, intellect\nAnd work infer.\n\nBut If I should a simple rhyme\njust happen on,\nI'll write it in my little pad\nAnd when I'm gone —\n\nIf one should read that little phrase\nAnd think it nice,\nMy life will then have been a worth —\nWhile sacrifice."},
{"title":"Love","date":"2015-09-11","content":"You      Me\nOne      Two\nHot      Cold\nJoy      Misery\nNear     Far\nTrue     False\nHere     There\nLife     Death\nHope     Despair\nFound    Lost\nRight    Wrong \nForever  Never \nGrowing  Falling \nAdoring  Loathing\nTogether Apart\nRational Irrational\nCaressing Pounding\n\nLove."},
{"title":"The Hare and the Sparrow (Aesop)","date":"2015-09-12","content":"Enjoying all the fresh, clean air,\nUpon the meadow was a hare.\n\nA shadow on the ground was cast,\nAnd with a start, the hare moved fast.\n\nBut with a cry, and then a gasp,\nSharp talons ‘round his sides did clasp.\n\nAnd then the hare began to rise\nInto the boundless summer skies.\n\nHeld firmly by the eagle’s grip,\nThe hare would take this final trip.\n\nA sparrow fluttered ‘round about,\nThen at the hare began to shout:\n\n“What happened to your fabled speed?\nIt failed you in your time of need!”\n\n“They said that you were oh so quick –\nBut now it seems you’re not so slick!”\n\nBut while the sparrow thus did tease,\nA hawk, the bird did quickly seize.\n\nThe hare despite his own grave plight\nDid say, “my friend, that serves you right!”\n\nAnd so with his last, final breath,\nHe felt much better facing death.\n\n---\n\nWe see that those who ridicule,\nMay one day soon become the fool."},
{"title":"Isaiah 30:15-25","date":"2015-09-13","content":"The Holy One of Is-ra-el,\nThe Lord thy God hath said -\nAlthough my children, I would save,\nAnother chose instead.\n\nYea, ye said no – for we will flee,\nOn horses swift shall ride.\nYet God shall grant your enemies\nTo swiftly reach thy side.\n\nAs many flee, ye shall be left\nAs desolate and still –\nAs beacon on a mountain top –\nAn ensign on a hill.\n\nAnd then shall God, with mercy great,\nBe gracious unto you.\nYea blessed are all they that wait\nFor God’s great judgment true.\n\nIn Zion, at Jerusalem,\nThe people shall then dwell.\nThey’ll no more weep, their cries He’ll hear,\nTheir fears, He all shall quell.\n\nThat thy eyes might see thy teachers\nGod giveth thee, before\nThe bread of dark adversity –\nAffliction’s water pour.\n\nAnd in thine ears, the spirits voice -\nTo on the path stay straight;\nFirst to the right, and then the left,\nAnd safely through the gate.\n\nAll other gods and images\nYou’ll melt and cast away.\nAnd bread of increase shall be thine,\nAs rain shall bless that day.\n\nThy cattle in large pastures feed,\nThe oxen and young ass.\nWith fan and shovel ye shall reap\nThe grains and all the grass.\n\nYea, streams and rivers shall then run\nOn hills and mountain tall -\nUpon that day of slaughter great,\nYea, when the towers fall.\n\nScriptural Reference: Isaiah 30:15-25"},
{"title":"Win","date":"2015-09-14","content":"I’ll tell you who you cannot beat –\nThe fellow who stays on his feet.\nOr if knocked down, he gets back up –\nHe’s always going to win the cup!\n\nYou may be faster, or more wise –\nBut he will always claim the prize.\nHe’ll take a punch right to the chin,\nAnd somehow, he will always win.\n\nYou try to squash his spirit down,\nHe’ll come right back, and win the crown.\nYou beat him ‘til he’s on the floor,\nAnd there he comes, right back for more.\n\nSo if a vict’ry is your plan.\nYou simply have to be that man!\n\nInspired by:\n“You just can’t beat the person who never gives up.”\nBabe Ruth"},
{"title":"Are One Thousand Words Worth A Picture?","date":"2015-09-15","content":"A picture’s worth a thousand words.\nI'm told that it is so,\nBy those who feign authority.\nAnd I suppose they know. \n\nBut if we're mathematical,\nAnd turn the phrase around;\nDoes, under thorough scrutiny,\nThe theory remain sound. \n\nIf I should pen and paper take,\nOne thousand words did write,\nThen paste them o'er my mantle, \nWould It make a pretty sight? \n\nAnd regardless of the masses,\nAnd what they may believe;\nA book with only pictures would\nBe cause for me to grieve. \n\nSo please keep pictures on the wall;\nAnd words inside of books.\nYou'll make your life much easier;\nAnd get less funny looks."},
{"title":"Estrellas","date":"2015-09-16","content":"Estrellas brillantes\nTan altas que son.\nMi Dios me ha dado\nUn gran gallardón.\n\nAhora soy niño,\nEspero aquí.\nArriba está,\nEsperando a mí.\n\nEstrellas brillantes\nCon la luz pido ya,\nEnseñen la ruta\nAl cielo allá."},
{"title":"Contemplation","date":"2015-09-17","content":"Along this stretch of beach I sit\nThat I may contemplate a bit;\nO'er life and love and peace and war,\nAnd calmness to my soul restore. \n\nFor as my idle thoughts do soar\nNow tempered by the oceans roar;\nI wonder what's to come of me\nAnd what, if anything, I'll be. \n\nI query if true love I'll find.\nOr if in loneliness entwined,\nI'll wander ‘lone throughout my days,\nA pris'ner in an endless maze. \n\nI ponder how on foreign lands\nPerhaps a gallant army stands\nPrepared to fight, that some may live\nIn freedom, and their lives will give.\n\nI then can see the children play\nOn meadows green throughout the day.\nAnd then in tranquil beds they sleep.\nTheir innocence the peace will keep. \n\nI know the world does little care\nAbout these thoughts that I now air.\nFor if a cause I do endorse\nOr wish to change the world’s course \n\nI must not stay upon my shelf,\nRely on no one but myself...\nHowever, now I think I'll stay\nUpon this beach along the bay."},
{"title":"Waves","date":"2015-09-18","content":"It wasn't all that long ago\nWhen to each other, we\nWere nothing more than passing waves\nIn life's tumultuous sea.\n\nBut as the waves, direction take\nWhen coming nigh to land -\nWe too did change our courses, and\nForge onward hand in hand.\n\nAlthough, as waves, our mortal lives\nQuite temporary are.\nThe limits of eternal souls\nExtend out rather far.\n\nThus now I pray that we might strength\nIn one another find.\nThat unlike waves, the wind and storm,\nOur actions may not bind.\n\nBut rather, arm in arm we may\nOn plotted course abide.\nUnited through this life and on,\nUntouched by changing tide."},
{"title":"The Lion’s Court (Aesop)","date":"2015-09-19","content":"Upon a time, there was a place\nWhere each and all did peace embrace.\n\nThe lion king was just and fair,\nFor all the creatures he did care.\n\nAnd so to disagreements thwart\nHe often held a public court.\n\nThen each would come unto his mount,\nAnd to the king make full account.\n\nThe tiger did respect the deer,\nWho now did not have cause to fear.\n\nThe leopard did not harm the goat.\nIn fact, on him, did rather dote.\n\nThe wolf no longer hunted sheep,\nWho now could very peaceful sleep.\n\nThe timid hare was heard to say;\n“’Tis true, we all are free today.”\n\nAnd thus they lived in harmony,\nThe way a kingdom ought to be.\n\n---\n\nIf anyone must live in fear,\nThen justice is but insincere.\n\n(Aesop index references: Oxford-Gibbs 20, Perry 334)"},
{"title":"How Great Thy Love","date":"2015-09-20","content":"They chained, then scourged and sentenced you\nFor being Son of God.\nHow vain and foolish are the souls\nWho walk on earthly sod. \n\nFor hanging on the cross in pain,\nYou did not power shew.\nBut asked for their forgiveness, as\nThey \"know not what they do.\" \n\nHow great thy love for mortal man.\nHow infinite and true thy plan.\nAs death for mercy didst thou pay\nAnd for me down, your life did lay. \n\nHow great thy love I now can see.\nIndebted then I'll always be.\nHow great, my Lord, thy love for me.\nTo save my soul and set me free. \n\nThe destitute, the murderer,\nThe righteous, wicked and impure,\nThou lovest all in equity.\nAnd hope from sin they all will flee. \n\n‘Though man dost lose the iron rod\nAnd wander farther from his God.\nIn holy courts you sit above\nAnd never failing offer love. \n\nThen as a simple mortal I,\nIn wonderment do stand.\nAs I your love do feel for me,\nThe kindness of your hand. \n\nI hope to one day comprehend\nThis gift of love you give,\nThat I might also love the world\nAnd as you've taught me live. \n\nFor hanging on the cross in pain,\nYou did not power shew.\nBut asked for their forgiveness, as\nThey \"know not what they do.\" \n\nHow great thy love for mortal man.\nHow infinite and true thy plan.\nAs death for mercy didst thou pay\nAnd for me down, your life did lay."},
{"title":"Solitary","date":"2015-09-21","content":"Alone, solitary,\nOnly sounds of nature heard.\nTo some, prospect scary,\nThere alone with tree and bird.\n\nTo me, sanctuary,\nFar from sprawling city street.\nWhere on occasion, I\nMay alone with feelings meet.\n\nHave, per chance, you been there?\nI do wonder if you know,\nIf he who lives within\nIs a friend or rather foe.\n\nAnd so I'll leave this message,\nAs now this poem ends:\nThat loneliness is peaceful,\nWhen with yourself, you're friends."},
{"title":"Rhyme On","date":"2015-09-22","content":"A poet doesn't always know\nJust what he wants to write.\nHe often will just ramble on -\nA tragic sort of plight.\n\nWhat should be said in just one word\nHe might jot down in ten.\nAnd as his aim he only might\nOn paper try to pen: \n\nA bit of miscellan’ous rhyme\nPerhaps he'll use another time."},
{"title":"The Yarnball","date":"2015-09-23","content":"When I was but a little lad,\nA studyin' in school,\nI learned ‘bout math and languages\nAnd of the golden rule.\n\nThere was one thing they taught me though,\nThat's caused a lot of strife.\nAnd though I've searched solutions,\nIt has plagued me all my life.\n\nThe scientists of times long past\nOnce made some firm resolves:\n\"Our planet flies through outer space\nAnd ‘round the sun revolves.\"\n\nNot only this, these fellows claimed,\n(Now listen to this riddle),\nBut as it makes this journey, it\nSpins around its middle.\"\n\nNow for a child young as I,\nThis concept was quite new\nAnd so I thought about it and\nI'll share these thoughts with you.\n\nI pictured one large ball of yarn\nAnd on the top stood I.\nAnd then this ball of yarn, you see,\nWas hurled up in the sky.\n\nThen someone grabbed the end of it so\nAs my yarn ball traveled\nIt spun and jerked and dove ...\nUntil it came unraveled.\n\nImagine with me if you will\nHow hard it is to keep\nYour body stationary\nWith this madness 'neath your feet.\n\nThen if you think about it\n(And I really think you should)\nOur earth's just like a yarn ball, and\nIt's spinning pretty good.\n\nNow some folks have a handle\nAnd on to it they hold.\nThey never sail the seven seas\nOr leave in search of gold.\n\nThey say it's due to gravity -\nI really can't believe -\nFor when I loosen up my grip\nFrom where I've been I leave.\n\nI have no ties that bind me\nOr roots to hold me down\nAnd so I slip and slide you see,\nAround from town to town.\n\nIt's quite a large sized yarnball though,\nAnd fortunate for me,\nIt's got a lot of crevices\nI'd really like to see.\n\nI know that of this journey\nOne day I'll surely tire\nAnd to keep a roof above my head\nIs to what I will aspire.\n\nAt times I wish that I were still\nA little lad in school\nAnd didn't know ‘bout algebra\nOr of King Henry's rule,\n\nBut I'm o'erjoyed that I was there\nThe day they taught the scheme\nOf planetary orbits\nAnd expanded on the theme.\n\nFor although I wish they'd change it\nAnd allow the world to stop.\nOr at least to slow it down a bit\nAnd let me climb on top,\n\nIt's nice I understand it\nAnd know the foe I fight.\nSo one day I might discover\nA solution to my plight."},
{"title":"Grandma Dear","date":"2015-09-24","content":"Our grandma dear, your soft words shared,\nHave taught me truths and proved you cared.\nA humble nurse - you've brought us health.\nAnd shown that love's the greatest wealth.\n\nA faithful wife and mother too,\nYou've cared for everyone but you.\nYou've brought us song, and filled our bowl,\nYou've cheered the tired and weary soul.\n\nA tribute to you now we share,\nYou are a jewel most prized and rare."},
{"title":"Beauty","date":"2015-09-25","content":"Should beauty all be gathered unto one single place?\nOr should we rather spread it out o'er all the worlds face?\n\nNow as I'm not a scholar or expert in the field,\nI think to greater intellects I will the problem yield.\n\nBut rather selfishly, I thought if I could find a way,\nI'd bring together earths most treasured beauties here today.\n\nAnd so for you, these roses I, specific'lly did buy,\nThat I might see them next to you — and you alongside I."},
{"title":"The Fox and the Grapes (Aesop)","date":"2015-09-26","content":"A fox one day was passing by\nBelow a sunny summer sky.\n\nAlong a dusty dirty trail,\nHe dragged his bushy, furry tail.\n\nAnd as he walked, he paused to think\nHow much he’d like to have a drink.\n\nAnd then a bunch of grapes he spied,\nWith juicy nectar full inside.\n\nThey looked so sweet, about to burst,\nHe knew that they would quench his thirst.\n\nAnd so with all his strength he hopped,\nThough, short of those fine grapes he stopped,\n\nFor they were just a bit too high.\nBut once again, the fox did try.\n\nAnd though he tried with all his might\nIt was, alas, a losing ﬁght.\n\nAnd after trying for an hour,\nHe cried, \"Those grapes are surely sour.\"\n\n---\n\nFor he who fails the prize to gain,\nWill often scorn it in his pain."},
{"title":"Quest","date":"2015-09-27","content":"You see, before the mountains were;\nBefore the rivers ran;\nBefore the tall majestic trees\nGave shade to mortal man;\n\nBefore the earth was shaped and formed\nAnd beasts placed there to dwell;\nBefore the firstling raindrops did\nOn sun baked soil fell;\n\nI lived and learned and prospered while\nAlong my Fathers side,\nAnd yearned to gain his fullness, and\nTo measure with his stride.\n\nHe loved me as a Father would.\nWas pleased with my desire.\nBut cautioned that the only path\nWas through the tempters fire.\n\nI told him that the foe I'd fight,\nAnd conquer valiantly.\nHe bowed his head and softly spoke:\n\"Then blessed shalt thou be.\"\n\nAt times when I'm discouraged, and\nFeel that life's unfair, I\nRecall my pre—existence and\nThe promise I made there.\n\nFor though I travel far and wide\nAnd sail o'er the sea,\nI know my Heav'nly Father still\nIs watching over me.\n\nSo I must always overcome\nAnd further truth and right.\nAs always must I serve him with\nMy heart, strength, mind and might.\n\nThen soon I'll see his face again\nAnd bowing at his feet\nI'll know that I am as he is\nAnd for his glory meet.\n\nThen he will say \"my son thou art,\nAnd faithful thou hast been.\nYou've overcome all wickedness,\nThe slavery of sin.\n\nAnd now back to my presence you\nHave faithfully returned.\nI'll place a crown upon your head;\nA kingdom you have earned.\" \n\nQuest"},
{"title":"Origins","date":"2015-09-28","content":"I'm told that years and years have past,\nSince came a quite enormous blast.\nAnd from this mess of strewn debris,\nOur earth emerged victor'ously.\n\nUpon which atoms' frolickings\nDid random create living things.\nThen as the planet did revolve,\nThese organisms did evolve.\n\nAnd this did happen by degree\nUntil were born both you and me.\nThis process then will follow on\nLong after you and I are gone. \n\nThis theory has remained intact,\nAnd almost can be called a fact.\nSo while this all may be quite true\nI have to share 'tween me and you,\n\nI think there's likely much to learn,\nAs new facts may the old upturn.\nAnd when we know the story whole,\nGod likely played a crucial role.\n\nBut as things stand right now, today,\nThere is one thing I'd like to say: \nI'd like to think I'm more than chance — \nA random bit of happenstance.            \n\nOrigins"},
{"title":"The Aeroplane","date":"2015-09-29","content":"Composed on a flight from Los Angeles to Amsterdam … or so they say! \n \nI've seen the craft up in the air.\nI've seen it on the ground.\nI find it quite amazing, how\nIt seems to fly around. \n\nThey say they'll take you ‘cross the state\nOr even o'er the sea.\nThey'll do it all quite gladly, for\nA reasonable fee.\n\nThey load it up with people and\nOf course their baggage too.\nIt must weigh several hundred tons\nWith all the gas and crew. \n\nAnd then they drive it down the road\nUntil it starts to rise,\nAnd onward, upward through the clouds\nTo vanish in the skies. \n\nIt's really quite intriguing, how\nThis hoax they perpetrate,\nAs I'm certain it's all fiction —\nThis illusion they create. \n\nFor to soar around the world in\nA cylinder of steel,\nDefies all basic reason, and\nI won't accept it's real! \n\nI like to climb aboard them though\nAlthough it's rather strange,\nFor when I take a ride on one\nThe scen'ry seems to change. \n\nSo let them play their little game\n(Although it's all in fun).\nIt's often quite enjoyable\nWhen all is said and done.  \n\nAeroplane"},
{"title":"Mr. Moon","date":"2015-09-30","content":"When through the woods I walk at night,\nWith daddy by my side,\nI see the moon up in the sky.\nAnd I from it do hide.\n\nI hide beneath the tall pine trees\nAnd ‘round the hillside too.\nAnd then the moon goes in a cloud,\nAnd pops out — Peek a Boo!\n\nI love to play this hide—n—seek\nWith Mr. Moon at night.\nAnd when I close my eyes to sleep\nHe goes out of my sight."},
