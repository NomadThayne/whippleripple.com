{"title":"The Bloom","date":"2015-10-01","content":"A horticulturist by trade\nOne day upon his garden gazed;\nCollections of the prized and rare,\nTogether with the common fair. \n\nNow in one corner of this plot,\nA withered bud began to rot.\n\"A tragedy\" the folks declared\nAnd at this gardener they glared. \n\nFor once upon that very stem\nWas found a budding blooming gem.\n\"A masterpiece\" the people said.\nBut now it hung all limp and dead. \n\n\"'Twas your neglect,\" the neighbors stated,\n\"And you this bloom eradicated.\" \nSo thus the accusations flew,\nAs our dear friend at once withdrew.\n\nAnd contemplated what they'd said\nReclining on his garden bed.\nAlthough he knew great care he took,\nUpon a careful, closer look,\n\nHe realized mistakes he'd made.\nAnd so its death, the price he paid. \n\"But wait!!\" he yelled in joyous tones,\nWhich cut right through the choir of moans.\n\n\"Although this bud will bite the dust,\nThen rot decay and turn to must. \nThe ground below will fertilize\nAs our dear plant will energize.\n\nAnd thus its form and size will change.\nAnd though right now it may seem strange. \nOne day you'll pass this way again,\nAnd look, and look and stare and then,\n\nA new bud in its blooming phase\nWill earn your highest form of praise.\""},
{"title":"I Love You, Friend","date":"2015-10-02","content":"Come now with me and walk a while,\nYou need not talk, but merely smile.\n\nI like your look, your way, your style,\nDon't put me through a lengthy trial.\n\nThe world is full, with much to see,\nAnd by your side I wish to be.\n\nThe paths ahead are new to me,\nBut we to travel them are free.\n\nAlone I've come a distance great,\nI hope I haven't come too late.\n\nI think I'm rather sent by fate\nThat we might share this joyful state.\n\nYour beauty does with nature blend,\nMy heart to paradise does send.\n\nForever you, would I defend\nBecause, you see, I love you, friend."},
{"title":"The Hares and the Frogs (Aesop)","date":"2015-10-03","content":"The hares all lived in constant fear\nOf dangers present, far and near.\n\nThis burden heavy on them weighed,\nAnd for relief they often prayed.\n\nThen as the months and years passed by,\nThey often thought they’d rather die.\n\nIn death, their suff’ring might be brief.\nThus suicide could bring relief.\n\nAs courage they most surely lacked,\nThey made this most distressing pact:\n\nThey marched in sadness, with a frown\nOff to the pond where they would drown.\n\nThe frogs who lived there, in the mud,\nDid hear their steps – each thump and thud.\n\nIn terror were the frogs then led,\nAnd from the bank they quickly fled.\n\nAdieu to lily pad they bid,\nAnd underneath the water hid.\n\nThe hares this exodus did view\nWhich taught them something rather new.\n\nAn elder hare did then observe,\n“These frogs have lost all of their nerve.\n\nI didn’t think that it could be,\nBut they’re more cowardly than we.\n\nPerhaps a lesson does this give –\nGood hares, let’s choose this day to live!”\n\n---\n\nAlthough your life may seem a curse,\nAnother fellow has it worse.\n\n(Index references: Oxford-Gibbs 248, Perry 138)"},
{"title":"The Faith","date":"2015-10-04","content":"To have the faith that Moses had, to cause the Red Sea part;\nOr even of a mustard seed placed deep within my heart.\nWith faith I could great mountains move, and miracles perform.\nImpart the blind their vision, and could tame the savage storm.\nWith faith I would possess the key, the power of the Lord;\nThe key to that great treasure house where blessings all are stored.\n\nWith faith within me, I could climb the highest peak.\nWith faith within me, I could find all that I seek.\nFor faith is power given freely from above -\nTo conquer all our enemies and spread the cause of love.\n\nBut I, oh Lord, in weakness stand, an humbled lowly lamb.\nAnd of these great and noble feats, quite undeserving am.\nA sinner in Thine eyes I fear, ‘though good works I do try.\nAnd for the great Redeemers blood, I in my garden cry.\nBut I shall not relinquish hope, and trust in Thy great love.\nAs grace and mercy Thou dost send, from Thy great realm above.\n\nWith faith within me, I could climb the highest peak.\nWith faith within me, I could find all that I seek.\nFor faith is power given freely from above —\nTo conquer all our enemies and spread the cause of love.\n\nSo I thank my Heav'nly Father, each morning as I pray;\nFor the faith I have to wake up and face another day.\nThe faith I have to earn my keep, to buy my daily bread.\nTo overcome temptation and to choose the right instead.\nAnd so if I, each week or so, a bit more faith do gain,\nPerhaps my own celestial crown I will one day obtain.\n\nWith faith within me, I could climb the highest peak.\nWith faith within me, I could find all that I seek.\nFor faith is power given freely from above -\nTo conquer all our enemies and spread the cause of love."},
{"title":"Flight","date":"2015-10-05","content":"With weary eyes and tired feet\nYou wander ‘long that deep‘ning rut.\nThrough day long selfsame tiresome tasks,\nYou ever climb but never reach the summit. \n\nAnd then with jealous eyes you look\nAbove the clouds and in them see\nWith goss'mer wings, he floats and dives.\nAnd though you sit quite dreary, the bird flies free.\n \nThen watch the cars fly blurry past\nThe window from the which you stare\nAnd I confused must simply ask,\nWhy is it that you churn away your life there?\n \nWhy don't you come along with me\nI'll take you where the birds fly free.\nThat past the summit you might see\nA place where worldly cares are not important.\n\nAnd though we must industr'ous be;\nWe needn't press our nose so hard on grindstones.\nBecause at times our minds must flee,\nThen for a moment burdens drop, and rest. \n\nFlight"},
{"title":"Water Works","date":"2015-10-06","content":"Pounding surf along the coast\nMolding dunes of sand,\nCarving solid rocky cliffs,\nWhere the water meets the land.\n\nMelting snow to stream gives rise\nFlowing down the valley sides,\nForming valleys, canyons grand,\nWhere the water meets the land.\n\nFalling rain On arid plain,\nNatural Springs\nThat lifeblood brings,\nBalanced by God's gentle hand -\nWhere the water meets the land."},
{"title":"Q","date":"2015-10-07","content":"Q is the queerest letter you\nCould ever hope to see.\nAnd some think quite un-useful, though\nIt's handy as can be.\n\nFor if you wish to quarrel, quake \nOr quit or quantify;\nYou couldn't really do it well,\nWithout a Q nearby.\n\nA duck would be quite silent, as\nA voice it would then lack \nIf it did not have access to\nA Q to make a quack.\n\nA queen could never quiver or\nFeel queasy quietly.\nAnd her power might be quashed although\nQuite qualified she'd be. \n\nYou'd never see a quail hur-\nRy quickly ‘cross the quad.\nAnd couldn't quarry quartz at all,\nI think it would be sad.\n\nBut if you think the questions\nOn a quiz lack quality -\nWithout a Q the whole thing would\nJust disappear, you see. \n\nThough if quadruplets on a quest\nIn quicksand did just sink,\nA quart of water, thirst would quench,\nIf they did take a drink.\n\nI hope you liked my little rhyme,\nI've one more tip for you.\nA Q must almost always be\nEscorted by a U."},
{"title":"Relics","date":"2015-10-08","content":"Gleaming turret, sparkling tower,\nShewing forth a kingly power.\nWalls of stone with bands of steel -\nBells from yonder belfry peal.\n\nSigns of strength when knights did reign\n0'er the vast and open plain.\nClashing sword and lances crossed,\nLeaving victims by as dross.\n\nMuscles forged of steel and fire -\nOf great deeds they did not tire.\nNow they groan beneath the sand,\n'Cross this gray and dreary land.\n\nRelics of a bygone age\nForce did rule o'er wisdom sage -\nOnce where chivalry did bloom\nNow the briars, rust, and gloom."},
{"title":"Dunce","date":"2015-10-09","content":"I've always been quite good at games\nWhere mind skills proved the key.\nBut I have found a riddle now\nI can't solve logic’lly.\n\nThe problem is: the woman.\nAnd try all that I may,\nI cannot understand her.\nI've little else to say.\n\nI've tried to analyze her.\nI've tried to understand.\nAnd still without an answer,\nIn solitude I stand.\n\nI only want to win the love\nOf one with whom I'd stay.\nAnd love her back profoundly.\nThen from her never stray.\n\nIt seems though, I'm unlucky,\nAlthough it takes just once.\nAnd since success I cannot find,\nI feel as if a dunce."},
{"title":"The Race (Aesop)","date":"2015-10-10","content":"Come, hear a tale I’d like to share\nAbout a tortoise and a hare:\n\nThe hare ran all about the wood,\nAnd laughed and played, as right he should.\n\nThe tortoise moved more like a snail\nAnd leisurely moved down the trail.\n\nThe hare did boast that none indeed\nIn all the world could match his speed.\n\nAnd then the tortoise he did tease\nAbout his funny feet and knees.\n\nThe tortoise then in anger cried,\n“How dare you others so deride!”\n\nAs shades of red transformed his face,\nThe hare he challenged to a race.\n\nThe hare, a hearty laugh did make,\nBut happily the chance did take.\n\nThe fox they chose as referee\nBecause both wise and fair he’d be.\n\nAnd on the morrow they would see\nWhich one would grasp the victory.\n\nThe day dawned bright, both were prepared,\nA glance, and then a handshake shared.\n\nThe fox, with grace, his tail did wag.\nTo mark the start, he waved a flag.\n\nThe tortoise started down the track,\nA firm resolve he did not lack.\n\nThe hare with confidence did grin,\n“I do not have to run to win!”\n\nHe had the time, and more, to spare\nAnd so he thought he’d linger there.\n\nNow thinking all of this a bore,\nHe took a nap and did then snore.\n\nAll afternoon, the hare did sleep.\nThe tortoise steady pace did keep.\n\nThe hare did finally awake\nThat he, his foe, might now o’er take.\n\nWith all the time he took to doze\nThere was a mighty gap to close.\n\nInto the race his all he thrust\nAnd left behind a cloud of dust.\n\nThe tortoise thought “the race is mine!”\nJust inches from the finish line\n\nBut with a burst, the hare closed fast,\nUpon the outcome doubt was cast.\n\nThe hare knew he must end on top.\nHe took a final giant hop.\n\nFirst through the air the hare did glide –\nThen ‘cross the tortoise shell did slide.\n \nBut with an outstretched neck and head,\nThe tortoise still the contest led.\n\nThe hare collapsed there in a huff,\nAnd knew it wasn’t quite enough.\n\nThe woodland creatures fixed their eyes\nAs none foresaw this great surprise.\n\nAnd when it all was said and done\nThe tortoise had the vict’ry won.\n\nThe fox declared, that day at least,\nThe tortoise was the faster beast\n---\n\nWhile some may set a faster pace,\nJust slow and steady wins the race.\n\n(Index references: Oxford-Gibbs 237, Perry 226)"},
{"title":"I Sometimes Stop to Wonder","date":"2015-10-11","content":"I sometimes stop to wonder\nWhy I have come to earth.\nWhy these, the last days of the world,\nWas I ordained to birth?\n\nWhen famine and destruction\nHave been prophesied to come.\nAnd some were to be chosen, why,\nPray, was I of the some?\n\nI think there was an error,\nFor valiant I am not.\nI must have slipped right through the cracks\nAnd fell down to this spot.\n\nI will not though contest it.\nI'm rather glad I'm here.\nAlthough for my own safety,\nI, Do tremble for my fear.\n\nAs trials will befall me\nTemptations come my way.\nIt will be difficult, at least,\nTo on the pathway stay.\n\nBut hope I have to make it\nWith all the help of God,\nMy knuckles will be white, I fear,\nFrom clinging on the rod.\n\n‘Though soon it will be over.\nThe way will be made clear.\nThe Savior of the world will come\nTo gather His flock near.\n\nThen when the heavens open,\nAnd when I see the Lord,\nHe'll wear a garment red as blood\nAnd wield a mighty sword.\n\nAnd then, He, many blessings\nWill on my head bestow.\nAnd then His loving kindness I,\nAgain will come to know.\n\nSo even if it's just a cruel\nAnd terrible mistake -\nI will be better off if I\nThe best of it do make."},
{"title":"1492","date":"2015-10-12","content":"\"In fourteen hundred ninety two ...\"\nAs one great poet wrote.\nA thing occurred that I feel was\nOf some historic note:\n\nA fellow named Columbus did\nRight of the charts set sail.\nTo find a route to China, thus,\nHe on that point did fail.\n\nHe happened on America,\nAs others had before.\nBut he did open up his mouth\nAnd talked about it more.\n\nNow as we mark another year\nFrom that historic date;\nThe natives of this continent\nHis journey might berate.\n\nBut someone else was bound to come —\nThe continent can't hide.\nYou really can't go very far\nAnd not with it collide."},
{"title":"I Wonder","date":"2015-10-13","content":"I wonder,\nShall I wander\nOver all this earthly sphere;\n\nAnd never\nFind the answers,\n'Though I search both far and near?\n\nPerplexing\nAnd unnerving\nIt increasingly does seem.\n\nLike falling,\nEver falling\nIn a re-occurring dream.\n\nI wish to\nKnow the future.\nWhat will happen in advance;\n\nDestiny\nWithin my view,\nThat each step won't be by chance.\n\nBut the years,\nEver passing,\nDo now seem to hold the clue.\n\nThe present,\nNot the future,\nWill decide what I will do.\n\nFor answers\nSought to questions\nWhich are yet to be discussed.\n\nWill never\nBe uncovered,\n‘Though in them we may trust.\n\nThen plainly,\nEver plainly,\nAs we on our course do stay;\n\nThe answers,\nFor the questions,\nWill surely come our way."},
{"title":"Cactus","date":"2015-10-14","content":"My daddy said you're prickly, like\nHis beard at evening time.\nMy mother likes your greenish hue,\nA lovely shade of lime. \n\nBut I'm amazed at how your roots\nStretch so far down below\nTo find some water for your thirst,\nYou could to China go. \n\nBut silent sentry of the west,\nI will not pat your head.\nFor you would likely poke me, so\nI'll wave hello instead."},
{"title":"Zero","date":"2015-10-15","content":"I wish within this rhyme to state\nMy feelings t'ward a number great.\nAnd voice concerns I've had of late\n‘Bout those who would my theme equate To nothing.\n\n‘Though zero added to itself\nRemains unchanged upon its shelf.\nAnd when to other sums combined,\nThere's been no change, we do this find\n\nAmazing; When rather than combine the two,\nWe set them side by side and do\nExamine the result we see\nIt's increased value by degree of ten.\n\nSo never underestimate\nThe problems which we can create\nBy overlooking zeroes and\nNot noticing just where they stand.\n\nThe End."},
{"title":"For Someone","date":"2015-10-16","content":"As my heart does careless run,\nMy hand does write a poem, for someone.\n\nTime and economics slide,\nAs on a cloud in heaven, with you ride.\n\nFalls from clouds can be quite far,\n‘Though true the only transit, to a star.\n\nIf we hold each other tight,\nLess likely would we plummet, pray we might."},
{"title":"Aesop's Book Review (Aesop)","date":"2015-10-17","content":"A certain man who wrote a book\nAsked Aesop if he’d take a look.\n\n“Please tell me in your own fine way\nThe brilliance that my words display.\n\nIs there a single page or phrase\nThat do your senses most amaze?\n\nAlthough my other works are great, \nThis surely is the best to date.\n\nThe genius of it shines right through…\nBut please, I’d like to hear from you.\n\nJust how would you my book appraise?\nDo I, myself, give too much praise?”\n\n...\n\nThe book was such a wretched bore,\nEach page was worse than that before.\n\nSo Aesop barely made it through,\nThen said, “Good sir, I’ll say to you:\n\n“I think you should voice your acclaim,\nAs no one else will feel the same.”\n---\nWrite that to what your heart is true,\nAlthough your fans may be quite few."},
{"title":"Tithing","date":"2015-10-18","content":"They say that moth and rust corrupt\nAnd 'though all you might try,\nYou cannot take your earthly gains\nAlong the day you die.\n\nI won't say that I disagree\nBut just ‘tween you and me,\nA way to overcome this plight\nThere may quite likely be.\n\nYou see, I take just ten percent\nOf all that I do gain,\nAnd put it in a special fund.\nNow, why I will explain:\n\nThe plan is simply stated, for\nWith tithes and off'rings I,\nAm making a down payment\nOn a mansion in the sky."},
{"title":"Wings","date":"2015-10-19","content":"There is no shore beyond\nThe reach of our imagination,\nNor altitude above the range\nOf our wings of aspiration."},
{"title":"Lonely Cipher","date":"2015-10-20","content":"Lonely cipher, where do you go?\nIn silence, what do you know?\nAre you a poet in some kind of righteous rage?\nAgainst a world you decry page after page.\nPlease tell me mister, do you have a place to go?\nOr do you like to wander, out in the snow.\n\nA loner, in quiet thought.\nI wonder what wars you've fought.\nHave you now given up on what life once stood for;\nAnd chosen other means to settle up the score?\nHave you at last denounced the throne you earned at birth,\nTo search for answers at the corners of the earth.\n\nLonely cipher, where do you go?\nIn silence, what do you know?\nAre you a poet in some kind of righteous rage?\nAgainst a world you decry page after page.\nPlease take me with you, please let me see,\nA new perspective and philosophy."},
{"title":"Bee","date":"2015-10-21","content":"Black and yellow little bees,\nfloating on a summer breeze.\nOn each flower she does hop\nAnd then back at the hive does stop.\n\nShe fills it up with honey sweet.\nThere is no more delicious treat.\nBut if back home, I wish to bring\nSome honey, she might try to sting.\n\nBut though the pain may make me cry,\nThe bee, you see will surely die.\nAnd so this tale, you see, my friend,\nMight have a rather tragic end."},
{"title":"Onward","date":"2015-10-22","content":"The time has come, I think, at last,\nTo shed a tear and leave the past.\nAnd onward trek on new found trails,\nOld ties unleash, unfurl the sails.\n\nFor yesterday is in the past,\nTomorrow new, now forming fast.\nAnd as the moon sets dim and pale,\nThe sun breaks forth, its rays unveil;\n\nA brand new world of dreams come true,\nInfinities of things to do.\nA time of opportunity,\nTo be just what I want to be.\n\n‘Though honestly I must admit\nTo leave the past hurts quite a bit;\nI look toward the morning star\nAnd know that ‘though I may roam far,\n\nA little bit of now I'll keep\nWithin my heart amid the heap\nOf long past trials and victories,\nOf tears, and smiles, and pleasantries. \n\nFor what more could I really ask?\n‘Neath morrows mid—day sun I'll bask.\nA new adventure underway,\nThe heroes role for me to play.\n\nAnd always forward without fail,\n‘Though glimmers of the past I'll trail.\nFor I believe the quest of men\nShould be to learn from where they've been."},
{"title":"Beyond","date":"2015-10-23","content":"Beyond the thoughts we comprehend,\nBeyond the words that may be penned;\n\nOur souls may whisper like a dove\nWith messages of truest love.\n\nWhen strength or courage we do lack,\nWhen difficulties do attack;\n\nWe are sustained by mem’ries of\nThe warm and caring arms of love.\n\nWhen walking hand in hand with you,\nWith earth’s great beauties in our view;\n\nLike angel choirs voiced above,\nOur hearts may sing in joy with love."},
{"title":"The Thirsty Hare (Aesop)","date":"2015-10-24","content":"A hare hopped down a dusty trail,\nWith weariness he dragged his tail.\n\nBut more, his thirst did plague the hare –\nNo water found he anywhere.\n\nAnd then good fortune his way fell –\nAside the road, there was a well.\n\nDespite his luck, he found a flaw –\nThere was no means to water draw.\n\nNot thinking very much at all,\nInto the well he chose to fall.\n\nThen in that water dark and chill\nHe cooled his brow and drank his fill.\n\nAnd after having all his fun,\nHe stopped to think what he had done.\n\nIn desperation he did shout,\n“Please, someone stop and let me out!”\n\nA fox did happen by the site\nAnd heard the hare scream out in fright.\n\nAs she peered down the hole to see,\nThe hare did plead; “oh, please save me.”\n\nThe hare, his story did relate\nAnd what led to his sorry state.\n\nThen after hearing of his plight\nThe fox just said; “It serves you right.\n\nBefore you dove to quench your thirst,\nYou should have thought about it first.”\n\nThen after having had her say,\nShe gave a wave and walked away.\n\n---\n\nFor consequences, give a thought,\nTo not within a trap be caught.\n\nAesop index references: Oxford-Gibbs 444, Perry 408"},
{"title":"Nebuchadnezzar","date":"2015-10-25","content":"Head of gold, great king -\nWhat sorrow time must bring. \n\nForeknowledge of the end of time,\nWhen only iron and clay doth stand.\n\nSoon rent and in its stead\nThe kingdom of our living head.\n\nStone cut without hands\nWill cover all the earth —\n\nWould you rather stand as servant in our Father's land,\nThan king in yours with pure command?"},
{"title":"Aspirations","date":"2015-10-26","content":"If I were a king...\nI would be the greatest king in the world.\nI would only enact good laws and treat everyone well.\nPeople would come from all over the world\nJust to look at my kingdom and maybe live in it.\n\nIf I were a chef...\nI would be the greatest chef in the world.\nI would prepare food like it had never been done before.\nPeople would come from all over the world\nJust to watch me prepare food and maybe taste it.\n\nIf I were a tailor...\nI would be the greatest tailor in the world.\nI would make the nicest clothes anyone has ever seen.\nPeople would come from all over the world\nJust to see my clothes and maybe try them on.\n\nIf I were a fisherman...\nI would be the greatest fisherman in the world.\nI would catch the biggest and best fish in the sea.\nPeople would come from all over the world\nJust to see my fish and maybe taste them.\n\nIf I were a builder...\nI would be the greatest builder in the world.\nI would make the most beautiful houses ever.\nPeople would come from all over the world\nJust to see my houses and maybe live in them.\n\nBut what am I? What am I?\nI shall be the greatest me in the whole world.\nAlthough I don't know exactly what it is I will do,\nPeople will come from all over the world\nAnd say, \"you are the greatest you I have ever seen.\""},
{"title":"The Trek","date":"2015-10-27","content":"I set out on a little trek,\nThat I, the world might see.\nThe weather, it was balmy, clear,\nNot nicer could it be.\n\nThe sun shone down about me as\nI Trottled right along.\nThe birds joined in the chorus, as\nI sang aloud my song.\n\nI happened on a cobbler, who\nSaid, \"My-good-golly-pete,\nYou can't be travelin' my lad\nWith nothin' on your feet.\n\nAlthough I hadn't thought of it,\nI saw some I did like,\nAnd without too much dickering,\nA bargain we did strike.\n\nAnd then I met a tailor, who\nSaid, \"My dear boy, it's rare,\nTo see a fellow clad in shoes\nWhile other than that bare.\"\n\nA speech ensued about the pros\nOf fashion and did run\nFrom tying a cravat just right,\nTo harmful rays of sun.\n\nOf course I bought that suit of clothes\nAnd then I bought a home.\nWith all of the accouterments\nAnd ceased the world to roam.\n\nSometimes now in the evenings, while\nJust lying in my bunk,\nI think about my life thus far\nAnd all my bloomin' junk.\n\nIf I had other paths then walked;\nThe cobbler had I passed;\nThe world I'd have gone around\nAnd seen all that it hast.\n\nI wouldn't have this pile of stuff\nTo lug around and clean,\nBut wisdom great from all would I\nHave had the chance to glean."},
{"title":"Wolves","date":"2015-10-28","content":"Wolves in the forest\nAdvance in a pack,\nLooking for something\nThat they can attack.\n\nShiny white teeth and\nA silver gray coat,\nLurking in darkness\nIn forest remote."},
{"title":"Little Fingers","date":"2015-10-29","content":"You struggle with those fingers, child.\nThe thumb gets in the way.\nAppendages that still are wild -\nKeep testing them, I pray.\n\nFor now just grip my steady thumb,\nAnd hold on to it tight.\nThen soon you'll lift a breaded crumb,\nAnd later learn to write."},
{"title":"Free","date":"2015-10-30","content":"If you ask me why I'm free\nOf some female company,\nI'll surely on her head the blame imply.\n\nAs in the past I've failed,\nIn competition paled.\nI'm sure her future answers will be \"no.\"\n\nI suppose I likely would,\nIf I halfway thought she could,\nRespond with an affirmative reply.\n\nBut being that I'm me.\nAnd knowing she is she.\nI fear the odds particularly low.\n\nThus to avoid a fall,\nI will opt to her not call.\nBut rather sit alone in misery."},
{"title":"Trick or Treat","date":"2015-10-31","content":"There is but one night every year\nWhen all your fears come true.\nWhen Ghosts and Goblins Haunt the town\nWith shrieks and shouts of \"Boo.\"\n\nSo if you have a heart that's faint,\nYou shouldn't roam the street.\nFor you might likely see them there -\nSent out for Trick or Treat!"},
{"title":"Repentance","date":"2015-11-01","content":"One night I lay upon my cot\nIn prayerful and absorbing thought.\nBut all my faults did fill my head\nAnd hence for His forgiveness plead.\n\n\"My lord, in my indignity,\nI come before thy throne to plea.\n’Though, true at times, a sinful son,\nI ask that I, thou might not shun.\n\nAnd pray that t'ward thy shining light\nI may with courage bravely fight.\nThat ever I might on thy path\nRemain, in spite of Satan's wrath.\n\nOh Father, to be meet I pray,\nTo kneel before thee on that day.\nAnd that without reluctancy,\nThou might say; \"son, reside with me.\"\n\nI then a quiet stillness felt\nAnd knew that He in mercy dealt.\nFor as I drifted off to sleep,\nA thought I heard, my heart did leap:\n\n\"Thy sins I have forgiven thee,\nWith Christ as intercessory,\nFor all the world's guilt did pay\nThat through repentance find the way.\"\n\nIn sum, a message apropos -\nFor as He said, so long ago,\nNow go thy way and sin no more —\nAnd I shall wait thee at the door."},
{"title":"Commuter","date":"2015-11-02","content":"When queried what it is I do\nTo earn my livelihood,\nI answer with my tongue in cheek\n(My diction's not real good).\n\nI do rise up in the morning,\nPut on a suit of clothes,\nAnd eat my breakfast quickly, as\nI watch the morning shows.\n\n'Tis then I take my auto,\nDepart from my abode\nAnd join my colleagues everyday\nOut there upon the road.\n\nWe glance at one another, and\nWe cut each other off,\nAnd scream and yell and rant and rave\nAnd at each other scoff.\n\nThen when we reach our offices\nWe do a little lunch,\nAnd talk about our morning drive,\nOur time clocks then we punch.\n\nThen back out to the highway, where\nWe curse and spit and swear.\nTo reach our homes in safety, and\nIn no time, we are there.\n\nMy title of vice president\nIs somewhat incorrect.\nI'm really a commuter, and\nDemand my due respect!"},
{"title":"A Vote","date":"2015-11-03","content":"I slowly walked down to the polls.\nMy head was hanging low.\nFor who or what I ought to vote,\nI did not really know.\n\nThe choices seemed so loathsome, and\nThe candidates so weak.\nIn fact I think as bad does go\nWe've likely hit the peak.\n\nBut as a patriot would do,\nI swallowed hard and chose\nThe ones I thought would hurt me least ...\nBut one just never knows.\n\nAnd then I thought how fortunate\nWe are to have a vote.\nSo bad or good, I love this land.\nI'll end now on that note."},
{"title":"Post-Election Blues","date":"2015-11-04","content":"I had wished that it were over.\nI wanted it to end.\nBut God does often, spitefully,\nOur dearest wishes send.\n\nI'd had enough of candidates,\nOf slogans and of bills,\nOf propositions, promises,\nAnd special interest wills.\n\nBut on returning from the polls,\nJust right around the block,\nI tuned in my old TV and\nReceived a major shock.\n\nInstead of all the pleas and threats\nTo vote for this or that,\nThey wanted me to purchase things\nAnd so I donned my hat.\n\nAnd went out to the local mall\nTo do just what they asked;\nWhere I depleted all my funds -\nAnd did it rather fast.\n\nSo then without a penny, I\nOut on the street was tossed.\nAnd insult upon injury,\nMy candidate had lost."},
{"title":"Dark Ages","date":"2015-11-05","content":"My thoughts quite often I do cast\nUpon the rather distant past.\nAnd I would like to make remark\nUpon the famous Ages Dark.\n\nAn age of glory, brave and bold\nWith castles all arrayed with gold.\nWhen knights with sword would prove the right\nBy showing forth their awesome might.\n\nA maiden would not need to fear\nWith men in armor ever near.\nBut dragons fierce kept on the run,\nAs knights would slay them - just for fun.\n\nBut life in castles made of stone\nWithout a proper telephone\nWould be a cause for great despair;\nCold and alone I'd shiver there.\n\nNo cars, no planes, no window panes,\nThe humid smell of must;\nAnd standing out beneath the rain,\nMy armor'd surely rust.\n\nAnd so I feel there likely may,\nA reason to in our time to stay.\nAs from a more relaxed position,\nI may watch knights on television."},
{"title":"Sometimes","date":"2015-11-06","content":"Sometimes,\nThere's a gleam in your eyes.\nIt happens most often\nWhen the corners of your mouth\nTurn up.\nAnd the lips separate just a bit.\n\nIt may be the reflection from your teeth\nOr from a star.\nI think though that its a\nReflection from your spirit.\nAnd when you smile just right,\nThe light comes in And bounces off your soul\nThen comes back through your eyes.\n\nI love that sparkle.\nIt is more valuable to me\nThan the sparkle of your diamonds,\nAlthough they symbolize our covenant\nTo spend together forever.\n\nIt is more beautiful than the moon\nReflecting on the ocean around our home.\nIt tells me that you're happy and\nThat you love me.\nI love you and that light that you bring to my life.\n\nSometimes,\nA gleam I see.\nWhen corners of your mouth do rise\nAnd lips part just a bit."},
{"title":"Run for Your Life! (Aesop)","date":"2015-11-07","content":"Some goats were grazing on the grass.\nThe goatherd watched the clouds drift pass.\n\nTheir dog was sniffing at the air,\nAnd thought he smelled a wild hare.\n\nHe walked toward a leafy bush\nAnd gave the branch a gently push.\n\nA hare out from the shrub did dart.\nThe dog in quick pursuit did start.\n\nAcross the field at frenzied pace,\nThen through some trees the pair did race.\n\nThen under thorny hedges near,\nThe hare again did disappear.\n\nThe dog back to the herd returned.\nThis time without his meal earned.\n\nThe goatherd laughed, and teased his friend;\n“This isn’t how it used to end.\n\nYou used to be so very fast –\nI guess that now is in the past.”\n\nThe dog a quick retort did make –\n“The hare had more than I at stake.”\n\n---\n\nOne’s effort to a goal obtain\nIs less than to his life retain.\n\n\"Running hare\". Licensed under CC BY-SA 3.0 via Wikimedia Commons\n\nIndex references: Oxford-Gibbs 396, Perry 331"},
{"title":"Discontent","date":"2015-11-08","content":"Far flung from greater place, I'm sure;\nWhy else so discontent am I.\nAnd why does heaven so allure?\nWhy do I yearn to yonder fly?\n\nIf merely molten clay am hewn,\nMy aspirations might not soar.\nOh yes! I'm more than dust and rain.\nI know not what, but much, much more.\n\nOnce in a quiet, shaded wood,\nIn contemplation I did stand.\nA gentle unheard loving voice\nWith power did my ear demand.\n\nThe message clear - I now know why,\nA higher plane I would explore.\nThese mortal days, are but a test,\nFor destiny I can't ignore."},
{"title":"Believe!","date":"2015-11-09","content":"The things on which we now insist,\nNot long ago did not exist;\n\nThe mobile phone and internet,\nThe radio and TV set,\n\nThe car and satellites and planes,\nElectric blankets too, and trains.\n\nThey once were just ideas, or less,\nAnd did not all the world impress.\n\nEach took a thought, and then an act,\nBefore they could our lives impact.\n\nSo, let me make it crystal clear,\nYou should not doubt, or failure fear.\n\nThere's nothing you cannot achieve,\nIf in your dreams you do believe.\n\nInspired by:\n\"If you can dream it, you can do it.\"\nWalt Disney"},
{"title":"Paranoia","date":"2015-11-10","content":"When you see them on the corner\nOr hiding in the store,\nWhen they're in the car behind you\nAnd always ‘hind the door;\n\nWhen paranoia's got you, and\nYou can't sleep through the night,\nFor with every creak and rustle\nYou sit up straight in fright;\n\nRemember that it's only fear\nYou need to reckon with,\nAnd ghoulies, ghosts and goblins are\nExclusively in myth.\n\nBut on the other hand my friend,\nWhen lights are fading off;\n'Though the dead may not afflict you,\nAt the living never scoff.\n\n'Though paranoia's crazy, and\nIt tears you up inside;\nI would never feign to postulate\nYour fears aren't justified."},
{"title":"The Sea","date":"2015-11-11","content":"The sea's a place for roaming,\nTo seek the wandering star.\nWhere we can go discover\nAnd see the lands afar.\n\nThe sea's a place of beauty\nWhere seagulls dive and play.\nThe waves show forth their fury\nAnd the sun sets 'cross the bay.\n\nThe sea's a place for children,\nBuilding castles in the sand.\nTo show God's great creation\nAnd the power of His hand."},
{"title":"Shipwreck","date":"2015-11-12","content":"They sailed o'er the spanish main,\nAnd 'cross the raging sea.\nBut now they're fathoms down below\nReduced just to debris.\n\nAnd there they lie, some leagues submerged,\nWhere kelp and coral grow.\nA haven for the fish at play\nAs barnacles do grow.\n\nI wonder ’bout the sailors brave,\nAnd if they lived or died.\nAnd if a treasure in a chest\nIs hidden down inside."},
{"title":"Turning Tide","date":"2015-11-13","content":"At six o'clock on Saturday,\nThe memory still clear,\nOf when her ship set sail that day\nAnd left me on this pier.\n\nThe seagulls cried the lament loud -\nThe surf roared loud in pain.\nBut I sat quiet, listlessly,\nMy heart now rent in twain.\n\nI said I wished she wouldn't leave.\nI'd rather she would stay.\nBut now she's gone and I alone\nEndure each passing day.\n\nTide is turning, currents flow,\nEbbing, flooding, apropos.\nAll adrift upon the sea,\nPassing through eternity.\n\nHoping love won't fade away,\nHarder with each passing day.\nTide is turning, currents change.\nLives like oceans rearrange.\n\nBut I, as well, have left the pier\nWith someone mourning me.\nAnd ’though I cried a tear or two,\nI felt that it must be.\n\nThen ships will come and also go,\nAnd on them all will ride.\nAs often as the circling moon\nDoes bring again the tide.\n\nTide is turning, currents flow,\nEbbing, flooding, apropos.\nTide is turning, currents change.\nLives like oceans rearrange."},
{"title":"The Hare's Antlers (Aesop)","date":"2015-11-14","content":"A stag upon a hilltop stood.\nHe was the prince of all the wood.\n\nWith antlers glorious and grand,\nNo finer creature could there stand.\n\nIn jealousy a hare did cry\nTo Jupiter, the god on high –\n\nThat he great horns should also wear\nSo he might look so strong and fair.\n\nAnd with sharp horns upon his head,\nHis enemies would run with dread.\n\nBut Jupiter, the god of Greek,\nInformed the hare he was too weak.\n\nWith pleading voice, the hare did cry;\n“I know I can, and beg to try.”\n\nSo warned, the hare had been well told,\nHe could not bear the heavy load;\n\nThe god, his wish did then bestow,\nAnd on his head the horns did grow.\n\nFine branching horns both tall and wide –\nThe lowly hare did beam with pride.\n\nAnd under the oppressive weight,\nHe showed to all his prize so great.\n\nAnd then along the road did pass\nA flock of sheep to find green grass.\n\nThe shepherds saw this little beast,\nAnd thought to make of it a feast.\n\nThe hare did sense their appetite\nAnd turned to scurry far from sight.\n\nBut with the burden on his head\nHe now did feel a sense of dread.\n\nHe could not run, or jump, or hop,\nOr their most cruel intentions stop.\n\nAnd so to those great antlers win,\nThe hare paid dearly, with his skin.\n\n---\n\nBeware, the dream you wish achieve\nMay be the one you do receive."},
{"title":"Dawn","date":"2015-11-15","content":"The day has dawned anew,\nThe last day of the Lord.\nHis praise we as a carol send\nIn love with one accord.\n\nThe signs of prophets dead\nNow blazen ‘cross the sky.\nThe righteous know He soon will come,\nOur Lord and God most high.\n\nThe wicked, blind with sin,\nHis warnings will not heed.\nAs stubble then, they must now burn\nWhen he does come with speed.\n\nWe will be gathered then.\nThe stakes all gathered tight.\nWhen in a cloud and dyed of red\nHe comes adorned in light."},
{"title":"Kindness","date":"2015-11-16","content":"As you endure your daily grind,\nWhenever possible, be kind.\n\nWhen someone near has lost their way,\nWhen things don't always go your way,\n\nWhen tempers flare and others shout,\nWhen someone's sanity you doubt,\n\nWhen running late, when you are tired,\nPerhaps the day when you are fired,\n\nWhen others fail to do their part,\nWhen you are left with broken heart,\n\n'Though difficult at times, I find -\nIt's always possible. Be kind!"},
{"title":"Shadows of a Philosophical Daydream","date":"2015-11-17","content":"From here to there, and there to here,\nThe shapeless blobs are drawing near.\nThe lifeless forms that hurry past —\nTo work, to school, to ballet class. \n\nIt really doesn't matter much.\nYou've got your lives to which you clutch.\nI've got my own life too, you see;\nI dread your drab conformity.\n\nThere's much to learn, absorb, and grasp,\nWhile your short lives are rushing past.\nI wish you could be one with me\nTo soar into eternity,\n\nTo visit endless bounds of space,\nAnd lose all track of time and place,\nTo study out the human mind\nAnd all the hidden powers find.\n\nFrom here to there, and there to here,\nThe shapeless blobs still drawing near\nThe lifeless forms more quickly pass —\nTo work to school, to ballet class.\n\nAnd I alone now hope and pray\nThat humankind may come to say:\n\"The race is o'er and no one won,\nThe struggle now an inward one.\n\nAnd we must grow and learn to be\nAs brothers, yearning harmony.\nThe race we run‘s an inward test\nAnd not to beat another's best.\"\n\nBut hopes are dreams and dreams, alas,\nAre not as good as hard cold facts.\nFrom here to there, and there to here,\nThe shapeless blobs are close, I fear.\n\nThe lifeless forms as bullets pass —\nTo school, to work, to ballet class.\nAnd over-run I soon will be\nBy someone else's fantasy.\n\nThen try I will with mind and might\nTo never lose the endless fight.\nAs pressures from the mass prevail,\nI'll always hope of glory trail,\n\nAnd carry on through muck and mire,\nAnd strive to raise the banner higher;\nTo defend the truth and just,\nI always have and always must!\n\nFrom there to here, and here to there,\nI run around and blankly stare,\nAs minutes on the clock roll past,\nI'm late again for ballet class!"},
{"title":"The Little Bug","date":"2015-11-18","content":"I saw it crawling in the dirt\nA half a block away.\nAnd put it in my pocket, then,\nI took it home to play.\n\nIt was the weirdest little bug\nYou'd ever hope to see.\nIt crawled upon the sidewalk and\nThen it did crawl on me.\n\nI thought I'd put it in the house\nRight on the tile floor.\nAnd let my mother see it and\nThen listen to her roar.\n\nAnd then I thought I'd throw it up\nInto my father's hair.\nTo see if when he pulled it off\nIt might the old guy scare.\n\nBut after playing baseball, and\nThen jumping on my bed,\nI pulled the little fellow out\nAnd he was very dead."},
{"title":"A Not So Ordinary View","date":"2015-11-19","content":"The other morning when I woke\nI did the help of Him invoke.\nFor comprehension I did pray,\nTo see the world a different way.\n\nAs deep within life's daily grind\nI more than often myself find.\nAnd rarely ever make the time\nTo out from under schedules climb.\n\nAnd thus I travel through my life,\nMy calendar with nonsense rife.\nMy mind, however, blank is found\nWhere idle thoughts did once abound,\n\nWhen I was younger and was free\nFrom vain responsibility.\nI took the time to stop and sit\nAnd thoughts to wander off permit.\n\nAs Alice in her wonderland\nOn distant planets I would stand,\nReflecting on the universe,\nOr lines of Shakespeare did rehearse.\n\nBut somewhere ’tween a fool and sage\nYou reach a rather awkward stage.\nWhere fool enough to think you're wise,\nThe foolish things of earth you prize.\n\nAnd hence in circles 'round you spin,\nConvinced that you might someday win.\nBut rather soon you'll come to tell —\nThe end result: a dizzy spell.\n\nSo if you have a moment free,\nI bid you spend some time with me.\nAnd let me share, of life, with you\nA not so ordinary view."},
{"title":"Celebration of Time","date":"2015-11-20","content":"Of all the things in life that we\nDo o'er our lives collect,\nIt's years passed by that are the best,\nAs I do now reflect.\n\nFor each year brings a dozen months,\nThree hundred some odd days\nOf time that I may spend with you\nAnd in your eyes may gaze. \n\nToday, in recognition of\nYour vast and boundless worth,\nI give to you my heart-felt love -\nThe greatest gift on earth.\n\nDevotion to you, I bequeath,\nMy time and honor too.\nAnd knowledge that my time most prized\nIs what I've spent with you."},
{"title":"The Art of the Fox (Aesop)","date":"2015-11-21","content":"A fox upon the road did stroll.\nAnd as he passed a grassy knoll,\n\nA hare did wave and shout, “good day!”\nAnd quizzically went on to say;\n\n“In all the wood you stand apart,\nAs famous for your skillful art.\n\nBut many of us do not know\nWhat talent caused your fame to grow.”\n\nThe fox replied with knowing glow;\n“My secrets I will gladly show.\n\nI do appreciate your zeal,\nCome join me for a lovely meal.\n\nPlease hop down to my den at nine,\nAs that is when I plan to dine.\n\nAll day the hare prepared with haste\nThat of the art, might get a taste.\n\nAnd wanting to appear his best,\nThe hare arrived fresh cleaned and dressed.\n\nThe table was quite finely set\nBut food had not been placed there yet.\n\nThe fox did then his plan reveal,\nThe hare, himself, would be the meal.\n\nThe fox left no one to applaud\nHis art of cunning and of fraud.\n\n---\n\nShould curiosity arise,\nConsider also what is wise."},
{"title":"Below a Starry Sky","date":"2015-11-22","content":"Have you, below a starry sky\nThought much on who you are?\nA child of Almighty God\nFrom royal courts afar.\n\nHave you considered what it means\nTo be a godly heir?\nThe promise, if you're worthy, to\nAll endless worlds share.\n\nCan you imagine what it means\nTo have all strength and power?\nThat on the heads of all mankind\nRich blessings you might show'r.\n\nAnd so I think I'll work toward\nThat elevated goal.\nFor I do know I have the pow'r\nWithin my humble soul.\n\nIt's not that I am discontent\nCompletely with my state.\nIt's just that I would always like\nMy status elevate.\n\nAnd from my humble mortal view,\nI see no cause to stop\nAt any intervening point,\nIn transit to the top."},
{"title":"Lowly Seed","date":"2015-11-23","content":"From lowly seed, when careful sown,\nThe mighty tree in time is grown.\nThe drops of melting glacier field,\nDoes in its course a river yield.\n\nAs tiny tillers great ships steer\nBack to their sheltered home port pier.\nAnd thus it goes, though small in size\nA larger end they realize.\n\nSo please remember this I ask,\nBefore commencing any task:\nWhen visions of grand things you scheme\nOr planning out a lifelong dream;\n\nWithout providing great detail\nYour brilliant plan will soon derail.\nFor no one cares how grand the scale,\nWithout the little things, ‘twill fail.\n\nAnd likewise don't discount the worth\nOf all the smaller things on earth.\nFor value's such a vaguery\nBefore the end result we see."},
{"title":"Lingering Doubts","date":"2015-11-24","content":"Why is it that you linger here?\nDo you enjoy our company so much\nThat you endure the pain of being old.\nAnd fight each day the grasp of mother earth. \n\nWhy is it that you linger here?\nIn younger days the bands of life were strong\nBut today, the will to live is barter\nSufficient for release from earthly woe.\n\nWhy is it that you linger here?\nPerhaps it is the fear of unknown paths?\nReluctance to forsake familiar ways?\nAnd hesitance to tell God of your worth?\n\nWhy is it that you linger here?\nI do not know, but each day that you stay\nPlease know that we do cherish and are glad.\nFor when you leave, more than you'll ever know -\n\nYou will be missed and you, we won't forget."},
{"title":"The Pier","date":"2015-11-25","content":"Pilings rotting in the surf\nUseless now to all;\nFaint is now the memory\nWhen they once stood tall.\n\nWhen a pier did span the waves,\nWhen the boats did stop,\nWhere on lazy afternoons\nFishing hooks did drop.\n\nUnder moonlit star-filled skies,\nHolding lover's hands -\nThere they traded vows and then\nAccepted wedding bands.\n\nLives must be too busy now,\nCity lights too bright;\nFor those children to return\nAnd view this lonely sight.\n\nBarnacles have taken o'er\nWhat's left of yesteryear.\nSoon the pounding waves will take\nWhat once was held so dear."},
{"title":"The Setting Sun","date":"2015-11-26","content":"I spend my days upon the sea.\nFrom land's firm grasp my soul runs free.\nI stare at passing gulls that soar,\nUntil they've gone and pass no more.\n\nThe sails flap at changing winds\nAnd dolphins bare their sloping fins.\nThe tiller kicks as swells resist,\nWhile memories rise of loved ones missed.\n\nThe days pass on, and what is done?\nNo clock is punched, no love is won.\nAnd yet fulfilled in bed I lie,\nWhen sun gives way to moonlit sky.\n\nFor often in this sea, called life,\nWhen burdened down with care and strife.\nThe goal, when all is said and done:\nTo last until the setting sun."},
{"title":"Sails on the Bay","date":"2015-11-27","content":"Sometimes life\nBecomes a little hairy.\nStress and strife,\nMore than just remotely scary.\n\nFriction mounts,\nI find trouble's underway.\nSo I run\nTo my secret hide-away.\n\nWhere I flee the daily grind\nAnd might relaxation find -\nTo escape life's schrapnel fray,\nWatching sails on the bay. \n\nWatching sails on the bay\nBlows my mundane cares away.\nAnd 'though all that you may say,\nYes, forever here I'll stay,\nWatching sails on the bay. \n\nYou ask me:\nIf I would like to travel.\nCarefree be,\nAnd let my mind unravel.\n\nBut I think -\nIf I were to leave here baby,\nOut of sync\nI'd be and absolutely crazy.\n\nSo complacently I sit,\nAnd though selfish I admit,\nI just think I'd rather stay\nWatching sails on the bay. \n\nWatching sails on the bay\nBlows my mundane cares away.\nAnd 'though all that you may say,\nYes, forever here I'll stay,\nWatching sails on the bay. \n\nI love you,\nSo I hope you understand.\nThat it seems\nThings don't happen as they're planned.\n\nSo my dear\nWhen I can't be by your side;\nRemember me\nAnd when you went out with the tide.\n\n‘Cause I know you can't remain,\nBut I'm tethered by a chain.\nAnd the price of love I'll pay.\nWatching sails on the bay.\n\nWatching sails on the bay\nBlows my mundane cares away.\nAnd 'though all that you may say,\nYes, forever here I'll stay,\nWatching sails on the bay.\n\nWatching sails on the bay."},
{"title":"Home (Aesop)","date":"2015-11-28","content":"When Zeus, the god, his wedding planned,\nHe sent the news to all the land.\n\nEach creature he did then invite,\nThat they might share in his delight.\n\nAnd on that day they all did stand\nAs witness to the fête so grand.\n\nExcept for one, there on the list,\nThe tortoise had been sorely missed.\n\nSo Zeus inquired of the slight,\nAnd where the tortoise was that night.\n\nIn meekness did the tortoise say,\n“In fact, I stayed at home all day.\n\nI’m sure you had delicious fare,\nAnd everyone was gathered there,\n\nBut from my youth, and now full grown,\nI’d often rather be alone.\n\nAnd ‘though it’s not a palace dome,\nThere’s really no place quite like home.\n\nPerhaps I missed a lovely band,\nBut I was quite contended.” And,\n\nThis answer did not Zeus appease\nAnd so his scepter he did seize.\n\nAn edict he did firmly state:\n“Forever, from this very date,\n\nBecause the tortoise likes to stay\nWithin her house both night and day,\n\nShe’ll carry it upon her back.\nAnd thus, her home she’ll never lack.\n\nAnd will not offer this excuse,\nIf summoned once again by Zeus.”\n\nSo, as you may know very well,\nThat’s why a tortoise has a shell.\n\n---\n\n‘Though you may ‘round the world roam,\nSome peace is only felt at home."},
{"title":"More","date":"2015-11-29","content":"To some it seems is given more.\nThis topic then I must explore.\nFor why to them and not to me?\nInjustice done, you must agree!\n\nWhile lovers walking hand in hand\nDo pass my way, I solemn stand.\nAlone I pass away my time.\nIn solitude I wax sublime.\n\nIn commerce, some reach lofty heights.\nThey wield their pow'r in corp'rate fights.\nWhile I my memos churn and file,\nWith hopes to emulate their style.\n\nThen others travel ‘round the globe.\nExotic ports they daily probe.\nAs I more static on my stool,\nAppear to all, the village fool.\n\nAnd some are wise and some are proud,\nWhile some stand tall above the crowd.\nAs some have wealth to high degree,\nAnd others rare lack company.\n\nIs this then some eternal scheme,\nTo thwart my every waking dream?\nOr may I from this state redeem\nA little more than it may seem.\n\nFor fame, good looks and mounds of gold\nDo not a great man make, I'm told.\nAnd this I certain must believe\nShould I to greatness wish achieve.\n\nSo rather curse in heaven's name,\nI will not unfair practice claim,\nBut simply live my life each day,\nAnd on the straight and narrow stay.\n\nSo when I see my Maker's face\nHe won't resist my warm embrace.\nThat by His side I'll take my place.\nAnd progress on within His grace.\n\nSo whether rich or famous I\nShould be the day I'm called to die;\nAs long as I am free of sin,\nCelestial glory I shall win."},
{"title":"Uplift","date":"2015-11-30","content":"Some dream to garner fortunes great.\nAnd some to rule a sovereign state.\nWhile others wish to show their might\nBy killing others in a fight.\n\nAnd there are those that seek great fame\nWith passion that all know their name.\nI only wish, by verse I may,\nUplift a single soul this day."},
{"title":"Lucre","date":"2015-12-01","content":"'Though green and wrinkled in a wad\nTo modern man thou art a god.\nFrom humble tree along a hill\nYou now incite some men to kill.\n\nAs lives are spent in your pursuit\nTo some is felt, art evil's root.\nTo others, panacea true,\nThe cure for mankind's troubles, you\n\n'Tis you that makes the master, slave.\nCommercial highways do you pave.\nYou feign to judge the worth of man.\nAnd worse, the masses think you can.\n\nO What repugnant filth you are,\nYour kind, we should with fervor bar.\nBut now I'll pen remove from page,\nAs off I go to earn my wage."},
{"title":"Thacher Rising","date":"2015-12-02","content":"From a distant ridge,\nThe future now appears suddenly;\nCarried on proven hooves and strong backs.\n\nStirring dust around them,\nThey arrive hesitantly and perhaps unsure;\nBut with the courage to rise to any challenge.\n\nEncircled by love,\nAnd the wisdom of the ages;\nFallen riders rise again in glory.\n\nTime and trials flee,\nAs the thunder of the herd passes swiftly;\nOn to mountaintops and pastures unknown.\n\nArmed with honor and integrity,\nImbued with fairness and curiosity;\nEach wave of fresh riders, undaunted, nourish distant shores.\n\nEntering each new day,\nHorse and rider take wing;\nSoaring through clouds of splendor to unseen heights.\n\nAnd as a distant dream unfolds,\nThe past becomes the future once again;\nAnd memories of greatness ride to lofty peaks above."},
{"title":"Stupor of Thought","date":"2015-12-03","content":"In past thought of stupor,\nOr stupor of thought,\nA concept before my\nCerebrum was brought.\n\nAre ideas that I think,\nFresh, novel and new,\nOr are they just seeds that\nWere planted and grew?\n\nCan a mind, made of goo\nAnd ancient decay\nCreate out of nothing\nA something, I pray?\n\nCould a library grand\nBe floating around,\nWhere thoughts and ideas on\nGreat scrolls may abound?\n\nDoes God, with syringe, Force\nThem into our brain,\nAnd the smartest just don't\nAllow them to drain?\n\nWhatever conclusion \nFrom this query's wrought,\nRemember it all just\nBegan with one thought."},
{"title":"Looking For Company","date":"2015-12-04","content":"Is it beauty past description —\nThe quality I seek?\nThe intelligence of Einstein,\nOr a disposition meek?\n\nWould it help if she had talents,\nIf she could dance ballet?\nOr if she could a portrait paint,\nPerhaps enact a play?\n\nIf she an occupation had -\nAccountant, engineer?\nIf she could cook and clean and sew?\nWere wealthy without peer?\n\nIf she had all these attributes\nAnd maybe several more —\nShould I think her worth my while, to\nRelinquish freedom for?\n\nThe answer makes such little sense,\nAlthough I know it's true.\nHence without explanation,\nI will share my thoughts with you.\n\nThe heart does not read resumes.\nEmotions heed not facts.\nIt is not to simple logic\nTo which my love reacts.\n\nBut one day when she walks my way,\nAnd simply says \"hello.“\nIf with her I'll forever stay,\nImmediately I'll know."},
{"title":"A Missed Meal (Aesop)","date":"2015-12-05","content":"A lion found a sleeping hare.\nAnd with the prey quite cornered there,\n\nThe great cat hungry now did feel,\nAnd thought to have it for a meal.\n\nBut as his claw was set to wield,\nHe saw a deer out in the field.\n\nThe hare still in his sleep did sprawl,\nYet through the grass the cat did crawl.\n\nApproaching now in speed and stealth,\nHe’d feast upon his new found wealth.\n\nBut as the lion close did creep,\nThe deer jumped clear with mighty leap.\n\nThe lion ran, fast as he could -\nThe deer, more swift, ran through the wood.\n\nThe losing race that then ensued\nDid leave the lion with no food.\n\nDefeated he returned to where\nHe left in peace the sleeping hare.\n\nBut in the leaves, there on the ground,\nThe dozing hare could not be found.\n\n---\n\nPursuing further wealth and greed,\nYou may lose what you have and need.\n\n(Index references: Oxford-Gibbs 286, Perry 148)"},
{"title":"The Season","date":"2015-12-06","content":"An odd phenomenon I've found,\nIs as each year does roll around; \nThe advent of the Christmas season\nComes sooner, for whatever reason.\n\nNot only does it fill December,\nBut very nearly all November.\nAnd soon we'll dress on Halloween\nLike the plumb sugar fairy queen.\n\nNow bells and toys and Santa Clause \nIn mid July may give one pause\nBut as I see it, all is well,\nThe simple reason, I will tell;\n\nThese holidays, it seems, my friend\nDo peace, goodwill and mercy send,\nTo all the people of the earth\nAnd fill the world with love and mirth.\n\nSo if on January first\nThe season on the world did burst\nAnd lasted throughout all the year\nWith 'biding Christmas joy and cheer,\n\nI think it would be quite a boon.\nAnd let us pray it happens soon."},
{"title":"Hero","date":"2015-12-07","content":"I've never known a hero,\nWho thought that he was brave.\nWhose conscious aim was to forsake\nHis life, to other's save.\n\nNot that he wouldn't do it,\nA time or two or more.\nOr that a call to duty, he'd\nOff-handedly ignore.\n\nBut rarely does the need arise\nAnd only fools pursue,\nThe opportunity to die -\nI wouldn't now, would you?\n\nSo I might be a hero, just\nAwaiting my great test.\nI'd rather like to think so.\nOptimism’s always best.\n\nSo throw me in the jaws of hell -\nGreat feats require of me.\nAllow me opportunity,\nMy valor we might see.\n\nOr take my word for it, old friend,\nThat we might never see,\nThe day when my great test does come\nAnd ’fore the foe I flee."},
{"title":"El Cid","date":"2015-12-08","content":"In all of the peninsula\nOf Spain and Portugal;\nHis name's revered by young and old.\nHis exploits known by all.\n\nThere never was a greater man\nTo ride a horse in mail.\nIn battle he was fearsome, brave,\nAnd never known to fail.\n\nBut evil and convincing men\nPersuaded Christian Crown;\nThat our fair knight with jealousy\nWould soon the King bring down.\n\nThey warned that he be sent away,\nRefused by all the land.\nBy royal proclamation, that\nIntact the throne might stand.\n\nSo, banished by the Christian and\nThe enemy of Moor;\nOh my Cid wept, the fabled knight,\nWithout a home and poor.\n\nBut honor was his byword, and\nTrue loyalty his creed.\nHe flew to conquer kingdoms,\nAboard his mighty steed.\n\nAnd then the mighty treasures\nHe did share with his duped King:\nConvincing him with kindness\nThat no danger would he bring.\n\nVast fortunes did he bring the King,\nMuch land and peoples too.\nAnd for his strength and bravery,\nThe Moor from Spain withdrew.\n\nTime honored now by Spaniard as\nProtector from the Moor.\nHis Armor shining brightly, he -\nEl Cid, Campeador."},
{"title":"Skis","date":"2015-12-09","content":"On skis through whitened wood I go.\nAround me pines fresh laced with snow.\nI hear the sound of shifting ice,\nAs sharpened skis do o'er it slice.\n\nI love to see the pristine wood.\nIf you could too, you really should,\nTo feel the icy mountain breeze\nBlow carefully amid the trees.\n\nAnd see the woodland creatures peek\nAs under skis the snow does creak.\nThe air is crystal clean and new,\nI've never seen a grander view."},
{"title":"Rhyme","date":"2015-12-10","content":"Some think it not too easy\nTo write a theme in rhyme;\nTo organize a meter,\nAnd fit the words in time.\n\nThey say to write a poem,\nIn fact is awf’lly hard.\nAnd admiration follows\nThe writing of a bard.\n\nBut I, the situation,\nDo now with thought review.\nI think I'll pen a couple thoughts\nTo share results with you:\n\nThe fact is, poets often\nThe english language bend.\nThey'll often cut and splice their words,\nThe rules of grammar rend.\n\nBut more than that, cohesive thought\nIs often set aside.\nAlthough my purpose is not to\nThe poets work deride.\n\nIt's simply that I rather think\nThat even you or I\nCould write a piece of poetry -\nIf we were pleased to try."},
{"title":"A Little Romance","date":"2015-12-11","content":"Excuse me, would you like to dance?\nI couldn't help but catch your glance,\nAnd so I thought I'd take a chance —\nIn hopes of finding some romance.\n\nIt seems my time is rather full\nWhen trying my fair weight to pull.\nAnd work can rather be a chore,\nWhile sitting home's an awful bore.\n\nBut when in love, the world does change,\nPriorities then rearrange.\nAnd life just seems to glide along,\nLike in some old forgotten song.\n\nA rose, a kiss, with hand in hand,\nA list'ning ear to understand.\nA walk at midnight on the pier,\nAnd someone who will hold me near.\n\nAnd so I‘d rather like to find\nAnother who is so inclined\nTo throw the dice and take a chance,\nIn hopes of finding some romance."},
{"title":"Grasping Victory (Aesop)","date":"2015-12-12","content":"A little tortoise made her way\nAlong a path, one summer day.\n\nInside she felt a little dread –\nAn eagle circled overhead.\n\nAnd soon, the eagle from the sky\nWith talons sharp came swooping by.\n\nHer fears she then did realize\nAs she was lifted in the skies.\n\nThe tortoise did not lose her cool,\nAnd said “great eagle, you’re no fool.\n\nI’m very small and hard to eat -\nI’ll guide you to a tasty treat.\n\nThe eagle to the plan agreed,\nAnd to the tortoise he did heed.\n\nAlong the river they did fly,\nUntil a grove of trees came by.\n\nAnd underneath the leafy stand\nThey found a place where they could land,\n\nBeside a clear and tranquil pond,\nWhere fish for many years had spawned.\n\nThe eagle picked them out with ease\nAnd ate his fill beneath the trees.\n\nThe tortoise with relief did sigh,\nAnd nibbled on the plants nearby,\n\nExpecting that this time of day\nA bear might happen by this way.\n\nThen, as she thought, the bear came by\nAnd found the bird too fat to fly.\n\nThe bear enjoyed an eagle dish,\nBefore a second course of fish.\n\nThe eagle swift was thus undone\nBy tortoise, far too slow to run.\n\n---\n\nBoth the mighty and the fleet,\nMay with trickery be beat."},
{"title":"The Brightest Christmas","date":"2015-12-13","content":"There was no brightly colored tree\nNor carols sung with joy and glee;\nWhen Christ the Lord, the Son of God\nDid come to dwell on earthly sod.\n \nBut since that time in many lands\nHave gifts of splendor traded hands,\nIn mem’ry of that humble birth,\nIn hidden corner of the earth.\n \nNow Santa Claus and lighted trees\nWith jingle bells and pine bough wreaths,\nBeneath an evening crisp and clear,\nHave brought the season joy and cheer.\n \nBut throughout all the land is told\nThat all the riches and the gold\nCould never buy the love unfeigned\nAs in that humble stable reigned.\n \nAnd never did the angels sing\nAs when they did the good news bring;\nThat through this meek and lowly birth,\nOur Savior came to save the earth."},
{"title":"The Greatest Legacy","date":"2015-12-14","content":"For some, the course they navigate\nIs building fortunes vast and great.\nAnd for this monetary goal,\nThey focus all their mind and soul.\n\nAnd some succeed and treasures leave\nFor those who at their coffins grieve.\nWhile others at great wealth do fail,\nAnd leave the destitute to wail.\n\nBut greatest is the legacy\nOf those who served quite happily;\nWho minister to poor and sick,\nAnd friends remain through thin and thick.\n\nWho cling to what they know is true\nAnd always seek the higher view.\nAnd 'though it's not their only quest,\nOft' times with riches they are blessed.\n\nWhich they apply most willingly\nTo acts of generosity -\nPursuing causes most worthwhile,\nThey share their comfort and a smile.\n\nBut either way, I would maintain,\nWe should remember this refrain:\nIt's not the stuff we leave behind.\nIt's what we've done for humankind."},
{"title":"Dessert","date":"2015-12-15","content":"My mother made the greatest cakes\nAnd cookies too and pies.\nBut when I asked her how, why,\nHer response was a surprise...\n\nI wrote her just a little note,\nAnd pleaded that she might\nJust forward desert recipes\nThe next time she did write.\n\nI opened up her envelope,\nAnd in it there was sand\nAnd also seeds for cactus, and,\nI did not understand.\n\nShe also wrote a little note and\nSaid, with one more S,\nI could have got a cookbook.\nShe was right, I must confess.\n\nSo after supper for a treat\nRemember, one more S.\nAnd if you want a barren place,\nJust one will do, I guess."},
{"title":"Golden Gate","date":"2015-12-16","content":"I crossed the golden gate today\nAbove the churning, hostile sea.\nAnd with a pen and paper, I\nDid write the thoughts that came to me.\n\nHow many souls have crossed this span?\nHow many architects did plan;\nWhen raising, how many did die;\nAnd how many at home did cry?\n\nBefore it was, did no one cross;\nOr did they, to ensuing loss?\nDoes it the landscape now disface;\nOr rather does it add its grace?\n\nHow many have their lives destroyed\nBy plummeting into the void?\nHow many others does it save;\nBy carrying above the wave?\n\nI will the trestle now traverse,\nAs honor do I give in verse.\nFor I need only question why,\nTo build the thing I need not try."},
{"title":"Fellow Wonderer","date":"2015-12-17","content":"On a bench in random thought,\nNo great answer herein sought.\nAs the brain does slowly rot,\nExpectations never wrought.\n\nFog encircling 'round the pier.\nMind in some slow motion gear.\nOnly sounds of seabirds hear.\nFootsteps from the mist draw near.\n\nBell from passing ship does ring.\nBird does suddenly take wing,\nAs my random thoughts do sing.\nWho might those dark footsteps bring?\n\nFellow wonderer is there.\nStrolling by, a nod we share.\nDo you think the world should care,\nWhat was thought and pondered there?"},
{"title":"Tribute","date":"2015-12-18","content":"I've never had a better friend.\nShe'd stand beside me ’til the end.\nWith understanding look and smile,\nShe reassures with calming style.\n\nAlong the beach we often run;\nThen stop to view the setting sun.\nWhen others seem to little care,\nI know that she is ever there.\n\nMy life is her raison d'etre,\nThis mortal life we've come to share.\nThe motive for this monologue:\nTo pay a tribute to ... my dog."},
{"title":"A Flying Lesson (Aesop)","date":"2015-12-19","content":"A tortoise by the marsh did play,\nAnd to the birds around did say;\n\n“Oh shearwaters, and gulls, and terns,\nA great desire within me burns.\n\nTo fly, like you, would be a thrill.\nPlease teach to me this wond’rous skill!”\n\nAn eagle overheard the plea,\nAnd asked, “what would you give to me,\n\nTo tutor you up in the sky,\nTo touch the clouds … the trees soar by?”\n\nThe tortoise offered fortune great:\n“The treasures of the sea await.\n\nA great reward I’ll surely pay,\nIf you’ll teach me to fly today.”\n\nAnd so the eagle grasped her tight,\nAnd flapped his wings with all his might.\n\nAnd up into the skies they rose\nJust as their deal did propose.\n\nAbove the trees, the two did soar,\nAnd through the clouds they did explore.\n\nThe tortoise never felt so free,\nAnd shouted out with joy and glee.\n\nThe eagle said “we’re nearly done.”\nI think that you have had your fun.\n\nAnd where’s that treasure of the sea?\nIt’s time to pay my salary.”\n\nThe tortoise then her thanks did give,\nBut said, “I ask you please forgive\n\nThe offer that I rashly made.\nFor ‘though I would have gladly paid,\n\nI did my wealth misrepresent.\nYou see, I do not have a cent.\n\nThen high above a mountain top,\nThe eagle did the tortoise drop.\n\nAnd without any wings at all,\nThe tortoise from the height did fall.\n\nThe helpless tortoise then did cry;\n“In foolishness I yearned to fly.\n\nI struggled just to learn to walk.\nAnd now will die upon a rock.”\n\nSo with her life, the price to pay,\nIn pieces on the ground she lay.\n\n---\n\nTomorrow often brings regrets,\nWhen merriments are paid with debts."},
{"title":"Bethlehem","date":"2015-12-20","content":"O’er all the many centuries,\nIn all the principalities;\nWould that small village, through the earth\nBe known, were not it for his birth?\n \nAnd more, the twelfth month of the year\nWould likely not be filled with cheer.\nNor would we each have trees of pine\nAdorned with lights that color shine.\n \nOur calendar, confused would be,\nNo need for Christianity,\nIn sum, the world would markedly\nBe different from the one we see.\n \nBut greater far, remember that\nIf Mary, Christ had not begat;\nHe could not for our sins have paid -\nAnd thus my humble accolade."},
{"title":"Hands of Love","date":"2015-12-21","content":"Who was the carpenter -\nWith skilled and calloused hands,\nWho built a manger\nAnd sold it to an innkeeper?\n\nWho was the farmer –\nHaving sown good seeds,\nDid harvest, heap, and bundle hay\nUpon a cart, to trade in Bethlehem?\n\nWho was the weaver –\nSpinning fibers into thread,\nThen worked the loom to yield cloth\nFor a young girl to fashion swaddling clothes?\n\nDid they know the child –\nWho was gently placed therein?\nAnd with His hands did heal and teach\nAnd save a world from sin."},
{"title":"The Mirths of Christmas","date":"2015-12-22","content":"The scholars of our time do say;\nChrist was not born on Christmas day.\n \nAnd more, the wise men came too late\nTo be in Bethlehem that date.\n \nThe carols likely not were sung\nAnd not one single bell was rung.\n \nWhat's more, the story of S. Clause,\nDoes also have its share of flaws.\n \nAnd don't forget that tree of pine\nIs nothing more than pagan sign.\n \nBut should these truths at all detract\nFrom that most all consuming fact;\n \nThat Christ was born, and love he brought\nAnd truth to all the masses taught?\n \nSo sing the carols loud and strong,\nAnd let the church bells peal long;\n \nThen trim the tree and deck the halls\nAnd let the shoppers fill the malls.\n \nFor there is cause to celebrate!\nWhat e'er the season or the date.\n \nAnd let us at this time recall\nOur savior came to save us all."},
{"title":"The Brightest Star","date":"2015-12-23","content":"In distant heavens long ago\nA little star once shone;\nA tiny little flicker there,\nNot even half-way grown.\n\nNow, news had traveled far and wide\nThat soon would come the night\nWhen Jesus Christ to earth would come,\nThe King of truth and light.\n\nThe star with all her heart and might\nDid wish to see the birth.\nAnd so she flew across the skies\nToward our tiny earth.\n\nBut where on earth would Jesus come?\nThe star now yearned to know.\nAnd so to wise men from the east\nThe little light did go.\n\nThe wise men knew the Lord would come\nAnd were prepared to find\nThe birthplace of the holy child,\nThe Savior of mankind.\n\nThe wise men plead, \"O precious star,\nIf you will shine above;\nTogether we will find the babe,\nThe Prince of peace and love.\n\nThey traveled to Jerusalem,\nAnd once within the gate\nThe wise men went to ask the king\nAnd bid the star to wait.\n\nOur friend, the little star did gaze\nAt all the earth that night\nAnd then in yonder heaven, she\nDid see a wond'rous sight.\n\nAn angel in the heavens spoke\nGood tidings of great joy -\n\"In humble manger lays our Lord,\nAn holy infant boy.\"\n\nAs hosts of angels filled the sky\nAnd shepherds knelt below.\nThe little star was filled with joy,\nAnd brighter did she glow.\n\nAngelic choirs sang of peace.\n\"Glory to God\" they cried.\nCarols, beautiful sweet and pure,\nEchoed on ev'ry side.\n\nAs shepherds walked to Bethlehem,\nThe star so brightly shined.\nTo help them on their way that night,\nThe baby Lord to find.\n\nThen, in a stable they did see\nThe baby in the hay,\nWhile Joseph held his Mary sweet\nUpon that Christmas day.\n\nThe little star, who once was dim\nIn heaven seen afar,\nDescended on that holy scene,\nAnd was the brightest star.\n\nThe wise men looked and saw her there -\nHer light so bright and pure;\nAnd brought the child their precious gifts\nGold, frankincense and myrrh.\n\nOh little star, we thank you now\nFor giving us your light -\nIlluminating all the earth\nThat holy Christmas night."},
{"title":"Holiday Memories","date":"2015-12-24","content":"As Christmas bows are tied with care\nAnd candy canes delight\nWhen carols through the halls do sound,\nAnd candles sparkle bright;\n\nMy memories of holidays\nIn times long past bring cheer.\nAnd expectations lift my heart,\nAs Christmas comes each year.\n\nWhen youth was my companion dear\nAnd I from stress was free –\nAwaiting reindeer and St. Nick\nWould fill my heart with glee.\n\nEach present I would hold with care \nAnd guess the gift unseen,\nImagining the treasure held\nWithin the red and green.\n\nBut now that streaks of gray and white\nAdorn my aging head\nI’d gladly trade the presents for\nMy children near instead.\n\nPreparing feasts for loved ones dear\nAnd setting out each plate\nWe listen for their footsteps now\nWithin our garden gate.\n\nWe sit around a blazing fire\nAnd talk of days gone by;\nAs smells beyond the kitchen waft\nOf roast, potatoes, pie…\n\nWe tuck the little ones in bed,\nUpon them blankets throw,\nAnd decorate for Christmas ‘morn\nAs embers lose their glow.\n\nAnd hope that in a child’s heart\nOur legacy lives on.\nAnd Christmas’ spirit lingers still\nWhen all of us are gone."},
{"title":"A Christmas Thought","date":"2015-12-25","content":"Wast born 'neath crisp and clear dark night,\nIn a manger, lovely sight.\n'Though humbler place could not be found,\nAngels with their trumps did sound.\nThe baby Jesus, Son of God,\nThy great mission we do laud.\n \n'Though many years have passed away\nSince that sacred, holy day;\nPray, we might not forget Thy love\nPoured abundant from above.\nThat cheer might fill the empty heart\nAs we, with others, love impart.\n \nAll through the season, and the year\nMay the feelings linger near.\nThat when the tree and glitter's gone;\nThe spirit, we might carry on."},
{"title":"Hold On Tight! (Aesop)","date":"2015-12-26","content":"A tortoise watched the birds all fly,\nAnd chipmunks quickly scamper by;\n\nAnd thought where he would like to go,\nIf he did not move quite so slow.\n\nIf like the hare, with speed could run,\nEach day he’d chase the setting sun.\n\nBut on his back, his shell did weigh,\nAnd slowed each step throughout the day.\n\nThe world had surely much to see,\nIf he could of his shell be free.\n\nTwo ducks did all this overhear,\nAnd to the tortoise waddled near.\n\nWith feathers they did dry his tear,\nAnd shared a thought to bring him cheer:\n\n“Perhaps we could bestow a gift,\nAnd give to you a little lift…\n\nWe’ll find a stick that’s strong, but light –\nWell suited to a lengthy flight.\n\nThen in our beaks, we’ll hold each end.\nAnd you’ll bite in the middle, friend.\n\nThen all the world you’ll get to see,\nAs you fly in our company.”\n\nThe tortoise did no longer grieve,\nAnd said with glee, “when can we leave?”\n\nSo, quickly they did all prepare,\nTo leave the ground and take to air.\n\nAgain the ducks, the tortoise told,\n“You never must release your hold!”\n\nThen slowly first, the three did rise,\nToward the clear and sunny skies.\n\nAnd ever upward, they rose higher,\nJust as the tortoise did desire.\n\nA crow did happen by in flight,\nAnd paused at this amazing sight.\n\nShe asked, “who is this that you bring,\nIs this indeed the tortoise king?”\n\nThis praise, the tortoise did surprise,\nAnd in response, though quite unwise,\n\nThe tortoise shouted, “thank you ma’m,”\nThen found himself in quite a jam.\n\nAs from his mouth the stick did slip\nAnd he had lost his precious grip.\n\nThe world now, he would never view,\nHis travels now completely through.\n\nUpon the rocks, now just debris …\nBut from his shell, he was now free.\n\n---\n\nJust focus on the task at hand,\nOr suffer destiny unplanned.\n\n: 2, Aesop’s Fables (1884): 188)\n\nTraditional"},
{"title":"My Lord","date":"2015-12-27","content":"Humble savior, born in stall;\nCome to save the world all.\nCondescension of a God,\nIn the robes of peasant shod.\n \nMission holy sent to do,\nHow I wish they only knew!\nWhy does man not understand\nProphets in his very land?\n \nOften simple minds reject\nTreasures great and truths correct.\nMay I always comprehend,\nAll the wondrous gifts you send.\n \nAnd the earth, the truth be taught,\nThat thy suff'ring be for aught.\nOh my savior, holy lamb,\nIn thy debt I always am."},
{"title":"Problems","date":"2015-12-28","content":"Be grateful for the problems that\nYou face each day at work.\nEmbrace each challenge as it comes,\nAnd do not from them shirk.\n\nBecause, you see, if all went smooth\nAnd no one had a care -\nIt's very likely you would find\nThey wouldn't need you there!"},
{"title":"A Better Way","date":"2015-12-29","content":"Each one of us is born, does die;\nAt both events, our loved ones cry.\nIn the remaining time between,\nThe bounties of this earth we glean.\n\nBut I must query all, this day\nTo answer this, if someone may;\nWhose duty is it to decide\nHow long, we on this earth reside?\n\nWho sends the soldier off to kill,\nTo take a life against its will.\nWho doles out medicines and care\nWhen bodies fall in disrepair.\n\nWho, with a fetus does away,\nAs death to comatose does stay.\nWho, great sums spend on sick and old\nWhen strong and healthy suffer cold.\n\nAs lack of food a child does kill\nWho, for the dying pays on still.\nThe answer, I don't feign to know,\nAnd so my search must onward go.\n\nBut this I'll dare to state today;\nThere ought to be a better way!"},
{"title":"Joshua Tree","date":"2015-12-30","content":"O, there you stand with hands upraised\nLike Joshua of old.\nIn praise of the almighty God -\nAt least that's what I'm told.\n\nJoshua Tree from desert stand\nYou rise above the rest.\nSurviving heat and swirling sand,\nYou make of it the best.\n\nGood fellowship you offer to\nThe lonely traveler.\nAnd without company yourself,\nSo faithful, you endure."},
{"title":"River of Time","date":"2015-12-31","content":"River of time,\nFlowing ever onward.\nA paradigm,\nWith many thoughts inferred.\n\nAn element so pure is not\nAs water from the source is brought\nBeginnings in the melted ice\nA streamlet does begin arise,\nAs infant grows to larger size;\nI wonder how it's banks should rise\n\nThe rapids clean and purify,\nThe pools reflecting question why.\nAt times I feel an undertow,\nWhile later it does slowly flow.\nAnd then, at last, when all is done\nIt meets the sea and flows as one.\n\nRiver of time,\nFlowing ever onward.\nA paradigm,\nWith many thoughts inferred."},
{"title":"New Year","date":"2016-01-01","content":"The New Year dawns with hope renewed,\nAs through a clearer window viewed.\n\nThe burdens of the months behind\nNo longer clutter up the mind.\n\nNew possibilities abound,\nA firm resolve within us found.\n\nAs resolutions fill our heart -\nA better course this year we’ll chart."},
{"title":"The Crow's Counsel (Aesop)","date":"2016-01-02","content":"An eagle perched atop a beach\nDid spot a tortoise near his reach.\n\nHe had not seen this thing before\nAnd walked up close to now explore.\n\nThe tortoise was within his shell,\nAnd there remained, protected well.\n\nWith mighty beak, he pecked its back.\nBut no response from this attack.\n\nWith talons he did slash and rake.\nBut hardly did a scratch it make.\n\nAnd so he thought he’d fly away,\nTo find another meal that day.\n\nJust then appeared a smiling crow,\nWho said, “let’s talk before you go.\n\nInside this shell’s a meal for two,\nAnd I can tell you what to do.\n\nWith your great strength and my quick brain,\nWe both can something good obtain.\n\nAnd so the eagle said he’d share\nThe shell now held within his care.\n\nThen as the crow his trick did tell,\nThe eagle listened very well.\n\nAnd did just what he had been told -\nWith claws, the shell did tightly hold.\n\nThen with the tortoise, up he flew\nToward the sunny skies of blue.\n\nAnd with the rocks now far below,\nHe let his package quickly go.\n\nWith stones below, it made impact\nAnd open wide the shell did crack.\n\nThe crow was waiting close at hand,\nNearby the rocks, upon the sand.\n\nAnd quickly did the meat then seize\nAnd flew away, beneath some trees.\n\nUpon returning to the place,\nThe eagle did not find a trace\n\nOf crafty crow or meat to share –\nThe shell had been left fully bare.\n\nSo while the crow did eat his fill,\nThe eagle stood there hungry still.\n\n---\nWhen following a charted course,\nConsider well, how true the source."},
{"title":"Praise","date":"2016-01-03","content":"With the angels, praise we give thee —\nFather of the light.\nCrying loud our adoration,\nFor thy grace and might.\n\nFrom thy presence, holy offspring\nHere on earth to dwell;\nMay we not deny our lineage.\nMay we serve thee well.\n\nShare thy gospel with our neighbor;\nTeach our children love.\nLabor in thy holy temple,\nPray to thee above."},
{"title":"Power","date":"2016-01-04","content":"The only time over which \nWe have power\nTo exercise control\nIs now!"},
